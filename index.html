<script>
// ==================== PP4 + DHT ДВИЖОК v2.4.1 ====================
const PP4={_peerId:null,_beacons:{},_channels:{},_requests:[],_ws:null,_wsUrl:'wss://robincall.stephanclaps-491.workers.dev/ws',_wsReconnectDelay:1000,_maxReconnectDelay:30000};
const DHT={_nodeId:null,_buckets:[],_storage:{},_k:20,_alpha:3,_peers:new Map(),_signalSend:null};
if(!window.crypto?.subtle)throw new Error('Требуется HTTPS');
const RND=()=>{const a=new Uint32Array(4);crypto.getRandomValues(a);return[...a].map(x=>x.toString(16).padStart(8,'0')).join('');};
const SHA=async t=>{const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');};
async function generateHardwarePeerId(){const p=[];try{const c=document.createElement('canvas');const gl=c.getContext('webgl');const ext=gl.getExtension('WEBGL_debug_renderer_info');if(ext){p.push(gl.getParameter(ext.UNMASKED_VENDOR_WEBGL));p.push(gl.getParameter(ext.UNMASKED_RENDERER_WEBGL));}}catch(e){}try{const ctx=new AudioContext();p.push(ctx.sampleRate.toString());p.push(ctx.destination.maxChannelCount.toString());ctx.close();}catch(e){}p.push(screen.width+'x'+screen.height,screen.colorDepth.toString(),navigator.hardwareConcurrency||'',navigator.deviceMemory||'');let s=localStorage.getItem('pp4_hw_salt');if(!s){s=RND();localStorage.setItem('pp4_hw_salt',s);}p.push(s);const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p.join('|')));return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('').substring(0,32);}
async function generateKeyPair(){return await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-256'},true,['deriveBits']);}
async function exportPublicKey(kp){const r=await crypto.subtle.exportKey('raw',kp.publicKey);return btoa(String.fromCharCode(...new Uint8Array(r)));}
async function importPublicKey(b64){const r=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));return await crypto.subtle.importKey('raw',r,{name:'ECDH',namedCurve:'P-256'},false,[]);}
async function deriveSecret(kp,remotePubKey){const b=await crypto.subtle.deriveBits({name:'ECDH',public:remotePubKey},kp.privateKey,256);return Array.from(new Uint8Array(b)).map(b=>b.toString(16).padStart(2,'0')).join('');}
async function encryptAES(text,secret){const k=await crypto.subtle.importKey('raw',new TextEncoder().encode(secret.substring(0,32)),{name:'AES-GCM'},false,['encrypt']);const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,new TextEncoder().encode(text));const c=new Uint8Array(iv.length+new Uint8Array(ct).length);c.set(iv);c.set(new Uint8Array(ct),iv.length);return btoa(String.fromCharCode(...c));}
async function decryptAES(enc,secret){try{const k=await crypto.subtle.importKey('raw',new TextEncoder().encode(secret.substring(0,32)),{name:'AES-GCM'},false,['decrypt']);const c=Uint8Array.from(atob(enc),x=>x.charCodeAt(0));return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:c.slice(0,12)},k,c.slice(12)));}catch(e){return null;}}
async function packBlob(jsonString,secret){let p=jsonString;if(p.length>3800)p=p.substring(0,3800);const pad=crypto.getRandomValues(new Uint8Array(4096-p.length));p+=String.fromCharCode(...pad);return await encryptAES(p,secret);}
async function unpackBlob(blob,secret){const dec=await decryptAES(blob,secret);if(!dec)return null;try{return JSON.parse(dec.trim().replace(/\x00+$/,''));}catch(e){return null;}}
function saveChannels(){const d=Object.entries(PP4._channels).map(([id,ch])=>({id,peerId:ch.peerId,type:ch.type,expires:ch.expires,createdAt:ch.createdAt}));localStorage.setItem('pp4_channels',JSON.stringify(d));}
function loadChannels(){try{const r=localStorage.getItem('pp4_channels');if(!r)return;JSON.parse(r).forEach(ch=>{if(Date.now()<ch.expires)PP4._channels[ch.id]={...ch,blobs:[],secret:null,reconnect:true};});}catch(e){}}
let pendingDH={};

// ========== DHT KADEMLIA ==========
function xorDistance(id1,id2){const len=Math.min(id1.length,id2.length);let dist='';for(let i=0;i<len;i++)dist+=(parseInt(id1[i],16)^parseInt(id2[i],16)).toString(16);return BigInt('0x'+dist);}
function getBucketIndex(dist){if(dist===0n)return 0;return dist.toString(2).length-1;}
function initBuckets(){DHT._buckets=Array.from({length:256},()=>[]);}
function addPeer(peerId,conn){const dist=xorDistance(DHT._nodeId,peerId);const idx=Math.min(getBucketIndex(dist),255);const bucket=DHT._buckets[idx];const existing=bucket.findIndex(p=>p.id===peerId);if(existing>=0)bucket.splice(existing,1);bucket.unshift({id:peerId,conn,lastSeen:Date.now()});if(bucket.length>DHT._k)bucket.pop();DHT._peers.set(peerId,{conn,lastSeen:Date.now()});}
function getClosestPeers(targetId,count=DHT._k){const all=[];for(const bucket of DHT._buckets)for(const peer of bucket)all.push({...peer,distance:xorDistance(targetId,peer.id)});all.sort((a,b)=>(a.distance<b.distance?-1:a.distance>b.distance?1:0));return all.slice(0,count);}
function findLocally(key){return DHT._storage[key]||null;}
const pendingDHTRequests=new Map();
function setupDataChannel(dc,peerId){dc.onopen=()=>{addPeer(peerId,dc);updateUI();};dc.onclose=()=>{DHT._peers.delete(peerId);for(const bucket of DHT._buckets){const idx=bucket.findIndex(p=>p.id===peerId);if(idx>=0)bucket.splice(idx,1);}updateUI();};dc.onmessage=(e)=>{const msg=JSON.parse(e.data);const peer=DHT._peers.get(peerId);if(peer)peer.lastSeen=Date.now();if(msg.type==='dht-ping'){dc.send(JSON.stringify({type:'dht-pong'}));return;}if(msg.type==='dht-pong')return;if(msg.type==='dht-store'){DHT._storage[msg.key]={value:msg.value,publisher:msg.publisher,timestamp:msg.timestamp};return;}if(msg.type==='dht-find'){const found=DHT._storage[msg.key];dc.send(JSON.stringify(found?{type:'dht-find-response',requestId:msg.requestId,found:true,value:found.value,publisher:found.publisher}:{type:'dht-find-response',requestId:msg.requestId,found:false,peers:getClosestPeers(msg.key,DHT._k).map(p=>({id:p.id}))}));return;}if(msg.type==='dht-find-response'){const resolve=pendingDHTRequests.get(msg.requestId);if(resolve){pendingDHTRequests.delete(msg.requestId);resolve(msg);}return;}if(msg.type==='blob'){handleMessage({type:'blob',blob:msg.blob,channelId:msg.channelId});return;}};}
async function sendToPeer(peerId,message){const peer=DHT._peers.get(peerId);if(!peer?.conn||peer.conn.readyState!=='open')return;try{peer.conn.send(JSON.stringify(message));}catch(e){}}
async function sendToPeerAndWait(peerId,message){const requestId=RND();message.requestId=requestId;return new Promise((resolve)=>{pendingDHTRequests.set(requestId,resolve);sendToPeer(peerId,message);setTimeout(()=>{if(pendingDHTRequests.has(requestId)){pendingDHTRequests.delete(requestId);resolve(null);}},5000);});}
function dhtStore(key,value,publisher){const closest=getClosestPeers(key,DHT._k).filter(p=>p.conn?.readyState==='open');DHT._storage[key]={value,publisher,timestamp:Date.now()};for(const peer of closest)sendToPeer(peer.id,{type:'dht-store',key,value,publisher,timestamp:Date.now()});return closest.length;}
async function dhtFindValue(key){const local=findLocally(key);if(local)return local;const asked=new Set();let closest=getClosestPeers(key,DHT._alpha);for(let round=0;round<3;round++){const promises=closest.filter(p=>!asked.has(p.id)).map(p=>{asked.add(p.id);return sendToPeerAndWait(p.id,{type:'dht-find',key});});const results=(await Promise.all(promises)).filter(r=>r);for(const r of results){if(r.found){DHT._storage[key]={value:r.value,publisher:r.publisher,timestamp:Date.now()};return r;}if(r.peers)for(const p of r.peers)if(!asked.has(p.id))addPeer(p.id,null);}closest=getClosestPeers(key,DHT._k).filter(p=>!asked.has(p.id)).slice(0,DHT._alpha);if(closest.length===0)break;}return null;}
async function handleSignal(fromPeerId,signal){const pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});pc.ondatachannel=(e)=>{setupDataChannel(e.channel,fromPeerId);const ch=Object.entries(PP4._channels).find(([_,c])=>c.peerId===fromPeerId);if(ch)updateUI();};pc.onicecandidate=(e)=>{if(!e.candidate&&pc.localDescription&&DHT._signalSend)DHT._signalSend(fromPeerId,{type:'dht-signal',sdp:JSON.stringify(pc.localDescription)});};await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(signal.sdp)));const answer=await pc.createAnswer();await pc.setLocalDescription(answer);return pc;}
async function connectToPeerDHT(peerId){const pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});const dc=pc.createDataChannel('dht');setupDataChannel(dc,peerId);pc.onicecandidate=(e)=>{if(!e.candidate&&pc.localDescription&&DHT._signalSend)DHT._signalSend(peerId,{type:'dht-signal',sdp:JSON.stringify(pc.localDescription)});};const offer=await pc.createOffer();await pc.setLocalDescription(offer);return{pc,dc};}

// ========== ЕДИНЫЙ WEB SOCKET ==========
function connectWS(){if(PP4._ws&&PP4._ws.readyState===WebSocket.OPEN)return;try{PP4._ws=new WebSocket(PP4._wsUrl);}catch(e){setTimeout(connectWS,PP4._wsReconnectDelay);PP4._wsReconnectDelay=Math.min(PP4._wsReconnectDelay*2,PP4._maxReconnectDelay);return;}PP4._ws.onopen=()=>{PP4._wsReconnectDelay=1000;PP4._ws.send(JSON.stringify({action:'subscribe',peerId:PP4._peerId}));checkRequests();};PP4._ws.onmessage=async e=>{let m;try{m=JSON.parse(e.data);}catch(er){return;}if(m.type==='dht-signal'&&m.from!==DHT._nodeId){await handleSignal(m.from,m.data);return;}await handleMessage(m);};PP4._ws.onclose=()=>{setTimeout(connectWS,PP4._wsReconnectDelay);PP4._wsReconnectDelay=Math.min(PP4._wsReconnectDelay*2,PP4._maxReconnectDelay);};}
DHT._signalSend=(targetPeerId,data)=>{if(PP4._ws?.readyState===WebSocket.OPEN)PP4._ws.send(JSON.stringify({action:'dht-signal',targetPeerId,from:DHT._nodeId,data}));};

async function handleMessage(msg){
    if(msg.type==='blob'){for(const[id,ch]of Object.entries(PP4._channels)){if(!ch.secret)continue;const u=await unpackBlob(msg.blob,ch.secret);if(!u)continue;
        if(u.webrtc){await handleWebRTC(u,id);return;}
        if(u.voice){const ct=contacts.find(c=>c.channelId===id);if(id===activeChannelId)addMsg(ct?.name||'Друг','🎤 Голосовое');playVoiceBlob(u.data);return;}
        ch.blobs.push({...u,from:'them'});ch.expires=Date.now()+600000;saveChannels();
        const ct=contacts.find(c=>c.channelId===id);const sn=ct?.name||'Друг';
        if(id===activeChannelId)addMsg(sn,u.d||u.text||'');
        else document.getElementById('robin-text').textContent=`Новое от ${sn}`;
        updateCupIndicator();return;}}
    if(msg.type==='request'){PP4._requests.push({from:msg.from,tempKeyHash:msg.tempKeyHash,time:Date.now(),pubKey:msg.pubKey});renderRequests();updateRequestsBadge();if(PP4._requests.length===1)document.getElementById('requests-modal').classList.add('active');}
    if(msg.type==='beacon-match'){const b=PP4._beacons[msg.beaconId];if(b&&b.keyPair){const chId=msg.channelId||RND();const ss=await deriveSecret(b.keyPair,await importPublicKey(msg.pubKey));PP4._channels[chId]={secret:ss,peerId:msg.peerId,type:'cup',blobs:[],expires:Date.now()+600000,createdAt:Date.now()};delete PP4._beacons[msg.beaconId];delete pendingDH[msg.beaconId];saveChannels();addContact({peerId:msg.peerId,name:'Лучник',channelId:chId,verified:false});updateUI();connectToPeerDHT(msg.peerId).catch(()=>{});}}
    if(msg.type==='connect-ack'){const e=pendingDH[msg.requestId];if(e&&e.keyPair){const chId=msg.channelId||RND();const ss=await deriveSecret(e.keyPair,await importPublicKey(msg.pubKey));PP4._channels[chId]={secret:ss,peerId:msg.peerId,type:'cup',blobs:[],expires:Date.now()+600000,createdAt:Date.now()};delete pendingDH[msg.requestId];saveChannels();addContact({peerId:msg.peerId,name:'Лучник',channelId:chId,verified:false});updateUI();connectToPeerDHT(msg.peerId).catch(()=>{});}}
    if(msg.type==='reconnect-request'){const ch=PP4._channels[msg.channelId];if(ch){const oldS=ch.secret;const ct=contacts.find(c=>c.channelId===msg.channelId);const kp=await generateKeyPair();const pk=await exportPublicKey(kp);const ss=await deriveSecret(kp,await importPublicKey(msg.pubKey));ch.secret=ss;ch.reconnect=false;ch.expires=Date.now()+600000;if(ct?.verified&&oldS&&oldS!==ch.secret){ct.verified=false;saveContacts();renderContacts();addMsg('⚠','Ключ канала изменился!');}if(PP4._ws)PP4._ws.send(JSON.stringify({action:'reconnect-ack',channelId:msg.channelId,pubKey:pk,requestId:msg.requestId,peerId:PP4._peerId}));saveChannels();updateUI();connectToPeerDHT(ch.peerId).catch(()=>{});}}
    if(msg.type==='reconnect-ack'){const e=pendingDH[msg.requestId];if(e){const ch=PP4._channels[msg.channelId];if(ch){const oldS=ch.secret;const ct=contacts.find(c=>c.channelId===msg.channelId);const ss=await deriveSecret(e.keyPair,await importPublicKey(msg.pubKey));ch.secret=ss;ch.reconnect=false;ch.reconnecting=false;ch.expires=Date.now()+600000;if(ct?.verified&&oldS&&oldS!==ch.secret){ct.verified=false;saveContacts();renderContacts();addMsg('⚠','Ключ канала изменился!');}saveChannels();updateUI();delete pendingDH[msg.requestId];connectToPeerDHT(ch.peerId).catch(()=>{});}}}
    if(msg.type==='channel-closed'){if(PP4._channels[msg.channelId]){delete PP4._channels[msg.channelId];saveChannels();updateUI();}}
}

async function createBeacon(){const kp=await generateKeyPair();const pk=await exportPublicKey(kp);const tkh=await SHA(pk);const bid=RND();PP4._beacons[bid]={keyPair:kp,pubKey:pk,hash:tkh,expires:Date.now()+1800000,createdAt:Date.now()};pendingDH[bid]={keyPair:kp};if(PP4._ws)PP4._ws.send(JSON.stringify({action:'beacon',beaconId:bid,tempKeyHash:tkh,peerId:PP4._peerId,pubKey:pk}));document.getElementById('beacon-display').style.display='block';document.getElementById('beacon-display').textContent='Твой Peer ID: '+PP4._peerId;renderBeaconTimers();updateUI();}
async function connectByPeerId(targetId){const kp=await generateKeyPair();const pk=await exportPublicKey(kp);const tkh=await SHA(pk);const rid=RND();pendingDH[rid]={keyPair:kp};if(PP4._ws)PP4._ws.send(JSON.stringify({action:'connect',targetPeerId:targetId,tempKeyHash:tkh,fromPeerId:PP4._peerId,pubKey:pk,requestId:rid}));}
async function acceptRequest(i){const r=PP4._requests[i];if(!r)return;const kp=await generateKeyPair();const pk=await exportPublicKey(kp);if(PP4._ws)PP4._ws.send(JSON.stringify({action:'accept-request',fromPeerId:r.from,tempKeyHash:r.tempKeyHash,myPeerId:PP4._peerId,pubKey:pk}));PP4._requests.splice(i,1);renderRequests();updateRequestsBadge();}
function rejectRequest(i){PP4._requests.splice(i,1);renderRequests();updateRequestsBadge();}
function checkRequests(){if(PP4._ws)PP4._ws.send(JSON.stringify({action:'check-requests',peerId:PP4._peerId}));}
async function reconnectChannel(id){const ch=PP4._channels[id];if(!ch||ch.reconnecting)return;ch.reconnecting=true;const kp=await generateKeyPair();const pk=await exportPublicKey(kp);const rid=RND();pendingDH[rid]={keyPair:kp};if(PP4._ws)PP4._ws.send(JSON.stringify({action:'reconnect',channelId:id,targetPeerId:ch.peerId,pubKey:pk,requestId:rid,fromPeerId:PP4._peerId}));}

// ========== ОТПРАВКА БЛОБОВ (DHT → WS) ==========
async function sendBlobToChannel(channelId,data){const ch=PP4._channels[channelId];if(!ch||!ch.secret)return false;const packed=await packBlob(data,ch.secret);const dhtPeers=getClosestPeers(channelId,3).filter(p=>p.conn?.readyState==='open');if(dhtPeers.length>0){let sent=0;for(const p of dhtPeers){try{await sendToPeer(p.id,{type:'blob',channelId,blob:packed});sent++;}catch(e){}}if(sent>0)return true;}if(PP4._ws)PP4._ws.send(JSON.stringify({action:'blob',channelId,blob:packed,peerId:PP4._peerId}));return true;}

// ========== WebRTC ==========
let pc=null,localStream=null,callActive=false,incomingOffer=null,ringtoneAudio=null,ringbackAudio=null,pendingIce=[];
async function getMediaStream(){try{return await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});}catch(e){return null;}}
function createPC(){if(pc){pc.close();pc=null;}pendingIce=[];pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]});if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));pc.ontrack=e=>{if(e.streams[0]){const a=new Audio();a.srcObject=e.streams[0];a.play().catch(()=>{});}};pc.onicecandidate=e=>{if(e.candidate&&activeChannelId)sendWebRTCMsg('webrtc-ice',JSON.stringify(e.candidate));};pc.onconnectionstatechange=()=>{if(pc.connectionState==='connected'){callActive=true;stopRingback();stopRingtone();addMsg('📞','Разговор начат');}if(pc.connectionState==='disconnected'||pc.connectionState==='failed')hangup(false);};return pc;}
async function sendWebRTCMsg(type,sdp){if(!activeChannelId)return;await sendBlobToChannel(activeChannelId,JSON.stringify({webrtc:type,sdp}));}
function playRingtone(){stopRingtone();ringtoneAudio=new Audio('assets/sounds/melodi.mp3');ringtoneAudio.loop=true;ringtoneAudio.volume=0.5;ringtoneAudio.play().catch(()=>{});}
function stopRingtone(){if(ringtoneAudio){ringtoneAudio.pause();ringtoneAudio.loop=false;ringtoneAudio=null;}}
function playRingback(){stopRingback();ringbackAudio=new Audio('assets/sounds/Welk.mp3');ringbackAudio.loop=true;ringbackAudio.volume=0.5;ringbackAudio.play().catch(()=>{});}
function stopRingback(){if(ringbackAudio){ringbackAudio.pause();ringbackAudio.loop=false;ringbackAudio=null;}}
async function startCall(){if(callActive||!activeChannelId)return;const s=await getMediaStream();if(!s){addMsg('⚠','Нет доступа к микрофону');return;}localStream=s;createPC();playRingback();const o=await pc.createOffer();await pc.setLocalDescription(o);await sendWebRTCMsg('webrtc-offer',JSON.stringify(o));addMsg('📞','Вызов...');}
async function acceptCall(){if(!incomingOffer||!activeChannelId)return;stopRingtone();const s=await getMediaStream();if(!s)return;localStream=s;createPC();await pc.setRemoteDescription(new RTCSessionDescription(incomingOffer));while(pendingIce.length>0){const c=pendingIce.shift();try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(e){}}const a=await pc.createAnswer();await pc.setLocalDescription(a);await sendWebRTCMsg('webrtc-answer',JSON.stringify(a));callActive=true;addMsg('📞','Разговор начат');}
function hangup(send=true){callActive=false;stopRingtone();stopRingback();if(send&&activeChannelId)sendWebRTCMsg('webrtc-hangup','');if(pc){pc.close();pc=null;}if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}incomingOffer=null;pendingIce=[];addMsg('📞','Разговор завершён');}
async function handleWebRTC(u,channelId){if(u.webrtc==='webrtc-offer'){if(callActive||pc){sendWebRTCMsg('webrtc-hangup','');return;}pendingIce=[];incomingOffer=JSON.parse(u.sdp);addMsg('📞','Входящий вызов...');playRingtone();showCallButtons(true);}if(u.webrtc==='webrtc-answer'&&pc){stopRingback();try{await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(u.sdp)));while(pendingIce.length>0){const c=pendingIce.shift();try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(e){}}callActive=true;addMsg('📞','Разговор начат');}catch(e){}}if(u.webrtc==='webrtc-ice'&&pc){try{const c=JSON.parse(u.sdp);if(pc.remoteDescription)await pc.addIceCandidate(new RTCIceCandidate(c));else pendingIce.push(c);}catch(e){}}if(u.webrtc==='webrtc-hangup'){if(callActive||pc){hangup(false);addMsg('📞','Собеседник завершил');}}}

// ========== ГОЛОСОВЫЕ ==========
let voiceRecorder=null,voiceChunks=[],voiceRecording=false;
async function toggleVoiceRecording(){voiceRecording?stopVoiceRecording():startVoiceRecording();}
async function startVoiceRecording(){try{const s=await navigator.mediaDevices.getUserMedia({audio:true});voiceRecorder=new MediaRecorder(s,{mimeType:'audio/webm; codecs=opus'});voiceChunks=[];voiceRecorder.ondataavailable=e=>voiceChunks.push(e.data);voiceRecorder.onstop=async()=>{const blob=new Blob(voiceChunks,{type:'audio/webm'});if(blob.size<100||blob.size>300000)return;const reader=new FileReader();reader.onload=async()=>{const b64=reader.result.split(',')[1];if(activeChannelId){await sendBlobToChannel(activeChannelId,JSON.stringify({voice:true,data:b64}));addMsg('Вы','🎤 Голосовое');}};reader.readAsDataURL(blob);s.getTracks().forEach(t=>t.stop());voiceRecorder=null;voiceRecording=false;document.getElementById('btn-voice').style.background='';};voiceRecorder.start();voiceRecording=true;document.getElementById('btn-voice').style.background='#f44336';}catch(e){addMsg('⚠','Нет доступа к микрофону');}}
function stopVoiceRecording(){try{if(voiceRecorder?.state==='recording')voiceRecorder.stop();}catch(e){voiceRecording=false;const btn=document.getElementById('btn-voice');if(btn)btn.style.background='';}}
function playVoiceBlob(b64){const a=new Audio('data:audio/webm;base64,'+b64);a.play().catch(()=>{});}

// ========== UI ==========
let contacts=[],activeChannelId=null,activePeerId=null;
function updateUI(){const chs=Object.keys(PP4._channels).length;const dhtp=DHT._peers.size;const dhtActive=dhtp>0;document.getElementById('robin-text').textContent=`Каналов: ${chs} | DHT: ${dhtp} пиров`+(dhtActive?' 🟢':' 🟡');}
function addMsg(sender,text){const box=document.getElementById('chat-box');const row=document.createElement('div');row.className='message-row';const sp=['📞','⚠','🔐'];const isSys=sp.some(p=>sender.startsWith(p));const av=isSys?'':'<img src="assets/avatar/001ava.png" class="avatar">';row.innerHTML=`${av}<div class="msg-body"><div class="msg-sender">${sender}</div><div>${text}</div><div class="msg-status">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;box.appendChild(row);box.scrollTop=box.scrollHeight;}
function addContact(c){if(!contacts.find(x=>x.peerId===c.peerId)){contacts.push(c);saveContacts();}renderContacts();}
function saveContacts(){localStorage.setItem('rh_contacts',JSON.stringify(contacts));}
function loadContacts(){try{const r=localStorage.getItem('rh_contacts');if(r)contacts=JSON.parse(r);}catch(e){}}
function renderContacts(){const l=document.getElementById('contacts-list-inner');if(!l)return;l.innerHTML=contacts.map(c=>`<div class="contact-item" onclick="openChat('${c.peerId}')"><div class="contact-info"><span class="contact-name">${c.name||'Лучник'}</span><span class="tag ${c.verified?'verified':'pending'}">${c.verified?'✅ ECDH':'⚠ ECDH'}</span>${c.channelId&&PP4._channels[c.channelId]?`<span style="font-size:0.55em;color:var(--text-dim);">⏱ ${Math.round((PP4._channels[c.channelId].expires-Date.now())/60000)}м</span>`:''}</div>${c.channelId&&PP4._channels[c.channelId]?.reconnect?'<button onclick="event.stopPropagation();reconnectChannel(\''+c.channelId+'\')">🔄</button>':''}</div>`).join('')||'<div style="color:var(--text-dim);padding:20px;">🏹 Лучников нет</div>';}
function openChat(peerId){document.getElementById('contacts-sheet').classList.remove('open');document.getElementById('overlay').classList.remove('show');const ct=contacts.find(c=>c.peerId===peerId);if(!ct||!ct.channelId)return;activePeerId=peerId;activeChannelId=ct.channelId;document.getElementById('robin-bar-sender').textContent=ct.name||'Лучник';document.getElementById('robin-text').textContent='Канал активен';const box=document.getElementById('chat-box');box.innerHTML='<div class="typing-indicator" id="typing-indicator"></div>';const ch=PP4._channels[ct.channelId];if(ch&&ch.blobs)ch.blobs.forEach(b=>{const im=b.from==='me';addMsg(im?'Вы':(ct.name||'Друг'),b.d||b.text||'');});updateCupIndicator();updateRobinBarECDH();}
function updateCupIndicator(){const chId=activeChannelId||Object.keys(PP4._channels)[0];const ch=chId?PP4._channels[chId]:null;const ind=document.getElementById('cup-indicator');if(!ch||!ind){if(ind)ind.style.display='none';return;}ind.style.display='flex';const bc=ch.blobs?ch.blobs.length:0;const be=document.getElementById('cup-blobs');if(be){be.textContent=`${bc}/10`;be.className=bc>=10?'full':bc>=7?'ok':'';}const totalSec=Math.max(0,Math.round((ch.expires-Date.now())/1000));const min=Math.floor(totalSec/60);const sec=totalSec%60;const te=document.getElementById('cup-timer');if(te){te.textContent=`${min}:${sec.toString().padStart(2,'0')}`;te.className=min<=2?'low':min<=5?'ok':'';}}
function updateRobinBarECDH(){const chId=activeChannelId||Object.keys(PP4._channels)[0];const ch=chId?PP4._channels[chId]:null;const ct=contacts.find(c=>c.channelId===chId);const bar=document.getElementById('robin-bar-status');if(!bar)return;if(ch&&ch.secret&&ct?.verified)bar.innerHTML='<span style="color:var(--seeding-color);">🔒 ECDH</span>';else if(ch&&ch.secret)bar.innerHTML='<span style="color:orange;">⚠ ECDH</span>';else bar.innerHTML='';}
function renderBeaconTimers(){const ct=document.getElementById('beacon-timers');if(!ct)return;const now=Date.now();const ab=Object.entries(PP4._beacons).filter(([_,b])=>now<b.expires);ct.innerHTML=ab.length?ab.map(([_,b])=>`<div>🏹 Маяк: ${Math.round((b.expires-now)/60000)} мин</div>`).join(''):'';}
function renderRequests(){const l=document.getElementById('requests-list-inner');if(!l)return;l.innerHTML=PP4._requests.map((r,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;margin:4px 0;background:rgba(255,255,255,0.03);border-radius:8px;"><span style="font-size:0.75em;">📞 ${r.from.substring(0,8)}...</span><div><button class="btn-primary" onclick="acceptRequest(${i})" style="width:auto;padding:6px 12px;font-size:0.7em;">✅</button><button class="btn-dark" onclick="rejectRequest(${i})" style="width:auto;padding:6px 12px;font-size:0.7em;">❌</button></div></div>`).join('')||'<div style="color:var(--text-dim);font-size:0.75em;">Нет заявок</div>';}
function updateRequestsBadge(){const btn=document.getElementById('btn-requests');if(btn)btn.textContent=PP4._requests.length?`📞 (${PP4._requests.length})`:'📞';}
function showCallButtons(show){const div=document.getElementById('call-buttons');if(div)div.style.display=show?'flex':'none';}
function generateSafetyNumber(hash){return hash.match(/.{4}/g).slice(0,4).join('-');}
function generateSafetyEmoji(hash){const e=['🏹','🌲','🦊','🐺','⚔️','🛡️','🍺','🏰','🌟','💪','🤝','🙏','👑','💰','🎯','📞'];const b=hash.match(/.{2}/g).slice(0,4).map(b=>parseInt(b,16)%e.length);return b.map(i=>e[i]).join(' ');}

// ========== ИНИТ ==========
async function init(){
    PP4._peerId=await generateHardwarePeerId();DHT._nodeId=PP4._peerId;initBuckets();
    loadChannels();loadContacts();connectWS();updateUI();renderContacts();
    if(Object.keys(PP4._channels).length>0){const firstId=Object.keys(PP4._channels)[0];const firstCh=PP4._channels[firstId];activeChannelId=firstId;activePeerId=firstCh.peerId;let ct=contacts.find(c=>c.peerId===firstCh.peerId);if(!ct){ct={peerId:firstCh.peerId,name:'Лучник',channelId:firstId,verified:false};contacts.push(ct);saveContacts();}else ct.channelId=firstId;document.getElementById('robin-text').textContent=`Канал с ${ct.name}`;renderContacts();updateRobinBarECDH();}
    
    document.getElementById('btn-arrow').addEventListener('click',()=>{document.getElementById('arrow-modal').classList.add('active');document.getElementById('beacon-display').style.display='none';renderBeaconTimers();});
    document.getElementById('btn-create-beacon').addEventListener('click',()=>{createBeacon();});
    document.getElementById('btn-connect-peer').addEventListener('click',()=>{const v=document.getElementById('peer-id-input').value.trim();if(v)connectByPeerId(v);});
    document.getElementById('close-arrow-modal').addEventListener('click',()=>{document.getElementById('arrow-modal').classList.remove('active');});
    document.getElementById('btn-requests').addEventListener('click',()=>{checkRequests();document.getElementById('requests-modal').classList.add('active');renderRequests();});
    document.getElementById('close-requests-modal').addEventListener('click',()=>{document.getElementById('requests-modal').classList.remove('active');});
    document.getElementById('btn-contacts').addEventListener('click',()=>{renderContacts();document.getElementById('contacts-sheet').classList.add('open');document.getElementById('overlay').classList.add('show');});
    document.getElementById('contacts-close').addEventListener('click',()=>{document.getElementById('contacts-sheet').classList.remove('open');document.getElementById('overlay').classList.remove('show');});
    document.getElementById('overlay').addEventListener('click',()=>{document.getElementById('contacts-sheet').classList.remove('open');document.getElementById('settings-sheet').classList.remove('open');document.getElementById('overlay').classList.remove('show');});
    
    document.getElementById('btn-settings').addEventListener('click',async()=>{const chId=activeChannelId||Object.keys(PP4._channels)[0];const ch=chId?PP4._channels[chId]:null;document.getElementById('dht-peers-display').textContent=DHT._peers.size;if(ch&&ch.secret){const hash=await SHA(ch.secret);const safety=generateSafetyNumber(hash);const emoji=generateSafetyEmoji(hash);document.getElementById('safety-display').textContent=safety+' '+emoji;const vs=document.getElementById('verify-section');if(vs)vs.style.display='block';const qi=document.getElementById('qr-image');if(qi){const data=encodeURIComponent(JSON.stringify({v:1,peerId:PP4._peerId,channelId:chId,safety}));qi.src=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${data}`;qi.style.display='block';document.getElementById('qr-section').style.display='block';}}else{document.getElementById('safety-display').textContent='нет канала';const vs=document.getElementById('verify-section');if(vs)vs.style.display='none';}document.getElementById('settings-sheet').classList.add('open');document.getElementById('overlay').classList.add('show');});
    document.getElementById('settings-close').addEventListener('click',()=>{document.getElementById('settings-sheet').classList.remove('open');document.getElementById('overlay').classList.remove('show');});
    document.getElementById('btn-verify-key').addEventListener('click',()=>{const chId=activeChannelId||Object.keys(PP4._channels)[0];if(!chId)return;const ct=contacts.find(c=>c.channelId===chId);if(ct){ct.verified=true;saveContacts();renderContacts();document.getElementById('verify-section').style.display='none';addMsg('🔐','Ключ канала подтверждён');updateRobinBarECDH();}});
    
    document.getElementById('btn-call').addEventListener('click',()=>{if(callActive)hangup(true);else startCall();});
    document.getElementById('btn-accept-call').addEventListener('click',()=>{showCallButtons(false);acceptCall();});
    document.getElementById('btn-reject-call').addEventListener('click',()=>{showCallButtons(false);stopRingtone();sendWebRTCMsg('webrtc-hangup','');incomingOffer=null;});
    document.getElementById('btn-voice').addEventListener('click',toggleVoiceRecording);
    
    let themeIdx=1;const themes=['paper','forest','morning'];
    document.getElementById('setting-theme').addEventListener('click',()=>{themeIdx=(themeIdx+1)%themes.length;document.documentElement.setAttribute('data-theme',themes[themeIdx]);document.getElementById('theme-name').textContent=themes[themeIdx]==='paper'?'Бумага':themes[themeIdx]==='forest'?'Лес':'Утро';});
    document.documentElement.setAttribute('data-theme','paper');
    
    document.getElementById('send-btn').addEventListener('click',async()=>{const t=document.getElementById('msg-input').value.trim();if(t){if(!activeChannelId){const chIds=Object.keys(PP4._channels);if(!chIds.length)return;activeChannelId=chIds[0];}const ch=PP4._channels[activeChannelId];if(!ch||!ch.secret)return;await sendBlobToChannel(activeChannelId,JSON.stringify({d:t}));ch.blobs.push({d:t,t:Date.now(),n:RND(),from:'me'});ch.expires=Date.now()+600000;saveChannels();addMsg('Вы',t);updateCupIndicator();document.getElementById('msg-input').value='';}});
    document.getElementById('msg-input').addEventListener('keypress',e=>{if(e.key==='Enter')document.getElementById('send-btn').click();});
    
    setInterval(()=>{const n=new Date();document.getElementById('header-date').textContent=n.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});document.getElementById('header-time').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});},1000);
    
    setInterval(()=>{const now=Date.now();for(const[id,ch]of Object.entries(PP4._channels)){if(now>ch.expires){delete PP4._channels[id];saveChannels();if(id===activeChannelId){activeChannelId=null;activePeerId=null;}}}for(const[id,b]of Object.entries(PP4._beacons)){if(now>b.expires)delete PP4._beacons[id];}for(const[id]of Object.entries(pendingDH)){if(!PP4._beacons[id]&&!PP4._channels[id])delete pendingDH[id];}PP4._requests=PP4._requests.filter(r=>now-r.time<1800000);for(const[id,peer]of DHT._peers){if(now-peer.lastSeen>30000&&peer.conn?.readyState==='open')peer.conn.send(JSON.stringify({type:'dht-ping'}));if(now-peer.lastSeen>120000){DHT._peers.delete(id);for(const bucket of DHT._buckets){const idx=bucket.findIndex(p=>p.id===id);if(idx>=0)bucket.splice(idx,1);}}}updateRequestsBadge();updateCupIndicator();renderBeaconTimers();renderContacts();updateUI();},10000);}
init();
</script>
</body>
</html>
