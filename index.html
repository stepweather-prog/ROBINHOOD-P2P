<script>
// ==================== PP4 + DHT + GZIP + RATCHET v3.4 ====================
const DEBUG = true;
function logError(context, error) {
    if (DEBUG) console.error(`[${context}]`, error);
}
function logWarn(context, msg) {
    if (DEBUG) console.warn(`[${context}]`, msg);
}

const PP4={_peerId:null,_beacons:{},_channels:{},_ws:null,_wsUrl:'wss://robincall.stephanclaps-491.workers.dev/ws',_wsReconnectDelay:1000,_maxReconnectDelay:30000};
const DHT={_nodeId:null,_buckets:[],_storage:{},_k:20,_alpha:3,_peers:new Map(),_signalSend:null};
if(!window.crypto?.subtle)throw new Error('Требуется HTTPS');
const RND=()=>{const a=new Uint32Array(4);crypto.getRandomValues(a);return[...a].map(x=>x.toString(16).padStart(8,'0')).join('');};
const SHA=async t=>{const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');};

async function generateHardwarePeerId(){
    const p=[];
    try{const c=document.createElement('canvas');const gl=c.getContext('webgl');const ext=gl.getExtension('WEBGL_debug_renderer_info');if(ext){p.push(gl.getParameter(ext.UNMASKED_VENDOR_WEBGL));p.push(gl.getParameter(ext.UNMASKED_RENDERER_WEBGL));}}catch(e){logError('generateHardwarePeerId/WebGL',e);}
    try{const ctx=new AudioContext();p.push(ctx.sampleRate.toString());p.push(ctx.destination.maxChannelCount.toString());ctx.close();}catch(e){logError('generateHardwarePeerId/Audio',e);}
    p.push(screen.width+'x'+screen.height,screen.colorDepth.toString(),navigator.hardwareConcurrency||'',navigator.deviceMemory||'');
    let s=localStorage.getItem('pp4_hw_salt');if(!s){s=RND();localStorage.setItem('pp4_hw_salt',s);}p.push(s);
    const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p.join('|')));
    return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('').substring(0,32);
}

async function generateKeyPair(){return await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-256'},true,['deriveBits']);}
async function exportPublicKey(kp){const r=await crypto.subtle.exportKey('raw',kp.publicKey);return btoa(String.fromCharCode(...new Uint8Array(r)));}
async function importPublicKey(b64){const r=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));return await crypto.subtle.importKey('raw',r,{name:'ECDH',namedCurve:'P-256'},false,[]);}
async function deriveSecret(kp,remotePubKey){const b=await crypto.subtle.deriveBits({name:'ECDH',public:remotePubKey},kp.privateKey,256);return Array.from(new Uint8Array(b)).map(b=>b.toString(16).padStart(2,'0')).join('');}

async function encryptAES(text,secret){
    const k=await crypto.subtle.importKey('raw',new TextEncoder().encode(secret.substring(0,32)),{name:'AES-GCM'},false,['encrypt']);
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,new TextEncoder().encode(text));
    const c=new Uint8Array(iv.length+new Uint8Array(ct).length);c.set(iv);c.set(new Uint8Array(ct),iv.length);
    return btoa(String.fromCharCode(...c));
}

async function decryptAES(enc,secret){
    try{
        const k=await crypto.subtle.importKey('raw',new TextEncoder().encode(secret.substring(0,32)),{name:'AES-GCM'},false,['decrypt']);
        const c=Uint8Array.from(atob(enc),x=>x.charCodeAt(0));
        return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:c.slice(0,12)},k,c.slice(12)));
    }catch(e){logError('decryptAES',e);return null;}
}

async function compressData(str){
    try{
        const data=new TextEncoder().encode(str);const cs=new CompressionStream('gzip');
        const writer=cs.writable.getWriter();writer.write(data);writer.close();
        const reader=cs.readable.getReader();const chunks=[];
        while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);}
        const totalLength=chunks.reduce((s,c)=>s+c.length,0);const combined=new Uint8Array(totalLength);
        let offset=0;for(const chunk of chunks){combined.set(chunk,offset);offset+=chunk.length;}
        return btoa(String.fromCharCode(...combined));
    }catch(e){logError('compressData',e);logWarn('compressData','GZIP недоступен, отправка без сжатия');return btoa(str);}
}

async function decompressData(b64){
    try{
        const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const ds=new DecompressionStream('gzip');
        const writer=ds.writable.getWriter();writer.write(bytes);writer.close();
        const reader=ds.readable.getReader();const chunks=[];
        while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);}
        const totalLength=chunks.reduce((s,c)=>s+c.length,0);const combined=new Uint8Array(totalLength);
        let offset=0;for(const chunk of chunks){combined.set(chunk,offset);offset+=chunk.length;}
        return new TextDecoder().decode(combined);
    }catch(e){logError('decompressData',e);logWarn('decompressData','GZIP распаковка не удалась, пробуем plain');return atob(b64);}
}

async function computeHMAC(data,secret){
    const hmacKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(secret.substring(0,32)),{name:'HMAC',hash:'SHA-256'},false,['sign']);
    const signature=await crypto.subtle.sign('HMAC',hmacKey,new TextEncoder().encode(data));
    return btoa(String.fromCharCode(...new Uint8Array(signature)));
}

async function verifyHMAC(data,signature,secret){
    try{
        const hmacKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(secret.substring(0,32)),{name:'HMAC',hash:'SHA-256'},false,['verify']);
        const sigBytes=Uint8Array.from(atob(signature),c=>c.charCodeAt(0));
        return await crypto.subtle.verify('HMAC',hmacKey,sigBytes,new TextEncoder().encode(data));
    }catch(e){logError('verifyHMAC',e);return false;}
}

async function advanceRatchet(ch){
    const oldKey=ch.ratchetKey||ch.secret;
    const salt=(ch.ratchetIndex||0).toString(16).padStart(16,'0');
    const newKey=await SHA(oldKey+salt);
    ch.ratchetKey=newKey;ch.ratchetIndex=(ch.ratchetIndex||0)+1;
    if(!ch.oldKeys)ch.oldKeys=[];
    ch.oldKeys.push({index:ch.ratchetIndex-1,key:oldKey});
    if(ch.oldKeys.length>50)ch.oldKeys.shift();
    updateRatchetIndicator();return newKey;
}

async function packBlob(jsonString,ch){
    const compressed=await compressData(jsonString);
    const padSize=Math.floor(Math.random()*50)+20;
    const randomPad=btoa(String.fromCharCode(...crypto.getRandomValues(new Uint8Array(padSize))));
    const data=JSON.stringify({z:compressed,t:Date.now(),n:RND(),pad:randomPad,ri:ch.ratchetIndex||0});
    const currentKey=ch.ratchetKey||ch.secret;
    const hmac=await computeHMAC(data,currentKey);
    const packed=hmac+'|'+data;
    let padded=packed;
    if(padded.length<4096){const pad=crypto.getRandomValues(new Uint8Array(4096-padded.length));padded+=String.fromCharCode(...pad);}
    else padded=padded.substring(0,4096);
    await advanceRatchet(ch);
    return await encryptAES(padded,ch.secret);
}

async function tryDecryptWithKey(decrypted,key){
    const separatorIndex=decrypted.indexOf('|');
    if(separatorIndex===-1)return null;
    const hmac=decrypted.substring(0,separatorIndex);
    const data=decrypted.substring(separatorIndex+1).trim().replace(/\x00+$/,'');
    const valid=await verifyHMAC(data,hmac,key);
    if(!valid)return null;
    try{
        const parsed=JSON.parse(data);
        if(parsed.z){const decompressed=await decompressData(parsed.z);const inner=JSON.parse(decompressed);inner._t=parsed.t;inner._ri=parsed.ri;return inner;}
        delete parsed.pad;delete parsed.ri;return parsed;
    }catch(e){logError('tryDecryptWithKey/JSON',e);return null;}
}

async function unpackBlob(blob,ch){
    const dec=await decryptAES(blob,ch.secret);
    if(!dec)return null;
    let result=await tryDecryptWithKey(dec,ch.ratchetKey||ch.secret);
    if(result)return result;
    if(ch.oldKeys){for(let i=ch.oldKeys.length-1;i>=0;i--){result=await tryDecryptWithKey(dec,ch.oldKeys[i].key);if(result)return result;}}
    return null;
}

async function requestRatchetResync(ch){
    const chId=Object.keys(PP4._channels).find(id=>PP4._channels[id]===ch);
    if(!chId)return;
    const resyncData=JSON.stringify({type:'ratchet-resync',secret:ch.secret,peerId:PP4._peerId});
    const packed=await encryptAES(resyncData,ch.secret);
    broadcastBlob(packed,chId);
    rMsg('🔄 Ресинхронизация ratchet...',3000);
}

function saveChannels(){
    const d=Object.entries(PP4._channels).map(([id,ch])=>({id,peerId:ch.peerId,type:ch.type,expires:ch.expires,createdAt:ch.createdAt}));
    try{localStorage.setItem('pp4_channels',JSON.stringify(d));}catch(e){logError('saveChannels',e);}
}

function loadChannels(){
    try{
        const r=localStorage.getItem('pp4_channels');if(!r)return;
        JSON.parse(r).forEach(ch=>{if(Date.now()<ch.expires)PP4._channels[ch.id]={...ch,blobs:[],secret:null,reconnect:true};});
    }catch(e){logError('loadChannels',e);}
}

let pendingDH={};
function xorDistance(id1,id2){const len=Math.min(id1.length,id2.length);let dist='';for(let i=0;i<len;i++)dist+=(parseInt(id1[i],16)^parseInt(id2[i],16)).toString(16);return BigInt('0x'+dist);}
function getBucketIndex(dist){if(dist===0n)return 0;return dist.toString(2).length-1;}
function initBuckets(){DHT._buckets=Array.from({length:256},()=>[]);}
function addPeer(peerId,conn){const dist=xorDistance(DHT._nodeId,peerId);const idx=Math.min(getBucketIndex(dist),255);const bucket=DHT._buckets[idx];const existing=bucket.findIndex(p=>p.id===peerId);if(existing>=0)bucket.splice(existing,1);bucket.unshift({id:peerId,conn,lastSeen:Date.now()});if(bucket.length>DHT._k)bucket.pop();DHT._peers.set(peerId,{conn,lastSeen:Date.now()});}
function getClosestPeers(targetId,count=DHT._k){const all=[];for(const bucket of DHT._buckets)for(const peer of bucket)all.push({...peer,distance:xorDistance(targetId,peer.id)});all.sort((a,b)=>(a.distance<b.distance?-1:a.distance>b.distance?1:0));return all.slice(0,count);}
const pendingDHTRequests=new Map();

function setupDataChannel(dc,peerId){
    dc.onopen=()=>{addPeer(peerId,dc);updateUI();};
    dc.onclose=()=>{DHT._peers.delete(peerId);for(const bucket of DHT._buckets){const idx=bucket.findIndex(p=>p.id===peerId);if(idx>=0)bucket.splice(idx,1);}updateUI();};
    dc.onmessage=(e)=>{
        let msg;
        try{msg=JSON.parse(e.data);}catch(er){logError('setupDataChannel/onmessage',er);return;}
        const peer=DHT._peers.get(peerId);if(peer)peer.lastSeen=Date.now();
        if(msg.type==='dht-ping'){try{dc.send(JSON.stringify({type:'dht-pong'}));}catch(er){logError('dht-pong/send',er);}return;}
        if(msg.type==='dht-pong')return;
        if(msg.type==='dht-store'){DHT._storage[msg.key]={value:msg.value,publisher:msg.publisher,timestamp:msg.timestamp};return;}
        if(msg.type==='dht-find'){
            const found=DHT._storage[msg.key];
            try{
                dc.send(JSON.stringify(found?{type:'dht-find-response',requestId:msg.requestId,found:true,value:found.value,publisher:found.publisher}:{type:'dht-find-response',requestId:msg.requestId,found:false,peers:getClosestPeers(msg.key,DHT._k).map(p=>({id:p.id}))}));
            }catch(er){logError('dht-find/send',er);}
            return;
        }
        if(msg.type==='dht-find-response'){const resolve=pendingDHTRequests.get(msg.requestId);if(resolve){pendingDHTRequests.delete(msg.requestId);resolve(msg);}return;}
        if(msg.type==='blob'){handleIncomingBlob(msg.blob,msg.channelId);return;}
    };
}

async function sendToPeer(peerId,message){
    const peer=DHT._peers.get(peerId);
    if(!peer?.conn||peer.conn.readyState!=='open')return;
    try{peer.conn.send(JSON.stringify(message));}catch(e){logError('sendToPeer',e);}
}

async function handleSignal(fromPeerId,signal){
    let pc;
    try{
        pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
    }catch(e){logError('handleSignal/RTCPeerConnection',e);return;}
    pc.ondatachannel=(e)=>{setupDataChannel(e.channel,fromPeerId);};
    pc.onicecandidate=(e)=>{if(!e.candidate&&pc.localDescription&&DHT._signalSend)DHT._signalSend(fromPeerId,{type:'dht-signal',sdp:JSON.stringify(pc.localDescription)});};
    try{
        await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(signal.sdp)));
        const answer=await pc.createAnswer();await pc.setLocalDescription(answer);
    }catch(e){logError('handleSignal/SDP',e);}
    return pc;
}

async function connectToPeerDHT(peerId){
    let pc,dc;
    try{pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});}catch(e){logError('connectToPeerDHT/RTCPeerConnection',e);return{};}
    dc=pc.createDataChannel('dht');setupDataChannel(dc,peerId);
    pc.onicecandidate=(e)=>{if(!e.candidate&&pc.localDescription&&DHT._signalSend)DHT._signalSend(peerId,{type:'dht-signal',sdp:JSON.stringify(pc.localDescription)});};
    try{const offer=await pc.createOffer();await pc.setLocalDescription(offer);}catch(e){logError('connectToPeerDHT/SDP',e);}
    return{pc,dc};
}

function connectWS(){
    if(PP4._ws&&PP4._ws.readyState===WebSocket.OPEN)return;
    try{PP4._ws=new WebSocket(PP4._wsUrl);}catch(e){logError('connectWS',e);rMsg('❌ Ошибка подключения к сети',5000);setTimeout(connectWS,PP4._wsReconnectDelay);PP4._wsReconnectDelay=Math.min(PP4._wsReconnectDelay*2,PP4._maxReconnectDelay);return;}
    PP4._ws.onopen=()=>{PP4._wsReconnectDelay=1000;setConnectionStatus('online');try{PP4._ws.send(JSON.stringify({action:'subscribe',peerId:PP4._peerId}));}catch(e){logError('connectWS/subscribe',e);}};
    PP4._ws.onmessage=async e=>{
        let m;
        try{m=JSON.parse(e.data);}catch(er){logError('WS/onmessage',er);return;}
        if(m.type==='dht-signal'&&m.from!==DHT._nodeId){await handleSignal(m.from,m.data);return;}
        if(m.type==='blob'){handleIncomingBlob(m.blob,m.channelId);return;}
    };
    PP4._ws.onclose=()=>{setConnectionStatus('offline');setTimeout(connectWS,PP4._wsReconnectDelay);PP4._wsReconnectDelay=Math.min(PP4._wsReconnectDelay*2,PP4._maxReconnectDelay);};
}

DHT._signalSend=(targetPeerId,data)=>{
    if(PP4._ws?.readyState===WebSocket.OPEN){
        try{PP4._ws.send(JSON.stringify({action:'dht-signal',targetPeerId,from:DHT._nodeId,data}));}catch(e){logError('DHT._signalSend',e);}
    }
};

const BLOB_NS='00000000000000000000000000000000';
let incomingBeacons=[];

function getMyNick(){return document.getElementById('nick-label')?.textContent||'Лучник';}
function getMyAvatar(){return selectedAvatar||'001';}

async function createBeacon(){
    const targetId=document.getElementById('peer-id-input').value.trim();
    if(!targetId){rMsg('Введи Peer ID друга',3000);return;}
    const kp=await generateKeyPair();const pk=await exportPublicKey(kp);const nonce=RND();const bid=RND();
    const beaconKey=await SHA(nonce+'beacon');
    const inner=await encryptAES(JSON.stringify({nonce:nonce,timestamp:Date.now(),peerId:PP4._peerId}),beaconKey);
    const beacon={type:'beacon',pubKey:pk,peerId:PP4._peerId,inner:inner,targetPeerId:targetId,nick:getMyNick(),avatar:getMyAvatar()};
    PP4._beacons[bid]={keyPair:kp,pubKey:pk,nonce:nonce,beaconKey:beaconKey,expires:Date.now()+300000};
    broadcastBlob(JSON.stringify(beacon),BLOB_NS);
    rMsg('🏹 Тетива натянута...',3000);
    document.getElementById('arrow-modal')?.classList.remove('active');
}

function ponkNotify(){const btn=document.getElementById('btn-requests');if(!btn)return;if(incomingBeacons.length>0){btn.classList.add('blink');}else{btn.classList.remove('blink');}}
function ponkConfirm(){if(incomingBeacons.length===0)return;incomingBeacons.shift();ponkNotify();rMsg('✅ Подтверждено!',2000);}

function showChatForChannel(channelId){
    activeChannelId=channelId;
    const ct=contacts.find(c=>c.channelId===channelId);
    if(ct){activePeerId=ct.peerId;document.getElementById('robin-bar-sender').textContent=ct.name||'Лучник';}
    const box=document.getElementById('chat-box');
    box.innerHTML='<div class="typing-indicator" id="typing-indicator"></div>';
    const ch=PP4._channels[channelId];
    if(ch&&ch.blobs){ch.blobs.forEach(b=>{const im=b.from==='me';const ct2=contacts.find(c=>c.channelId===channelId);appendMessage(im?'Вы':(ct2?.name||'Друг'),b.d||b.text||'',im?selectedAvatar:(ct2?.avatar||'001'));});}
    updateCupIndicator();updateRatchetIndicator();
}

async function handleIncomingBlob(blobData,channelId){
    let data;try{data=JSON.parse(blobData);}catch(e){logError('handleIncomingBlob/JSON',e);return;}
    
    if(data.type==='beacon'&&data.pubKey&&data.inner){
        if(data.targetPeerId&&data.targetPeerId!==PP4._peerId)return;
        const remotePubKey=await importPublicKey(data.pubKey);const kp=await generateKeyPair();const myPubKey=await exportPublicKey(kp);
        const ss=await deriveSecret(kp,remotePubKey);const chId=RND();
        PP4._channels[chId]={secret:ss,ratchetKey:ss,ratchetIndex:0,oldKeys:[],peerId:data.peerId,type:'cup',blobs:[],expires:Date.now()+600000,createdAt:Date.now()};
        broadcastBlob(JSON.stringify({type:'beacon-response',pubKey:myPubKey,peerId:PP4._peerId,inner:data.inner,nick:getMyNick(),avatar:getMyAvatar()}),BLOB_NS);
        saveChannels();addContact({peerId:data.peerId,name:data.nick||'Лучник',channelId:chId,verified:false,avatar:data.avatar||'001'});
        updateUI();showChatForChannel(chId);
        incomingBeacons.push({data,time:Date.now()});ponkNotify();
        rMsg('✅ Канал открыт!',3000);return;
    }
    
    if(data.type==='beacon-response'&&data.pubKey&&data.inner){
        for(const[bid,b]of Object.entries(PP4._beacons)){
            if(!b.beaconKey)continue;const dec=await decryptAES(data.inner,b.beaconKey);if(!dec)continue;
            let payload;try{payload=JSON.parse(dec);}catch(e){logError('beacon-response/JSON',e);continue;}
            if(payload.nonce!==b.nonce)continue;
            const remotePubKey=await importPublicKey(data.pubKey);const ss=await deriveSecret(b.keyPair,remotePubKey);const chId=RND();
            PP4._channels[chId]={secret:ss,ratchetKey:ss,ratchetIndex:0,oldKeys:[],peerId:data.peerId,type:'cup',blobs:[],expires:Date.now()+600000,createdAt:Date.now()};
            delete PP4._beacons[bid];saveChannels();addContact({peerId:data.peerId,name:data.nick||'Лучник',channelId:chId,verified:false,avatar:data.avatar||'001'});
            updateUI();showChatForChannel(chId);
            rMsg('✅ Канал открыт!',3000);return;
        }
    }
    
    if(data.type==='ratchet-resync'&&data.secret){const chId=Object.keys(PP4._channels).find(id=>PP4._channels[id].peerId===data.peerId);if(chId){const ch=PP4._channels[chId];ch.ratchetKey=data.secret;ch.ratchetIndex=0;ch.oldKeys=[];rMsg('✅ Ratchet перезапущен',3000);updateRatchetIndicator();}return;}
    
    for(const[id,ch]of Object.entries(PP4._channels)){
        if(!ch.ratchetKey)continue;const u=await unpackBlob(blobData,ch);if(!u)continue;if(u._pad)delete u._pad;
        if(!activeChannelId||activeChannelId!==id)showChatForChannel(id);
        if(u.webrtc){await handleWebRTC(u,id);return;}
        if(u.voice){const ct=contacts.find(c=>c.channelId===id);const senderName=ct?.name||'Друг';const senderAvatar=ct?.avatar||'001';appendMessage(senderName,'🎤 Голосовое',senderAvatar,u.data,'audio/webm');if(id!==activeChannelId)rMsg('🎤 Голосовое от '+senderName,3000);updateCupIndicator();return;}
        ch.blobs.push({...u,from:'them'});ch.expires=Date.now()+600000;saveChannels();
        const ct=contacts.find(c=>c.channelId===id);const sn=ct?.name||'Друг';const sa=ct?.avatar||'001';
        appendMessage(sn,u.d||u.text||'',sa);if(id!==activeChannelId)rMsg('Новое от '+sn,3000);
        updateCupIndicator();playSound('arrow_hit.wav');return;
    }
}

function broadcastBlob(packed,channelId){
    const dhtPeers=getClosestPeers(channelId||BLOB_NS,3).filter(p=>p.conn?.readyState==='open');
    if(dhtPeers.length>0){for(const p of dhtPeers)sendToPeer(p.id,{type:'blob',channelId:channelId||BLOB_NS,blob:packed});return;}
    if(PP4._ws){try{PP4._ws.send(JSON.stringify({type:'blob',channelId:channelId||BLOB_NS,blob:packed,peerId:PP4._peerId}));}catch(e){logError('broadcastBlob/WS',e);}}
}
async function sendBlobToChannel(channelId,data){const ch=PP4._channels[channelId];if(!ch||!ch.ratchetKey)return false;const packed=await packBlob(data,ch);broadcastBlob(packed,channelId);return true;}

function updateRatchetIndicator(){
    const chId=activeChannelId||Object.keys(PP4._channels)[0];const ch=chId?PP4._channels[chId]:null;const indicator=document.getElementById('ratchet-indicator');
    if(!indicator)return;if(!ch||!ch.ratchetKey){indicator.style.display='none';return;}indicator.style.display='inline';
    const ri=ch.ratchetIndex||0;let color,icon;

    if(!activeChannelId||activeChannelId!==channelId){activeChannelId=channelId;const ct=contacts.find(c=>c.channelId===channelId);if(ct){activePeerId=ct.peerId;}}
    if(u.webrtc==='webrtc-offer'){if(callActive||pc){sendWebRTCMsg('webrtc-hangup','');return;}iceBuffer=[];try{incomingOffer=JSON.parse(u.sdp);}catch(e){logError('handleWebRTC/offer-parse',e);return;}const cp=document.getElementById('call-panel');if(cp)cp.style.display='flex';const ct=contacts.find(c=>c.channelId===channelId);document.getElementById('call-avatar').src='assets/avatar/'+(ct?.avatar||'001')+'ava.png';document.getElementById('call-contact-name').textContent=ct?.name||'Лучник';document.getElementById('call-status').textContent='📞 Входящий...';showActiveControls(false);showIncomingControls(true);showCallWave(false);playRingtone();}
    if(u.webrtc==='webrtc-answer'&&pc){stopRingback();try{await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(u.sdp)));iceBuffer.forEach(c=>pc.addIceCandidate(new RTCIceCandidate(c)).catch(er=>{logError('handleWebRTC/answer-ICE',er);}));iceBuffer=[];callActive=!0;document.getElementById('call-status').textContent='✅ Разговор';showIncomingControls(false);showActiveControls(true);showCallWave(true);playSound('open.mp3');}catch(e){logError('handleWebRTC/answer',e);}}
    if(u.webrtc==='webrtc-ice'&&pc){try{const c=JSON.parse(u.sdp);if(pc.remoteDescription)pc.addIceCandidate(new RTCIceCandidate(c)).catch(er=>{logError('handleWebRTC/ICE-add',er);});else iceBuffer.push(c);}catch(e){logError('handleWebRTC/ICE-parse',e);}}
    if(u.webrtc==='webrtc-hangup'){if(callActive||pc){rMsg('📞 Собеседник завершил',3000);hang(!1);}}
}
function startVoiceTimer(){voiceSeconds=0;const vt=document.getElementById('voice-timer-overlay');if(vt){vt.style.display='block';vt.textContent='🎤 0:00';}voiceTimerInterval=setInterval(()=>{voiceSeconds++;const m=Math.floor(voiceSeconds/60),s=(voiceSeconds%60).toString().padStart(2,'0');const vt=document.getElementById('voice-timer-overlay');if(vt)vt.textContent='🎤 '+m+':'+s;},1000);}
function stopVoiceTimer(){if(voiceTimerInterval)clearInterval(voiceTimerInterval);const vt=document.getElementById('voice-timer-overlay');if(vt)vt.style.display='none';}
function toggleVoiceRecording(){voiceRecording?stopVoiceRecording():startVoiceRecording();}
function startVoiceRecording(){if(voiceRecorder?.state==='recording')return;navigator.mediaDevices.getUserMedia({audio:true}).then(st=>{voiceStream=st;voiceRecorder=new MediaRecorder(st,{mimeType:'audio/webm; codecs=opus',audioBitsPerSecond:16000});voiceChunks=[];voiceRecorder.ondataavailable=e=>voiceChunks.push(e.data);voiceRecorder.onstop=()=>{const blob=new Blob(voiceChunks,{type:'audio/webm'});if(blob.size>100&&blob.size<300000&&activeChannelId){const reader=new FileReader();reader.onload=async()=>{const b64=reader.result.split(',')[1];await sendBlobToChannel(activeChannelId,JSON.stringify({voice:true,data:b64}));appendMessage('Вы','🎤 Голосовое','assets/avatar/'+selectedAvatar+'ava.png',b64,'audio/webm');};reader.readAsDataURL(blob);}if(voiceStream){voiceStream.getTracks().forEach(t=>t.stop());voiceStream=null;}voiceRecorder=null;voiceRecording=!1;stopVoiceTimer();document.getElementById('btn-voice-input').style.background='';showVoiceWave(false);};voiceRecorder.start();voiceRecording=!0;startVoiceTimer();document.getElementById('btn-voice-input').style.background='#f44336';showVoiceWave(true);}).catch(e=>{logError('startVoiceRecording',e);rMsg('❌ Микрофон недоступен или занят',3000);});}
function stopVoiceRecording(){if(voiceRecorder?.state==='recording')voiceRecorder.stop();}
function playVoiceBlob(b64){const a=new Audio('data:audio/webm;base64,'+b64);a.play().catch(e=>{logError('playVoiceBlob',e);});}
async function reconnectChannel(id){const ch=PP4._channels[id];if(!ch||ch.reconnecting)return;ch.reconnecting=true;const kp=await generateKeyPair();const pk=await exportPublicKey(kp);const rid=RND();pendingDH[rid]={keyPair:kp};if(PP4._ws){try{PP4._ws.send(JSON.stringify({action:'reconnect',channelId:id,targetPeerId:ch.peerId,pubKey:pk,requestId:rid,fromPeerId:PP4._peerId}));}catch(e){logError('reconnectChannel',e);}}}
async function destroySession(){if(!confirm('⚠ ПОЛНЫЙ СБРОС!'))return;hang(!1);['PP','RobinHoodContacts'].forEach(n=>{try{indexedDB.deleteDatabase(n);}catch(e){logError('destroySession/indexedDB',e);}});try{localStorage.clear();}catch(e){logError('destroySession/localStorage',e);}const box=document.getElementById('chat-box');if(box)box.querySelectorAll('.message-row').forEach(m=>m.remove());playSmokeAnimation();playSound('clear cache.mp3');rMsg('🔥 Всё скурили!',5000);setConnectionStatus('offline');applyTheme('paper');const pas=document.getElementById('profile-avatar-small');if(pas)pas.src='assets/avatar/001ava.png';document.getElementById('robin-avatar').src='assets/avatar/001ava.png';const nl=document.getElementById('nick-label');if(nl)nl.textContent='Твой ник';const ls=document.getElementById('lock-status');if(ls)ls.textContent='Не задан';document.body.classList.remove('custom-bg');document.body.style.removeProperty('--custom-bg');const bs=document.getElementById('bg-status');if(bs)bs.textContent='Не задан';contacts=[];saveContacts();renderContacts();}

const LOCK_KEY='robinhood_lock_v2';let lockType=null,lockPinHash='',pinInput='',isSettingLock=false,failedAttempts=0;
const lockScreen=document.getElementById('lock-screen'),appContainer=document.getElementById('app-container');
async function loadLockSettings(){let saved;try{saved=JSON.parse(localStorage.getItem(LOCK_KEY)||'null');}catch(e){logError('loadLockSettings',e);}if(saved){lockType=saved.type;lockPinHash=saved.pinHash||'';}failedAttempts=0;if(!lockType){lockScreen.style.display='none';appContainer.style.display='flex';PP4._peerId=await generateHardwarePeerId();DHT._nodeId=PP4._peerId;initBuckets();loadChannels();loadContacts();connectWS();initApp();}else{lockScreen.style.display='flex';appContainer.style.display='none';setupLockUI();}}
function setupLockUI(){const pinSection=document.getElementById('lock-pin-section');const patternSection=document.getElementById('lock-pattern-section');const subtitle=document.getElementById('lock-subtitle');const error=document.getElementById('lock-error');if(pinSection)pinSection.style.display='';if(patternSection)patternSection.style.display='none';if(subtitle)subtitle.textContent=isSettingLock?'Задайте пин-код (5 цифр)':'Введите пин-код';if(error)error.textContent='';pinInput='';drawNumpad();updatePinDots();}
function drawNumpad(){const np=document.getElementById('lock-numpad');if(!np)return;np.innerHTML='';for(let i=1;i<=9;i++){const btn=document.createElement('button');btn.className='lock-num';btn.textContent=i;btn.onclick=()=>addPinDigit(i.toString());np.appendChild(btn);}const btn0=document.createElement('button');btn0.className='lock-num zero';btn0.textContent='0';btn0.onclick=()=>addPinDigit('0');np.appendChild(btn0);const btnDel=document.createElement('button');btnDel.className='lock-num';btnDel.textContent='⌫';btnDel.onclick=()=>{pinInput=pinInput.slice(0,-1);updatePinDots();};np.appendChild(btnDel);}
function addPinDigit(d){if(pinInput.length>=5)return;pinInput+=d;updatePinDots();if(pinInput.length===5)setTimeout(()=>verifyPin(),200);}
function updatePinDots(){const dots=document.querySelectorAll('.lock-pin-dot');dots.forEach((d,i)=>d.classList.toggle('filled',i<pinInput.length));}
async function sha256Hash(text){const d=new TextEncoder().encode(text);const h=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');}
async function verifyPin(){if(isSettingLock){if(!lockPinHash){lockPinHash=pinInput;pinInput='';updatePinDots();if(document.getElementById('lock-subtitle'))document.getElementById('lock-subtitle').textContent='Повторите пин-код';return;}if(pinInput===lockPinHash){const hash=await sha256Hash(pinInput);try{localStorage.setItem(LOCK_KEY,JSON.stringify({type:'pin',pinHash:hash}));}catch(e){logError('verifyPin/save',e);}lockType='pin';lockPinHash=hash;isSettingLock=false;pinInput='';updatePinDots();const ls=document.getElementById('lock-status');if(ls)ls.textContent='Пин-код';unlockApp();}else{const err=document.getElementById('lock-error');if(err)err.textContent='Не совпадают. Попробуйте снова.';lockPinHash='';pinInput='';updatePinDots();const sub=document.getElementById('lock-subtitle');if(sub)sub.textContent='Задайте пин-код (5 цифр)';}}else{const hash=await sha256Hash(pinInput);if(hash===lockPinHash){failedAttempts=0;unlockApp();}else{failedAttempts++;pinInput='';updatePinDots();if(failedAttempts>=3){document.querySelectorAll('.lock-num').forEach(b=>b.disabled=true);const err=document.getElementById('lock-error');if(err)err.textContent='Заблокировано. Обновите страницу.';}else{const err=document.getElementById('lock-error');if(err)err.textContent=`Неверно. Осталось попыток: ${3-failedAttempts}`;}}}}
async function unlockApp(){lockScreen.style.display='none';appContainer.style.display='flex';if(!PP4._peerId){PP4._peerId=await generateHardwarePeerId();DHT._nodeId=PP4._peerId;initBuckets();loadChannels();loadContacts();connectWS();}initApp();}
document.getElementById('setting-lock')?.addEventListener('click',()=>{if(lockType){if(confirm('Сбросить блокировку?')){try{localStorage.removeItem(LOCK_KEY);}catch(e){logError('setting-lock/remove',e);}lockType=null;lockPinHash='';const ls=document.getElementById('lock-status');if(ls)ls.textContent='Не задан';}}else{isSettingLock=true;lockPinHash='';pinInput='';lockScreen.style.display='flex';appContainer.style.display='none';setupLockUI();}});
loadLockSettings();
setInterval(()=>{const now=Date.now();for(const[id,ch]of Object.entries(PP4._channels)){if(now>ch.expires){delete PP4._channels[id];saveChannels();if(id===activeChannelId){activeChannelId=null;activePeerId=null;}}}for(const[id,b]of Object.entries(PP4._beacons)){if(now>b.expires)delete PP4._beacons[id];}for(const[id,peer]of DHT._peers){if(now-peer.lastSeen>30000&&peer.conn?.readyState==='open'){try{peer.conn.send(JSON.stringify({type:'dht-ping'}));}catch(e){logError('dht-ping/send',e);}}if(now-peer.lastSeen>120000){DHT._peers.delete(id);for(const bucket of DHT._buckets){const idx=bucket.findIndex(p=>p.id===id);if(idx>=0)bucket.splice(idx,1);}}}updateCupIndicator();updateRatchetIndicator();updateUI();},10000);
</script>
