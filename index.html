<div class="bottom-sheet" id="settings-sheet">
    <div class="bottom-sheet-header">
        <span>⚙️ Опции Шервуда</span>
        <button class="bottom-sheet-close" id="settings-close">✕</button>
    </div>
    <div class="bottom-sheet-list" id="settings-list-inner">
        <!-- Лучники -->
        <div class="contact-item" id="setting-contacts">
            <div class="contact-info">
                <span style="font-size:22px;">👥</span>
                <span class="contact-name">Лучники</span>
            </div>
            <span style="color:var(--text-dim);">→</span>
        </div>
        <!-- Звук -->
        <div class="contact-item" id="setting-sound">
            <div class="contact-info">
                <span style="font-size:22px;">🔔</span>
                <span class="contact-name">Звук</span>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-sound" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        <!-- Тема -->
        <div class="contact-item" id="setting-theme">
            <div class="contact-info">
                <span style="font-size:22px;" id="theme-icon">🌲</span>
                <span class="contact-name">Тема</span>
            </div>
            <span id="theme-name" style="color:var(--text-dim);">Лес</span>
        </div>
        <!-- Сервер -->
        <div class="contact-item" id="setting-server">
            <div class="contact-info">
                <span style="font-size:22px;">🌐</span>
                <span class="contact-name">Сервер</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span id="server-label" style="color:var(--text-dim);font-size:0.7em;">Render</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-server">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
        <!-- Блокировка -->
        <div class="contact-item" id="setting-lock">
            <div class="contact-info">
                <span style="font-size:22px;">🔐</span>
                <span class="contact-name">Блокировка</span>
            </div>
            <span id="lock-status" style="color:var(--text-dim);font-size:0.7em;">Не задан</span>
        </div>
        <!-- Самоуничтожение -->
        <div class="contact-item" id="setting-self-destruct">
            <div class="contact-info">
                <span style="font-size:22px;">💣</span>
                <span class="contact-name">Самоуничтожение</span>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-selfdestruct">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <!-- Туннель -->
        <div class="contact-item" id="setting-tunnel">
            <div class="contact-info">
                <span style="font-size:22px;">🔒</span>
                <span class="contact-name">Туннель</span>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-tunnel">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <!-- Установка приложения -->
        <div class="contact-item setting-install-btn hidden" id="setting-install">
            <div class="contact-info">
                <img src="assets/avatars/001-.png" style="width:28px;height:28px;border-radius:6px;">
                <div>
                    <div class="contact-name" style="font-size:0.8em;">RobinHood P2P</div>
                    <div style="font-size:0.6em;color:var(--text-dim);">Установить приложение</div>
                </div>
            </div>
            <span style="font-size:1.2em;">📲</span>
        </div>
        <!-- ⚠️ БЕЗОПАСНОСТЬ -->
        <div class="contact-item security-warning" id="setting-security-info">
            <div class="contact-info">
                <span style="font-size:22px;">⚠️</span>
                <div>
                    <div class="contact-name">Безопасность</div>
                    <div style="font-size:0.6em;color:var(--text-dim);">
                        Мы не рассылаем APK!<br>
                        Установка только через браузер.<br>
                        Осторожно с подделками!
                    </div>
                </div>
            </div>
            <span style="font-size:1.2em;">🛡️</span>
        </div>
    </div>
</div>
