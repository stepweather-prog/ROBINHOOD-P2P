<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RobinHood P2P</title>
    <link rel="icon" href="data:,">
    <style>
        :root { --bg: #1a2a1f; --bg2: #0d1a0c; --accent: #c4a24b; --accent2: #e8d5a3; --text: #e8e2c7; --dim: #b8a87a; --border: #c4a24b; --green: #4caf50; --red: #f44336; --orange: #ff9800; --msg-bg: rgba(30,40,25,0.85); --input-bg: rgba(20,30,18,0.9); --btn-bg: rgba(196,162,75,0.1); --btn-hover: rgba(196,162,75,0.25); }
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; overflow:hidden; font-family:'Segoe UI',sans-serif; }
        body { background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100dvh; }
        .header { background:rgba(20,30,18,0.95); border-bottom:2px solid var(--border); padding:8px; display:flex; align-items:center; gap:8px; z-index:10; flex-shrink:0; }
        .header-title { font-weight:bold; color:var(--accent2); }
        .header-status { margin-left:auto; display:flex; align-items:center; gap:4px; font-size:0.7em; }
        .dot { width:8px; height:8px; border-radius:50%; }
        .dot.online { background:var(--green); } .dot.offline { background:var(--red); } .dot.checking { background:var(--orange); animation:pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .chat { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:6px; }
        .msg { background:var(--msg-bg); padding:8px 12px; border-radius:12px; border-left:3px solid var(--accent); max-width:85%; animation:slideIn 0.3s ease; }
        .msg.self { border-left-color:var(--green); align-self:flex-end; }
        .msg.system { border-left-color:var(--orange); align-self:center; font-size:0.8em; opacity:0.8; }
        @keyframes slideIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
        .msg-sender { font-weight:bold; font-size:0.8em; color:var(--accent2); }
        .msg-text { font-size:0.9em; margin-top:2px; }
        .input-area { background:rgba(20,30,18,0.95); padding:8px; display:flex; gap:6px; border-top:1px solid var(--border); flex-shrink:0; }
        input { flex:1; background:var(--input-bg); border:1px solid var(--border); padding:10px; color:var(--text); border-radius:8px; outline:none; font-size:14px; }
        input:focus { border-color:var(--accent2); }
        button { background:var(--btn-bg); border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:14px; }
        button:hover { background:var(--btn-hover); }
        button.active-call { background:rgba(76,175,80,0.3); border-color:var(--green); }
        button.hangup { background:rgba(244,67,54,0.3); border-color:var(--red); }
        #log { font-size:0.6em; color:var(--dim); text-align:center; padding:4px; min-height:18px; }
        #call-panel { display:none; background:rgba(0,0,0,0.9); padding:12px; text-align:center; border-top:2px solid var(--border); }
        #call-timer { font-size:1.2em; color:var(--green); font-family:monospace; margin:6px 0; display:none; }
    </style>
</head>
<body>
<div class="header">
    <span class="header-title">🏹 RobinHood P2P</span>
    <div class="header-status">
        <span class="dot checking" id="dot"></span>
        <span id="status">Проверка...</span>
    </div>
    <button id="btn-create">🏹</button>
    <button id="btn-call">📞</button>
    <button id="btn-clear">🚬</button>
</div>
<div class="chat" id="chat"></div>
<div id="call-panel">
    <div id="call-status">📞 Вызов...</div>
    <div id="call-timer">00:00</div>
    <button id="btn-accept" class="active-call" style="display:none;">📞 Ответить</button>
    <button id="btn-reject" class="hangup" style="display:none;">✕ Отклонить</button>
    <button id="btn-hangup" class="hangup" style="display:none;">✕ Завершить</button>
</div>
<div class="input-area">
    <input type="text" id="input" placeholder="Выпустить стрелу..." autocomplete="off">
    <button id="btn-send">➤</button>
</div>
<div id="log"></div>

<script>
// ==================== P2PPong — ЦАРЬ ====================
const SERVERS=[{id:'render',url:'https://p2ppong-v2.onrender.com'},{id:'workers',url:'https://robincall.stephanclaps-491.workers.dev'}];
let channels={},pollTimers={},events={},peerId=null,sessionId=null,ready=!1;

function rnd(){return crypto.randomUUID?.()||Math.random().toString(36).substr(2)+Date.now().toString(36)}
async function sha256(t){const d=new TextEncoder().encode(t);const h=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}
async function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('PP',1);r.onupgradeneeded=()=>{r.result.createObjectStore('id',{keyPath:'k'})};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function loadPeerId(){if(peerId)return peerId;try{const db=await openDB();const v=await new Promise(r=>{const q=db.transaction('id','readonly').objectStore('id').get('peerId');q.onsuccess=()=>r(q.result);q.onerror=()=>r(null)});if(v?.v){peerId=v.v;return peerId}}catch(e){}
const fp=[navigator.userAgent,screen.width,screen.height].join('|');const salt=localStorage.getItem('s')||(localStorage.setItem('s',rnd()),localStorage.getItem('s'));const h=await sha256(fp+'|'+salt);peerId=h.substring(0,16);try{const db=await openDB();db.transaction('id','readwrite').objectStore('id').put({k:'peerId',v:peerId})}catch(e){}return peerId}
async function deriveKey(sec){const h=await sha256(sec);const kb=new TextEncoder().encode(h.substring(0,32));return await crypto.subtle.importKey('raw',kb,{name:'AES-GCM'},false,['encrypt','decrypt'])}
async function encrypt(text,sec){try{const k=await deriveKey(sec);const iv=crypto.getRandomValues(new Uint8Array(12));const enc=new TextEncoder().encode(text);const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,enc);const c=new Uint8Array(iv.length+new Uint8Array(ct).length);c.set(iv);c.set(new Uint8Array(ct),iv.length);return '🔐'+btoa(String.fromCharCode(...c))}catch(e){return text}}
async function decrypt(enc,sec){if(!enc||!enc.startsWith('🔐'))return null;try{const k=await deriveKey(sec);const c=Uint8Array.from(atob(enc.substring(2)),x=>x.charCodeAt(0));const iv=c.slice(0,12);const ct=c.slice(12);const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},k,ct);return new TextDecoder().decode(dec)}catch(e){return null}}
async function api(srv,method,path,body){const server=SERVERS.find(s=>s.id===srv);if(!server)return null;const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),8000);try{const o={method,headers:{'Content-Type':'application/json'},signal:ctrl.signal};if(body)o.body=JSON.stringify(body);const r=await fetch(server.url+path,o);clearTimeout(t);return r.ok?await r.json():null}catch(e){clearTimeout(t);return null}}
function startPoll(sid,srv){
    if(pollTimers[sid])return;
    let last=Date.now();
    const poll=async()=>{
        const s=srv||channels[sid]?.server;
        const res=await api(s,'GET','/message?id='+sid+'&since='+last);
        if(!res?.messages)return;
        for(const m of res.messages){
            const ch=channels[sid];if(!ch)continue;
            let dec=await decrypt(m.packet,ch.sec);
            if(!dec){try{dec=JSON.parse(m.packet).text||m.packet}catch(e){dec=m.packet}}
            let sender=null,text=dec;
            try{const p=JSON.parse(dec);sender=p.sender;text=p.text||dec}catch(e){}
            if(sender===sessionId){last=Math.max(last,m.time>9999999999?m.time:m.time*1000);continue}
            if(events.message)events.message({text,channelId:sid,sender});
            last=Math.max(last,m.time>9999999999?m.time:m.time*1000);
        }
    };
    poll();pollTimers[sid]=setInterval(poll,4000);
}
function stopPoll(sid){if(pollTimers[sid]){clearInterval(pollTimers[sid]);delete pollTimers[sid]}}

async function createArrow(){
    if(!ready)await init();
    const key=rnd();const kh=await sha256(key);const sec=key;
    const results=[];
    for(const s of SERVERS){
        const body=s.id==='workers'?{tempKeyHash:kh,publicId:peerId}:{tempKey:key,tempKeyHash:kh,publicId:peerId};
        const res=await api(s.id,'POST','/beacon',body);
        if(res?.sessionId)results.push({sessionId:res.sessionId,server:s.id});
    }
    if(!results.length){if(events.error)events.error({text:'Серверы не отвечают'});return}
    const primary=results[0];const sid=primary.sessionId;
    channels[sid]={sec,server:primary.server,peerId,servers:results.map(r=>r.server),last:Date.now()};
    const link=`https://stepweather-prog.github.io/ROBINHOOD-P2P/?id=${sid}&servers=${results.map(r=>r.server).join(',')}&peer=${peerId}&key=${key}`;
    if(events.created)events.created({sessionId:sid,link,peerId,key,sec});
    let matched=false;const start=Date.now();
    while(Date.now()-start<90000){
        const checks=await Promise.all(results.map(r=>api(r.server,'GET','/beacon?id='+r.sessionId)));
        if(checks.some(c=>c?.matched)){matched=true;break}
        await new Promise(r=>setTimeout(r,5000));
    }
    if(!matched){delete channels[sid];if(events.error)events.error({text:'Таймаут ожидания'});return}
    channels[sid].last=Date.now();startPoll(sid,channels[sid].server);
    if(events.open)events.open({channelId:sid,role:'creator',peerId,sec});
}

async function acceptArrow(pid,key){
    if(!ready)await init();
    const kh=await sha256(key);const sec=key;
    const params=new URLSearchParams(window.location.search);
    const servers=(params.get('servers')||'render,workers').split(',');
    const sid=params.get('id');
    for(const srv of servers){
        const body=srv==='workers'?{tempKeyHash:kh}:{tempKey:key};
        const res=await api(srv,'POST','/find',body);
        if(res?.status==='matched'){
            const cid=res.sessionId||sid;
            channels[cid]={sec,server:srv,peerId:pid,last:Date.now()};
            startPoll(cid,srv);
            if(events.open)events.open({channelId:cid,role:'receiver',peerId:pid,sec});
            return;
        }
    }
    if(events.error)events.error({text:'Маяк не найден'});
}

async function sendMsg(cid,text){
    if(!ready)await init();
    const ch=channels[cid];
    if(!ch){if(events.error)events.error({text:'Канал не найден',channelId:cid});return}
    const payload=JSON.stringify({text,sender:sessionId,time:Date.now()});
    const encrypted=await encrypt(payload,ch.sec);
    const res=await api(ch.server,'POST','/message',{sessionId:cid,packet:encrypted});
    if(!res){delete channels[cid];stopPoll(cid);if(events.error)events.error({text:'session_not_found',channelId:cid})}
    else{ch.last=Date.now()}
}

function on(ev,cb){events[ev]=cb}
function getChannels(){return channels}
async function init(){
    if(ready)return;
    sessionId=rnd();await loadPeerId();ready=true;
    console.log('[P2PPong] Готов. PeerId:',peerId.substring(0,10)+'...');
    if(events.ready)events.ready({peerId});
}
init().catch(e=>console.error('[P2PPong]',e));
window.P2PPong={init,createArrow,acceptArrow,sendMessage:sendMsg,on,getChannels,getPeerId:()=>peerId};

// ==================== UI — СЛУГА С ЗВОНКАМИ ====================
const chat=document.getElementById('chat'),input=document.getElementById('input'),logEl=document.getElementById('log'),dot=document.getElementById('dot'),statusEl=document.getElementById('status');
const callPanel=document.getElementById('call-panel'),callStatus=document.getElementById('call-status'),callTimer=document.getElementById('call-timer');
const btnAccept=document.getElementById('btn-accept'),btnReject=document.getElementById('btn-reject'),btnHangup=document.getElementById('btn-hangup');
let currentChannelId=null;

// WebRTC
let pc=null,localStream=null,callActive=false,incomingOffer=null,callTimerInterval=null,callSeconds=0;

function addMsg(text,cls=''){
    const div=document.createElement('div');
    div.className='msg '+cls;
    div.innerHTML=text;
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

function setStatus(s){
    dot.className='dot '+s;
    statusEl.textContent=s==='online'?'Готов':s==='offline'?'Нет связи':'Проверка...';
}

function log(msg){logEl.textContent=msg;console.log('[UI]',msg)}

async function getMediaStream(){
    try{return await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}})}
    catch(e){log('❌ Нет микрофона');return null}
}

function createPC(){
    if(pc){pc.close();pc=null}
    pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
    if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
    pc.ontrack=e=>{if(e.streams[0]){const a=new Audio();a.srcObject=e.streams[0];a.play().catch(()=>{})}};
    pc.onicecandidate=e=>{
        if(e.candidate&&currentChannelId){
            P2PPong.sendMessage(currentChannelId,'__ICE__'+JSON.stringify(e.candidate));
        }
    };
    pc.onconnectionstatechange=()=>{
        console.log('[WebRTC] State:',pc.connectionState);
        if(pc.connectionState==='connected'){
            callActive=true;
            startCallTimer();
            callStatus.textContent='✅ Разговор';
            btnHangup.style.display='inline-block';
            btnAccept.style.display='none';
            btnReject.style.display='none';
            log('✅ Разговор активен');
        }
        if(pc.connectionState==='disconnected'||pc.connectionState==='failed'){
            hang(false);
        }
    };
    return pc;
}

function startCallTimer(){
    callSeconds=0;callTimer.style.display='block';callTimer.textContent='00:00';
    callTimerInterval=setInterval(()=>{callSeconds++;const m=Math.floor(callSeconds/60).toString().padStart(2,'0'),s=(callSeconds%60).toString().padStart(2,'0');callTimer.textContent=m+':'+s},1000);
}
function stopCallTimer(){
    if(callTimerInterval)clearInterval(callTimerInterval);
    callTimer.style.display='none';callTimer.textContent='00:00';
}

function showCallPanel(show){callPanel.style.display=show?'block':'none';}

async function startCall(){
    if(callActive||!currentChannelId){log('❌ Нет канала для звонка');return}
    const stream=await getMediaStream();if(!stream)return;
    localStream=stream;createPC();
    showCallPanel(true);callStatus.textContent='📞 Вызов...';btnHangup.style.display='inline-block';btnAccept.style.display='none';btnReject.style.display='none';
    log('📞 Звоним...');
    try{
        const offer=await pc.createOffer();
        await pc.setLocalDescription(offer);
        P2PPong.sendMessage(currentChannelId,'__OFFER__'+JSON.stringify(offer));
    }catch(e){log('❌ Ошибка звонка');hang(true)}
}

async function acceptCall(){
    if(!incomingOffer||!currentChannelId)return;
    const stream=await getMediaStream();if(!stream)return;
    localStream=stream;createPC();
    showCallPanel(true);callStatus.textContent='✅ Разговор';btnHangup.style.display='inline-block';btnAccept.style.display='none';btnReject.style.display='none';
    log('📞 Принимаем...');
    try{
        await pc.setRemoteDescription(new RTCSessionDescription(incomingOffer));
        const answer=await pc.createAnswer();
        await pc.setLocalDescription(answer);
        P2PPong.sendMessage(currentChannelId,'__ANSWER__'+JSON.stringify(answer));
        incomingOffer=null;
        callActive=true;
        startCallTimer();
    }catch(e){log('❌ Ошибка принятия');hang(true)}
}

function hang(sendSignal=true){
    callActive=false;stopCallTimer();
    if(sendSignal&&currentChannelId)P2PPong.sendMessage(currentChannelId,'__HANGUP__');
    if(pc){pc.close();pc=null}
    if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null}
    incomingOffer=null;
    showCallPanel(false);btnHangup.style.display='none';btnAccept.style.display='none';btnReject.style.display='none';
    log('📞 Звонок завершён');
}

// Обработчики кнопок
document.getElementById('btn-create').addEventListener('click',()=>{
    P2PPong.createArrow();
    log('🏹 Создаю стрелу...');
});

document.getElementById('btn-call').addEventListener('click',()=>{
    if(callActive)hang(true);
    else startCall();
});

document.getElementById('btn-clear').addEventListener('click',()=>{
    chat.innerHTML='';
    log('🚬 Чат очищен');
});

document.getElementById('btn-send').addEventListener('click',()=>{
    const text=input.value.trim();
    if(!text)return;
    const chs=P2PPong.getChannels();
    const keys=Object.keys(chs);
    if(!currentChannelId||!chs[currentChannelId]){
        if(keys.length>0)currentChannelId=keys[0];
        else{log('❌ Создайте стрелу (🏹)');return}
    }
    P2PPong.sendMessage(currentChannelId,text);
    addMsg(`<div class="msg-sender">Вы</div><div class="msg-text">${text}</div>`,'self');
    input.value='';
    log('➤ Отправлено');
});

input.addEventListener('keypress',e=>{if(e.key==='Enter')document.getElementById('btn-send').click()});

btnAccept.addEventListener('click',acceptCall);
btnReject.addEventListener('click',()=>{
    if(incomingOffer&&currentChannelId)P2PPong.sendMessage(currentChannelId,'__HANGUP__');
    incomingOffer=null;
    showCallPanel(false);
    log('📞 Отклонено');
});
btnHangup.addEventListener('click',()=>hang(true));

// Понг колбэки
P2PPong.on('ready',()=>{setStatus('online');log('🏹 Готов');const chs=P2PPong.getChannels();const keys=Object.keys(chs);if(keys.length>0)currentChannelId=keys[0]});

P2PPong.on('created',data=>{
    currentChannelId=data.sessionId;
    log('✅ Стрела создана! ID: '+data.sessionId.substring(0,8)+'...');
    navigator.clipboard.writeText(data.link).catch(()=>{});
});

P2PPong.on('open',data=>{
    currentChannelId=data.channelId;
    setStatus('online');
    log('✅ Канал открыт!');
});

P2PPong.on('message',data=>{
    if(!data.text)return;
    
    // Сигнальные сообщения для звонков
    if(data.text.startsWith('__OFFER__')){
        if(callActive||pc){P2PPong.sendMessage(data.channelId,'__HANGUP__');return}
        currentChannelId=data.channelId;
        try{
            incomingOffer=JSON.parse(data.text.replace('__OFFER__',''));
            showCallPanel(true);
            callStatus.textContent='📞 Входящий звонок...';
            btnAccept.style.display='inline-block';
            btnReject.style.display='inline-block';
            btnHangup.style.display='none';
            log('📞 Входящий звонок!');
        }catch(e){log('❌ Ошибка входящего')}
        return;
    }
    
    if(data.text.startsWith('__ANSWER__')&&pc){
        try{
            pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(data.text.replace('__ANSWER__',''))));
            callActive=true;startCallTimer();
            callStatus.textContent='✅ Разговор';
            btnHangup.style.display='inline-block';
            btnAccept.style.display='none';
            btnReject.style.display='none';
            log('✅ Соединение установлено');
        }catch(e){log('❌ Ошибка ANSWER')}
        return;
    }
    
    if(data.text.startsWith('__ICE__')&&pc){
        try{pc.addIceCandidate(new RTCIceCandidate(JSON.parse(data.text.replace('__ICE__','')))).catch(()=>{})}catch(e){}
        return;
    }
    
    if(data.text==='__HANGUP__'){
        if(callActive||pc){log('📞 Собеседник завершил');hang(false)}
        return;
    }
    
    // Обычное сообщение
    currentChannelId=data.channelId;
    addMsg(`<div class="msg-sender">Друг</div><div class="msg-text">${data.text}</div>`);
    log('📩 Сообщение');
});

P2PPong.on('error',data=>{log('⚠ '+(data.text||'Ошибка'));setStatus('offline')});

// Автоподключение
const params=new URLSearchParams(window.location.search);
const refId=params.get('id'),refKey=params.get('key');
if(refId&&refKey){log('🔄 Подключаюсь...');setTimeout(()=>P2PPong.acceptArrow(null,refKey),500)}
</script>
</body>
</html>
