<!DOCTYPE html>
<html lang="ru">
<head>

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src 'self' blob:; connect-src 'self' https://p2ppong.onrender.com https://robincall.stephanclaps-491.workers.dev blob:; img-src 'self' data: blob: https://stepweather-prog.github.io https://warp-generator.github.io; frame-src 'self' https://stepweather-prog.github.io; manifest-src 'self'; form-action 'none'; base-uri 'self';">
    <style>
        :root, [data-theme="forest"] { --bg-primary: #1a2a1f; --bg-secondary: #0d1a0c; --accent: #c4a24b; --accent-light: #e8d5a3; --accent-glow: rgba(196,162,75,0.5); --text: #e8e2c7; --text-bright: #f5e6b8; --text-dim: #b8a87a; --border: #c4a24b; --btn-bg: rgba(196,162,75,0.1); --btn-border: rgba(196,162,75,0.3); --btn-hover: rgba(196,162,75,0.25); --sheet-bg: linear-gradient(145deg, #1e2a1a 0%, #0f180d 100%); --input-bg: rgba(20,30,18,0.9); --input-focus: rgba(25,38,22,0.95); --msg-bg: rgba(30,40,25,0.85); --msg-accent: #c4a24b; --robin-bg: rgba(50,70,40,0.9); --robin-accent: #e8c97a; --overlay-bg: rgba(0,0,0,0.6); --call-bg: linear-gradient(135deg, rgba(25,35,20,0.98), rgba(15,25,12,0.98)); }
        /* Остальные темы без изменений */

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { font-size: clamp(14px, 2.5vw, 16px); }
        html,body { margin:0; padding:0; height:100%; overflow:hidden; -webkit-text-size-adjust:100%; }
        body { background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%); color: var(--text); font-family: 'Segoe UI', 'Inter', 'Georgia', serif; display:flex; flex-direction:column; height:100vh; height:100dvh; position:relative; }

        /* ФОН ИСПРАВЛЕН: строго между уведомителем и полем ввода */
        body::before {
            content:"";
            position:fixed;
            top:clamp(58px, 13vw, 76px);
            left:0;
            width:100%;
            height:calc(100dvh - clamp(58px, 13vw, 76px) - clamp(54px, 11vw, 70px));
            background-image:url('assets/background.webp');
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            z-index:0;
            opacity:0.35;
        }
        body::after {
            content:"";
            position:fixed;
            top:clamp(58px, 13vw, 76px);
            left:0;
            width:100%;
            height:calc(100dvh - clamp(58px, 13vw, 76px) - clamp(54px, 11vw, 70px));
            background:radial-gradient(circle at 50% 40%, rgba(30,40,25,0.5), rgba(10,20,8,0.85));
            z-index:0;
        }
        .header { background:linear-gradient(135deg, rgba(25,35,20,0.96), rgba(15,25,12,0.98)); border-bottom:2px solid var(--border); backdrop-filter:blur(8px); z-index:10; padding:6px 10px; display:flex; flex-direction:column; gap:4px; position:relative; box-shadow:0 4px 20px rgba(0,0,0,0.3); flex-shrink:0; }
        .header-row-1 { display:flex; align-items:center; gap:6px; }
        .header-title-text { font-size:clamp(1em, 3vw, 1.3em); font-weight:bold; background:linear-gradient(135deg, var(--accent-light), var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent; letter-spacing:1px; }
        .header-shield { font-size:clamp(0.9em, 2.5vw, 1.1em); filter:drop-shadow(0 0 3px var(--accent-glow)); }
        .header-clock { font-size:clamp(0.7em, 2vw, 0.85em); color:var(--accent-light); font-family:monospace; margin-left:auto; margin-right:8px; letter-spacing:1px; }
        .header-version { font-size:0.55em; color:var(--text-dim); }
        .header-row-2 { display:flex; justify-content:space-around; align-items:center; }
        .header-row-3 { display:flex; justify-content:space-around; }
        .header-btn { width:clamp(36px, 8vw, 44px); height:clamp(36px, 8vw, 44px); display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:10px; font-size:clamp(18px, 4vw, 22px); position:relative; transition:all 0.2s ease; background:var(--btn-bg); border:1px solid var(--btn-border); }
        .header-btn:hover { background:var(--btn-hover); transform:scale(1.05); border-color:var(--accent); }
        .header-btn img { width:100%; height:100%; object-fit:contain; padding:5px; }
        .header-label { font-size:0.55em; color:var(--text-dim); text-align:center; width:clamp(36px, 8vw, 44px); cursor:pointer; font-weight:bold; white-space:nowrap; }
        .header-avatar { width:clamp(28px, 6vw, 34px); height:clamp(28px, 6vw, 34px); border-radius:50%; object-fit:cover; border:2px solid var(--border); box-shadow:0 2px 8px rgba(0,0,0,0.3); }
        .chat-area { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; background:rgba(10,18,8,0.35); scrollbar-width:none; position:relative; z-index:1; }
        .chat-area::-webkit-scrollbar { display:none; }
        .message-row { display:flex; align-items:flex-start; gap:8px; background:var(--msg-bg); backdrop-filter:blur(8px); padding:8px 10px; border-radius:14px; border-left:3px solid var(--msg-accent); transition:all 0.2s ease; animation:messageSlideIn 0.3s ease; }
        @keyframes messageSlideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
        .input-area { background:linear-gradient(135deg, rgba(25,35,20,0.96), rgba(15,25,12,0.98)); backdrop-filter:blur(8px); padding:8px; padding-bottom:calc(8px + env(safe-area-inset-bottom, 0px)); display:flex; gap:5px; align-items:center; border-top:1px solid var(--border); position:relative; z-index:1; flex-shrink:0; }
        input, textarea { flex:1; background:var(--input-bg); border:1px solid var(--border); padding:10px; color:var(--text); border-radius:10px; font-size:clamp(14px, 2.5vw, 16px); outline:none; font-family:'Segoe UI', 'Inter', monospace; transition:all 0.2s; min-width:0; }
        input:focus, textarea:focus { border-color:var(--accent-light); box-shadow:0 0 8px var(--accent-glow); background:var(--input-focus); }
        .bow-button { width:38px; height:38px; cursor:pointer; transition:transform 0.1s ease; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3)); flex-shrink:0; }
        .bow-button:active { transform:scale(0.92); }
        .avatar { width:clamp(38px, 8vw, 44px); height:clamp(38px, 8vw, 44px); border-radius:50%; object-fit:cover; background-color:#2a3a25; flex-shrink:0; border:2px solid var(--border); }
        .msg-body { flex:1; min-width:0; }
        .msg-sender { font-weight:900; color:var(--text-bright); font-size:0.9em; text-shadow:0 1px 2px rgba(0,0,0,0.5); letter-spacing:0.3px; }
        .msg-body div { font-size:0.9em; line-height:1.4; color:var(--text); }
        .msg-status { font-size:0.6em; color:var(--text-dim); text-align:right; margin-top:4px; }
        #robin-row { background:var(--robin-bg); border-left:3px solid var(--robin-accent); box-shadow:0 2px 12px rgba(0,0,0,0.2); position:sticky; top:0; z-index:6; margin-bottom:4px; }
        #robin-text { font-weight:700; font-size:0.85em; color:var(--text-bright); text-shadow:0 1px 3px rgba(0,0,0,0.6); }
        .voice-timer-overlay { display:none; position:absolute; top:-26px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:#f44336; font-family:monospace; font-size:0.75em; padding:2px 8px; border-radius:6px; z-index:20; pointer-events:none; white-space:nowrap; }

        /* АНИМАЦИЯ ЛУКА — ФИКСИРОВАННАЯ ПОЗИЦИЯ */
        #bow-above-send {
            position:fixed !important;
            bottom:clamp(62px, 12vw, 78px) !important;
            right:clamp(50px, 18vw, 90px) !important;
            width:80px !important;
            height:80px !important;
            z-index:100 !important;
            pointer-events:none !important;
            display:none !important;
        }

        .bottom-sheet, .avatar-selector { position:fixed; top:0; left:0; width:min(85%, 380px); height:100%; background:var(--sheet-bg); border-right:2px solid var(--border); z-index:200; transform:translateX(-100%); transition:transform 0.35s cubic-bezier(0.2,0.9,0.4,1.1); overflow-y:auto; backdrop-filter:blur(16px); box-shadow:8px 0 30px rgba(0,0,0,0.5); -webkit-overflow-scrolling:touch; }
        .bottom-sheet.open, .avatar-selector.show { transform:translateX(0); }
        .bottom-sheet-header { padding:16px 16px 10px; font-weight:bold; color:var(--accent-light); border-bottom:1px solid var(--border); margin-bottom:6px; font-size:1em; display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.2); }
        .bottom-sheet-close { background:none; border:none; color:var(--accent-light); font-size:22px; cursor:pointer; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
        .bottom-sheet-close:hover { background:var(--btn-hover); transform:rotate(90deg); }
        .bottom-sheet-list { padding:6px 12px; }
        .contact-item { display:flex; align-items:center; justify-content:space-between; padding:10px; margin:5px 0; border-radius:12px; background:rgba(255,245,215,0.05); border:1px solid var(--btn-border); cursor:pointer; color:var(--text); transition:all 0.2s; }
        .contact-item:hover { background:var(--btn-hover); border-color:var(--accent); transform:translateX(5px); }
        .contact-info { display:flex; align-items:center; gap:10px; flex:1; }
        .contact-avatar { width:36px; height:36px; border-radius:50%; object-fit:cover; border:2px solid var(--border); }
        .contact-name { font-weight:600; font-size:0.9em; color:var(--accent-light); }
        .delete-contact { background:none; border:none; color:#c97a5a; font-size:18px; cursor:pointer; padding:6px; border-radius:8px; transition:all 0.2s; flex-shrink:0; }
        .delete-contact:hover { background:rgba(201,122,90,0.2); transform:scale(1.1); }
        .avatar-selector { padding:16px; }
        .avatar-selector p { color:var(--accent-light); margin:0 0 12px; font-size:1em; text-align:center; }
        #avatar-list { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
        .avatar-option { width:clamp(45px, 10vw, 55px); height:clamp(45px, 10vw, 55px); border-radius:50%; object-fit:cover; margin:3px; cursor:pointer; border:2px solid transparent; transition:all 0.2s; }
        .avatar-option:hover { border-color:var(--accent-light); transform:scale(1.1); }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--overlay-bg); backdrop-filter:blur(4px); display:none; z-index:190; }
        .overlay.show { display:block; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:300; justify-content:center; align-items:center; }
        .modal-overlay.active { display:flex; }
        .modal-dialog { background:var(--sheet-bg); padding:20px; border-radius:20px; width:85%; max-width:380px; text-align:center; border:2px solid var(--border); max-height:85vh; overflow-y:auto; box-shadow:0 12px 40px rgba(0,0,0,0.5); }
        .modal-dialog h3 { color:var(--accent-light); margin:0 0 12px; font-size:1.1em; }
        .modal-dialog button { width:100%; padding:12px; margin-top:8px; border:none; border-radius:10px; font-size:14px; font-weight:bold; cursor:pointer; transition:all 0.2s; }
        .modal-dialog button:active { transform:scale(0.96); }
        .btn-primary { background:linear-gradient(135deg, var(--accent), #b8903a); color:#1a1f0f; }
        .btn-dark { background:#4a3a2a; color:#eee; }
        .btn-cancel { background:#5a3a2a; color:#eee; }
        .code-display { background:#0a1208; border:1px solid var(--border); color:var(--accent-light); border-radius:10px; padding:10px; font-size:0.75em; word-break:break-all; margin:12px 0; text-align:center; user-select:all; font-family:monospace; }
        .contact-menu { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--sheet-bg); border:2px solid var(--border); border-radius:18px; padding:10px; z-index:400; min-width:220px; box-shadow:0 12px 40px rgba(0,0,0,0.6); }
        .contact-menu-item { padding:10px; cursor:pointer; border-radius:10px; margin-bottom:5px; font-size:0.9em; color:var(--text); transition:all 0.2s; }
        .contact-menu-item:hover { background:var(--btn-hover); transform:translateX(5px); }
        #menu-cancel { background:#4a3a2a; border:none; padding:8px; border-radius:8px; color:white; cursor:pointer; width:100%; margin-top:6px; }
        .robin-arrow-container { display:inline-block; vertical-align:middle; margin-left:6px; background:transparent !important; }
        .robin-arrow-container svg, .robin-arrow-container canvas { background:transparent !important; }
        .avatar-selector::-webkit-scrollbar, .bottom-sheet::-webkit-scrollbar { display:none; }
        .avatar-selector, .bottom-sheet { scrollbar-width:none; }
        .smoke-anim { position:fixed; bottom:50%; left:50%; transform:translate(-50%,50%); width:280px; height:280px; z-index:500; pointer-events:none; animation:smokeRise 3s ease-out forwards; }
        @keyframes smokeRise { 0% { opacity:1; transform:translate(-50%,50%) scale(0.5); } 100% { opacity:0; transform:translate(-50%,-100%) scale(1.5); } }
        .modal-input-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); z-index:500; display:none; justify-content:center; align-items:center; }
        .modal-input-overlay.active { display:flex; }
        .modal-input-dialog { background:var(--sheet-bg); border:2px solid var(--border); border-radius:18px; padding:18px; width:85%; max-width:320px; text-align:center; }
        .modal-input-dialog h3 { color:var(--accent-light); margin:0 0 10px; font-size:1em; }
        .modal-input-dialog input { width:100%; margin-bottom:10px; }
        .modal-input-dialog .modal-btns { display:flex; gap:6px; }
        .modal-input-dialog .modal-btns button { flex:1; padding:8px; border-radius:8px; border:none; font-weight:bold; cursor:pointer; }
        .btn-gold { background:linear-gradient(135deg, var(--accent), var(--accent)); color:#1a1f0f; }
        .terms-btn { background:none; border:1px solid var(--btn-border); color:var(--text-dim); padding:3px 6px; border-radius:6px; font-size:0.55em; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
        .terms-btn:hover { background:var(--btn-hover); border-color:var(--accent); }
        #call-panel { background:var(--call-bg); border-top:2px solid var(--border); }
        #call-status { color:var(--accent-light); }
        #emoji-panel { scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
        #emoji-grid span { font-size:clamp(20px, 4vw, 24px); cursor:pointer; padding:5px; border-radius:6px; transition:all 0.15s; }
        #emoji-grid span:hover { background:var(--btn-hover); transform:scale(1.2); }
        .toggle-switch { position:relative; display:inline-block; width:44px; height:24px; flex-shrink:0; }
        .toggle-switch input { opacity:0; width:0; height:0; }
        .toggle-slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:rgba(255,255,255,0.1); border-radius:24px; border:2px solid var(--border); transition:all 0.3s; }
        .toggle-slider:before { content:""; position:absolute; height:16px; width:16px; left:2px; bottom:2px; background:var(--text-dim); border-radius:50%; transition:all 0.3s; }
        .toggle-switch input:checked + .toggle-slider { background:#4caf50; border-color:#4caf50; }
        .toggle-switch input:checked + .toggle-slider:before { transform:translateX(20px); background:white; }
        .toggle-switch.disabled { opacity:0.3; pointer-events:none; }
        .typing-indicator { font-size:0.65em; color:var(--text-dim); padding:2px 10px; font-style:italic; min-height:16px; }
        .online-dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:3px; }
        .online-dot.online { background:#4caf50; box-shadow:0 0 5px #4caf50; }
        .online-dot.offline { background:#666; }
        #pong-frame { display:none !important; position:fixed !important; top:-9999px !important; left:-9999px !important; width:1px !important; height:1px !important; opacity:0 !important; pointer-events:none !important; visibility:hidden !important; border:none !important; z-index:-1 !important; }
        .tunnel-delete-btn { padding:6px 12px; border-radius:6px; border:1px solid #f44336; background:rgba(244,67,54,0.15); color:#f44336; cursor:pointer; font-size:0.7em; margin-left:8px; }
        .tunnel-delete-btn:hover { background:rgba(244,67,54,0.3); }
        .setting-install-btn { background:rgba(76,175,80,0.08) !important; cursor:pointer; }
        .setting-install-btn:hover { background:rgba(76,175,80,0.2) !important; }
        .video-circle-msg { max-width:200px; border-radius:12px; overflow:hidden; cursor:pointer; }
        .video-circle-msg video { width:100%; display:block; border-radius:12px; }
        #lock-screen { position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%); }
        #lock-screen::before { content:""; position:fixed; top:0; left:0; width:100%; height:100%; background-image:url('assets/background.webp'); background-size:cover; background-position:center; background-repeat:no-repeat; z-index:-1; opacity:0.3; }
        .lock-title { font-size:1.5em; font-weight:bold; background:linear-gradient(135deg, var(--accent-light), var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:20px; }
    </style>
</head>
<body>
<div id="lock-screen">
    <div class="lock-title">🏹 RobinHood P2P</div>
    <div class="lock-subtitle" id="lock-subtitle">Введите пин-код</div>
    <div class="lock-tabs" id="lock-tabs"><button class="lock-tab active" data-tab="pin">🔢 Пин-код</button><button class="lock-tab" data-tab="pattern">🔐 Графический</button></div>
    <div id="lock-pin-section"><div class="lock-pin-dots" id="lock-pin-dots"><div class="lock-pin-dot"></div><div class="lock-pin-dot"></div><div class="lock-pin-dot"></div><div class="lock-pin-dot"></div></div><div class="lock-numpad" id="lock-numpad"></div><div class="lock-setup-hint" id="lock-pin-hint"></div></div>

</div>

<div id="app-container" style="display:none;flex-direction:column;height:100%;">

<div class="header">

    </div>
    <div class="header-row-3"><span class="header-label" id="nick-label">Твой ник</span><span class="header-label">Стрела</span><span class="header-label" id="call-label">Звонок</span><span class="header-label">Видео</span><span class="header-label">Курить</span><span class="header-label" id="settings-label">Опции</span></div>
</div>
<div id="robin-row" style="padding:8px 12px;"><div class="message-row" style="margin:0;padding:8px 10px;"><img src="assets/avatars/231-icon-11433690.png" class="avatar" id="robin-avatar" style="width:40px;height:40px;"><div class="msg-body"><div class="msg-sender">Robin Hood</div><div id="robin-text">Святые сокеты стабильны!</div></div></div></div>
<div class="chat-area" id="chat-box"><div class="typing-indicator" id="typing-indicator"></div></div>
<div class="input-area" style="position:relative;">
    <div class="voice-timer-overlay" id="voice-timer-overlay">🎤 0:00</div>
    <button class="header-btn" id="btn-emoji" style="flex-shrink:0;width:32px;height:32px;font-size:15px;">😊</button>
