<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>RobinHood P2P</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/avatars/001-.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <style>
        /* все ваши стили (оставьте без изменений) */
    </style>
</head>
<body>
    <!-- вся ваша HTML-разметка (оставьте без изменений) -->
    <script>
        (function() {
            // === Часть 1: Основные переменные DOM ===
            const pongFrame = document.getElementById('pong-frame');
            const chatBox = document.getElementById('chat-box');
            const msgInput = document.getElementById('msg-input');
            const robinText = document.getElementById('robin-text');
            const profileAvatarSmall = document.getElementById('profile-avatar-small');
            const nickLabel = document.getElementById('nick-label');
            const avatarSelector = document.getElementById('avatar-selector');
            const avatarList = document.getElementById('avatar-list');
            const contactsSheet = document.getElementById('contacts-sheet');
            const contactsListInner = document.getElementById('contacts-list-inner');
            const settingsSheet = document.getElementById('settings-sheet');
            const overlay = document.getElementById('overlay');
            const modalOverlay = document.getElementById('modal-input-overlay');
            const modalTitle = document.getElementById('modal-input-title');
            const modalField = document.getElementById('modal-input-field');
            const modalOk = document.getElementById('modal-input-ok');
            const modalCancel = document.getElementById('modal-input-cancel');
            const termsBtn = document.getElementById('btn-terms');
            const btnCall = document.getElementById('btn-call');
            const callLabel = document.getElementById('call-label');
            const callPanel = document.getElementById('call-panel');
            const callStatus = document.getElementById('call-status');
            const callAccept = document.getElementById('call-accept');
            const callReject = document.getElementById('call-reject');
            const callSpeaker = document.getElementById('call-speaker');
            const callEnd = document.getElementById('call-end');
            const emojiPanel = document.getElementById('emoji-panel');
            const emojiGrid = document.getElementById('emoji-grid');
            const btnEmoji = document.getElementById('btn-emoji');
            const tunnelConfigModal = document.getElementById('tunnel-config-modal');
            const tunnelConfigInput = document.getElementById('tunnel-config-input');
            const configFileInput = document.getElementById('config-file-input');
            const serverToggle = document.getElementById('server-toggle');
            const serverLabel = document.getElementById('server-label');
            const typingIndicator = document.getElementById('typing-indicator');
            const cancelArrowBtn = document.getElementById('cancel-arrow-btn');
            const sendBtn = document.getElementById('send-btn');
            const historyStatus = document.getElementById('history-status');
            const soundStatus = document.getElementById('sound-status');
            const tunnelToggle = document.getElementById('tunnel-toggle');
            const themeIcon = document.getElementById('theme-icon');
            const themeName = document.getElementById('theme-name');
            const bowContainer = document.getElementById('bow-above-send');

            // === Часть 2: Константы и глобальные состояния ===
            const PONGPONG_ORIGIN = 'https://stepweather-prog.github.io';
            const WORKERS_URL = 'https://robincall.stephanclaps-491.workers.dev';
            const RENDER_URL = 'https://p2ppong.onrender.com';

            let modalResolve = null;
            let handshakeSecret = null;
            let channels = {};
            let activeChannelId = null;
            let deferredPrompt = null;
            let toggleHistoryState = true;
            let toggleSoundState = true;
            let activeContact = null;
            let historyEncryptionKey = null;
            let robinDefaultText = robinText ? robinText.textContent : 'Святые сокеты стабильны!';
            let robinTimer = null;
            let currentMenuContact = null;
            let profileSent = {};
            let peerConnections = {};
            let localStreams = {};
            let dataChannels = {};
            let callActive = false;
            let videoCallActive = false;
            let speakerOn = true;
            let cameraOn = true;
            let micOn = true;
            let ringtoneAudio = null;
            let ringbackAudio = null;
            let savedConfigs = [];
            let activeTunnel = null;
            let currentServer = 'render';
            let pendingIceCandidates = {};
            let typingTimers = {};
            let contactOnlineStatus = {};
            let audioPool = {};
            let selfDestructTimers = {};
            let activeReactionMsgId = null;
            let messageReactions = {};
            let meshPeers = {};
            let cachedHistory = [];

            try { savedConfigs = JSON.parse(localStorage.getItem('robinhood_tunnels') || '[]'); } catch(e) {}
            try { currentServer = localStorage.getItem('robinhood_server') || 'render'; } catch(e) {}
            try { messageReactions = JSON.parse(localStorage.getItem('robinhood_reactions') || '{}'); } catch(e) {}

            const themes = [
                { id: 'forest', icon: '🏹', name: 'Лес' },
                { id: 'sunset', icon: '🌅', name: 'Закат' },
                { id: 'ocean', icon: '🌊', name: 'Океан' },
                { id: 'rose', icon: '🌹', name: 'Роза' },
                { id: 'amber', icon: '🍯', name: 'Янтарь' },
                { id: 'mint', icon: '🌿', name: 'Мята' },
                { id: 'lavender', icon: '💜', name: 'Лаванда' },
                { id: 'cherry', icon: '🍒', name: 'Вишня' }
            ];
            let currentTheme = localStorage.getItem('robinhood_theme') || 'forest';

            // === Часть 3: Безопасное экранирование и вспомогательные функции ===
            function safeHtml(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function getIceServers() {
                return [
                    { urls: "stun:stun.l.google.com:19302" },
                    { urls: "stun:stun1.l.google.com:19302" },
                    {
                        urls: ["turn:openrelay.metered.ca:80?transport=tcp", "turn:openrelay.metered.ca:443?transport=tcp"],
                        username: "openrelayproject",
                        credential: "openrelayproject"
                    }
                ];
            }

            function getAudio(filename) {
                if (!audioPool[filename]) {
                    audioPool[filename] = new Audio('assets/sounds/' + filename);
                    audioPool[filename].volume = 0.5;
                }
                const a = audioPool[filename];
                a.currentTime = 0;
                return a;
            }

            function playSound(filename) {
                if (toggleSoundState) {
                    try { getAudio(filename).play().catch(function() {}); } catch(e) {}
                }
            }

            function playRingtone() { stopRingtone(); ringtoneAudio = getAudio('melodi.mp3'); ringtoneAudio.loop = true; ringtoneAudio.volume = 0.7; ringtoneAudio.play().catch(function() {}); }
            function stopRingtone() { if (ringtoneAudio) { ringtoneAudio.pause(); ringtoneAudio.loop = false; ringtoneAudio = null; } }
            function playRingback() { stopRingback(); ringbackAudio = getAudio('Welk.mp3'); ringbackAudio.loop = true; ringbackAudio.volume = 0.5; ringbackAudio.play().catch(function() {}); }
            function stopRingback() { if (ringbackAudio) { ringbackAudio.pause(); ringbackAudio.loop = false; ringbackAudio = null; } }
            function playCallStart() { const a = getAudio('open.mp3'); a.volume = 0.7; a.play().catch(function() {}); }
            function playCallEnd() { const a = getAudio('exet.mp3'); a.volume = 0.7; a.play().catch(function() {}); }

            // === Часть 4: Криптография ===
            async function generateAESKey() { return await crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]); }
            async function exportAESKey(key) {
                const raw = await crypto.subtle.exportKey("raw", key);
                return btoa(Array.from(new Uint8Array(raw), b => String.fromCharCode(b)).join(''));
            }
            async function importAESKey(base64key) {
                const raw = Uint8Array.from(atob(base64key), c => c.charCodeAt(0));
                return await crypto.subtle.importKey("raw", raw, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
            }
            async function aesEncrypt(plaintext, key) {
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const encoded = new TextEncoder().encode(plaintext);
                const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, encoded);
                return JSON.stringify({
                    iv: btoa(Array.from(iv, b => String.fromCharCode(b)).join('')),
                    data: btoa(Array.from(new Uint8Array(ciphertext), b => String.fromCharCode(b)).join(''))
                });
            }
            async function aesDecrypt(payloadStr, key) {
                try {
                    const payload = JSON.parse(payloadStr);
                    const iv = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
                    const data = Uint8Array.from(atob(payload.data), c => c.charCodeAt(0));
                    const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
                    return new TextDecoder().decode(decrypted);
                } catch(e) { return null; }
            }
            async function getHistoryKey() { if (!historyEncryptionKey) historyEncryptionKey = await generateAESKey(); }

            // === Часть 5: История (только в памяти) ===
            async function saveEncryptedHistory(messages) {
                if (!toggleHistoryState) return;
                if (!historyEncryptionKey) await getHistoryKey();
                try { cachedHistory = messages; } catch(e) {}
            }

            async function loadEncryptedHistory() {
                if (!toggleHistoryState) return [];
                if (!historyEncryptionKey) await getHistoryKey();
                const stored = localStorage.getItem('robinhood_chat_history');
                if (stored) {
                    try {
                        const decrypted = await aesDecrypt(stored, historyEncryptionKey);
                        if (decrypted) {
                            cachedHistory = JSON.parse(decrypted);
                            localStorage.removeItem('robinhood_chat_history');
                        }
                    } catch(e) { cachedHistory = []; }
                }
                return cachedHistory;
            }

            // === Часть 6: Модальный ввод ===
            function showModalInput(title, placeholder = '', defaultValue = '') {
                return new Promise(resolve => {
                    modalResolve = resolve;
                    modalTitle.textContent = title;
                    modalField.placeholder = placeholder;
                    modalField.value = defaultValue;
                    modalOverlay.classList.add('active');
                    modalField.focus();
                });
            }
            function hideModalInput(value) {
                modalOverlay.classList.remove('active');
                if (modalResolve) { modalResolve(value); modalResolve = null; }
            }
            modalOk.addEventListener('click', () => hideModalInput(modalField.value.trim()));
            modalCancel.addEventListener('click', () => hideModalInput(null));
            modalField.addEventListener('keypress', e => { if (e.key === 'Enter') hideModalInput(modalField.value.trim()); });
            modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) hideModalInput(null); });

            // === Часть 7: Отправка сообщений в P2PPong ===
            function sendToPong(msg) {
                if (!msg) return;
                if (activeChannelId && channels[activeChannelId]) {
                    msg.secret = channels[activeChannelId].secret;
                    msg.channelId = activeChannelId;
                }
                if (handshakeSecret && msg.action === 'handshake') msg.handshake = handshakeSecret;
                msg.server = currentServer;
                if (pongFrame.contentWindow) {
                    pongFrame.contentWindow.postMessage(msg, PONGPONG_ORIGIN);
                }
            }
            function sendCallSignal(text) { sendToPong({ action: 'send', text, channelId: activeChannelId }); }

            // === Часть 8: WebRTC - создание PeerConnection ===
            async function getMediaStream(enableVideo = false) {
                try {
                    return await navigator.mediaDevices.getUserMedia({
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
                        video: enableVideo
                    });
                } catch(e) { updateRobinStatus('❌ Нет доступа к микрофону/камере'); return null; }
            }

            function createPeerConn(stream, callId) {
                const pc = new RTCPeerConnection({ iceServers: getIceServers(), iceTransportPolicy: 'all' });
                if (stream) stream.getTracks().forEach(t => pc.addTrack(t, stream));
                pc.ontrack = e => {
                    if (e.streams && e.streams[0]) {
                        if (videoCallActive && callId === 'main') {
                            // видео обрабатывается отдельно
                        } else {
                            const a = new Audio(); a.srcObject = e.streams[0]; a.play().catch(() => {});
                        }
                    }
                };
                pc.onicecandidate = e => { if (e.candidate) sendCallSignal('__ICE__' + JSON.stringify({ candidate: e.candidate, callId })); };
                pc.oniceconnectionstatechange = () => {
                    if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
                        if (callStatus) callStatus.textContent = '✅ Разговор';
                    }
                    if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                        cleanupPeer(callId);
                        if (callId === 'main') endCall();
                    }
                };
                return pc;
            }

            // === Часть 9: DataChannel только для инициатора ===
            function setupDataChannel(pc, callId) {
                try {
                    const dc = pc.createDataChannel('sherwood', { ordered: true });
                    dataChannels[callId] = dc;
                    dc.onopen = () => {};
                    dc.onclose = () => { delete dataChannels[callId]; };
                    dc.onmessage = e => {
                        try {
                            const msg = JSON.parse(e.data);
                            if (msg.type === 'file') handleDataChannelFile(msg);
                        } catch(err) {}
                    };
                } catch(e) { console.error('Failed to create data channel:', e); }
            }

            function handleDataChannelFile(msg) {
                updateRobinStatus('📎 Получен файл: ' + safeHtml(msg.name), 3000);
                const byteString = atob(msg.data);
                const ab = new ArrayBuffer(byteString.length);
                const ia = new Uint8Array(ab);
                for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                const blob = new Blob([ab], { type: msg.mime });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = msg.name; a.click();
                setTimeout(() => URL.revokeObjectURL(url), 10000);
            }

            // === Часть 10: Очистка пиров и ICE ===
            function cleanupPeer(callId) {
                if (peerConnections[callId]) { peerConnections[callId].close(); delete peerConnections[callId]; }
                if (localStreams[callId]) { localStreams[callId].getTracks().forEach(t => t.stop()); delete localStreams[callId]; }
                if (dataChannels[callId]) { try { dataChannels[callId].close(); } catch(e) {} delete dataChannels[callId]; }
                delete pendingIceCandidates[callId];
                delete meshPeers[callId];
            }

            function flushIceCandidates(callId = 'main') {
                const pc = peerConnections[callId];
                if (!pc || !pc.remoteDescription || !pc.remoteDescription.type) return;
                const candidates = pendingIceCandidates[callId] || [];
                for (const c of candidates) {
                    try { pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {}); } catch(e) {}
                }
                delete pendingIceCandidates[callId];
            }

            // === Часть 11: Звонки ===
            async function startCall(enableVideo = false) {
                if (callActive) return;
                if (!activeChannelId || !channels[activeChannelId]) {
                    updateRobinStatus('🏹 Сначала воспользуйся стрелой!', 3000);
                    return;
                }
                videoCallActive = enableVideo;
                const stream = await getMediaStream(enableVideo);
                if (!stream) return;
                localStreams['main'] = stream;
                callPanel.style.display = 'block';
                callStatus.textContent = enableVideo ? '📹 Видеовызов...' : '📞 Вызов...';
                callAccept.style.display = 'none';
                callReject.style.display = 'none';
                callEnd.style.display = 'inline-block';
                callSpeaker.style.display = 'inline-block';
                playRingback();
                const pc = createPeerConn(stream, 'main');
                peerConnections['main'] = pc;
                setupDataChannel(pc, 'main');
                pc.ondatachannel = () => {};
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                sendCallSignal('__OFFER__' + JSON.stringify({ sdp: offer, video: enableVideo }));
                callActive = true;
            }

            function endCall() {
                callActive = false; videoCallActive = false;
                stopRingtone(); stopRingback(); playCallEnd();
                sendCallSignal('__HANGUP__');
                Object.keys(peerConnections).forEach(k => cleanupPeer(k));
                Object.keys(localStreams).forEach(k => {
                    if (localStreams[k]) localStreams[k].getTracks().forEach(t => t.stop());
                });
                localStreams = {}; peerConnections = {}; pendingIceCandidates = {}; meshPeers = {}; dataChannels = {};
                callPanel.style.display = 'none';
                callAccept.style.display = 'inline-block';
                callReject.style.display = 'inline-block';
                callEnd.style.display = 'none';
                callSpeaker.style.display = 'none';
                updateRobinStatus('📞 Звонок завершён');
            }

            function toggleSpeaker() {
                speakerOn = !speakerOn;
                if (callSpeaker) callSpeaker.textContent = speakerOn ? '🔊' : '🔇';
            }

            // === Часть 12: Кнопки звонков ===
            btnCall.addEventListener('click', () => { if (callActive) { endCall(); return; } startCall(false); });
            callReject.addEventListener('click', () => { stopRingtone(); sendCallSignal('__HANGUP__'); callPanel.style.display = 'none'; updateRobinStatus('📞 Вызов отклонён'); });
            callEnd.addEventListener('click', endCall);
            callSpeaker.addEventListener('click', toggleSpeaker);
            callLabel.addEventListener('click', () => btnCall.click());

            // === Часть 13: Отправка файлов ===
            const btnFile = document.getElementById('btn-file');
            const fileInput = document.getElementById('file-input');
            if (btnFile) {
                btnFile.addEventListener('click', () => {
                    if (fileInput) fileInput.click();
                });
            }
            if (fileInput) {
                fileInput.addEventListener('change', () => {
                    Array.from(fileInput.files).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = () => {
                            const base64 = reader.result.split(',')[1];
                            sendFileMessage({ name: file.name, size: file.size, type: file.type, data: base64 });
                        };
                        reader.readAsDataURL(file);
                    });
                    fileInput.value = '';
                });
            }

            function sendFileMessage(fileData) {
                if (!activeChannelId || !channels[activeChannelId]) return;
                const payload = { type: 'file', name: fileData.name, size: fileData.size, mime: fileData.type || 'application/octet-stream', data: fileData.data, time: Date.now() };
                sendToPong({ action: 'send', text: '__FILE__' + JSON.stringify(payload), channelId: activeChannelId });
                appendFileMessage('Вы', payload, profileAvatarSmall ? profileAvatarSmall.src : 'assets/avatars/001-.png');
            }

            function appendFileMessage(sender, fileData, avatarSrc) {
                const sizeStr = fileData.size < 1024 ? fileData.size + ' B' : (fileData.size < 1048576 ? (fileData.size / 1024).toFixed(1) + ' KB' : (fileData.size / 1048576).toFixed(1) + ' MB');
                const row = document.createElement('div');
                row.className = 'message-row';
                row.innerHTML = `<img src="${avatarSrc}" class="avatar" alt="avatar">
                    <div class="msg-body"><div class="msg-sender">${safeHtml(sender)}</div>
                    <div class="msg-file" data-file="${safeHtml(fileData.name)}" data-mime="${fileData.mime}" data-filedata="${fileData.data}">
                    <span class="msg-file-icon">📄</span><div class="msg-file-info"><div class="msg-file-name">${safeHtml(fileData.name)}</div>
                    <div class="msg-file-size">${sizeStr}</div></div></div>
                    <div class="msg-status">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div></div>`;
                chatBox.insertBefore(row, typingIndicator);
                chatBox.scrollTop = chatBox.scrollHeight;
                row.querySelector('.msg-file').addEventListener('click', function() {
                    const data = this.dataset.filedata;
                    const mime = this.dataset.mime;
                    const name = this.dataset.name;
                    const byteString = atob(data);
                    const ab = new ArrayBuffer(byteString.length);
                    const ia = new Uint8Array(ab);
                    for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                    const blob = new Blob([ab], { type: mime });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = name; a.click();
                    setTimeout(() => URL.revokeObjectURL(url), 10000);
                });
            }

            // === Часть 14: Самоуничтожающиеся сообщения (упрощено) ===
            let selfDestructMode = false;
            const btnSelfDestruct = document.getElementById('btn-self-destruct');
            if (btnSelfDestruct) {
                btnSelfDestruct.addEventListener('click', () => {
                    selfDestructMode = !selfDestructMode;
                    btnSelfDestruct.style.borderColor = selfDestructMode ? '#f44336' : '';
                    btnSelfDestruct.style.background = selfDestructMode ? 'rgba(244,67,54,0.2)' : '';
                    updateRobinStatus(selfDestructMode ? '💣 Режим самоуничтожения: ВКЛ' : '💣 Режим самоуничтожения: ВЫКЛ', 2000);
                });
            }

            function sendSelfDestructMessage(text, duration) {
                if (!activeChannelId || !channels[activeChannelId]) return;
                const payload = { type: 'selfdestruct', text, duration: duration || 30, time: Date.now() };
                sendToPong({ action: 'send', text: '__SELFDESTRUCT__' + JSON.stringify(payload), channelId: activeChannelId });
                appendSelfDestructMessage('Вы', text, profileAvatarSmall ? profileAvatarSmall.src : 'assets/avatars/001-.png', duration || 30);
            }

            function appendSelfDestructMessage(sender, text, avatarSrc, duration) {
                const msgId = 'msg_' + Date.now();
                const row = document.createElement('div');
                row.className = 'message-row'; row.id = msgId;
                row.innerHTML = `<img src="${avatarSrc}" class="avatar" alt="avatar">
                    <div class="msg-body"><div class="msg-sender">${safeHtml(sender)}</div>
                    <div>${safeHtml(text)}<span class="msg-self-destruct">💣${duration}с</span></div>
                    <div class="msg-status">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div></div>`;
                chatBox.insertBefore(row, typingIndicator);
                chatBox.scrollTop = chatBox.scrollHeight;
                let remaining = duration;
                const timer = setInterval(() => {
                    remaining--;
                    const sdSpan = row.querySelector('.msg-self-destruct');
                    if (sdSpan) sdSpan.textContent = '💣' + remaining + 'с';
                    if (remaining <= 0) { clearInterval(timer); row.classList.add('self-destruct'); setTimeout(() => { if (row.parentNode) row.remove(); }, 500); }
                }, 1000);
                selfDestructTimers[msgId] = timer;
            }

            // === Часть 15: Реакции на сообщения ===
            const reactionPicker = document.getElementById('reaction-picker');
            function showReactionPicker(msgElement, event) {
                if (!msgElement || !reactionPicker) return;
                const rect = msgElement.getBoundingClientRect();
                reactionPicker.style.display = 'flex';
                reactionPicker.style.top = (rect.top - 40) + 'px';
                reactionPicker.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
                activeReactionMsgId = msgElement.dataset.msgid || msgElement.id;
            }
            if (reactionPicker) {
                reactionPicker.querySelectorAll('span').forEach(span => {
                    span.addEventListener('click', () => {
                        if (!activeReactionMsgId || !activeChannelId) return;
                        const emoji = span.textContent;
                        sendToPong({ action: 'send', text: '__REACTION__' + JSON.stringify({ msgId: activeReactionMsgId, emoji }), channelId: activeChannelId });
                        addReactionToMessage(activeReactionMsgId, emoji, true);
                        reactionPicker.style.display = 'none';
                        activeReactionMsgId = null;
                    });
                });
            }

            function addReactionToMessage(msgId, emoji, fromNetwork) {
                const row = document.getElementById(msgId);
                if (!row) return;
                let reactionsDiv = row.querySelector('.msg-reactions');
                if (!reactionsDiv) {
                    reactionsDiv = document.createElement('div'); reactionsDiv.className = 'msg-reactions';
                    const msgBody = row.querySelector('.msg-body'); if (msgBody) msgBody.appendChild(reactionsDiv);
                }
                const existing = reactionsDiv.querySelector(`[data-emoji="${emoji}"]`);
                if (existing) {
                    const count = parseInt(existing.dataset.count || 1) + 1;
                    existing.textContent = emoji + ' ' + count; existing.dataset.count = count;
                } else {
                    const spanEl = document.createElement('span'); spanEl.className = 'msg-reaction'; spanEl.dataset.emoji = emoji; spanEl.dataset.count = 1;
                    spanEl.textContent = emoji + ' 1';
                    spanEl.addEventListener('click', () => {

                if (!historyEncryptionKey) await getHistoryKey();
                const json = JSON.stringify(contacts);

                const a = document.createElement('a'); a.href = url; a.download = 'robinhood_contacts_backup.enc'; a.click();

                        if (!decrypted) { updateRobinStatus('❌ Неверный ключ расшифровки', 3000); return; }

                        localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));

            // === Часть 23: Приём сообщений от P2PPong ===
            window.addEventListener('message', async (event) => {
                if (event.origin !== PONGPONG_ORIGIN) return;
                const data = event.data;
                if (!data || !data.type) return;

                switch (data.type) {
                    case 'pong-ready':
                        handshakeSecret = data.handshake;
                        sendToPong({ action: 'handshake' });
                        break;
                    case 'handshake-ok':
                        updateRobinStatus('🏹 Тетива натянута! Лучники готовы!', 2000);
                        const urlParams = new URLSearchParams(window.location.search);
                        if (urlParams.get('id') && urlParams.get('key')) {
                            currentServer = urlParams.get('server') || 'render';
                            serverToggle.checked = currentServer === 'workers';
                            serverLabel.textContent = currentServer === 'workers' ? 'Workers' : 'Render';
                            updateRobinStatus('📨 Принимаю стрелу...', 0);
                            sendToPong({ action: 'accept', id: urlParams.get('id'), key: urlParams.get('key') });
                        }
                        break;
                    case 'session-created':
                        document.getElementById('ref-link-display').textContent = data.fullLink;
                        document.getElementById('ref-modal').classList.add('active');
                        navigator.clipboard.writeText(data.fullLink).catch(() => {});
                        break;
                    case 'channel-open':
                        channels[data.channelId] = { secret: data.secret, role: data.role };
                        if (!activeChannelId) activeChannelId = data.channelId;
                        contactOnlineStatus[data.channelId] = true;
                        playQuiverAnimation();
                        let contacts = [];
                        try { contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]'); } catch(e) {}
                        if (!contacts.find(c => c.pubkey === data.channelId)) {
                            contacts.push({ pubkey: data.channelId, name: 'Лучник', avatar: 'assets/avatars/001-.png', status: 'confirmed' });
                            try { localStorage.setItem('robinhood_contacts', JSON.stringify(contacts)); } catch(e) {}
                        }
                        sendToPong({ action: 'send', text: '__PROFILE__' + JSON.stringify({ nick: nickLabel.textContent, avatar: profileAvatarSmall.src }), channelId: data.channelId });
                        break;
                    case 'channel-restored':
                        channels[data.channelId] = { secret: data.secret, role: data.role };
                        if (!activeChannelId) activeChannelId = data.channelId;
                        updateRobinStatus('🔄 Колчан восстановлен', 2000);
                        break;
                    case 'restored-channels':
                        data.channels.forEach(ch => {
                            channels[ch.channelId] = { secret: ch.secret, role: ch.role };
                            if (!activeChannelId) activeChannelId = ch.channelId;
                        });
                        updateRobinStatus('🔄 Колчаны восстановлены (' + data.channels.length + ')', 2000);
                        loadContacts();
                        break;
                    case 'message':
                        if (!data.channelId || !data.text || !channels[data.channelId]) break;
                        if (data.text === '__TYPING__') {
                            typingIndicator.textContent = '✍️ Лучник натягивает тетиву...';
                            clearTimeout(typingTimers[data.channelId]);
                            typingTimers[data.channelId] = setTimeout(() => typingIndicator.textContent = '', 2500);
                            return;
                        }
                        if (data.text.startsWith('__OFFER__')) {
                            const parsed = JSON.parse(data.text.replace('__OFFER__', ''));
                            const offer = parsed.sdp || parsed;
                            videoCallActive = parsed.video || false;
                            callPanel.style.display = 'block';
                            callStatus.textContent = videoCallActive ? '📹 Входящий видеовызов...' : '📞 Входящий вызов...';
                            callAccept.style.display = 'inline-block';
                            callReject.style.display = 'inline-block';
                            callEnd.style.display = 'none';
                            callSpeaker.style.display = 'none';
                            playRingtone();
                            callAccept.onclick = async () => {
                                stopRingtone();
                                callStatus.textContent = '📞 Соединение...';
                                callAccept.style.display = 'none';
                                callReject.style.display = 'none';
                                callEnd.style.display = 'inline-block';
                                callSpeaker.style.display = 'inline-block';
                                playCallStart();
                                const stream = await getMediaStream(videoCallActive);
                                if (!stream) { callPanel.style.display = 'none'; return; }
                                localStreams['main'] = stream;
                                const pc = createPeerConn(stream, 'main');
                                peerConnections['main'] = pc;
                                pc.ondatachannel = e => {
                                    dataChannels['main'] = e.channel;
                                    e.channel.onmessage = ev => {
                                        try {
                                            const msg = JSON.parse(ev.data);
                                            if (msg.type === 'file') handleDataChannelFile(msg);
                                        } catch(err) {}
                                    };
                                };
                                await pc.setRemoteDescription(new RTCSessionDescription(offer));
                                const answer = await pc.createAnswer();
                                await pc.setLocalDescription(answer);
                                sendCallSignal('__ANSWER__' + JSON.stringify(answer));
                                callActive = true;
                                flushIceCandidates('main');
                            };
                            callReject.onclick = () => { stopRingtone(); sendCallSignal('__HANGUP__'); callPanel.style.display = 'none'; updateRobinStatus('📞 Вызов отклонён'); };
                            return;
                        }
                        if (data.text.startsWith('__ANSWER__')) {
                            stopRingback();
                            callStatus.textContent = '✅ Разговор';
                            const answer = JSON.parse(data.text.replace('__ANSWER__', ''));
                            if (peerConnections['main']) {
                                peerConnections['main'].setRemoteDescription(new RTCSessionDescription(answer))
                                    .then(() => flushIceCandidates('main'));
                            }
                            return;
                        }
                        if (data.text.startsWith('__ICE__')) {
                            try {
                                const iceData = JSON.parse(data.text.replace('__ICE__', ''));
                                const callId = iceData.callId || 'main';
                                const candidate = iceData.candidate || iceData;
                                if (!pendingIceCandidates[callId]) pendingIceCandidates[callId] = [];
                                pendingIceCandidates[callId].push(candidate);
                                flushIceCandidates(callId);
                            } catch(e) {}
                            return;
                        }
                        if (data.text === '__HANGUP__') {
                            if (callActive) { endCall(); updateRobinStatus('📞 Собеседник завершил звонок'); }
                            else { stopRingtone(); callPanel.style.display = 'none'; updateRobinStatus('📞 Вызов отменён'); }
                            return;
                        }
                        if (data.text.startsWith('__FILE__')) {
                            try {
                                const fileData = JSON.parse(data.text.replace('__FILE__', ''));
                                const contactsArr = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                                const contact = contactsArr.find(c => c.pubkey === data.channelId);
                                appendFileMessage(contact ? contact.name : 'Друг', fileData, contact ? contact.avatar : 'assets/avatars/001-.png');
                                contactOnlineStatus[data.channelId] = true;
                                if (toggleSoundState) playSound('bow_shot.mp3');
                            } catch(e) {}
                            return;
                        }
                        if (data.text.startsWith('__SELFDESTRUCT__')) {
                            try {
                                const sdData = JSON.parse(data.text.replace('__SELFDESTRUCT__', ''));
                                const contactsArr = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                                const contact = contactsArr.find(c => c.pubkey === data.channelId);
                                appendSelfDestructMessage(contact ? contact.name : 'Друг', sdData.text, contact ? contact.avatar : 'assets/avatars/001-.png', sdData.duration);
                                contactOnlineStatus[data.channelId] = true;
                                if (toggleSoundState) playSound('bow_shot.mp3');
                            } catch(e) {}
                            return;
                        }
                        if (data.text.startsWith('__REACTION__')) {
                            try {
                                const rData = JSON.parse(data.text.replace('__REACTION__', ''));
                                addReactionToMessage(rData.msgId, rData.emoji, true);
                            } catch(e) {}
                            return;
                        }
                        if (data.text.startsWith('__PROFILE__')) {
                            try {
                                const p = JSON.parse(data.text.replace('__PROFILE__', ''));
                                const cs = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                                const c = cs.find(c => c.pubkey === data.channelId);
                                if (c) { c.name = p.nick || c.name; c.avatar = p.avatar || c.avatar; localStorage.setItem('robinhood_contacts', JSON.stringify(cs)); }
                            } catch(e) {}
                            return;
                        }
                        // Обычное сообщение
                        const contactsArr = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                        const contact = contactsArr.find(c => c.pubkey === data.channelId);
                        const senderName = contact ? contact.name : 'Друг';

                                    text: data.text, sender: 'friend', recipient: 'me',
                                    senderName, avatar: senderAvatar,
                                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                                });
                                saveEncryptedHistory(hist);
                            });
                        }
                        if (toggleSoundState) playSound('bow_shot.mp3');
                        break;
                    case 'install-prompt':
                        updateRobinStatus('📲 Приложение можно установить (меню браузера)', 4000);
                        break;
                }
            });

            // === Отправка сообщения ===
            async function sendMessageHandler() {
                const text = msgInput.value.trim();
                if (!text) return;
                if (!activeChannelId || !channels[activeChannelId]) { updateRobinStatus('❌ Нет активного колчана.', 2500); return; }
                if (!profileSent[activeChannelId]) {
                    profileSent[activeChannelId] = true;

                    const durationStr = await showModalInput('💣 Время самоуничтожения (сек)', '30', '30');
                    if (durationStr === null || durationStr === undefined || durationStr === '') return;
                    const sec = parseInt(durationStr) || 30;

                    selfDestructMode = false;
                    if (btnSelfDestruct) { btnSelfDestruct.style.borderColor = ''; btnSelfDestruct.style.background = ''; }
                } else {
                    sendToPong({ action: 'send', text, channelId: activeChannelId });
                    appendMessage('Вы', text, profileAvatarSmall.src);
                }
                msgInput.value = '';
                typingIndicator.textContent = '';
                clearTimeout(typingTimeout);
                playArcherAnimation();
                playBowAnimation();
                if (toggleSoundState) playSound('shot.mp3');
            }
            sendBtn.addEventListener('click', sendMessageHandler);
            msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessageHandler(); });

            function appendMessage(sender, text, avatarSrc, timeStr = null) {
                const msgId = 'msg_' + Date.now();
                const row = document.createElement('div');
                row.className = 'message-row';
                row.id = msgId;
                row.dataset.msgid = msgId;
                const finalTime = timeStr || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const links = detectLinks(text);
                let displayText = safeHtml(text);
                if (links.length > 0) {
                    links.forEach(url => {
                        displayText = displayText.replace(safeHtml(url), `<a href="${url}" target="_blank" class="msg-link">${safeHtml(url)}</a>`);
                    });
                }
                row.innerHTML = `<img src="${avatarSrc}" class="avatar" alt="avatar">
                    <div class="msg-body"><div class="msg-sender">${safeHtml(sender)}</div>
                    <div class="msg-text">${displayText}</div>
                    <div class="msg-status">${finalTime}</div></div>`;
                chatBox.insertBefore(row, typingIndicator);
                chatBox.scrollTop = chatBox.scrollHeight;

                let pressTimer;
                row.addEventListener('mousedown', () => { pressTimer = setTimeout(() => showReactionPicker(row, event), 500); });
                row.addEventListener('mouseup', () => clearTimeout(pressTimer));
                row.addEventListener('mouseleave', () => clearTimeout(pressTimer));
                row.addEventListener('touchstart', () => { pressTimer = setTimeout(() => showReactionPicker(row, event), 500); }, { passive: true });
                row.addEventListener('touchend', () => clearTimeout(pressTimer));
                row.addEventListener('touchmove', () => clearTimeout(pressTimer));
                row.querySelectorAll('.msg-link').forEach(link => {
                    link.addEventListener('click', e => { e.preventDefault(); showLinkPreview(link.href); });
                });

                if (messageReactions[msgId]) {
                    Object.keys(messageReactions[msgId]).forEach(emoji => {
                        for (let i = 0; i < messageReactions[msgId][emoji]; i++) addReactionToMessage(msgId, emoji, false);
                    });
                }
            }

            function updateRobinStatus(text, duration = 4000) {
                clearTimeout(robinTimer);
                robinText.style.transition = 'none';
                robinText.style.opacity = 1;
                robinText.textContent = text;
                if (duration > 0) {
                    robinTimer = setTimeout(() => {
                        robinText.style.transition = 'opacity 0.6s ease';
                        robinText.style.opacity = 0;
                        const onEnd = () => {
                            robinText.removeEventListener('transitionend', onEnd);
                            robinText.style.transition = 'none';
                            robinText.textContent = robinDefaultText;
                            robinText.style.opacity = 1;
                        };
                        robinText.addEventListener('transitionend', onEnd);
                    }, duration);
                }
            }

            // Анимации
            let archerAnimation = null, quiverAnim = null, bowAnim = null, currentArrowContainer = null;

            function playArcherAnimation() {
                if (currentArrowContainer && currentArrowContainer.parentNode) currentArrowContainer.parentNode.removeChild(currentArrowContainer);
                if (archerAnimation) { archerAnimation.destroy(); archerAnimation = null; }
                const wrapper = document.createElement('span'); wrapper.className = 'robin-arrow-container';
                wrapper.style.width = '100px'; wrapper.style.height = '50px'; wrapper.style.display = 'inline-block'; wrapper.style.verticalAlign = 'middle';
                currentArrowContainer = wrapper;
                robinText.textContent = '';
                robinText.appendChild(wrapper);
                if (typeof lottie !== 'undefined') {
                    archerAnimation = lottie.loadAnimation({ container: wrapper, renderer: 'canvas', loop: false, autoplay: true, path: 'assets/Archer.json' });
                    archerAnimation.addEventListener('complete', () => {
                        if (wrapper.parentNode) wrapper.parentNode.removeChild(wrapper);
                        currentArrowContainer = null; archerAnimation = null;
                        robinText.textContent = robinDefaultText;
                    });
                }
            }

            function playBowAnimation() {
                if (bowAnim) { bowAnim.destroy(); bowAnim = null; }
                bowContainer.style.display = 'block';
                if (typeof lottie !== 'undefined') {
                    bowAnim = lottie.loadAnimation({ container: bowContainer, renderer: 'canvas', loop: false, autoplay: true, path: 'assets/bow.json' });
                    bowAnim.addEventListener('complete', () => { bowContainer.style.display = 'none'; bowAnim = null; });
                }
            }

            function playQuiverAnimation() {
                if (currentArrowContainer && currentArrowContainer.parentNode) currentArrowContainer.parentNode.removeChild(currentArrowContainer);
                if (quiverAnim) { quiverAnim.destroy(); quiverAnim = null; }
                const wrapper = document.createElement('span'); wrapper.className = 'robin-arrow-container';
                wrapper.style.width = '100px'; wrapper.style.height = '50px'; wrapper.style.display = 'inline-block'; wrapper.style.verticalAlign = 'middle';
                currentArrowContainer = wrapper;
                robinText.textContent = '✅ ';
                robinText.appendChild(wrapper);
                if (typeof lottie !== 'undefined') {
                    quiverAnim = lottie.loadAnimation({ container: wrapper, renderer: 'canvas', loop: false, autoplay: true, path: 'assets/docking/animation.json' });
                    quiverAnim.addEventListener('complete', () => {
                        if (wrapper.parentNode) wrapper.parentNode.removeChild(wrapper);
                        currentArrowContainer = null; quiverAnim = null;
                    });
                }
                setTimeout(() => {
                    if (wrapper.parentNode) wrapper.remove();
                    robinText.textContent = robinDefaultText;
                }, 5000);
            }

            // Списки аватаров и контактов
            const avatars = ['assets/avatars/001-.png','assets/avatars/002--1.png','assets/avatars/003-icon-8033085.png','assets/avatars/009--7.png','assets/avatars/010--8.png','assets/avatars/018--16.png','assets/avatars/022--20.png','assets/avatars/037--35.png','assets/avatars/043--41.png','assets/avatars/048--46.png','assets/avatars/050--48.png','assets/avatars/052--50.png','assets/avatars/053--51.png','assets/avatars/056--54.png','assets/avatars/066--64.png','assets/avatars/077-icon-8033092.png','assets/avatars/083-icon-11885568.png','assets/avatars/094-icon-18926716.png','assets/avatars/108--83.png','assets/avatars/147-icon-6081840.png','assets/avatars/148-icon-5532632.png','assets/avatars/149-icon-4132697.png','assets/avatars/150-icon-10756654.png','assets/avatars/153-icon-4964924.png','assets/avatars/154-icon-4261075.png','assets/avatars/156-icon-4132828.png','assets/avatars/158--116.png','assets/avatars/160-icon-2332597.png','assets/avatars/162-icon-6237595.png','assets/avatars/167-icon-1920840.png','assets/avatars/168-icon-228268.png','assets/avatars/169-icon-5613167.png','assets/avatars/173-icon-1615623.png','assets/avatars/183-icon-5840846.png','assets/avatars/186-icon-6237499.png','assets/avatars/188-icon-6267517.png','assets/avatars/203-icon-3516506.png','assets/avatars/216-icon-5504960.png','assets/avatars/221-icon-9530256.png','assets/avatars/226-icon-9669507.png','assets/avatars/227-icon-9623471.png','assets/avatars/229-icon-10032172.png','assets/avatars/230-icon-10049316.png','assets/avatars/232-icon-11434002.png','assets/avatars/234-icon-10756328.png','assets/avatars/245-icon-16150697.png','assets/avatars/246-icon-16150730.png','assets/avatars/249-icon-17159913.png','assets/avatars/250-icon-17159758.png','assets/avatars/251-icon-17159744.png','assets/avatars/253-icon-18426073.png','assets/avatars/254-icon-18621065.png','assets/avatars/255-icon-18926692.png','assets/avatars/256--120.png'];

            function loadAvatars() {
                avatarList.innerHTML = '';
                avatars.forEach(src => {
                    const img = document.createElement('img'); img.src = src; img.className = 'avatar-option';
                    img.addEventListener('click', () => {
                        profileAvatarSmall.src = src;
                        document.getElementById('robin-avatar').src = src;
                        localStorage.setItem('robinhood_avatar', src);
                        updateRobinStatus('🖼 Аватар обновлён');
                        closeAllSheets();
                    });
                    avatarList.appendChild(img);
                });
            }

            function loadAvatarsForFriend(contact) {
                avatarList.innerHTML = '';
                avatars.forEach(src => {
                    const img = document.createElement('img'); img.src = src; img.className = 'avatar-option';
                    img.addEventListener('click', () => {
                        const contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                        const c = contacts.find(c => c.pubkey === contact.pubkey);
                        if (c) { c.avatar = src; localStorage.setItem('robinhood_contacts', JSON.stringify(contacts)); loadContacts(); updateChatWithContact(c); }
                        closeAllSheets();
                    });
                    avatarList.appendChild(img);
                });
                avatarSelector.classList.add('show');
                overlay.classList.add('show');
            }

            function loadContacts() {
                const contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                const confirmed = contacts.filter(c => c.status === 'confirmed');
                contactsListInner.innerHTML = '';
                if (confirmed.length) {
                    confirmed.forEach(c => {
                        const div = document.createElement('div'); div.className = 'contact-item';
                        const isOnline = contactOnlineStatus[c.pubkey] || false;
                        div.innerHTML = `<div class="contact-info"><span class="online-dot ${isOnline ? 'online' : 'offline'}"></span><img src="${c.avatar || 'assets/avatars/001-.png'}" class="contact-avatar" alt="avatar"><span class="contact-name">${safeHtml(c.name)}</span></div><button class="delete-contact" data-pubkey="${c.pubkey}">✖</button>`;
                        div.querySelector('.contact-info').addEventListener('click', () => {
                            activeChannelId = c.pubkey;
                            openChatWithContact(c);
                            contactsSheet.classList.remove('open');
                            overlay.classList.remove('show');
                        });
                        div.querySelector('.delete-contact').addEventListener('click', e => { e.stopPropagation(); if (confirm('Убить лучника ' + c.name + '?')) deleteContact(c.pubkey); });
                        let pressTimer;
                        div.addEventListener('mousedown', () => { pressTimer = setTimeout(() => showContactMenu(c), 600); });
                        div.addEventListener('mouseup', () => clearTimeout(pressTimer));
                        div.addEventListener('mouseleave', () => clearTimeout(pressTimer));
                        div.addEventListener('touchstart', () => { pressTimer = setTimeout(() => showContactMenu(c), 600); }, { passive: true });
                        div.addEventListener('touchend', () => clearTimeout(pressTimer));
                        div.addEventListener('touchmove', () => clearTimeout(pressTimer));
                        contactsListInner.appendChild(div);
                    });
                } else {
                    updateRobinStatus('🏹 Лучников нет! Создайте стрелу, чтобы пригласить.', 3000);
                }
            }

            function deleteContact(pubkey) {
                let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                contacts = contacts.filter(c => c.pubkey !== pubkey);
                localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
                if (activeChannelId === pubkey) { delete channels[pubkey]; activeChannelId = Object.keys(channels)[0] || null; }
                loadContacts();
                updateRobinStatus('🔥 Стрелок уволен из Шервуда', 2000);
            }

            function openChatWithContact(contact) {
                activeContact = contact;
                chatBox.querySelectorAll('.message-row:not(#robin-row)').forEach(m => m.remove());
                typingIndicator.textContent = '';
                updateRobinStatus('💬 Перестрелка с ' + contact.name + ' открыта', 3000);
                loadChatHistory(contact.pubkey);
            }

            function updateChatWithContact(contact) {
                if (activeContact && activeContact.pubkey === contact.pubkey) activeContact = contact;
            }

            async function loadChatHistory(contactPubkey) {
                if (toggleHistoryState) {
                    const hist = await loadEncryptedHistory();
                    hist.forEach(msg => {
                        appendMessage(
                            msg.sender === 'me' ? 'Вы' : (msg.senderName || msg.sender.slice(0, 8)),
                            msg.text,
                            msg.avatar || 'assets/avatars/001-.png',
                            msg.time
                        );
                    });
                }
            }

            function showContactMenu(contact) {
                currentMenuContact = contact;
                const menu = document.getElementById('contact-menu'); menu.style.display = 'block';
                document.getElementById('menu-rename').onclick = async () => {
                    hideContactMenu();
                    const newName = await showModalInput('✎ Новое имя лучника', 'Имя', contact.name);
                    if (newName) {
                        const contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                        const c = contacts.find(c => c.pubkey === contact.pubkey);
                        if (c) { c.name = newName.substring(0, 15); localStorage.setItem('robinhood_contacts', JSON.stringify(contacts)); loadContacts(); updateChatWithContact(c); }
                    }
                };
                document.getElementById('menu-avatar').onclick = () => { hideContactMenu(); loadAvatarsForFriend(contact); };
                document.getElementById('menu-delete').onclick = () => { hideContactMenu(); if (confirm('Убить лучника ' + contact.name + '?')) deleteContact(contact.pubkey); };
                document.getElementById('menu-cancel').onclick = hideContactMenu;
            }

            function hideContactMenu() { document.getElementById('contact-menu').style.display = 'none'; currentMenuContact = null; }

            document.getElementById('share-ref-link-btn').addEventListener('click', () => {
                const link = document.getElementById('ref-link-display').textContent;
                if (link && navigator.share) navigator.share({ title: 'RobinHood P2P', url: link }).catch(() => {});
            });
            document.getElementById('close-ref-modal-btn').addEventListener('click', () => document.getElementById('ref-modal').classList.remove('active'));

            // Инициализация
            async function init() {
                applyTheme(currentTheme);
                pongFrame.src = 'https://stepweather-prog.github.io/P2PPong/?v=' + Date.now();
                const savedHistory = localStorage.getItem('robinhood_history');
                if (savedHistory !== null) toggleHistoryState = savedHistory === 'true';
                historyStatus.textContent = toggleHistoryState ? 'Вкл' : 'Выкл';
                const savedSound = localStorage.getItem('robinhood_sound');
                if (savedSound !== null) toggleSoundState = savedSound === 'true';
                soundStatus.textContent = toggleSoundState ? 'Вкл' : 'Выкл';
                const savedActive = localStorage.getItem('robinhood_active_tunnel');
                if (savedActive !== null && savedActive !== '') activeTunnel = parseInt(savedActive);
                updateTunnelUI();
                updateRobinStatus('🏹 Ждём колчан...', 0);
            }
            window.addEventListener('load', init);
        }
    </script>
