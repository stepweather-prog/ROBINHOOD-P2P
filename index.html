    <style>

        /* Остальные темы... добавьте их из вашего кода */
        
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        .header { background:linear-gradient(135deg, rgba(25,35,20,0.96), rgba(15,25,12,0.98)); border-bottom:2px solid var(--border); backdrop-filter:blur(8px); z-index:10; padding:8px 12px; display:flex; flex-direction:column; gap:6px; position:relative; box-shadow:0 4px 20px rgba(0,0,0,0.3); }

        #robin-text { font-weight:700; font-size:0.9em; color:var(--text-bright); text-shadow:0 1px 3px rgba(0,0,0,0.6); }
        
        /* Call Panel Styles */
        #call-panel { 
            position: fixed;

        .call-buttons { display: flex; justify-content: center; gap: 20px; }
        .call-btn {
            width: 60px;

        .call-btn:hover { transform: scale(1.1); }
        .call-btn-accept { background: #4caf50; color: white; box-shadow: 0 0 15px rgba(76, 175, 80, 0.5); }
        .call-btn-reject, .call-btn-end { background: #f44336; color: white; box-shadow: 0 0 15px rgba(244, 67, 54, 0.5); }
        .call-btn-control { background: var(--btn-bg); border: 1px solid var(--border); color: var(--text); font-size: 20px; }
        .call-btn-active { background: var(--accent); color: #1a1f0f; }
        
        .bottom-sheet, .avatar-selector { position:fixed; top:0; left:0; width:min(85%, 380px); height:100%; background:var(--sheet-bg); border-right:2px solid var(--border); z-index:200; transform:translateX(-100%); transition:transform 0.35s cubic-bezier(0.2,0.9,0.4,1.1); overflow-y:auto; backdrop-filter:blur(16px); box-shadow:8px 0 30px rgba(0,0,0,0.5); -webkit-overflow-scrolling:touch; }
        .bottom-sheet.open, .avatar-selector.show { transform:translateX(0); }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--overlay-bg); backdrop-filter:blur(4px); display:none; z-index:190; }
        .overlay.show { display:block; }
        
        .typing-indicator { font-size:0.7em; color:var(--text-dim); padding:2px 12px; font-style:italic; min-height:18px; }
        .online-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; }
        .online-dot.online { background:#4caf50; box-shadow:0 0 6px #4caf50; }
        .online-dot.offline { background:#666; }
        
        /* Анимация звонка */
        @keyframes callRipple {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.5); }
            70% { box-shadow: 0 0 0 20px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
        .call-ripple { animation: callRipple 1.5s infinite; }
    </style>
</head>

    <iframe id="pong-frame" src="" style="display:none;" title="p2p engine"></iframe>

    <script>
        (function() {
            // ========== DOM ЭЛЕМЕНТЫ ==========
            const pongFrame = document.getElementById('pong-frame');
            const chatBox = document.getElementById('chat-box');
            const msgInput = document.getElementById('msg-input');
            const robinText = document.getElementById('robin-text');
            const profileAvatarSmall = document.getElementById('profile-avatar-small');
            const nickLabel = document.getElementById('nick-label');
            const avatarSelector = document.getElementById('avatar-selector');
            const avatarList = document.getElementById('avatar-list');
            const contactsSheet = document.getElementById('contacts-sheet');
            const contactsListInner = document.getElementById('contacts-list-inner');
            const overlay = document.getElementById('overlay');
            const btnCall = document.getElementById('btn-call');
            const btnVideo = document.getElementById('btn-video');
            const callPanel = document.getElementById('call-panel');
            const callStatus = document.getElementById('call-status');
            const callButtons = document.getElementById('call-buttons');
            
            // ========== СОСТОЯНИЯ ==========
            let channels = {};
            let activeChannelId = null;
            let handshakeSecret = null;
            let currentServer = 'render';
            
            // WebRTC для звонков
            let peerConnection = null;
            let localStream = null;
            let callActive = false;
            let isCaller = false;
            let isVideoCall = false;
            let pendingOffer = null;
            
            // Аудиоэффекты
            let ringtoneAudio = null;
            let ringbackAudio = null;
            
            // Другие состояния
            let toggleHistoryState = true;
            let toggleSoundState = true;
            let typingTimers = {};
            let typingIndicator = document.getElementById('typing-indicator');
            let robinDefaultText = robinText ? robinText.textContent : 'Святые сокеты стабильны!';
            let robinTimer = null;
            
            // Конфигурация ICE
            const iceServers = [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" },
                { urls: "stun:stun2.l.google.com:19302" },
                { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" },
                { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" }
            ];
            
            // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
            function safeHtml(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }
            
            function updateRobinStatus(text, duration = 4000) {
                if (!robinText) return;
                clearTimeout(robinTimer);
                robinText.style.transition = 'none';
                robinText.style.opacity = 1;
                robinText.textContent = text;
                if (duration > 0) {
                    robinTimer = setTimeout(() => {
                        robinText.style.transition = 'opacity 0.6s ease';
                        robinText.style.opacity = 0;
                        const onEnd = () => {
                            robinText.removeEventListener('transitionend', onEnd);
                            robinText.style.transition = 'none';
                            robinText.textContent = robinDefaultText;
                            robinText.style.opacity = 1;
                        };
                        robinText.addEventListener('transitionend', onEnd);
                    }, duration);
                }
            }
            
            function playSound(filename) {
                if (!toggleSoundState) return;
                try {
                    const audio = new Audio('assets/sounds/' + filename);
                    audio.volume = 0.5;
                    audio.play().catch(() => {});
                } catch(e) {}
            }
            
            function playRingtone() {
                stopRingtone();
                try {
                    ringtoneAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3');
                    ringtoneAudio.loop = true;
                    ringtoneAudio.volume = 0.5;
                    ringtoneAudio.play().catch(() => {});
                } catch(e) {}
            }
            
            function stopRingtone() {
                if (ringtoneAudio) {
                    ringtoneAudio.pause();
                    ringtoneAudio.loop = false;
                    ringtoneAudio = null;
                }
            }
            
            function playRingback() {
                stopRingback();
                try {
                    ringbackAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/1358/1358-preview.mp3');
                    ringbackAudio.loop = true;
                    ringbackAudio.volume = 0.5;
                    ringbackAudio.play().catch(() => {});
                } catch(e) {}
            }
            
            function stopRingback() {
                if (ringbackAudio) {
                    ringbackAudio.pause();
                    ringbackAudio.loop = false;
                    ringbackAudio = null;
                }
            }
            
            function playCallEnd() {
                if (toggleSoundState) {
                    try {
                        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/1357/1357-preview.mp3');
                        audio.play().catch(() => {});
                    } catch(e) {}
                }
            }
            
            // ========== ОТПРАВКА СООБЩЕНИЙ В PONG ==========
            function sendToPong(msg) {
                if (!msg) return;
                if (activeChannelId && channels[activeChannelId]) {
                    msg.secret = channels[activeChannelId].secret;
                    msg.channelId = activeChannelId;
                }
                if (handshakeSecret && msg.action === 'handshake') {
                    msg.handshake = handshakeSecret;
                }
                pongFrame.contentWindow.postMessage(msg, '*');
            }
            
            function sendCallSignal(text) {
                sendToPong({ action: 'send', text, channelId: activeChannelId });
            }
            
            // ========== СООБЩЕНИЯ В ЧАТЕ ==========
            function appendMessage(sender, text, avatarSrc, timeStr = null) {
                const finalTime = timeStr || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const row = document.createElement('div');
                row.className = 'message-row';
                row.innerHTML = `
                    <img src="${avatarSrc}" class="avatar" alt="avatar">
                    <div class="msg-body">
                        <div class="msg-sender">${safeHtml(sender)}</div>
                        <div>${safeHtml(text)}</div>
                        <div class="msg-status">${finalTime}</div>
                    </div>
                `;
                chatBox.insertBefore(row, typingIndicator);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
            
            // ========== WEBRTC ЗВОНКИ ==========
            async function getLocalStream(enableVideo = false) {
                try {
                    const constraints = { audio: true };
                    if (enableVideo) constraints.video = true;
                    localStream = await navigator.mediaDevices.getUserMedia(constraints);
                    return true;
                } catch (e) {
                    updateRobinStatus('❌ Нет доступа к микрофону/камере: ' + e.message, 3000);
                    return false;
                }
            }
            
            function createPeerConnection() {
                if (peerConnection) {
                    peerConnection.close();
                }
                
                peerConnection = new RTCPeerConnection({ iceServers });
                
                // Добавляем локальный поток
                if (localStream) {
                    localStream.getTracks().forEach(track => {
                        peerConnection.addTrack(track, localStream);
                    });
                }
                
                // Обработка ICE кандидатов
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        sendCallSignal('__ICE__' + JSON.stringify(event.candidate));
                    }
                };
                
                // Получение удаленного потока
                peerConnection.ontrack = (event) => {
                    updateRobinStatus('🎙 Аудио получено', 2000);
                    const remoteAudio = new Audio();
                    remoteAudio.srcObject = event.streams[0];
                    remoteAudio.play().catch(e => console.log('Auto-play blocked'));
                };
                
                // Состояние соединения
                peerConnection.onconnectionstatechange = () => {
                    console.log('Connection state:', peerConnection.connectionState);
                    if (peerConnection.connectionState === 'connected') {
                        updateCallUI('connected');
                        callActive = true;
                        stopRingtone();
                        stopRingback();
                        updateRobinStatus('✅ Разговор установлен', 2000);
                    } else if (peerConnection.connectionState === 'disconnected' ||
                               peerConnection.connectionState === 'failed' ||
                               peerConnection.connectionState === 'closed') {
                        endCall();
                    }
                };
                
                peerConnection.oniceconnectionstatechange = () => {
                    console.log('ICE state:', peerConnection.iceConnectionState);
                };
            }
            
            function updateCallUI(state) {
                if (!callPanel) return;
                
                switch(state) {
                    case 'incoming':
                        callStatus.textContent = '📞 Входящий вызов...';
                        callButtons.innerHTML = `
                            <button class="call-btn call-btn-accept" id="call-accept">📞</button>
                            <button class="call-btn call-btn-reject" id="call-reject">❌</button>
                        `;
                        document.getElementById('call-accept')?.addEventListener('click', acceptCall);
                        document.getElementById('call-reject')?.addEventListener('click', rejectCall);
                        break;
                    case 'outgoing':
                        callStatus.textContent = isVideoCall ? '📹 Видеовызов...' : '📞 Вызов...';
                        callButtons.innerHTML = `<button class="call-btn call-btn-end" id="call-end">⏹</button>`;
                        document.getElementById('call-end')?.addEventListener('click', endCall);
                        break;
                    case 'connected':
                        callStatus.textContent = '✅ В разговоре';
                        callButtons.innerHTML = `
                            <button class="call-btn call-btn-control" id="call-mic">🎤</button>
                            <button class="call-btn call-btn-end" id="call-end">⏹</button>
                        `;
                        document.getElementById('call-mic')?.addEventListener('click', toggleMic);
                        document.getElementById('call-end')?.addEventListener('click', endCall);
                        break;
                    case 'none':
                        callPanel.style.display = 'none';
                        break;
                }
                callPanel.style.display = 'block';
            }
            
            function toggleMic() {
                if (localStream) {
                    const audioTrack = localStream.getAudioTracks()[0];
                    if (audioTrack) {
                        audioTrack.enabled = !audioTrack.enabled;
                        const micBtn = document.getElementById('call-mic');
                        if (micBtn) micBtn.textContent = audioTrack.enabled ? '🎤' : '🚫';
                    }
                }
            }
            
            async function startCall(enableVideo = false) {
                if (callActive) return;
                if (!activeChannelId || !channels[activeChannelId]) {
                    updateRobinStatus('🏹 Сначала воспользуйся стрелой!', 3000);
                    return;
                }
                
                isCaller = true;
                isVideoCall = enableVideo;
                updateCallUI('outgoing');
                playRingback();
                
                if (!await getLocalStream(enableVideo)) {
                    endCall();
                    return;
                }
                
                createPeerConnection();
                
                try {
                    const offer = await peerConnection.createOffer();
                    await peerConnection.setLocalDescription(offer);
                    sendCallSignal('__OFFER__' + JSON.stringify({ 
                        sdp: offer, 
                        video: enableVideo 
                    }));
                    updateRobinStatus('📡 Устанавливаем соединение...', 0);
                } catch (e) {
                    console.error('Create offer error:', e);
                    endCall();
                }
            }
            
            async function acceptCall() {
                if (!pendingOffer) return;
                
                stopRingtone();
                updateCallUI('outgoing');
                playCallStart();
                
                if (!await getLocalStream(isVideoCall)) {
                    rejectCall();
                    return;
                }
                
                createPeerConnection();
                
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(pendingOffer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    sendCallSignal('__ANSWER__' + JSON.stringify(answer));
                    pendingOffer = null;
                } catch (e) {
                    console.error('Accept call error:', e);
                    endCall();
                }
            }
            
            function rejectCall() {
                sendCallSignal('__HANGUP__');
                endCall();
                updateRobinStatus('📞 Вызов отклонён', 2000);
            }
            
            function endCall() {
                callActive = false;
                isCaller = false;
                isVideoCall = false;
                pendingOffer = null;
                
                stopRingtone();
                stopRingback();
                playCallEnd();
                
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null;
                }
                
                updateCallUI('none');
                updateRobinStatus('📞 Звонок завершён', 2000);
            }
            
            function playCallStart() {
                if (toggleSoundState) {
                    try {
                        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/1356/1356-preview.mp3');
                        audio.play().catch(() => {});
                    } catch(e) {}
                }
            }
            
            // ========== ОБРАБОТЧИК СООБЩЕНИЙ ОТ PONG ==========
            window.addEventListener('message', (event) => {
                if (event.source !== pongFrame.contentWindow) return;
                const data = event.data;
                
                switch(data.type) {
                    case 'pong-ready':
                        handshakeSecret = data.handshake;
                        sendToPong({ action: 'handshake' });
                        break;
                        
                    case 'handshake-ok':
                        updateRobinStatus('🏹 Тетива натянута! Лучники готовы!', 2000);
                        const urlParams = new URLSearchParams(window.location.search);
                        if (urlParams.get('id') && urlParams.get('key')) {
                            sendToPong({ action: 'accept', id: urlParams.get('id'), key: urlParams.get('key') });
                        }
                        break;
                        
                    case 'session-created':
                        document.getElementById('ref-link-display').textContent = data.fullLink;
                        document.getElementById('ref-modal').classList.add('active');
                        navigator.clipboard.writeText(data.fullLink).catch(()=>{});
                        break;
                        
                    case 'channel-open':
                        channels[data.channelId] = { secret: data.secret, role: data.role };
                        if (!activeChannelId) activeChannelId = data.channelId;
                        updateRobinStatus('✅ Колчан открыт!', 3000);
                        const contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                        if (!contacts.find(c => c.pubkey === data.channelId)) {
                            contacts.push({ pubkey: data.channelId, name: 'Лучник', avatar: 'assets/avatars/001-.png', status: 'confirmed' });
                            localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
                        }
                        loadContacts();
                        break;
                        
                    case 'channel-restored':
                        channels[data.channelId] = { secret: data.secret, role: data.role };
                        if (!activeChannelId) activeChannelId = data.channelId;
                        updateRobinStatus('🔄 Колчан восстановлен', 2000);
                        break;
                        
                    case 'restored-channels':
                        if (data.channels) {
                            data.channels.forEach(ch => {
                                channels[ch.channelId] = { secret: ch.secret, role: ch.role };
                                if (!activeChannelId) activeChannelId = ch.channelId;
                            });
                            updateRobinStatus('🔄 Колчаны восстановлены (' + data.channels.length + ')', 2000);
                            loadContacts();
                        }
                        break;
                        
                    case 'message':
                        if (!data.channelId || !data.text || !channels[data.channelId]) break;
                        
                        // Индикатор набора текста
                        if (data.text === '__TYPING__') {
                            if (typingIndicator) typingIndicator.textContent = '✍️ Лучник натягивает тетиву...';
                            clearTimeout(typingTimers[data.channelId]);
                            typingTimers[data.channelId] = setTimeout(() => {
                                if (typingIndicator) typingIndicator.textContent = '';
                            }, 2500);
                            return;
                        }
                        
                        // Обработка сигналов звонков
                        if (data.text.startsWith('__OFFER__')) {
                            if (callActive) return;
                            try {
                                const parsed = JSON.parse(data.text.replace('__OFFER__', ''));
                                pendingOffer = parsed.sdp || parsed;
                                isVideoCall = parsed.video || false;
                                updateCallUI('incoming');
                                playRingtone();
                                updateRobinStatus('📞 Входящий вызов!', 0);
                            } catch(e) { console.error(e); }
                            return;
                        }
                        
                        if (data.text.startsWith('__ANSWER__')) {
                            stopRingback();
                            try {
                                const answer = JSON.parse(data.text.replace('__ANSWER__', ''));
                                if (peerConnection) {
                                    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                                    updateRobinStatus('✅ Соединение установлено', 2000);
                                }
                            } catch(e) { console.error(e); }
                            return;
                        }
                        
                        if (data.text.startsWith('__ICE__')) {
                            try {
                                const candidate = JSON.parse(data.text.replace('__ICE__', ''));
                                if (peerConnection) {
                                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                                }
                            } catch(e) { console.error('ICE error:', e); }
                            return;
                        }
                        
                        if (data.text === '__HANGUP__') {
                            if (callActive) {
                                updateRobinStatus('📞 Собеседник завершил звонок', 2000);
                                endCall();
                            } else {
                                stopRingtone();
                                updateCallUI('none');
                                updateRobinStatus('📞 Вызов отменён', 2000);
                            }
                            return;
                        }
                        
                        // Обычное сообщение
                        activeChannelId = data.channelId;
                        const contactsArr = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                        const contact = contactsArr.find(c => c.pubkey === data.channelId);
                        const senderName = contact ? contact.name : 'Друг';
                        const senderAvatar = contact ? contact.avatar : 'assets/avatars/001-.png';
                        appendMessage(senderName, data.text, senderAvatar);
                        if (toggleSoundState) playSound('bow_shot.mp3');
                        break;
                        
                    case 'install-prompt':
                        updateRobinStatus('Откройте в браузере для установки', 3000);
                        break;
                        
                    case 'status':
                        updateRobinStatus(data.text, data.duration || 3000);
                        break;
                        
                    case 'error':
                        updateRobinStatus('⚠ ' + data.text, 4000);
                        break;
                }
            });
            
            // ========== ЗАГРУЗКА АВАТАРОВ И КОНТАКТОВ ==========
            const avatars = ['assets/avatars/001-.png','assets/avatars/002--1.png','assets/avatars/003-icon-8033085.png','assets/avatars/009--7.png','assets/avatars/010--8.png','assets/avatars/018--16.png','assets/avatars/022--20.png','assets/avatars/037--35.png','assets/avatars/043--41.png','assets/avatars/048--46.png','assets/avatars/050--48.png','assets/avatars/052--50.png','assets/avatars/053--51.png','assets/avatars/056--54.png','assets/avatars/066--64.png','assets/avatars/077-icon-8033092.png','assets/avatars/083-icon-11885568.png','assets/avatars/094-icon-18926716.png','assets/avatars/108--83.png','assets/avatars/147-icon-6081840.png','assets/avatars/148-icon-5532632.png','assets/avatars/149-icon-4132697.png','assets/avatars/150-icon-10756654.png','assets/avatars/153-icon-4964924.png','assets/avatars/154-icon-4261075.png','assets/avatars/156-icon-4132828.png','assets/avatars/158--116.png','assets/avatars/160-icon-2332597.png','assets/avatars/162-icon-6237595.png','assets/avatars/167-icon-1920840.png','assets/avatars/168-icon-228268.png','assets/avatars/169-icon-5613167.png','assets/avatars/173-icon-1615623.png','assets/avatars/183-icon-5840846.png','assets/avatars/186-icon-6237499.png','assets/avatars/188-icon-6267517.png','assets/avatars/203-icon-3516506.png','assets/avatars/216-icon-5504960.png','assets/avatars/221-icon-9530256.png','assets/avatars/226-icon-9669507.png','assets/avatars/227-icon-9623471.png','assets/avatars/229-icon-10032172.png','assets/avatars/230-icon-10049316.png','assets/avatars/232-icon-11434002.png','assets/avatars/234-icon-10756328.png','assets/avatars/245-icon-16150697.png','assets/avatars/246-icon-16150730.png','assets/avatars/249-icon-17159913.png','assets/avatars/250-icon-17159758.png','assets/avatars/251-icon-17159744.png','assets/avatars/253-icon-18426073.png','assets/avatars/254-icon-18621065.png','assets/avatars/255-icon-18926692.png','assets/avatars/256--120.png'];
            
            function loadAvatars() {
                if (!avatarList) return;
                avatarList.innerHTML = '';
                avatars.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.className = 'avatar-option';
                    img.addEventListener('click', () => {
                        if (profileAvatarSmall) profileAvatarSmall.src = src;
                        document.getElementById('robin-avatar').src = src;
                        localStorage.setItem('robinhood_avatar', src);
                        updateRobinStatus('🖼 Аватар обновлён');
                        closeAllSheets();
                    });
                    avatarList.appendChild(img);
                });
            }
            
            function loadContacts() {
                if (!contactsListInner) return;
                const contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                const confirmed = contacts.filter(c => c.status === 'confirmed');
                contactsListInner.innerHTML = '';
                if (confirmed.length) {
                    confirmed.forEach(c => {
                        const div = document.createElement('div');
                        div.className = 'contact-item';
                        div.innerHTML = `
                            <div class="contact-info">
                                <img src="${c.avatar || 'assets/avatars/001-.png'}" class="contact-avatar" alt="avatar">
                                <span class="contact-name">${safeHtml(c.name)}</span>
                            </div>
                            <button class="delete-contact" data-pubkey="${c.pubkey}">✖</button>
                        `;
                        div.querySelector('.contact-info')?.addEventListener('click', () => {
                            activeChannelId = c.pubkey;
                            contactsSheet?.classList.remove('open');
                            overlay?.classList.remove('show');
                            updateRobinStatus('💬 Перестрелка с ' + c.name + ' открыта', 3000);
                        });
                        div.querySelector('.delete-contact')?.addEventListener('click', e => {
                            e.stopPropagation();
                            if (confirm('Убить лучника ' + c.name + '?')) deleteContact(c.pubkey);
                        });
                        contactsListInner.appendChild(div);
                    });
                } else {
                    updateRobinStatus('🏹 Лучников нет! Создайте стрелу, чтобы пригласить.', 3000);
                }
            }
            
            function deleteContact(pubkey) {
                let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                contacts = contacts.filter(c => c.pubkey !== pubkey);
                localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
                if (activeChannelId === pubkey) {
                    delete channels[pubkey];
                    activeChannelId = Object.keys(channels)[0] || null;
                }
                loadContacts();
                updateRobinStatus('🔥 Стрелок уволен из Шервуда', 2000);
            }
            
            function closeAllSheets() {
                avatarSelector?.classList.remove('show');
                contactsSheet?.classList.remove('open');
                overlay?.classList.remove('show');
            }
            
            // ========== ОТПРАВКА СООБЩЕНИЙ ==========
            let typingTimeout = null;
            if (msgInput) {
                msgInput.addEventListener('input', () => {
                    if (!activeChannelId || !channels[activeChannelId]) return;
                    sendToPong({ action: 'send', text: '__TYPING__', channelId: activeChannelId });
                    clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => {
                        if (typingIndicator) typingIndicator.textContent = '';
                    }, 2000);
                });
            }
            
            async function sendMessageHandler() {
                const text = msgInput.value.trim();
                if (!text) return;
                if (!activeChannelId || !channels[activeChannelId]) {
                    updateRobinStatus('❌ Нет активного колчана.', 2500);
                    return;
                }
                sendToPong({ action: 'send', text, channelId: activeChannelId });
                appendMessage('Вы', text, profileAvatarSmall?.src || 'assets/avatars/001-.png');
                msgInput.value = '';
                if (typingIndicator) typingIndicator.textContent = '';
                clearTimeout(typingTimeout);
                if (toggleSoundState) playSound('shot.mp3');
            }
            
            // ========== ИНИЦИАЛИЗАЦИЯ ==========
            const savedAvatar = localStorage.getItem('robinhood_avatar');
            if (savedAvatar && profileAvatarSmall) {
                profileAvatarSmall.src = savedAvatar;
                document.getElementById('robin-avatar').src = savedAvatar;
            }
            const savedNick = localStorage.getItem('robinhood_nick');
            if (savedNick && nickLabel) nickLabel.textContent = savedNick.substring(0, 10);
            
            // Кнопки интерфейса
            document.getElementById('send-btn')?.addEventListener('click', sendMessageHandler);
            msgInput?.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessageHandler(); });
            
            document.getElementById('btn-arrow')?.addEventListener('click', () => {
                if (!handshakeSecret && Object.keys(channels).length === 0) {
                    updateRobinStatus('🏹 Колчан ещё не готов. Ждите сигнала.', 2500);
                    return;
                }
                updateRobinStatus('⚒ Крафт стрелы...', 0);
                sendToPong({ action: 'create' });
            });
            
            document.getElementById('btn-avatar')?.addEventListener('click', () => {
                if (avatarSelector?.classList.contains('show')) closeAllSheets();
                else { closeAllSheets(); loadAvatars(); avatarSelector?.classList.add('show'); overlay?.classList.add('show'); }
            });
            
            document.getElementById('btn-letters')?.addEventListener('click', () => {
                if (contactsSheet?.classList.contains('open')) {
                    contactsSheet.classList.remove('open');
                    overlay?.classList.remove('show');
                } else {
                    closeAllSheets();
                    loadContacts();
                    contactsSheet?.classList.add('open');
                    overlay?.classList.add('show');
                }
            });
            
            nickLabel?.addEventListener('click', async () => {
                const newNick = prompt('🏷 Твой ник (макс. 10 символов)', nickLabel.textContent);
                if (newNick) {
                    const nick = newNick.substring(0, 10);
                    nickLabel.textContent = nick;
                    localStorage.setItem('robinhood_nick', nick);
                    updateRobinStatus('🏷 Ник изменён на «' + nick + '»');
                }
            });
            
            document.getElementById('contacts-close')?.addEventListener('click', () => {
                contactsSheet?.classList.remove('open');
                overlay?.classList.remove('show');
            });
            
            overlay?.addEventListener('click', closeAllSheets);
            
            document.getElementById('btn-clear')?.addEventListener('click', () => {
                chatBox.querySelectorAll('.message-row:not(#robin-row)').forEach(m => m.remove());
                updateRobinStatus('🚬 Робин Гуд сжёг весь лагерь! Всё чисто.', 8000);
            });
            
            document.getElementById('btn-terms')?.addEventListener('click', () => {
                window.open('https://github.com/stepweather-prog/ROBINHOOD-P2P/blob/main/README.md', '_blank');
            });
            
            // Кнопки звонков
            btnCall?.addEventListener('click', () => startCall(false));
            btnVideo?.addEventListener('click', () => startCall(true));
            callLabel?.addEventListener('click', () => startCall(false));
            videoLabel?.addEventListener('click', () => startCall(true));
            
            // Загрузка iframe P2PPong
            pongFrame.src = 'https://stepweather-prog.github.io/P2PPong/?v=' + Date.now();
            
            updateRobinStatus('🏹 Ждём колчан...', 0);
            
            // Эмодзи панель (простая версия)
            const emojis = ['😀','😂','🤣','😍','😘','😜','😎','🤩','🥳','😢','😡','👍','👎','❤️','🔥','🎉','💀','🏹','🌲','🏰','🦊','🐺'];
            const emojiPanel = document.createElement('div');
            emojiPanel.id = 'emoji-panel';
            emojiPanel.style.cssText = 'display:none;position:fixed;bottom:70px;left:0;width:100%;background:var(--sheet-bg);border-top:2px solid var(--border);z-index:50;padding:10px;max-height:200px;overflow-y:auto;';
            const emojiGrid = document.createElement('div');
            emojiGrid.style.cssText = 'display:grid;grid-template-columns:repeat(8,1fr);gap:8px;text-align:center;';
            emojis.forEach(e => {
                const span = document.createElement('span');
                span.textContent = e;
                span.style.cssText = 'font-size:24px;cursor:pointer;padding:6px;border-radius:8px;';
                span.addEventListener('click', () => {
                    msgInput.value += e;
                    msgInput.focus();
                    emojiPanel.style.display = 'none';
                });
                emojiGrid.appendChild(span);
            });
            emojiPanel.appendChild(emojiGrid);
            document.body.appendChild(emojiPanel);
            
            document.getElementById('btn-emoji')?.addEventListener('click', () => {
                emojiPanel.style.display = emojiPanel.style.display === 'block' ? 'none' : 'block';
            });
            
            document.addEventListener('click', e => {
                if (emojiPanel && !emojiPanel.contains(e.target) && e.target !== document.getElementById('btn-emoji')) {
                    emojiPanel.style.display = 'none';
                }
            });
        })();
    </script>
</body>
</html>
