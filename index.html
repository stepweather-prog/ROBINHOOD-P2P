        return JSON.stringify({
            iv: btoa(Array.from(iv, function(b) { return String.fromCharCode(b); }).join('')),
            data: btoa(Array.from(new Uint8Array(ciphertext), function(b) { return String.fromCharCode(b); }).join(''))

    }
    async function aesDecrypt(payloadStr, key) {

            var data = Uint8Array.from(atob(payload.data), function(c) { return c.charCodeAt(0); });

    var settingExportContacts = document.getElementById('setting-export-contacts');

    var btnCloseLinkPreview = document.getElementById('btn-close-link-preview');

        if (btnCall) btnCall.addEventListener('click', function() { if (callActive) { endCall(); return; } startCall(false); });
    if (btnVideo) btnVideo.addEventListener('click', function() { if (callActive) { endCall(); return; } startCall(true); });
    if (callReject) callReject.addEventListener('click', function() { stopRingtone(); sendCallSignal('__HANGUP__'); if (callPanel) callPanel.style.display = 'none'; updateRobinStatus('📞 Вызов отклонён'); });
    if (callEnd) callEnd.addEventListener('click', endCall);

    if (callCamera) callCamera.addEventListener('click', toggleCamera);

    if (callLabel) callLabel.addEventListener('click', function() { if (btnCall) btnCall.click(); });
    if (videoLabel) videoLabel.addEventListener('click', function() { if (btnVideo) btnVideo.click(); });
    if (cancelArrowBtn) cancelArrowBtn.addEventListener('click', function() {

        var refModal = document.getElementById('ref-modal'); if (refModal) refModal.classList.remove('active');
        updateRobinStatus('⏹ Стрела отменена', 2000);
    });
        var emojis = ['😀','😂','🤣','😍','😘','😜','😎','🤩','🥳','😢','😡','👍','👎','❤️','🔥','🎉','💀','🏹','🌲','🏰','🦊','🐺','✨','⚔️','🛡️','🍺','🍗','🏕️','🌙','☀️','🌟','💪','🤝','🙏','👑','💰','🎯','📞','💬','🔔','❌','✅','🎵','📜','⚜️'];
    if (emojiGrid) {

    if (btnEmoji) btnEmoji.addEventListener('click', function() { if (emojiPanel) emojiPanel.style.display = emojiPanel.style.display === 'block' ? 'none' : 'block'; });
    document.addEventListener('click', function(e) {

        if (reactionPicker && !reactionPicker.contains(e.target)) { reactionPicker.style.display = 'none'; activeReactionMsgId = null; }
    });
        var typingTimeout = null;
    if (msgInput) {
        msgInput.addEventListener('input', function() {
            if (!activeChannelId || !channels[activeChannelId]) return;
            sendToPong({ action: 'send', text: '__TYPING__', channelId: activeChannelId });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(function() { if (typingIndicator) typingIndicator.textContent = ''; }, 2000);
        });
    }

    var btnArrow = document.getElementById('btn-arrow');
    if (btnArrow) btnArrow.addEventListener('click', function() {
        if (!handshakeSecret && Object.keys(channels).length === 0) { updateRobinStatus('🏹 Колчан ещё не готов. Ждите сигнала.', 2500); return; }
        updateRobinStatus('⚒ Крафт стрелы [' + (currentServer === 'workers' ? 'Warp' : 'Шервуд') + ']...', 0);
        sendToPong({ action: 'create' });
    });
        window.addEventListener('message', async function(event) {
        if (event.origin !== PONGPONG_ORIGIN) return;
        if (!pongFrame || event.source !== pongFrame.contentWindow) return;
        var data = event.data;
        if (!data || !data.type) return;
        
        switch (data.type) {
            case 'pong-ready':
                handshakeSecret = data.handshake;
                sendToPong({ action: 'handshake' });
                break;
            case 'handshake-ok':
                updateRobinStatus('🏹 Тетива натянута! Лучники готовы!', 2000);
                var urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('id') && urlParams.get('key')) {
                    currentServer = urlParams.get('server') || 'render';
                    if (serverToggle) serverToggle.checked = currentServer === 'workers';
                    updateRobinStatus('📨 Принимаю стрелу...', 0);
                    sendToPong({ action: 'accept', id: urlParams.get('id'), key: urlParams.get('key') });
                }
                break;
            case 'session-created':
                var refLinkDisplay = document.getElementById('ref-link-display');
                if (refLinkDisplay) refLinkDisplay.textContent = data.fullLink;
                generateQR(data.fullLink);
                var refModal = document.getElementById('ref-modal');
                if (refModal) refModal.classList.add('active');
                navigator.clipboard.writeText(data.fullLink).catch(function() {});
                break;
                        case 'channel-open':
                channels[data.channelId] = { secret: data.secret, role: data.role };
                if (!activeChannelId) activeChannelId = data.channelId;
                contactOnlineStatus[data.channelId] = true;
                playQuiverAnimation();
                var contacts = [];
                try { contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]'); } catch(e) {}
                if (!contacts.find(function(c) { return c.pubkey === data.channelId; })) {
                    contacts.push({ pubkey: data.channelId, name: 'Лучник', avatar: 'assets/avatars/001-.png', status: 'confirmed' });
                    try { localStorage.setItem('robinhood_contacts', JSON.stringify(contacts)); } catch(e) {}
                }
                sendToPong({
                    action: 'send',
                    text: '__PROFILE__' + JSON.stringify({ nick: nickLabel ? nickLabel.textContent : 'Лучник', avatar: profileAvatarSmall ? profileAvatarSmall.src : 'assets/avatars/001-.png' }),
                    channelId: data.channelId
                });
                break;
            case 'channel-restored':
                channels[data.channelId] = { secret: data.secret, role: data.role };
                if (!activeChannelId) activeChannelId = data.channelId;
                updateRobinStatus('🔄 Колчан восстановлен', 2000);
                break;
            case 'restored-channels':
                if (data.channels) {
                    data.channels.forEach(function(ch) {
                        channels[ch.channelId] = { secret: ch.secret, role: ch.role };
                        if (!activeChannelId) activeChannelId = ch.channelId;
                    });
                    updateRobinStatus('🔄 Колчаны восстановлены (' + data.channels.length + ')', 2000);
                    loadContacts();
                }
                break;
                            case 'message':
                if (!data.channelId || !data.text || !channels[data.channelId]) break;
                if (typeof data.text === 'string' && data.text === '__TYPING__') {
                    if (typingIndicator) typingIndicator.textContent = '✍️ Лучник натягивает тетиву...';
                    clearTimeout(typingTimers[data.channelId]);
                    typingTimers[data.channelId] = setTimeout(function() { if (typingIndicator) typingIndicator.textContent = ''; }, 2500);
                    return;
                }
                if (typeof data.text === 'string' && data.text.indexOf('__OFFER__') === 0) {
                    var parsed = JSON.parse(data.text.replace('__OFFER__', ''));
                    var offer = parsed.sdp || parsed; var isVideo = parsed.video || false;
                    videoCallActive = isVideo;
                    if (callPanel) callPanel.style.display = 'block';
                    if (callStatus) callStatus.textContent = isVideo ? '📹 Входящий видеовызов...' : '📞 Входящий вызов...';
                    if (callAccept) callAccept.style.display = 'inline-block';
                    if (callReject) callReject.style.display = 'inline-block';
                    if (callEnd) callEnd.style.display = 'none';
                    if (callSpeaker) callSpeaker.style.display = 'none';
                    if (callCamera) callCamera.style.display = 'none';
                    if (callMic) callMic.style.display = 'none';
                    playRingtone();
                    if (callAccept) {
                        callAccept.onclick = async function() {
                            stopRingtone(); if (callStatus) callStatus.textContent = '📞 Соединение...';
                            if (callAccept) callAccept.style.display = 'none'; if (callReject) callReject.style.display = 'none';
                            if (callEnd) callEnd.style.display = 'inline-block'; if (callSpeaker) callSpeaker.style.display = 'inline-block';
                            if (isVideo) { if (callCamera) callCamera.style.display = 'inline-block'; if (callMic) callMic.style.display = 'inline-block'; }
                            playCallStart();
                            var stream = await getMediaStream(isVideo);
                            if (!stream) { if (callPanel) callPanel.style.display = 'none'; return; }
                            localStreams['main'] = stream;
                            if (isVideo) { if (localVideo) localVideo.srcObject = stream; if (localVideoContainer) localVideoContainer.style.display = 'block'; if (videoControls) videoControls.classList.add('active'); }
                            var pc = createPeerConn(stream, 'main');
                            peerConnections['main'] = pc;
                            // На принимающей стороне DataChannel не создаём, ждём удалённый
                            pc.ondatachannel = function(e) {
                                dataChannels['main'] = e.channel;
                                e.channel.onmessage = function(ev) {
                                    try {
                                        var msg = JSON.parse(ev.data);
                                        if (msg.type === 'file') handleDataChannelFile(msg);
                                    } catch(err) {}
                                };
                            };
                            await pc.setRemoteDescription(new RTCSessionDescription(offer));
                            var answer = await pc.createAnswer();
                            await pc.setLocalDescription(answer);
                            sendCallSignal('__ANSWER__' + JSON.stringify(answer));
                            callActive = true;
                            flushIceCandidates('main');
                        };
                    }
                    if (callReject) {
                        callReject.onclick = function() { stopRingtone(); sendCallSignal('__HANGUP__'); if (callPanel) callPanel.style.display = 'none'; updateRobinStatus('📞 Вызов отклонён'); };
                    }
                    return;
                }
                if (typeof data.text === 'string' && data.text.indexOf('__ANSWER__') === 0) {
                    stopRingback(); if (callStatus) callStatus.textContent = '✅ Разговор';
                    var answer = JSON.parse(data.text.replace('__ANSWER__', ''));
                    if (peerConnections['main']) { peerConnections['main'].setRemoteDescription(new RTCSessionDescription(answer)).then(function() { flushIceCandidates('main'); }); }
                    return;
                }
                if (typeof data.text === 'string' && data.text.indexOf('__ICE__') === 0) {
                    try {
                        var iceData = JSON.parse(data.text.replace('__ICE__', ''));
                        var callId = iceData.callId || 'main'; var candidate = iceData.candidate || iceData;
                        if (!pendingIceCandidates[callId]) pendingIceCandidates[callId] = [];
                        pendingIceCandidates[callId].push(candidate); flushIceCandidates(callId);
                    } catch(e) {}
                    return;
                }
                if (data.text === '__HANGUP__') {
                    if (callActive) { endCall(); updateRobinStatus('📞 Собеседник завершил звонок'); }
                    else { stopRingtone(); if (callPanel) callPanel.style.display = 'none'; updateRobinStatus('📞 Вызов отменён'); }
                    return;
                }
                                if (typeof data.text === 'string' && data.text.indexOf('__FILE__') === 0) {
                    try {
                        var fileData = JSON.parse(data.text.replace('__FILE__', ''));
                        var contactsForFile = [];
                        try { contactsForFile = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]'); } catch(e) {}
                        var contact = contactsForFile.find(function(c) { return c.pubkey === data.channelId; });
                        var senderName = contact ? contact.name : (data.sender || 'Друг');
                        var senderAvatar = contact ? contact.avatar : 'assets/avatars/001-.png';
                        appendFileMessage(senderName, fileData, senderAvatar);
                        contactOnlineStatus[data.channelId] = true;
                        if (toggleSoundState) playSound('bow_shot.mp3');
                    } catch(e) {}
                    return;
                }
                if (typeof data.text === 'string' && data.text.indexOf('__SELFDESTRUCT__') === 0) {
                    try {
                        var sdData = JSON.parse(data.text.replace('__SELFDESTRUCT__', ''));
                        var contactsForSD = [];
                        try { contactsForSD = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]'); } catch(e) {}
                        var contact = contactsForSD.find(function(c) { return c.pubkey === data.channelId; });
                        var senderName = contact ? contact.name : (data.sender || 'Друг');
                        var senderAvatar = contact ? contact.avatar : 'assets/avatars/001-.png';
                        appendSelfDestructMessage(senderName, sdData.text, senderAvatar, sdData.duration);
                        contactOnlineStatus[data.channelId] = true;
                        if (toggleSoundState) playSound('bow_shot.mp3');
                    } catch(e) {}
                    return;
                }
                if (typeof data.text === 'string' && data.text.indexOf('__REACTION__') === 0) {
                    try { var rData = JSON.parse(data.text.replace('__REACTION__', '')); addReactionToMessage(rData.msgId, rData.emoji, true); } catch(e) {}
                    return;
                }
                if (typeof data.text === 'string' && data.text.indexOf('__PROFILE__') === 0) {
                    try {
                        var p = JSON.parse(data.text.replace('__PROFILE__', ''));
                        var cs = []; try { cs = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]'); } catch(e) {}
                        var c = cs.find(function(c) { return c.pubkey === data.channelId; });
                        if (c) { c.name = p.nick || c.name; c.avatar = p.avatar || c.avatar; try { localStorage.setItem('robinhood_contacts', JSON.stringify(cs)); } catch(e) {} }
                    } catch(e) {}
                    return;
                }
                                // Обычное сообщение
                var contactsForMsg = [];
                try { contactsForMsg = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]'); } catch(e) {}
                var contact = contactsForMsg.find(function(c) { return c.pubkey === data.channelId; });
                var senderName = contact ? contact.name : (data.sender || 'Друг');
                var senderAvatar = contact ? contact.avatar : 'assets/avatars/001-.png';
                appendMessage(senderName, data.text, senderAvatar);
                contactOnlineStatus[data.channelId] = true;
                if (toggleHistoryState) {
                    loadEncryptedHistory().then(function(hist) {
                        hist.push({
                            text: data.text, sender: 'friend', recipient: 'me',
                            senderName: senderName, avatar: senderAvatar,
                            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                        });
                        saveEncryptedHistory(hist);
                    });
                }
                if (toggleSoundState) playSound('bow_shot.mp3');
                break;
            case 'install-prompt':
                if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(r) { if (r.outcome === 'accepted') updateRobinStatus('🏹 Приложение устанавливается', 2000); deferredPrompt = null; }); }
                else { updateRobinStatus('Откройте в браузере для установки', 3000); }
                break;
            case 'status': updateRobinStatus(data.text, data.duration || 3000); break;
            case 'error': updateRobinStatus('⚠ ' + data.text, 4000); break;
        }
    });

    window.addEventListener('beforeinstallprompt', function(e) { e.preventDefault(); deferredPrompt = e; });
            // Загрузка аватара и ника
    var savedAvatar = null;
    try { savedAvatar = localStorage.getItem('robinhood_avatar'); } catch(e) {}
    if (savedAvatar && profileAvatarSmall) {

    // Кнопка настроек
    var btnSettings = document.getElementById('btn-settings');
    if (btnSettings) {

        });

    if (settingsClose) settingsClose.addEventListener('click', function() { if (settingsSheet) settingsSheet.classList.remove('open'); if (overlay) overlay.classList.remove('show'); });
    var settingsLabel = document.getElementById('settings-label');

    var settingTheme = document.getElementById('setting-theme');
    if (settingTheme) settingTheme.addEventListener('click', function() {
        var idx = themes.findIndex(function(t) { return t.id === currentTheme; });
        var next = themes[(idx + 1) % themes.length]; applyTheme(next.id);

    function closeAllSheets() {
        if (avatarSelector) avatarSelector.classList.remove('show');
        if (contactsSheet) contactsSheet.classList.remove('open');
        if (settingsSheet) settingsSheet.classList.remove('open');
        if (overlay) overlay.classList.remove('show');
    }
    if (overlay) overlay.addEventListener('click', closeAllSheets);

    async function init() {
        applyTheme(currentTheme);
        loadVisualTheme();
        var timestamp = Date.now();
        if (pongFrame) pongFrame.src = 'https://stepweather-prog.github.io/P2PPong/?v=' + timestamp;
        var savedHistory = null;
        try { savedHistory = localStorage.getItem('robinhood_history'); } catch(e) {}
        if (savedHistory !== null) toggleHistoryState = savedHistory === 'true';
        if (toggleHistory) toggleHistory.checked = toggleHistoryState;
        var savedSound = null;
        try { savedSound = localStorage.getItem('robinhood_sound'); } catch(e) {}
        if (savedSound !== null) toggleSoundState = savedSound === 'true';
        if (toggleSound) toggleSound.checked = toggleSoundState;
        var savedActive = null;
        try { savedActive = localStorage.getItem('robinhood_active_tunnel'); } catch(e) {}
        if (savedActive !== null && savedActive !== '') activeTunnel = parseInt(savedActive);
        updateTunnelUI();
        updateRobinStatus('🏹 Ждём колчан...', 0);
    }
    window.addEventListener('load', init);
})();
