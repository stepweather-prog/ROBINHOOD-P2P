        // ========== Theme Editor ==========

    function getCurrentThemeValue(elementId) {
        var el = elementMap[elementId];
        if (!el) return '';
        var val = getComputedStyle(document.documentElement).getPropertyValue(el.cssVar).trim();
        return val;
    }

    function parseColorToHSLA(colorStr) {
        var dummy = document.createElement('div');
        dummy.style.color = colorStr;
        document.body.appendChild(dummy);
        var c = getComputedStyle(dummy).color;
        document.body.removeChild(dummy);
        var match = c.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
        if (!match) return { h: 42, s: 60, l: 50, a: 1 };
        var r = parseInt(match[1])/255;
        var g = parseInt(match[2])/255;
        var b = parseInt(match[3])/255;
        var a = match[4] ? parseFloat(match[4]) : 1;
        var max = Math.max(r, g, b);
        var min = Math.min(r, g, b);
        var l = (max + min) / 2;
        var h = 0;
        var s = 0;
        if (max !== min) {
            var d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
            else if (max === g) h = ((b - r) / d + 2) / 6;
            else h = ((r - g) / d + 4) / 6;
        }
        return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100), a: a };
    }

    function hslaToHex(h, s, l) {
        s /= 100;
        l /= 100;
        var a = s * Math.min(l, 1 - l);
        var f = function(n) {
            var k = (n + h / 30) % 12;
            return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        };
        var r = Math.round(f(0) * 255);
        var g = Math.round(f(8) * 255);
        var b = Math.round(f(4) * 255);
        return '#' + [r, g, b].map(function(x) {
            return Math.max(0, Math.min(255, x)).toString(16).padStart(2, '0');
        }).join('');
    }

    function updateThemeEditorUI() {
        var val = getCurrentThemeValue(currentEditElement);
        var hsla = parseColorToHSLA(val);
        currentHue = hsla.h;
        currentSat = hsla.s;
        currentBri = hsla.l;
        currentAlpha = hsla.a;

        var colorSquare = document.getElementById('color-square');
        var colorCursor = document.getElementById('color-cursor');
        var hueCursor = document.getElementById('hue-cursor');
        var alphaSlider = document.getElementById('alpha-slider');
        var alphaVal = document.getElementById('alpha-val');
        var btnSizeSlider = document.getElementById('btn-size-slider');
        var btnSizeVal = document.getElementById('btn-size-val');
        var btnRadiusSlider = document.getElementById('btn-radius-slider');
        var btnRadiusVal = document.getElementById('btn-radius-val');
        var fontSizeSlider = document.getElementById('font-size-slider');
        var fontSizeVal = document.getElementById('font-size-val');

        if (colorSquare) colorSquare.style.background = 'linear-gradient(to bottom, #000, transparent), linear-gradient(to right, #fff, hsl(' + currentHue + ',100%,50%))';
        if (colorCursor) {
            colorCursor.style.left = currentSat + '%';
            colorCursor.style.top = currentBri + '%';
        }
        if (hueCursor) hueCursor.style.left = (currentHue/360*100) + '%';
        if (alphaSlider) alphaSlider.value = Math.round(currentAlpha*100);
        if (alphaVal) alphaVal.textContent = Math.round(currentAlpha*100) + '%';

        if (btnSizeSlider) btnSizeSlider.value = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--btn-size')) || 44;
        if (btnSizeVal) btnSizeVal.textContent = (btnSizeSlider ? btnSizeSlider.value : 44) + 'px';
        if (btnRadiusSlider) btnRadiusSlider.value = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--btn-radius')) || 12;
        if (btnRadiusVal) btnRadiusVal.textContent = (btnRadiusSlider ? btnRadiusSlider.value : 12) + 'px';
        if (fontSizeSlider) fontSizeSlider.value = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--font-size-base')) || 16;
        if (fontSizeVal) fontSizeVal.textContent = (fontSizeSlider ? fontSizeSlider.value : 16) + 'px';

        var elementSelector = document.getElementById('element-selector');
        if (elementSelector) {
            elementSelector.querySelectorAll('.element-chip').forEach(function(chip) {
                chip.classList.toggle('active', chip.dataset.element === currentEditElement);
            });
        }
    }

    function applyColorToElement(elementId) {
        var hex = hslaToHex(currentHue, currentSat, currentBri);
        var el = elementMap[elementId];
        if (!el) return;
        
        themeOverrides[el.cssVar] = hex;
        document.documentElement.style.setProperty(el.cssVar, hex);

        if (el.isPair && el.pairVar) {
            var darker = hslaToHex(currentHue, Math.max(0, currentSat-15), Math.max(5, currentBri-20));
            var lighter = hslaToHex(currentHue, Math.min(100, currentSat+10), Math.min(100, currentBri+25));
            themeOverrides[el.pairVar] = (elementId === 'accent' || elementId === 'bg') ? lighter : darker;
            document.documentElement.style.setProperty(el.pairVar, themeOverrides[el.pairVar]);
        }
        
        if (elementId === 'accent') {
            var glowHex = hex + '80';
            document.documentElement.style.setProperty('--accent-glow', glowHex);
            document.documentElement.style.setProperty('--border', hex);
            document.documentElement.style.setProperty('--msg-accent', hex);
            document.documentElement.style.setProperty('--robin-accent', themeOverrides['--accent-light'] || hex);
        }
        
        if (elementId === 'bg') {
            document.documentElement.style.setProperty('--bg-secondary', hslaToHex(currentHue, currentSat, Math.max(3, currentBri-20)));
        }
    }

    function updateColorFromSquare(x, y) {
        var colorSquare = document.getElementById('color-square');
        if (!colorSquare) return;
        var rect = colorSquare.getBoundingClientRect();
        currentSat = Math.round(Math.max(0, Math.min(100, (x - rect.left) / rect.width * 100)));
        currentBri = Math.round(Math.max(0, Math.min(100, (y - rect.top) / rect.height * 100)));
        var colorCursor = document.getElementById('color-cursor');
        if (colorCursor) {
            colorCursor.style.left = currentSat + '%';
            colorCursor.style.top = currentBri + '%';
        }
        applyColorToElement(currentEditElement);
    }

        colorSquare.addEventListener('mousedown', function(e) {
            updateColorFromSquare(e.clientX, e.clientY);
            var moveFn = function(ev) { updateColorFromSquare(ev.clientX, ev.clientY); };
            var upFn = function() {
                document.removeEventListener('mousemove', moveFn);
                document.removeEventListener('mouseup', upFn);
            };
            document.addEventListener('mousemove', moveFn);
            document.addEventListener('mouseup', upFn);
        });
        
        colorSquare.addEventListener('touchstart', function(e) {
            e.preventDefault();
            updateColorFromSquare(e.touches[0].clientX, e.touches[0].clientY);
            var moveFn = function(ev) { updateColorFromSquare(ev.touches[0].clientX, ev.touches[0].clientY); };

    }

            var colorSquareEl = document.getElementById('color-square');
            if (hueCursor) hueCursor.style.left = (currentHue/360*100) + '%';

            applyColorToElement(currentEditElement);
            
            var moveFn = function(ev) {
                currentHue = Math.round(Math.max(0, Math.min(360, (ev.clientX - rect.left) / rect.width * 360)));
                if (hueCursor) hueCursor.style.left = (currentHue/360*100) + '%';
                if (colorSquareEl) colorSquareEl.style.background = 'linear-gradient(to bottom, #000, transparent), linear-gradient(to right, #fff, hsl(' + currentHue + ',100%,50%))';

                    document.documentElement.style.removeProperty(elementMap[elId].pairVar);

            ['--accent-glow','--border','--msg-accent','--robin-accent','--bg-secondary',

            try {

            updateThemeEditorUI();
            updateRobinStatus('🎨 Тема сброшена', 2000);

    // Close theme editor

            if (saved.btnRadius) document.documentElement.style.setProperty('--btn-radius', saved.btnRadius + 'px');

        function getAudio(filename) {
        if (!audioPool[filename]) {
            audioPool[filename] = new Audio('assets/sounds/' + filename);
            audioPool[filename].volume = 0.5;
        }
        var a = audioPool[filename];
        a.currentTime = 0;
        return a;
    }

    async function generateAESKey() {
        return await crypto.subtle.generateKey(
            { name: "AES-GCM", length: 256 },
            true,
            ["encrypt", "decrypt"]
        );
    }

    async function exportAESKey(key) {
        var raw = await crypto.subtle.exportKey("raw", key);
        return btoa(String.fromCharCode.apply(null, new Uint8Array(raw)));
    }

    async function importAESKey(base64key) {
        var raw = Uint8Array.from(atob(base64key), function(c) { return c.charCodeAt(0); });
        return await crypto.subtle.importKey(
            "raw",
            raw,
            { name: "AES-GCM" },
            false,
            ["encrypt", "decrypt"]
        );
    }

    async function aesEncrypt(plaintext, key) {
        var iv = crypto.getRandomValues(new Uint8Array(12));
        var encoded = new TextEncoder().encode(plaintext);
        var ciphertext = await crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv },
            key,
            encoded
        );
        var payload = {
            iv: btoa(String.fromCharCode.apply(null, iv)),
            data: btoa(String.fromCharCode.apply(null, new Uint8Array(ciphertext)))
        };
        return JSON.stringify(payload);
    }

    async function aesDecrypt(payloadStr, key) {
        try {
            var payload = JSON.parse(payloadStr);
            var iv = Uint8Array.from(atob(payload.iv), function(c) { return c.charCodeAt(0); });
            var data = Uint8Array.from(atob(payload.data), function(c) { return c.charCodeAt(0); });
            var decrypted = await crypto.subtle.decrypt(
                { name: "AES-GCM", iv: iv },
                key,
                data
            );
            return new TextDecoder().decode(decrypted);
        } catch (e) {
            return null;
        }
    }

    async function getHistoryKey() {
        var stored = null;
        try {
            stored = localStorage.getItem('robinhood_history_key');
        } catch(e) {
            console.error('Failed to get history key:', e);
        }
        
        if (stored) {
            historyEncryptionKey = await importAESKey(stored);
        } else {
            var key = await generateAESKey();
            var rawB64 = await exportAESKey(key);
            try {
                localStorage.setItem('robinhood_history_key', rawB64);
            } catch(e) {
                console.error('Failed to save history key:', e);
            }
            historyEncryptionKey = key;
        }
    }

    async function saveEncryptedHistory(messages) {
        if (!toggleHistoryState) return;
        if (!historyEncryptionKey) await getHistoryKey();
        try {
            var json = JSON.stringify(messages);
            var encrypted = await aesEncrypt(json, historyEncryptionKey);
            localStorage.setItem('robinhood_chat_history', encrypted);
        } catch(e) {
            console.error('Failed to save history:', e);
        }
    }

    async function loadEncryptedHistory() {
        if (!toggleHistoryState) return [];
        var stored = null;
        try {
            stored = localStorage.getItem('robinhood_chat_history');
        } catch(e) {
            console.error('Failed to load history:', e);

        if (!stored) return [];
        
        try {

            var decrypted = await aesDecrypt(stored, historyEncryptionKey);

            return [];
        }
    }

    function createPeerConn(stream, callId) {
        var pc = new RTCPeerConnection({
            iceServers: getIceServers(),
            iceTransportPolicy: 'all'
        });
        
        if (stream) {
            stream.getTracks().forEach(function(t) {
                pc.addTrack(t, stream);
            });
        }
        
        pc.ontrack = function(e) {
            if (e.streams && e.streams[0]) {
                if (videoCallActive && callId === 'main') {
                    remoteVideo.srcObject = e.streams[0];
                    remoteVideoContainer.style.display = 'block';
                    videoControls.classList.add('active');
                } else {
                    var a = new Audio();
                    a.srcObject = e.streams[0];
                    a.play().catch(function() {});
                }
            }
        };
        
        pc.onicecandidate = function(e) {
            if (e.candidate) {
                sendCallSignal('__ICE__' + JSON.stringify({
                    candidate: e.candidate,
                    callId: callId
                }));
            }
        };
        
        pc.oniceconnectionstatechange = function() {
            if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
                callStatus.textContent = '✅ Разговор';
            }
            if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                cleanupPeer(callId);
                if (callId === 'main') endCall();
            }
        };
        
        // Создаем data channel для основного звонка
        if (callId === 'main') {
            try {
                var dc = pc.createDataChannel('sherwood', { ordered: true });
                dataChannels[callId] = dc;
                
                dc.onopen = function() {
                    console.log('Data channel opened for', callId);
                };
                
                dc.onclose = function() {
                    console.log('Data channel closed for', callId);
                    delete dataChannels[callId];
                };
                
                dc.onmessage = function(e) {
                    try {
                        var msg = JSON.parse(e.data);
                        if (msg.type === 'file') {
                            handleDataChannelFile(msg);
                        }
                    } catch(err) {
                        console.error('Data channel message error:', err);
                    }
                };
            } catch(e) {
                console.error('Failed to create data channel:', e);
            }
        }
        
        pc.ondatachannel = function(e) {
            dataChannels[callId] = e.channel;
            e.channel.onopen = function() {
                console.log('Remote data channel opened for', callId);
            };
            e.channel.onclose = function() {
                delete dataChannels[callId];
            };
            e.channel.onmessage = function(ev) {
                try {
                    var msg = JSON.parse(ev.data);
                    if (msg.type === 'file') {
                        handleDataChannelFile(msg);
                    }
                } catch(err) {
                    console.error('Remote data channel message error:', err);
                }
            };
        };
        
        return pc;
    }

    function handleDataChannelFile(msg) {
        updateRobinStatus('📎 Получен файл: ' + msg.name, 3000);
        var byteString = atob(msg.data);
        var ab = new ArrayBuffer(byteString.length);
        var ia = new Uint8Array(ab);
        for (var i = 0; i < byteString.length; i++) {
            ia[i] = byteString.charCodeAt(i);
        }
        var blob = new Blob([ab], { type: msg.mime });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = msg.name;
        a.click();
        URL.revokeObjectURL(url);
    }

    function cleanupPeer(callId) {
        if (peerConnections[callId]) {
            peerConnections[callId].close();
            delete peerConnections[callId];
        }
        if (localStreams[callId]) {
            localStreams[callId].getTracks().forEach(function(t) { t.stop(); });
            delete localStreams[callId];
        }
        if (dataChannels[callId]) {
            try {
                dataChannels[callId].close();
            } catch(e) {}
            delete dataChannels[callId];
        }
        delete pendingIceCandidates[callId];
        delete meshPeers[callId];
    }

    function flushIceCandidates(callId) {
        var pc = peerConnections[callId || 'main'];
        if (!pc || !pc.remoteDescription || !pc.remoteDescription.type) return;
        
        var candidates = pendingIceCandidates[callId || 'main'] || [];
        for (var i = 0; i < candidates.length; i++) {
            try {
                pc.addIceCandidate(new RTCIceCandidate(candidates[i])).catch(function() {});
            } catch(e) {
                console.error('Failed to add ICE candidate:', e);
            }
        }
        delete pendingIceCandidates[callId || 'main'];
    }

    async function startCall(enableVideo) {
        if (callActive) return;
        if (!activeChannelId || !channels[activeChannelId]) {
            updateRobinStatus('🏹 Сначала воспользуйся стрелой!', 3000);
            return;
        }
        
        videoCallActive = enableVideo;
        var stream = await getMediaStream(enableVideo);
        if (!stream) return;
        
        localStreams['main'] = stream;
        if (enableVideo) {
            localVideo.srcObject = stream;
            localVideoContainer.style.display = 'block';
            videoControls.classList.add('active');
        }
        
        callPanel.style.display = 'block';
        callStatus.textContent = enableVideo ? '📹 Видеовызов...' : '📞 Вызов...';
        callAccept.style.display = 'none';
        callReject.style.display = 'none';
        callEnd.style.display = 'inline-block';
        callSpeaker.style.display = 'inline-block';
        
        if (enableVideo) {
            callCamera.style.display = 'inline-block';
            callMic.style.display = 'inline-block';
        } else {
            callCamera.style.display = 'none';
            callMic.style.display = 'none';
        }
        
        playRingback();
        var pc = createPeerConn(stream, 'main');
        peerConnections['main'] = pc;
        
        var offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        sendCallSignal('__OFFER__' + JSON.stringify({ sdp: offer, video: enableVideo }));
        callActive = true;
    }

    function endCall() {
        callActive = false;
        videoCallActive = false;
        stopRingtone();
        stopRingback();
        playCallEnd();
        sendCallSignal('__HANGUP__');
        
        Object.keys(peerConnections).forEach(function(k) { cleanupPeer(k); });
        Object.keys(localStreams).forEach(function(k) {
            if (localStreams[k]) {
                localStreams[k].getTracks().forEach(function(t) { t.stop(); });
            }
        });
        
        localStreams = {};
        peerConnections = {};
        pendingIceCandidates = {};
        meshPeers = {};
        
        callPanel.style.display = 'none';
        callAccept.style.display = 'inline-block';
        callReject.style.display = 'inline-block';
        callEnd.style.display = 'none';
        callSpeaker.style.display = 'none';
        callCamera.style.display = 'none';
        callMic.style.display = 'none';
        
        remoteVideo.srcObject = null;
        localVideo.srcObject = null;
        remoteVideoContainer.style.display = 'none';
        localVideoContainer.style.display = 'none';
        videoControls.classList.remove('active');
        
        updateRobinStatus('📞 Звонок завершён');
    }

    // Pong frame message handler
    window.addEventListener('message', async function(event) {
        if (!event.source || !pongFrame || event.source !== pongFrame.contentWindow) return;
        var data = event.data;
        if (!data || !data.type) return;
        
        switch (data.type) {
            case 'pong-ready':
                handshakeSecret = data.handshake;
                sendToPong({ action: 'handshake' });
                break;
                
            case 'handshake-ok':
                updateRobinStatus('🏹 Тетива натянута! Лучники готовы!', 2000);
                var urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('id') && urlParams.get('key')) {
                    currentServer = urlParams.get('server') || 'render';
                    if (serverToggle) serverToggle.checked = currentServer === 'workers';
                    updateRobinStatus('📨 Принимаю стрелу...', 0);
                    sendToPong({
                        action: 'accept',
                        id: urlParams.get('id'),
                        key: urlParams.get('key')
                    });
                }
                break;
                
            case 'session-created':
                var refLinkDisplay = document.getElementById('ref-link-display');
                if (refLinkDisplay) refLinkDisplay.textContent = data.fullLink;
                generateQR(data.fullLink);
                var refModal = document.getElementById('ref-modal');
                if (refModal) refModal.classList.add('active');
                navigator.clipboard.writeText(data.fullLink).catch(function() {});
                break;
                
            case 'channel-open':
                channels[data.channelId] = {
                    secret: data.secret,
                    role: data.role
                };
                if (!activeChannelId) activeChannelId = data.channelId;
                contactOnlineStatus[data.channelId] = true;
                playQuiverAnimation();
                
                var contacts = [];
                try {
                    contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                } catch(e) {
                    console.error('Failed to load contacts:', e);
                }
                
                if (!contacts.find(function(c) { return c.pubkey === data.channelId; })) {
                    contacts.push({
                        pubkey: data.channelId,
                        name: 'Лучник',
                        avatar: 'assets/avatars/001-.png',
                        status: 'confirmed'
                    });
                    try {
                        localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
                    } catch(e) {
                        console.error('Failed to save contacts:', e);
                    }
                }
                
                sendToPong({
                    action: 'send',
                    text: '__PROFILE__' + JSON.stringify({
                        nick: nickLabel ? nickLabel.textContent : 'Лучник',
                        avatar: profileAvatarSmall ? profileAvatarSmall.src : 'assets/avatars/001-.png'
                    }),
                    channelId: data.channelId
                });
                break;
                
            case 'channel-restored':
                channels[data.channelId] = {
                    secret: data.secret,
                    role: data.role
                };
                if (!activeChannelId) activeChannelId = data.channelId;
                updateRobinStatus('🔄 Колчан восстановлен', 2000);
                break;
                
            case 'restored-channels':
                if (data.channels) {
                    data.channels.forEach(function(ch) {
                        channels[ch.channelId] = {
                            secret: ch.secret,
                            role: ch.role
                        };
                        if (!activeChannelId) activeChannelId = ch.channelId;
                    });
                    updateRobinStatus('🔄 Колчаны восстановлены (' + data.channels.length + ')', 2000);
                    loadContacts();
                }
                break;
                
            case 'message':
                if (!data.channelId || !data.text || !channels[data.channelId]) break;
                
                if (typeof data.text === 'string' && data.text === '__TYPING__') {
                    if (typingIndicator) typingIndicator.textContent = '✍️ Лучник натягивает тетиву...';
                    clearTimeout(typingTimers[data.channelId]);
                    typingTimers[data.channelId] = setTimeout(function() {
                        if (typingIndicator) typingIndicator.textContent = '';
                    }, 2500);
                    return;
                }
                
                if (typeof data.text === 'string' && data.text.indexOf('__OFFER__') === 0) {
                    var parsed = JSON.parse(data.text.replace('__OFFER__', ''));
                    var offer = parsed.sdp || parsed;
                    var isVideo = parsed.video || false;
                    videoCallActive = isVideo;
                    
                    if (callPanel) callPanel.style.display = 'block';
                    if (callStatus) callStatus.textContent = isVideo ? '📹 Входящий видеовызов...' : '📞 Входящий вызов...';
                    if (callAccept) callAccept.style.display = 'inline-block';
                    if (callReject) callReject.style.display = 'inline-block';
                    if (callEnd) callEnd.style.display = 'none';
                    if (callSpeaker) callSpeaker.style.display = 'none';
                    if (callCamera) callCamera.style.display = 'none';
                    if (callMic) callMic.style.display = 'none';
                    playRingtone();
                    
                    if (callAccept) {
                        callAccept.onclick = null;
                        callAccept.onclick = async function() {
                            stopRingtone();
                            if (callStatus) callStatus.textContent = '📞 Соединение...';
                            if (callAccept) callAccept.style.display = 'none';
                            if (callReject) callReject.style.display = 'none';
                            if (callEnd) callEnd.style.display = 'inline-block';
                            if (callSpeaker) callSpeaker.style.display = 'inline-block';
                            
                            if (isVideo) {
                                if (callCamera) callCamera.style.display = 'inline-block';
                                if (callMic) callMic.style.display = 'inline-block';
                            }
                            
                            playCallStart();
                            var stream = await getMediaStream(isVideo);
                            if (!stream) {
                                if (callPanel) callPanel.style.display = 'none';
                                return;
                            }
                            
                            localStreams['main'] = stream;
                            if (isVideo) {
                                if (localVideo) localVideo.srcObject = stream;
                                if (localVideoContainer) localVideoContainer.style.display = 'block';
                                if (videoControls) videoControls.classList.add('active');
                            }
                            
                            var pc = createPeerConn(stream, 'main');
                            peerConnections['main'] = pc;
                            await pc.setRemoteDescription(new RTCSessionDescription(offer));
                            var answer = await pc.createAnswer();
                            await pc.setLocalDescription(answer);
                            sendCallSignal('__ANSWER__' + JSON.stringify(answer));
                            callActive = true;
                            flushIceCandidates('main');
                        };
                    }
                    
                    if (callReject) {
                        callReject.onclick = null;
                        callReject.onclick = function() {
                            stopRingtone();
                            sendCallSignal('__HANGUP__');
                            if (callPanel) callPanel.style.display = 'none';
                            updateRobinStatus('📞 Вызов отклонён');
                        };
                    }
                    return;
                }
                
                if (typeof data.text === 'string' && data.text.indexOf('__ANSWER__') === 0) {
                    stopRingback();
                    if (callStatus) callStatus.textContent = '✅ Разговор';
                    var answer = JSON.parse(data.text.replace('__ANSWER__', ''));
                    if (peerConnections['main']) {
                        peerConnections['main'].setRemoteDescription(new RTCSessionDescription(answer))
                            .then(function() { flushIceCandidates('main'); });
                    }
                    return;
                }
                
                if (typeof data.text === 'string' && data.text.indexOf('__ICE__') === 0) {
                    try {
                        var iceData = JSON.parse(data.text.replace('__ICE__', ''));
                        var callId = iceData.callId || 'main';
                        var candidate = iceData.candidate || iceData;
                        if (!pendingIceCandidates[callId]) pendingIceCandidates[callId] = [];
                        pendingIceCandidates[callId].push(candidate);
                        flushIceCandidates(callId);
                    } catch(e) {
                        console.error('Failed to parse ICE data:', e);
                    }
                    return;
                }
                
                if (data.text === '__HANGUP__') {
                    if (callActive) {
                        endCall();
                        updateRobinStatus('📞 Собеседник завершил звонок');
                    } else {
                        stopRingtone();
                        if (callPanel) callPanel.style.display = 'none';
                        updateRobinStatus('📞 Вызов отменён');
                    }
                    return;
                }
                
                if (typeof data.text === 'string' && data.text.indexOf('__FILE__') === 0) {
                    try {
                        var fileData = JSON.parse(data.text.replace('__FILE__', ''));
                        var contactsForFile = [];
                        try {
                            contactsForFile = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                        } catch(e) {
                            console.error('Failed to load contacts:', e);
                        }
                        
                        var contact = contactsForFile.find(function(c) { return c.pubkey === data.channelId; });
                        var senderName = contact ? contact.name : (data.sender || 'Друг');
                        var senderAvatar = contact ? contact.avatar : 'assets/avatars/001-.png';
                        
                        appendFileMessage(senderName, fileData, senderAvatar);
                        contactOnlineStatus[data.channelId] = true;
                        if (toggleSoundState) playSound('bow_shot.mp3');
                    } catch(e) {
                        console.error('Failed to parse file data:', e);
                    }
                    return;
                }
                
                if (typeof data.text === 'string' && data.text.indexOf('__SELFDESTRUCT__') === 0) {
                    try {
                        var sdData = JSON.parse(data.text.replace('__SELFDESTRUCT__', ''));
                        var contactsForSD = [];
                        try {
                            contactsForSD = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                        } catch(e) {
                            console.error('Failed to load contacts:', e);
                        }
                        
                        var contact = contactsForSD.find(function(c) { return c.pubkey === data.channelId; });
                        var senderName = contact ? contact.name : (data.sender || 'Друг');
                        var senderAvatar = contact ? contact.avatar : 'assets/avatars/001-.png';
                        
                        appendSelfDestructMessage(senderName, sdData.text, senderAvatar, sdData.duration);
                        contactOnlineStatus[data.channelId] = true;
                        if (toggleSoundState) playSound('bow_shot.mp3');
                    } catch(e) {
                        console.error('Failed to parse self destruct data:', e);
                    }
                    return;
                }
                
                if (typeof data.text === 'string' && data.text.indexOf('__REACTION__') === 0) {
                    try {
                        var rData = JSON.parse(data.text.replace('__REACTION__', ''));
                        addReactionToMessage(rData.msgId, rData.emoji, true);
                    } catch(e) {
                        console.error('Failed to parse reaction data:', e);
                    }
                    return;
                }
                
                if (typeof data.text === 'string' && data.text.indexOf('__PROFILE__') === 0) {
                    try {
                        var p = JSON.parse(data.text.replace('__PROFILE__', ''));
                        var cs = [];
                        try {
                            cs = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                        } catch(e) {
                            console.error('Failed to load contacts:', e);
                        }
                        
                        var c = cs.find(function(c) { return c.pubkey === data.channelId; });
                        if (c) {
                            c.name = p.nick || c.name;
                            c.avatar = p.avatar || c.avatar;
                            try {

                    } catch (e) {

                    }
                    return;
                }
                
                // Regular message
                var contactsForMsg = [];
                try {
                    contactsForMsg = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                } catch(e) {
                    console.error('Failed to load contacts:', e);
                }
                
                var contact = contactsForMsg.find(function(c) { return c.pubkey === data.channelId; });
                var senderName = contact ? contact.name : (data.sender || 'Друг');
                var senderAvatar = contact ? contact.avatar : 'assets/avatars/001-.png';
                
                appendMessage(senderName, data.text, senderAvatar);

                        });

                    });
                }

                break;
                
            case 'install-prompt':
                if (deferredPrompt) {
                    deferredPrompt.prompt();

            updateRobinStatus('❌ Нет активного колчана. Создайте или примите стрелу.', 2500);

                    nick: nickLabel ? nickLabel.textContent : 'Лучник',

            });

            var durationStr = await showModalInput('💣 Время самоуничтожения (сек)', '30', '30');

            var sec = parseInt(durationStr) || 30;

            selfDestructMode = false;
            if (btnSelfDestruct) {
                btnSelfDestruct.style.borderColor = '';
                btnSelfDestruct.style.background = '';
            }
        } else {
            sendToPong({
                action: 'send',
                text: text,
                channelId: activeChannelId
            });

    function appendMessage(sender, text, avatarSrc, timeStr) {
        if (!chatBox) return;
        var msgId = 'msg_' + Date.now();
        var row = document.createElement('div');
        row.className = 'message-row';
        row.id = msgId;
        row.dataset.msgid = msgId;
        
        var finalTime = timeStr || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        var links = detectLinks(text);
        var displayText = text;
        
        if (links.length > 0) {
            links.forEach(function(url) {
                displayText = displayText.replace(url, '<a href="' + url + '" target="_blank" class="msg-link">' + url + '</a>');
            });
        }
        
        row.innerHTML = '<img src="' + avatarSrc + '" class="avatar" alt="avatar">' +
                       '<div class="msg-body"><div class="msg-sender">' + sender + '</div>' +
                       '<div class="msg-text">' + displayText + '</div>' +
                       '<div class="msg-status">' + finalTime + '</div></div>';
        
        chatBox.insertBefore(row, typingIndicator);
        chatBox.scrollTop = chatBox.scrollHeight;

        row.addEventListener('mousedown', function() {
            pressTimer = setTimeout(function() {
                showReactionPicker(row, event);
            }, 500);
        });
        
        row.addEventListener('mouseup', function() {
            clearTimeout(pressTimer);
        });
        
        row.addEventListener('mouseleave', function() {
            clearTimeout(pressTimer);
        });
        
        row.addEventListener('touchstart', function() {
            pressTimer = setTimeout(function() {
                showReactionPicker(row, event);
            }, 500);
        }, { passive: true });
        
        row.addEventListener('touchend', function() {
            clearTimeout(pressTimer);
        });
        
        row.addEventListener('touchmove', function() {
            clearTimeout(pressTimer);
        });
        
        row.querySelectorAll('.msg-link').forEach(function(link) {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                showLinkPreview(link.href);
            });
        });
        
        if (messageReactions[msgId]) {
            Object.keys(messageReactions[msgId]).forEach(function(emoji) {
                for (var i = 0; i < messageReactions[msgId][emoji]; i++) {
                    addReactionToMessage(msgId, emoji, false);
                }
            });
        }
    }

    async function loadChatHistory(contactPubkey) {
        if (toggleHistoryState) {
            var hist = await loadEncryptedHistory();
            hist.forEach(function(msg) {
                appendMessage(
                    msg.sender === 'me' ? 'Вы' : (msg.senderName || msg.sender.slice(0, 8)),
                    msg.text,
                    msg.avatar || 'assets/avatars/001-.png',
                    msg.time
                );
            });
        }
    }

    function showContactMenu(contact) {
        currentMenuContact = contact;
        var menu = document.getElementById('contact-menu');
        if (!menu) return;
        menu.style.display = 'block';
        
        var menuRename = document.getElementById('menu-rename');
        var menuAvatar = document.getElementById('menu-avatar');
        var menuQr = document.getElementById('menu-qr');
        var menuDelete = document.getElementById('menu-delete');
        var menuCancel = document.getElementById('menu-cancel');
        
        if (menuRename) {
            menuRename.onclick = async function() {
                hideContactMenu();
                var newName = await showModalInput('✎ Новое имя лучника', 'Имя', contact.name);
                if (newName) {
                    var contacts = [];
                    try {
                        contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                    } catch(e) {
                        console.error('Failed to load contacts:', e);
                    }
                    
                    var c = contacts.find(function(c) { return c.pubkey === contact.pubkey; });
                    if (c) {
                        c.name = newName.substring(0, 15);
                        try {
                            localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
                        } catch(e) {
                            console.error('Failed to save contacts:', e);
                        }
                        loadContacts();
                        updateChatWithContact(c);
                    }
                }
            };
        }
        
        if (menuAvatar) {
            menuAvatar.onclick = function() {
                hideContactMenu();
                loadAvatarsForFriend(contact);
            };
        }
        
        if (menuQr) {
            menuQr.onclick = function() {
                hideContactMenu();
                showContactQR(contact);
            };
        }
        
        if (menuDelete) {
            menuDelete.onclick = function() {
                hideContactMenu();
                if (confirm('Убить лучника ' + contact.name + '?')) {
                    deleteContact(contact.pubkey);
                }
            };
        }
        
        if (menuCancel) {
            menuCancel.onclick = hideContactMenu;
        }
    }

    function hideContactMenu() {
        var menu = document.getElementById('contact-menu');
        if (menu) menu.style.display = 'none';
        currentMenuContact = null;
    }

    // Share and close buttons
    var shareRefLinkBtn = document.getElementById('share-ref-link-btn');
    if (shareRefLinkBtn) {
        shareRefLinkBtn.addEventListener('click', function() {
            var refLinkDisplay = document.getElementById('ref-link-display');
            var link = refLinkDisplay ? refLinkDisplay.textContent : '';
            if (link && navigator.share) {
                navigator.share({
                    title: 'RobinHood P2P',
                    url: link
                }).catch(function() {});
            }
        });
    }

    var closeRefModalBtn = document.getElementById('close-ref-modal-btn');
    if (closeRefModalBtn) {
        closeRefModalBtn.addEventListener('click', function() {
            var refModal = document.getElementById('ref-modal');
            if (refModal) refModal.classList.remove('active');
        });
    }

    // Initialize application
    async function init() {
        applyTheme(currentTheme);
        loadVisualTheme();
        
        var timestamp = Date.now();
        if (pongFrame) {
            pongFrame.src = 'https://stepweather-prog.github.io/P2PPong/?v=' + timestamp;
        }
        
        var savedHistory = null;
        try {
            savedHistory = localStorage.getItem('robinhood_history');
        } catch(e) {
            console.error('Failed to load history setting:', e);
        }
        if (savedHistory !== null) toggleHistoryState = savedHistory === 'true';
        if (toggleHistory) toggleHistory.checked = toggleHistoryState;
        
        var savedSound = null;
        try {
            savedSound = localStorage.getItem('robinhood_sound');
        } catch(e) {
            console.error('Failed to load sound setting:', e);
        }
        if (savedSound !== null) toggleSoundState = savedSound === 'true';
        if (toggleSound) toggleSound.checked = toggleSoundState;
        
        var savedActive = null;
        try {
            savedActive = localStorage.getItem('robinhood_active_tunnel');
        } catch(e) {
            console.error('Failed to load active tunnel:', e);
        }
        if (savedActive !== null && savedActive !== '') {
            activeTunnel = parseInt(savedActive);
        }
        
        updateTunnelUI();
        updateRobinStatus('🏹 Ждём колчан...', 0);
    }

    window.addEventListener('load', init);
})();
</script>
