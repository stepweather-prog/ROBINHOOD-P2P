<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>RobinHood P2P</title>
    <link rel="manifest" href="manifest.json">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; -webkit-text-size-adjust: 100%; }
        body { background-color: #121212; color: #E0E0E0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; height: 100dvh; position: relative; }
        body::before { 
    content: ""; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    background-image: url('assets/background.webp');
    background-size: 100% auto; 
    background-position: center top; 
    background-repeat: no-repeat; 
    z-index: 0; 
}
@media (max-width: 400px) {
    body::before { background-size: contain; }
}
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 0; }
        
        .header { background-color: rgba(31,31,31,0.95); border-bottom: 2px solid #2E7D32; backdrop-filter: blur(5px); z-index: 10; padding: 6px 10px; display: flex; flex-direction: column; gap: 2px; position: relative; }
        .header-row-1 { display: flex; align-items: center; gap: 6px; }
        .header-title-text { font-size: 1.2em; font-weight: bold; color: #4CAF50; }
        .header-shield { font-size: 1em; }
        .header-version { font-size: 0.65em; color: #888; }
        .header-row-2 { display: flex; justify-content: space-around; align-items: center; gap: 4px; }
        .header-row-3 { display: flex; justify-content: space-around; }
        .header-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; font-size: 22px; }
        .header-btn:hover { background: rgba(255,255,255,0.1); }
        .header-label { 
    font-size: 0.65em; 
    color: #888; 
    text-align: center; 
    width: 50px; 
    cursor: pointer; 
    font-weight: bold;
    white-space: nowrap;
}
        .header-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
        
        .chat-area { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: transparent; scrollbar-width: none; position: relative; z-index: 1; }
        .chat-area::-webkit-scrollbar { display: none; }
        .message-row { display: flex; align-items: center; gap: 8px; background: rgba(31,31,31,0.9); padding: 8px; border-radius: 8px; backdrop-filter: blur(5px); }
        .input-area { background-color: rgba(31,31,31,0.95); padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px)); display: flex; gap: 8px; align-items: center; border-top: 1px solid #333; backdrop-filter: blur(5px); position: relative; z-index: 1; }
        input { flex: 1; background: rgba(42,42,42,0.9); border: 1px solid #444; padding: 10px; color: white; border-radius: 6px; font-size: 16px; outline: none; }
        .bow-button { width: 40px; height: 40px; cursor: pointer; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background-color: #333; flex-shrink: 0; }
        .msg-body { flex: 1; min-width: 0; }
        .msg-sender { font-weight: bold; color: #4CAF50; font-size: 0.85em; }
        .msg-status { font-size: 0.65em; color: #888; text-align: right; }
        #robin-row { background: rgba(46,125,50,0.2); border-left: 3px solid #2E7D32; }
        #robin-text { transition: opacity 0.6s ease; opacity: 1; font-size: 0.9em; }
        
        .avatar-selector, .contacts-list { display: none; position: fixed; top: 60px; left: 10px; right: 10px; max-height: 280px; overflow-y: auto; padding: 10px; background: rgba(20,20,20,0.98); border: 1px solid #2E7D32; border-radius: 10px; z-index: 200; text-align: center; }
        .avatar-selector.show, .contacts-list.show { display: block; }
        .avatar-option { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin: 4px; cursor: pointer; border: 2px solid transparent; }
        .avatar-option:hover { border-color: #FFA000; }
        .contact-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; color: #E0E0E0; }
        .contact-info { display: flex; align-items: center; gap: 8px; flex: 1; }
        .contact-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .contact-name { font-weight: 600; font-size: 0.9em; }
        .delete-contact { background: none; border: none; color: #f44336; font-size: 18px; cursor: pointer; padding: 0 8px; opacity: 0.7; }
        .delete-contact:hover { opacity: 1; }
        
        .invite-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
        .invite-modal.active { display: flex; }
        .invite-dialog { background: #1F1F1F; padding: 20px; border-radius: 12px; width: 80%; max-width: 320px; text-align: center; border: 1px solid #2E7D32; max-height: 80vh; overflow-y: auto; }
        .invite-dialog h3 { color: #4CAF50; margin: 0 0 10px; font-size: 1.1em; }
        .invite-dialog button { width: 100%; padding: 10px; margin-top: 5px; background: #2E7D32; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .code-display { background: #121212; border: 1px solid #444; color: white; border-radius: 6px; padding: 10px; font-size: 0.8em; word-break: break-all; margin: 10px 0; text-align: center; user-select: all; }
        textarea { width: 100%; height: 50px; background: #1e1e1e; color: #ccc; border: 1px solid #444; padding: 5px; font-family: monospace; resize: vertical; font-size: 12px; }
        
        .chat-switcher { position: fixed; bottom: 0; left: 0; right: 0; max-height: 50vh; background: rgba(20,20,20,0.98); z-index: 150; border-top: 2px solid #2E7D32; border-radius: 16px 16px 0 0; transform: translateY(100%); transition: transform 0.3s ease; overflow-y: auto; padding: 10px 0; }
        .chat-switcher.open { transform: translateY(0); }
        .chat-switcher-header { padding: 8px 16px; font-weight: bold; color: #888; border-bottom: 1px solid #333; margin-bottom: 5px; font-size: 0.9em; }
        .chat-switcher-list { padding: 0 16px; }
        .chat-switcher-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .chat-switcher-item:last-child { border-bottom: none; }
        
        .contact-menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #1F1F1F; border: 1px solid #2E7D32; border-radius: 12px; padding: 10px; z-index: 300; min-width: 200px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
        .contact-menu-item { padding: 10px; cursor: pointer; border-radius: 6px; margin-bottom: 4px; font-size: 0.9em; }
        .contact-menu-item:hover { background: rgba(255,255,255,0.1); }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 190; }
        .overlay.show { display: block; }
    </style>
</head>
<body>
<div class="header">
    <div class="header-row-1">
        <span class="header-title-text">ROBINHOOD P2P</span>
        <span class="header-shield">🛡️</span>
        <span style="flex:1;"></span>
        <span class="header-version">v2.0</span>
    </div>
    <div class="header-row-2">
    <div class="header-btn" id="btn-avatar"><img src="assets/avatars/001-.png" class="header-avatar" id="profile-avatar-small"></div>
    <div class="header-btn" id="btn-letters"><img src="assets/1.png" style="width:24px;height:24px;"></div>
    <div class="header-btn" id="btn-chats"><img src="assets/2.png" style="width:24px;height:24px;"></div>
    <div class="header-btn" id="btn-arrow"><img src="assets/3.png" style="width:24px;height:24px;"></div>
    <div class="header-btn" id="btn-history"><img src="assets/4.png" style="width:24px;height:24px;"></div>
    <div class="header-btn" id="btn-sound"><img src="assets/5.png" style="width:24px;height:24px;"></div>
    <div class="header-btn" id="btn-clear"><img src="assets/6.png" style="width:24px;height:24px;"></div>

    </div>
    <div class="header-row-3">
        <span class="header-label" id="nick-label">Лучник</span>
        <span class="header-label">Письма</span>
        <span class="header-label">Чаты</span>
        <span class="header-label">Стрела</span>

</div>

<div class="chat-area" id="chat-box">
    <div class="message-row" id="robin-row">
        <img src="assets/avatars/231-icon-11433690.png" class="avatar" id="robin-avatar">
        <div class="msg-body">
            <div class="msg-sender">Robin Hood</div>

</div>

<div class="input-area">
    <input type="text" id="msg-input" placeholder="Пустить стрелу">
    <img src="assets/bow.png" class="bow-button" id="send-btn" alt="Отправить">
</div>

<div class="overlay" id="overlay"></div>

<div class="avatar-selector" id="avatar-selector">
    <p style="color:#888;margin:0 0 8px;">Выбери лучника</p>
    <div id="avatar-list"></div>
</div>

<div class="contacts-list" id="contacts-list">
    <div id="contacts-list-inner"></div>
</div>

<div class="invite-modal" id="ref-modal">
    <div class="invite-dialog">
        <h3>Стрела готова</h3>
        <div class="code-display" id="ref-link-display"></div>
        <button id="share-ref-link-btn">Поделиться...</button>
        <button id="close-ref-modal-btn" style="background:#555;margin-top:5px;">Закрыть</button>
    </div>
</div>

<div class="chat-switcher" id="chat-switcher">
    <div class="chat-switcher-header">Активные перестрелки</div>
    <div class="chat-switcher-list" id="chat-switcher-list"></div>
</div>

<div id="contact-menu" class="contact-menu" style="display:none;">
    <div class="contact-menu-item" id="menu-rename">✎ Переименовать</div>
    <div class="contact-menu-item" id="menu-avatar">🖼 Сменить аватар</div>
    <div class="contact-menu-item" id="menu-delete">🔥 Сжечь колчан</div>
    <button id="menu-cancel" style="width:100%;margin-top:5px;background:#555;border:none;padding:8px;border-radius:6px;color:white;">Отмена</button>
</div>

<iframe id="pong-frame" src="" style="display:none;"></iframe>

<script>
    const pongFrame = document.getElementById('pong-frame');
    let handshakeSecret = null;
    let sessionSecret = null;
    let channelReady = false;

    function sendToPong(msg) {
        if (sessionSecret) msg.secret = sessionSecret;
        if (handshakeSecret && msg.action === 'handshake') msg.handshake = handshakeSecret;
        pongFrame.contentWindow.postMessage(msg, '*');
    }

    window.addEventListener('message', (event) => {
        if (event.source !== pongFrame.contentWindow) return;
        const data = event.data;
        switch(data.type) {
            case 'pong-ready':
                handshakeSecret = data.handshake;
                sendToPong({ action: 'handshake' });
                break;
            case 'handshake-ok':
                updateRobinStatus('Понг готов к стрельбе!', 2000);
                const urlParams = new URLSearchParams(window.location.search);
                const id = urlParams.get('id');
                if (id) {
                    updateRobinStatus('Принимаю стрелу...', 0);
                    sendToPong({ action: 'accept', id: id });
                }
                break;
            case 'session-created':
                const link = window.location.origin + window.location.pathname + '?id=' + data.sessionId;
                document.getElementById('ref-link-display').textContent = link;
                document.getElementById('ref-modal').classList.add('active');
                navigator.clipboard.writeText(link).catch(()=>{});
                if (navigator.share) navigator.share({ title:'RobinHood P2P', url: link }).catch(()=>{});
                break;
            case 'channel-open':
                sessionSecret = data.secret;
                channelReady = true;
                updateRobinStatus('✅ Колчан открыт!', 3000);
                break;
            case 'message':
                appendMessage(data.sender || 'Друг', data.text, 'assets/avatars/001-.png');
                if (toggleHistory.checked) {
                    loadEncryptedHistory().then(hist => {
                        hist.push({ text: data.text, sender: 'friend', recipient: myPubkey, senderName: data.sender, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
                        saveEncryptedHistory(hist);
                    });
                }
                if (toggleSound.checked) playSound('bow_shot.wav');
                break;
            case 'status': updateRobinStatus(data.text, data.duration || 3000); break;
            case 'error': updateRobinStatus(data.text, 4000); break;
        }
    });

    let myPrivkey, myPubkey, activeContact;

    async function generateKeyPair() {
        const keyPair = await crypto.subtle.generateKey({ name: "ECDSA", namedCurve: "P-256" }, true, ["sign", "verify"]);
        const pubKeyBuffer = await crypto.subtle.exportKey("spki", keyPair.publicKey);
        const privKeyBuffer = await crypto.subtle.exportKey("pkcs8", keyPair.privateKey);
        myPubkey = btoa(String.fromCharCode(...new Uint8Array(pubKeyBuffer)));
        myPrivkey = btoa(String.fromCharCode(...new Uint8Array(privKeyBuffer)));
        localStorage.setItem('robinhood_pubkey', myPubkey);
        localStorage.setItem('robinhood_privkey', myPrivkey);
    }
    async function loadKeys() {
        const storedPub = localStorage.getItem('robinhood_pubkey');
        const storedPriv = localStorage.getItem('robinhood_privkey');
        if (storedPub && storedPriv) { myPubkey = storedPub; myPrivkey = storedPriv; }
        else await generateKeyPair();
    }

    let historyEncryptionKey = null;
    async function getHistoryKey() {
        const stored = localStorage.getItem('robinhood_history_key');
        if (stored) {
            const raw = Uint8Array.from(atob(stored), c => c.charCodeAt(0));
            historyEncryptionKey = await crypto.subtle.importKey("raw", raw, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
        } else {
            const key = await crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
            const raw = await crypto.subtle.exportKey("raw", key);
            localStorage.setItem('robinhood_history_key', btoa(String.fromCharCode(...new Uint8Array(raw))));
            historyEncryptionKey = key;
        }
    }
    async function saveEncryptedHistory(messages) {
        if (!toggleHistory.checked) return;
        if (!historyEncryptionKey) await getHistoryKey();
        const json = JSON.stringify(messages);
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, historyEncryptionKey, new TextEncoder().encode(json));
        const payload = { iv: btoa(String.fromCharCode(...iv)), data: btoa(String.fromCharCode(...new Uint8Array(encrypted))) };
        localStorage.setItem('robinhood_chat_history', JSON.stringify(payload));
    }
    async function loadEncryptedHistory() {
        if (!toggleHistory.checked) return [];
        const stored = localStorage.getItem('robinhood_chat_history');
        if (!stored) return [];
        try {
            const payload = JSON.parse(stored);
            if (!payload.iv || !payload.data) return [];
            if (!historyEncryptionKey) await getHistoryKey();
            const iv = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
            const data = Uint8Array.from(atob(payload.data), c => c.charCodeAt(0));
            const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, historyEncryptionKey, data);
            const json = new TextDecoder().decode(decrypted);
            return JSON.parse(json);
        } catch(e) { return []; }
    }

    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');
    const robinText = document.getElementById('robin-text');
    const profileAvatarSmall = document.getElementById('profile-avatar-small');
    const nickLabel = document.getElementById('nick-label');
    const avatarSelector = document.getElementById('avatar-selector');
    const avatarList = document.getElementById('avatar-list');
    const contactsListDiv = document.getElementById('contacts-list');
    const contactsListInner = document.getElementById('contacts-list-inner');
    const overlay = document.getElementById('overlay');
    const chatSwitcher = document.getElementById('chat-switcher');
    const chatSwitcherList = document.getElementById('chat-switcher-list');
    const toggleHistory = document.getElementById('toggle-history');
    const toggleSound = document.getElementById('toggle-sound');
    let toggleHistoryState = true;
    let toggleSoundState = true;

    const savedAvatar = localStorage.getItem('robinhood_avatar');
    if (savedAvatar) {
        profileAvatarSmall.src = savedAvatar;
        document.getElementById('robin-avatar').src = savedAvatar;
    }
    const savedNick = localStorage.getItem('robinhood_nick');
    if (savedNick) nickLabel.textContent = savedNick;

    // Аватар
    document.getElementById('btn-avatar').addEventListener('click', () => {
        if (avatarSelector.classList.contains('show')) {
            avatarSelector.classList.remove('show');
            overlay.classList.remove('show');
        } else {
            closeAllPanels();
            loadAvatars();
            avatarSelector.classList.add('show');
            overlay.classList.add('show');
        }
    });
    nickLabel.addEventListener('click', () => {
    const newNick = prompt('Новый ник (макс. 15 символов):', nickLabel.textContent);
    if (newNick && newNick.trim()) {
        const nick = newNick.trim().substring(0, 15);
        nickLabel.textContent = nick;
        localStorage.setItem('robinhood_nick', nick);
        updateRobinStatus('Ник изменён на ' + nick);
    }
});

    // Письма
    document.getElementById('btn-letters').addEventListener('click', () => {
        if (contactsListDiv.classList.contains('show')) {
            contactsListDiv.classList.remove('show');
            overlay.classList.remove('show');
        } else {
            closeAllPanels();
            loadContacts();
            contactsListDiv.classList.add('show');
            overlay.classList.add('show');
        }
    });

    // Чаты
    document.getElementById('btn-chats').addEventListener('click', () => {
        if (chatSwitcher.classList.contains('open')) {
            chatSwitcher.classList.remove('open');
        } else {
            populateChatSwitcher();
            chatSwitcher.classList.add('open');
        }
    });

    // Стрела
    document.getElementById('btn-arrow').addEventListener('click', () => {
        if (!handshakeSecret && !sessionSecret) {
            updateRobinStatus('Понг ещё не готов', 2000);
            return;
        }
        if (channelReady) {
            updateRobinStatus('Канал уже открыт', 2000);
            return;
        }
        updateRobinStatus('Крафт стрелы...', 0);
        sendToPong({ action: 'create' });
    });

    // История
    document.getElementById('btn-history').addEventListener('click', () => {
        toggleHistoryState = !toggleHistoryState;
        if (!toggleHistoryState) {
            localStorage.removeItem('robinhood_history_key');
            localStorage.removeItem('robinhood_chat_history');
            historyEncryptionKey = null;
            sessionSecret = null;
            updateRobinStatus('Секреты уничтожены', 4000);
        } else {
            updateRobinStatus('История хранится', 4000);
        }
        localStorage.setItem('robinhood_history', toggleHistoryState);
    });

    // Звук
    document.getElementById('btn-sound').addEventListener('click', () => {
        toggleSoundState = !toggleSoundState;
        localStorage.setItem('robinhood_sound', toggleSoundState);
        updateRobinStatus(toggleSoundState ? 'Звук включён' : 'Звук выключен');
    });

    // Очистка
    document.getElementById('btn-clear').addEventListener('click', async () => {
        document.querySelectorAll('.message-row:not(#robin-row)').forEach(m => m.remove());
        if (toggleHistoryState) await saveEncryptedHistory([]);
        else localStorage.removeItem('robinhood_chat_history');
        updateRobinStatus('Письма пущены на самокрутки!', 3000);
    });

    overlay.addEventListener('click', () => {
        closeAllPanels();
    });

    function closeAllPanels() {
        avatarSelector.classList.remove('show');
        contactsListDiv.classList.remove('show');
        overlay.classList.remove('show');
    }

    document.getElementById('share-ref-link-btn').addEventListener('click', () => {
        const link = document.getElementById('ref-link-display').textContent;
        if (link && navigator.share) navigator.share({ title:'RobinHood P2P', url: link });
    });
    document.getElementById('close-ref-modal-btn').addEventListener('click', () => {
        document.getElementById('ref-modal').classList.remove('active');
    });

    function sendMessageHandler() {
        const text = msgInput.value.trim();
        if (!text) return;
        if (!channelReady) { updateRobinStatus('Канал не готов.', 2000); return; }
        sendToPong({ action: 'send', text: text });
        appendMessage('Вы', text, profileAvatarSmall.src);
        msgInput.value = '';
        if (toggleSoundState) playSound('bow_shot.wav');
        if (toggleHistoryState) {
            loadEncryptedHistory().then(hist => {
                hist.push({ text, sender: myPubkey, recipient: 'friend', senderName: nickLabel.textContent, avatar: profileAvatarSmall.src, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
                saveEncryptedHistory(hist);
            });
        }
    }

    document.getElementById('send-btn').addEventListener('click', sendMessageHandler);
    msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessageHandler(); });

    function appendMessage(sender, text, avatarSrc, timeStr = null) {
        const row = document.createElement('div'); row.className = 'message-row';
        const finalTime = timeStr || new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        row.innerHTML = `<img src="${avatarSrc}" class="avatar"><div class="msg-body"><div class="msg-sender">${sender}</div><div>${text}</div><div class="msg-status">${finalTime}</div></div>`;
        chatBox.appendChild(row); chatBox.scrollTop = chatBox.scrollHeight;
    }

    let robinDefaultText = robinText.textContent, robinTimer;
    function updateRobinStatus(text, duration=4000) {
        clearTimeout(robinTimer); robinText.style.transition = 'none'; robinText.style.opacity = 1; robinText.textContent = text;
        if (duration > 0) {
            robinTimer = setTimeout(() => {
                robinText.style.transition = 'opacity 0.6s ease'; robinText.style.opacity = 0;
                const onEnd = () => { robinText.removeEventListener('transitionend', onEnd); robinText.style.transition = 'none'; robinText.textContent = robinDefaultText; robinText.style.opacity = 1; };
                robinText.addEventListener('transitionend', onEnd);
            }, duration);
        }
    }

    function playSound(filename) { if (toggleSoundState) { const a = new Audio(`assets/sounds/${filename}`); a.volume=0.5; a.play().catch(()=>{}); } }

    const avatars = ['assets/avatars/001-.png','assets/avatars/002--1.png','assets/avatars/003-icon-8033085.png','assets/avatars/009--7.png','assets/avatars/010--8.png','assets/avatars/018--16.png','assets/avatars/022--20.png','assets/avatars/037--35.png','assets/avatars/043--41.png','assets/avatars/048--46.png','assets/avatars/050--48.png','assets/avatars/052--50.png','assets/avatars/053--51.png','assets/avatars/056--54.png','assets/avatars/066--64.png','assets/avatars/077-icon-8033092.png','assets/avatars/083-icon-11885568.png','assets/avatars/094-icon-18926716.png','assets/avatars/108--83.png','assets/avatars/147-icon-6081840.png','assets/avatars/148-icon-5532632.png','assets/avatars/149-icon-4132697.png','assets/avatars/150-icon-10756654.png','assets/avatars/153-icon-4964924.png','assets/avatars/154-icon-4261075.png','assets/avatars/156-icon-4132828.png','assets/avatars/158--116.png','assets/avatars/160-icon-2332597.png','assets/avatars/162-icon-6237595.png','assets/avatars/167-icon-1920840.png','assets/avatars/168-icon-228268.png','assets/avatars/169-icon-5613167.png','assets/avatars/173-icon-1615623.png','assets/avatars/183-icon-5840846.png','assets/avatars/186-icon-6237499.png','assets/avatars/188-icon-6267517.png','assets/avatars/203-icon-3516506.png','assets/avatars/216-icon-5504960.png','assets/avatars/221-icon-9530256.png','assets/avatars/226-icon-9669507.png','assets/avatars/227-icon-9623471.png','assets/avatars/229-icon-10032172.png','assets/avatars/230-icon-10049316.png','assets/avatars/232-icon-11434002.png','assets/avatars/234-icon-10756328.png','assets/avatars/245-icon-16150697.png','assets/avatars/246-icon-16150730.png','assets/avatars/249-icon-17159913.png','assets/avatars/250-icon-17159758.png','assets/avatars/251-icon-17159744.png','assets/avatars/253-icon-18426073.png','assets/avatars/254-icon-18621065.png','assets/avatars/255-icon-18926692.png','assets/avatars/256--120.png'];
    function loadAvatars() {
        avatarList.innerHTML = '';
        avatars.forEach(src => {
            const img = document.createElement('img'); img.src = src; img.className = 'avatar-option';
            img.addEventListener('click', () => {
                profileAvatarSmall.src = src;
                document.getElementById('robin-avatar').src = src;
                localStorage.setItem('robinhood_avatar', src);
                updateRobinStatus('Аватар обновлён');
                avatarSelector.classList.remove('show');
                overlay.classList.remove('show');
            });
            avatarList.appendChild(img);
        });
    }

    function loadContacts() {
        const contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
        const confirmed = contacts.filter(c => c.status === 'confirmed');
        contactsListInner.innerHTML = '';
        if (confirmed.length) {
            confirmed.forEach(c => {
                const div = document.createElement('div'); div.className = 'contact-item';
                div.innerHTML = `<div class="contact-info"><img src="${c.avatar || 'assets/avatars/001-.png'}" class="contact-avatar"><span class="contact-name">${c.name}</span></div><button class="delete-contact" data-pubkey="${c.pubkey}">✖</button>`;
                div.querySelector('.contact-info').addEventListener('click', () => {
                    openChatWithContact(c);
                    closeAllPanels();
                });
                div.querySelector('.delete-contact').addEventListener('click', (e) => { e.stopPropagation(); deleteContact(c.pubkey); });
                contactsListInner.appendChild(div);
            });
        } else {
            contactsListInner.innerHTML = '<div style="padding:10px;color:#888;">Контактов нет. Создайте стрелу!</div>';
        }
    }

    function deleteContact(pubkey) {
        let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
        contacts = contacts.filter(c => c.pubkey !== pubkey);
        localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
        loadContacts();
        updateRobinStatus('Стрелок уволен', 2000);
    }

    function openChatWithContact(contact) {
        activeContact = contact;
        document.querySelectorAll('.message-row:not(#robin-row)').forEach(m => m.remove());
        updateRobinStatus('Перестрелка с ' + contact.name + ' открыта', 3000);
        loadChatHistory(contact.pubkey);
    }

    async function populateChatSwitcher() {
        chatSwitcherList.innerHTML = '';
        const contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]').filter(c => c.status === 'confirmed');
        if (!contacts.length) { chatSwitcherList.innerHTML = '<div style="padding:10px;color:#888;">Нет контактов</div>'; return; }
        contacts.forEach(c => {
            const div = document.createElement('div'); div.className = 'chat-switcher-item';
            div.innerHTML = `<img src="${c.avatar || 'assets/avatars/001-.png'}" class="contact-avatar"><span class="contact-name">${c.name}</span>`;
            div.addEventListener('click', () => { chatSwitcher.classList.remove('open'); openChatWithContact(c); });
            chatSwitcherList.appendChild(div);
        });
    }

    async function loadChatHistory(contactPubkey) {
        if (toggleHistoryState) {
            const hist = await loadEncryptedHistory();
            hist.forEach(msg => {
                if (msg.sender === contactPubkey || msg.recipient === contactPubkey)
                    appendMessage(msg.sender === myPubkey ? 'Вы' : (msg.senderName || msg.sender.slice(0,8)), msg.text, msg.avatar || 'assets/avatars/001-.png', msg.time);
            });
        }
    }

    async function init() {
        document.getElementById('pong-frame').src = 'https://stepweather-prog.github.io/P2PPong/?v=' + Date.now();
        await loadKeys();
        const savedHistory = localStorage.getItem('robinhood_history');
        if (savedHistory !== null) toggleHistoryState = savedHistory === 'true';
        const savedSound = localStorage.getItem('robinhood_sound');
        if (savedSound !== null) toggleSoundState = savedSound === 'true';
        updateRobinStatus('Ждём Понга...', 0);
    }
    window.addEventListener('load', init);
</script>
