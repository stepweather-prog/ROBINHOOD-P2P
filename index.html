<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RobinHood P2P</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body { background-color: #121212; color: #E0E0E0; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-image: url('assets/Front/background.png'); background-size: cover; background-attachment: fixed; background-position: center 30%; background-repeat: no-repeat; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: -1; }
        .header { background-color: rgba(31,31,31,0.95); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2E7D32; backdrop-filter: blur(5px); z-index: 10; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: transparent; scrollbar-width: none; }
        .chat-area::-webkit-scrollbar { display: none; }
        .message-row { display: flex; align-items: center; gap: 10px; background: rgba(31,31,31,0.9); padding: 10px; border-radius: 8px; backdrop-filter: blur(5px); }
        .input-area { background-color: rgba(31,31,31,0.95); padding: 10px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; backdrop-filter: blur(5px); }
        input { flex: 1; background: rgba(42,42,42,0.9); border: 1px solid #444; padding: 12px; color: white; border-radius: 6px; font-size: 16px; outline: none; }
        .drawer { background-color: rgba(31,31,31,0.95); border-right-color: #2E7D32; backdrop-filter: blur(10px); }
        .drawer-header { background-color: #2E7D32; color: white; }
        .drawer-content { background: transparent; }
        .menu-link, .menu-item { color: #E0E0E0; border-bottom-color: rgba(255,255,255,0.05); }
        .drawer-footer { background: rgba(0,0,0,0.15); color: #888; border-top-color: rgba(255,255,255,0.05); }
        .avatar-selector, .contacts-list { background: rgba(255,255,255,0.05); scrollbar-width: none; }
        .online-indicator { width: 12px; height: 12px; background-color: #4CAF50; border-radius: 50%; box-shadow: 0 0 8px #4CAF50; }
        .online-indicator.offline { background-color: #f44336; box-shadow: 0 0 8px #f44336; }
        .bow-button { width: 50px; height: 50px; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background-color: #333; flex-shrink: 0; }
        .msg-body { flex: 1; min-width: 0; }
        .msg-sender { font-weight: bold; color: #4CAF50; font-size: 0.9em; }
        .msg-status { font-size: 0.7em; color: #888; text-align: right; }
        #robin-row { background: rgba(46,125,50,0.2); border-left: 3px solid #2E7D32; }
        #robin-text { transition: opacity 0.6s ease; opacity: 1; }
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 90; }
        .drawer { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background-color: rgba(31,31,31,0.95); z-index: 100; transition: left 0.3s ease; display: flex; flex-direction: column; box-shadow: 4px 0 10px rgba(0,0,0,0.4); border-right: 1px solid #2E7D32; backdrop-filter: blur(10px); }
        .drawer.open { left: 0; }
        .drawer-overlay.visible { display: block; }
        .drawer-header { padding: 24px 16px; background-color: #2E7D32; color: white; display: flex; flex-direction: column; gap: 12px; align-items: center; text-align: center; }
        .drawer-avatar { width: 75px; height: 75px; border-radius: 50%; border: 3px solid white; object-fit: cover; cursor: pointer; }
        .drawer-nick { font-size: 18px; font-weight: bold; }
        .change-name-btn { background: rgba(255,255,255,0.25); border: none; padding: 5px 14px; color: white; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .drawer-content { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; background: transparent; }
        .menu-link { display: flex; align-items: center; padding: 12px 4px; color: #E0E0E0; text-decoration: none; font-weight: 600; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 15px; }
        .menu-link img { width: 24px; height: 24px; margin-right: 10px; object-fit: contain; }
        .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; color: #E0E0E0; }
        .switch { position: relative; display: inline-block; width: 42px; height: 22px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .3s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #2E7D32; }
        input:checked + .slider:before { transform: translateX(20px); }
        .profile-edit { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; display: none; margin-top: 5px; width: 100%; box-sizing: border-box; }
        .profile-edit input { width: 100%; padding: 8px 12px; background: #121212; border: 1px solid #444; color: white; border-radius: 6px; margin-bottom: 8px; outline: none; box-sizing: border-box; }
        .invite-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
        .invite-modal.active { display: flex; }
        .invite-dialog { background: #1F1F1F; padding: 20px; border-radius: 12px; width: 80%; max-width: 320px; text-align: center; border: 1px solid #2E7D32; max-height: 80vh; overflow-y: auto; }
        .invite-dialog h3 { color: #4CAF50; margin: 0 0 10px; }
        .invite-dialog button { width: 100%; padding: 10px; margin-top: 5px; background: #2E7D32; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .code-display { background: #121212; border: 1px solid #444; color: white; border-radius: 6px; padding: 10px; font-size: 0.9em; word-break: break-all; margin: 10px 0; text-align: center; user-select: all; }
        .avatar-selector, .contacts-list { display: none; margin-top: 10px; text-align: center; max-height: 300px; overflow-y: auto; padding: 5px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .avatar-option { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin: 5px; cursor: pointer; border: 2px solid transparent; transition: border 0.2s; }
        .avatar-option:hover { border-color: #FFA000; }
        .contact-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; color: #E0E0E0; }
        .contact-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .contact-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .contact-name { font-weight: 600; }
        .delete-contact { background: none; border: none; color: #f44336; font-size: 20px; cursor: pointer; padding: 0 10px; opacity: 0.7; }
        .delete-contact:hover { opacity: 1; }
        .drawer-footer { padding: 16px; font-size: 11px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.15); color: #888; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="header">
    <button id="open-menu" style="font-size: 26px; cursor: pointer; background: none; border: none; color: inherit; outline: none; margin-right: 10px;">☰</button>
    <h2 style="margin: 0; font-size: 1.3em; flex: 1;" id="header-title">RobinHood P2P</h2>
    <div id="ddg-clear" style="font-size: 26px; cursor: pointer; user-select: none;">🔥</div>
</div>
<div class="chat-area" id="chat-box">
    <div class="message-row" id="robin-row">
        <img src="assets/avatars/231-icon-11433690.png" class="avatar" id="robin-avatar">
        <div class="msg-body">
            <div class="msg-sender" id="robin-title">Robin Hood</div>
            <div id="robin-text">Святые сокеты стабильны !</div>
        </div>
        <div class="online-indicator" id="network-status-dot"></div>
    </div>
</div>
<div class="input-area">
    <input type="text" id="msg-input" placeholder="Пустить стрелу">
    <img src="assets/ui/bow.png" class="bow-button" id="send-btn" alt="Отправить">
</div>

<div class="invite-modal" id="ref-modal">
    <div class="invite-dialog">
        <h3>🏹 Реферальная стрела</h3>
        <p style="font-size:0.9em;">Ваша стрела для приглашения:</p>
        <div class="code-display" id="ref-link-display"></div>
        <button id="copy-ref-link-btn">Копировать</button>
        <button id="share-ref-link-btn">Метнуть...</button>
        <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
        <p style="font-size:0.9em;">Вставьте стрелу или публичный колчан лучника:</p>
        <input type="text" id="friend-input" placeholder="Вставьте стрелу или публичный колчан лучника">
        <button id="add-friend-btn">Добавить лучника</button>
        <button id="close-ref-modal-btn" style="background:#555;">Закрыть</button>
    </div>
</div>

<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
    <div class="drawer-header">
        <img src="assets/avatars/001-.png" class="drawer-avatar" id="profile-avatar">
        <div class="drawer-nick" id="my-nick">Лучник</div>
        <button class="change-name-btn" id="change-profile-btn">Сменить ник</button>
        <div class="profile-edit" id="profile-edit-box">
            <input type="text" id="new-nick-input" placeholder="Новый ник...">
            <button class="change-name-btn" id="save-profile-btn">Применить</button>
        </div>
        <div class="avatar-selector" id="avatar-selector">
            <p>Выбери лучника</p>
            <div id="avatar-list"></div>
        </div>
    </div>
    <div class="drawer-content">
        <div class="menu-link" id="sherwood-letters-btn"><span>📖</span> Шервудские письма</div>
        <div class="contacts-list" id="contacts-list">
            <div id="contacts-list-inner"></div>
            <div id="pending-requests" style="margin-top: 10px; border-top: 1px solid #444; padding-top: 10px;"></div>
        </div>
        <div class="menu-item"><span>🗑️ Хранить историю</span><label class="switch"><input type="checkbox" id="toggle-history" checked><span class="slider"></span></label></div>
        <div class="menu-item"><span>🔊 Звук приложения</span><label class="switch"><input type="checkbox" id="toggle-sound" checked><span class="slider"></span></label></div>
        <div class="menu-link" id="ref-link-btn"><img src="assets/invain/invain.png"> Реферальная стрела</div>
    </div>
    <div class="drawer-footer">RobinHood Messenger v2.0</div>
</div>

<script>
    // ---------- КОНФИГУРАЦИЯ ----------
    const API_URL = 'https://robinhood-final-site.stephanclaps.workers.dev';
    
    // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
    let myPrivkey, myPubkey, activeContact;
    let pollingInterval;
    
    // ---------- КРИПТОГРАФИЯ ----------
    async function generateKeyPair() {
        const keyPair = await crypto.subtle.generateKey(
            { name: "ECDSA", namedCurve: "P-256" },
            true,
            ["sign", "verify"]
        );
        const pubKeyBuffer = await crypto.subtle.exportKey("spki", keyPair.publicKey);
        const privKeyBuffer = await crypto.subtle.exportKey("pkcs8", keyPair.privateKey);
        myPubkey = btoa(String.fromCharCode(...new Uint8Array(pubKeyBuffer)));
        myPrivkey = btoa(String.fromCharCode(...new Uint8Array(privKeyBuffer)));
        localStorage.setItem('robinhood_pubkey', myPubkey);
        localStorage.setItem('robinhood_privkey', myPrivkey);
    }
    
    async function loadKeys() {
        const storedPub = localStorage.getItem('robinhood_pubkey');
        const storedPriv = localStorage.getItem('robinhood_privkey');
        if (storedPub && storedPriv) {
            myPubkey = storedPub;
            myPrivkey = storedPriv;
        } else {
            await generateKeyPair();
        }
    }
    
    async function encryptMessage(text, recipientPubkey) {
        // Для простоты используем симметричный ключ, обёрнутый в публичный ключ получателя
        const aesKey = await crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt"]);
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, aesKey, new TextEncoder().encode(text));
        const rawKey = await crypto.subtle.exportKey("raw", aesKey);
        const payload = { key: btoa(String.fromCharCode(...new Uint8Array(rawKey))), iv: btoa(String.fromCharCode(...iv)), data: btoa(String.fromCharCode(...new Uint8Array(encrypted))) };
        return JSON.stringify(payload);
    }
    
    async function decryptMessage(payloadStr, senderPubkey) {
        try {
            const payload = JSON.parse(payloadStr);
            const rawKey = Uint8Array.from(atob(payload.key), c => c.charCodeAt(0));
            const iv = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
            const encryptedData = Uint8Array.from(atob(payload.data), c => c.charCodeAt(0));
            const aesKey = await crypto.subtle.importKey("raw", rawKey, { name: "AES-GCM" }, false, ["decrypt"]);
            const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, aesKey, encryptedData);
            return new TextDecoder().decode(decrypted);
        } catch(e) {
            return "[Ошибка расшифровки]";
        }
    }
    
    // ---------- API (WORKERS) ----------
    async function sendMessage(text, recipientPubkey) {
        const encrypted = await encryptMessage(text, recipientPubkey);
        const body = { sender: myPubkey, recipient: recipientPubkey, content: encrypted, timestamp: Date.now() };
        await fetch(API_URL + '/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    }
    
    async function getMessages(since = 0) {
        const res = await fetch(API_URL + '/messages?pubkey=' + encodeURIComponent(myPubkey) + '&since=' + since);
        if (!res.ok) return [];
        return await res.json();
    }
    
    // ---------- ИНТЕРФЕЙС ----------
    const openMenuBtn = document.getElementById('open-menu');
    const drawer = document.getElementById('drawer');
    const overlay = document.getElementById('drawer-overlay');
    const ddgClearBtn = document.getElementById('ddg-clear');
    const changeProfileBtn = document.getElementById('change-profile-btn');
    const profileEditBox = document.getElementById('profile-edit-box');
    const saveProfileBtn = document.getElementById('save-profile-btn');
    const newNickInput = document.getElementById('new-nick-input');
    const myNick = document.getElementById('my-nick');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const chatBox = document.getElementById('chat-box');
    const robinText = document.getElementById('robin-text');
    const profileAvatar = document.getElementById('profile-avatar');
    const avatarSelector = document.getElementById('avatar-selector');
    const avatarList = document.getElementById('avatar-list');
    const sherwoodBtn = document.getElementById('sherwood-letters-btn');
    const contactsListDiv = document.getElementById('contacts-list');
    const toggleHistory = document.getElementById('toggle-history');
    const toggleSound = document.getElementById('toggle-sound');
    const contactsListInner = document.getElementById('contacts-list-inner');
    const headerTitle = document.getElementById('header-title');

    // Кнопка "Шервудские письма"
    sherwoodBtn.addEventListener('click', () => {
        if (contactsListDiv.style.display === 'block') {
            contactsListDiv.style.display = 'none';
        } else {
            loadContacts();
            contactsListDiv.style.display = 'block';
        }
    });

    // Реферальная стрела
    function generateReferralLink() {
        if (!myPubkey) return '';
        const basePath = window.location.pathname.replace(/\/[^/]*$/, '/');
        const fullOrigin = window.location.origin + basePath;
        return fullOrigin + "?ref=" + encodeURIComponent(myPubkey);
    }
    document.getElementById('ref-link-btn').addEventListener('click', () => {
        const link = generateReferralLink();
        if (link) {
            document.getElementById('ref-link-display').textContent = link;
            document.getElementById('ref-modal').classList.add('active');
        }
    });
    document.getElementById('copy-ref-link-btn').addEventListener('click', function() {
        const link = document.getElementById('ref-link-display').textContent;
        if (!link) return;
        const btn = this;
        if (navigator.clipboard?.writeText) {
            navigator.clipboard.writeText(link).then(() => {
                btn.textContent = '✔ Заряжено!';
                btn.style.background = '#388E3C';
                setTimeout(() => { btn.textContent = 'Зарядить'; btn.style.background = '#2E7D32'; }, 2000);
            });
        } else {
            const range = document.createRange();
            range.selectNode(document.getElementById('ref-link-display'));
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            updateRobinStatus('Выделите и метните', 2000);
        }
    });
    document.getElementById('share-ref-link-btn').addEventListener('click', () => {
        const link = document.getElementById('ref-link-display').textContent;
        if (!link) return;
        if (navigator.share) navigator.share({ title: 'RobinHood P2P', text: 'Присоединяйся!', url: link }).catch(()=>{});
    });
    document.getElementById('close-ref-modal-btn').addEventListener('click', () => {
        document.getElementById('ref-modal').classList.remove('active');
    });

    // Добавление друга
    function addFriendManually() {
        const input = document.getElementById('friend-input');
        let value = input.value.trim();
        if (!value) return;
        let ref = value;
        if (value.includes('?ref=')) {
            const url = new URL(value);
            ref = url.searchParams.get('ref') || ref;
        }
        if (!ref) { updateRobinStatus('Неверный формат стрелы или колчана', 2000); return; }
        if (ref === myPubkey) { updateRobinStatus('Это ваш собственный колчан', 2000); return; }
        let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
        if (contacts.some(c => c.pubkey === ref)) { updateRobinStatus('Стрелок уже есть', 2000); return; }
        const tempName = ref.slice(0,8);
        contacts.push({ name: tempName, pubkey: ref, avatar: 'assets/avatars/001-.png', status: 'confirmed' });
        localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
        updateRobinStatus(`Стрелок ${tempName} добавлен`, 3000);
        loadContacts();
        input.value = '';
        document.getElementById('ref-modal').classList.remove('active');
    }
    document.getElementById('add-friend-btn').addEventListener('click', addFriendManually);
    document.getElementById('friend-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') addFriendManually(); });

    // Обработка перехода по реферальной ссылке
    function processReferral() {
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');
        if (ref && ref !== myPubkey) {
            let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
            if (!contacts.some(c => c.pubkey === ref)) {
                const tempName = ref.slice(0,8);
                contacts.push({ name: tempName, pubkey: ref, avatar: 'assets/avatars/001-.png', status: 'confirmed' });
                localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
                loadContacts();
                updateRobinStatus(`Стрелок ${tempName} добавлен по реф. стреле`, 3000);
            }
        }
    }

    // Стрельцы
    function loadContacts() {
        const contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
        const confirmed = contacts.filter(c => c.status === 'confirmed');
        contactsListInner.innerHTML = '';
        if (confirmed.length) {
            confirmed.forEach(c => {
                const div = document.createElement('div'); div.className = 'contact-item';
                div.innerHTML = `<div class="contact-info"><img src="${c.avatar || 'assets/avatars/001-.png'}" class="contact-avatar"><span class="contact-name">${c.name}</span></div><button class="delete-contact" data-pubkey="${c.pubkey}">✖</button>`;
                const infoDiv = div.querySelector('.contact-info');
                infoDiv.addEventListener('click', () => openChatWithContact(c));
                const delBtn = div.querySelector('.delete-contact');
                delBtn.addEventListener('click', (e) => deleteContact(c.pubkey, e));
                contactsListInner.appendChild(div);
            });
        } else {
            contactsListInner.innerHTML = '<div style="padding:10px;color:#888;">Воспользуйся реферальной стрелой!</div>';
        }
    }

    function deleteContact(pubkey, event) {
        event.stopPropagation();
        let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
        contacts = contacts.filter(c => c.pubkey !== pubkey);
        localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
        if (activeContact && activeContact.pubkey === pubkey) { activeContact = null; headerTitle.textContent = 'RobinHood P2P'; }
        loadContacts();
        updateRobinStatus('Стрелок уволен', 2000);
    }

    function openChatWithContact(contact) {
        activeContact = contact;
        headerTitle.textContent = contact.name;
        msgInput.placeholder = "Выпустить стрелу " + contact.name + "...";
        document.querySelectorAll(".message-row:not(#robin-row)").forEach(m => m.remove());
        updateRobinStatus("Перестрелка с " + contact.name + " открыт", 3000);
        contactsListDiv.style.display = "none";
        drawer.classList.remove("open");
        overlay.classList.remove("visible");
        loadChatHistory(contact.pubkey);
    }

    // Чат
    async function loadChatHistory(contactPubkey) {
        const messages = await getMessages(0);
        const filtered = messages.filter(m => m.sender === contactPubkey || m.recipient === contactPubkey);
        filtered.forEach(m => {
            const text = m.decrypted || m.content;
            const senderName = m.sender === myPubkey ? 'Вы' : (activeContact?.name || m.sender.slice(0,8));
            const avatar = m.sender === myPubkey ? profileAvatar.src : (activeContact?.avatar || 'assets/avatars/001-.png');
            appendMessage(senderName, text, avatar, new Date(m.timestamp).toLocaleTimeString());
        });
    }

    async function sendMessageHandler() {
        const text = msgInput.value.trim();
        if (!text || !activeContact) return;
        await sendMessage(text, activeContact.pubkey);
        appendMessage('Вы', text, profileAvatar.src);
        msgInput.value = '';
        if (toggleSound.checked) playSound('bow_shot.wav');
    }

    sendBtn.addEventListener('click', sendMessageHandler);
    msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendBtn.click(); });

    function appendMessage(sender, text, avatarSrc, timeStr = null) {
        const row = document.createElement('div'); row.className = 'message-row';
        const finalTime = timeStr || new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        row.innerHTML = `<img src="${avatarSrc}" class="avatar"><div class="msg-body"><div class="msg-sender">${sender}</div><div>${text}</div><div class="msg-status">${finalTime}</div></div>`;
        chatBox.appendChild(row); chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Очистка истории
    ddgClearBtn.addEventListener('click', () => {
        document.querySelectorAll('.message-row:not(#robin-row)').forEach(m => m.remove());
        updateRobinStatus('Робин Гуд пустил ваши письма на самокрутки !', 5000);
    });

    // Статус Робин Гуда
    let robinDefaultText = robinText.textContent; let robinTimer;
    function updateRobinStatus(text, duration=4000) {
        clearTimeout(robinTimer);
        robinText.style.transition = 'none'; robinText.style.opacity = 1;
        robinText.textContent = text;
        robinTimer = setTimeout(() => {
            robinText.style.transition = 'opacity 0.6s ease'; robinText.style.opacity = 0;
            const onEnd = () => {
                robinText.removeEventListener('transitionend', onEnd);
                robinText.style.transition = 'none';
                robinText.textContent = robinDefaultText;
                robinText.style.opacity = 1;
            };
            robinText.addEventListener('transitionend', onEnd);
        }, duration);
    }

    // Звук
    function playSound(filename) {
        if (toggleSound.checked) {
            const audio = new Audio(`assets/sounds/${filename}`);
            audio.volume = 0.5;
            audio.play().catch(e=>console.log);
        }
    }

    // Поллинг новых сообщений
    async function pollMessages() {
        if (!myPubkey) return;
        const messages = await getMessages(Date.now() - 60000);
        messages.forEach(m => {
            if (m.sender !== myPubkey && activeContact && m.sender === activeContact.pubkey) {
                decryptMessage(m.content, m.sender).then(text => {
                    appendMessage(activeContact.name, text, activeContact.avatar, new Date(m.timestamp).toLocaleTimeString());
                });
            }
        });
    }

    // Инициализация
    async function init() {
        await loadKeys();
        updateRobinStatus('Святые сокеты стабильны !', 3000);
        processReferral();
        setInterval(pollMessages, 5000);
        pollingInterval = setInterval(pollMessages, 5000);
    }

    window.addEventListener('load', init);
    window.addEventListener('pagehide', () => clearInterval(pollingInterval));

    // Боковое меню
    openMenuBtn.addEventListener('click', () => { drawer.classList.toggle('open'); overlay.classList.toggle('visible'); });
    overlay.addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('visible'); });

    // Аватары и ник (базовые)
    const savedAvatar = localStorage.getItem('robinhood_avatar'); if (savedAvatar) profileAvatar.src = savedAvatar;
    const savedNick = localStorage.getItem('robinhood_nick'); if (savedNick) myNick.textContent = savedNick;
    changeProfileBtn.addEventListener('click', () => profileEditBox.style.display = profileEditBox.style.display === 'block' ? 'none' : 'block');
    saveProfileBtn.addEventListener('click', () => {
        const newNick = newNickInput.value.trim();
        if (newNick) {
            myNick.textContent = newNick;
            localStorage.setItem('robinhood_nick', newNick);
            newNickInput.value = '';
            profileEditBox.style.display = 'none';
            updateRobinStatus(`Ник изменён на ${newNick}`);
        }
    });

    // Список аватаров
    const avatars = ['assets/avatars/001-.png','assets/avatars/002--1.png','assets/avatars/003-icon-8033085.png','assets/avatars/009--7.png','assets/avatars/010--8.png','assets/avatars/018--16.png','assets/avatars/022--20.png','assets/avatars/037--35.png','assets/avatars/043--41.png','assets/avatars/048--46.png','assets/avatars/050--48.png','assets/avatars/052--50.png','assets/avatars/053--51.png','assets/avatars/056--54.png','assets/avatars/066--64.png','assets/avatars/077-icon-8033092.png','assets/avatars/083-icon-11885568.png','assets/avatars/094-icon-18926716.png','assets/avatars/108--83.png','assets/avatars/147-icon-6081840.png','assets/avatars/148-icon-5532632.png','assets/avatars/149-icon-4132697.png','assets/avatars/150-icon-10756654.png','assets/avatars/153-icon-4964924.png','assets/avatars/154-icon-4261075.png','assets/avatars/156-icon-4132828.png','assets/avatars/158--116.png','assets/avatars/160-icon-2332597.png','assets/avatars/162-icon-6237595.png','assets/avatars/167-icon-1920840.png','assets/avatars/168-icon-228268.png','assets/avatars/169-icon-5613167.png','assets/avatars/173-icon-1615623.png','assets/avatars/183-icon-5840846.png','assets/avatars/186-icon-6237499.png','assets/avatars/188-icon-6267517.png','assets/avatars/203-icon-3516506.png','assets/avatars/216-icon-5504960.png','assets/avatars/221-icon-9530256.png','assets/avatars/226-icon-9669507.png','assets/avatars/227-icon-9623471.png','assets/avatars/229-icon-10032172.png','assets/avatars/230-icon-10049316.png','assets/avatars/232-icon-11434002.png','assets/avatars/234-icon-10756328.png','assets/avatars/245-icon-16150697.png','assets/avatars/246-icon-16150730.png','assets/avatars/249-icon-17159913.png','assets/avatars/250-icon-17159758.png','assets/avatars/251-icon-17159744.png','assets/avatars/253-icon-18426073.png','assets/avatars/254-icon-18621065.png','assets/avatars/255-icon-18926692.png','assets/avatars/256--120.png'];
    function loadAvatars() {
        avatarList.innerHTML = '';
        avatars.forEach(src => {
            const img = document.createElement('img'); img.src = src; img.className = 'avatar-option';
            img.addEventListener('click', () => { profileAvatar.src = src; localStorage.setItem('robinhood_avatar', src); updateRobinStatus('Аватар обновлён'); avatarSelector.style.display = 'none'; });
            avatarList.appendChild(img);
        });
    }
    profileAvatar.addEventListener('click', () => { avatarSelector.style.display = avatarSelector.style.display === 'block' ? 'none' : 'block'; if (avatarSelector.style.display === 'block') loadAvatars(); });

    // Закрытие бокового меню свайпом
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
    document.addEventListener('touchend', e => {
        const deltaX = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(deltaX) > 50) {
            if (deltaX > 0 && !drawer.classList.contains('open')) { drawer.classList.add('open'); overlay.classList.add('visible'); }
            else if (deltaX < 0 && drawer.classList.contains('open')) { drawer.classList.remove('open'); overlay.classList.remove('visible'); }
        }
    });
</script>
</body>
