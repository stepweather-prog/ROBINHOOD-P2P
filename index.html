<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2PPong v5.0</title>
    <link rel="icon" href="data:,">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://p2ppong-v2.onrender.com https://robincall.stephanclaps-491.workers.dev https://* wss://*;">
    <style>
        :root { --bg: #0d1a0c; --bg2: #1a2a1f; --accent: #c4a24b; --accent2: #e8d5a3; --text: #e8e2c7; --dim: #b8a87a; --border: #c4a24b; --green: #4caf50; --red: #f44336; --orange: #ff9800; --blue: #4bc4d0; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:linear-gradient(135deg,var(--bg),var(--bg2)); color:var(--text); font-family:'Segoe UI','Inter',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .container { width:100%; max-width:500px; background:rgba(20,30,18,0.95); border:2px solid var(--border); border-radius:20px; padding:24px; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
        h2 { text-align:center; background:linear-gradient(135deg,var(--accent2),var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:20px; }
        .status-row { display:flex; align-items:center; gap:8px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
        .status-dot { width:10px; height:10px; border-radius:50%; }
        .status-dot.online { background:var(--green); box-shadow:0 0 8px var(--green); }
        .status-dot.offline { background:var(--red); }
        .status-dot.checking { background:var(--orange); animation:pulse 1s infinite; }
        .status-dot.mesh { background:var(--blue); box-shadow:0 0 8px var(--blue); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .server-cards { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
        .server-card { flex:1; min-width:90px; padding:12px; border-radius:12px; border:1px solid var(--border); text-align:center; cursor:pointer; transition:0.2s; background:rgba(255,255,255,0.03); }
        .server-card:hover { background:rgba(196,162,75,0.15); }
        .server-card.active { border-color:var(--green); background:rgba(76,175,80,0.1); }
        .server-card.mesh-active { border-color:var(--blue); background:rgba(75,196,208,0.1); }
        .server-name { font-weight:bold; font-size:0.9em; color:var(--accent2); }
        .server-status { font-size:0.65em; color:var(--dim); margin-top:4px; }
        .log-box { background:rgba(0,0,0,0.4); border-radius:10px; padding:10px; max-height:200px; overflow-y:auto; font-family:monospace; font-size:0.6em; color:var(--dim); margin-top:12px; }
        .log-entry { margin:3px 0; } .log-entry.success { color:var(--green); } .log-entry.error { color:var(--red); } .log-entry.info { color:var(--accent2); } .log-entry.mesh { color:var(--blue); }
        .stats-row { display:flex; justify-content:space-between; font-size:0.6em; color:var(--dim); margin-top:12px; flex-wrap:wrap; gap:4px; }
        button { width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:rgba(196,162,75,0.1); color:var(--text); cursor:pointer; font-weight:bold; font-size:0.9em; transition:0.2s; margin-top:8px; }
        button:hover { background:rgba(196,162,75,0.25); }
        .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.7em; font-weight:bold; }
        .badge-pwa { background:rgba(76,175,80,0.2); color:var(--green); } .badge-browser { background:rgba(255,152,0,0.2); color:var(--orange); } .badge-mesh { background:rgba(75,196,208,0.2); color:var(--blue); }
    </style>
</head>
<body>
<div class="container">
    <h2>🏹 P2PPong v5.0</h2>
    <div class="status-row">
        <span class="status-dot checking" id="status-dot"></span>
        <span id="status-text">Проверка...</span>
        <span class="badge" id="pwa-badge">Браузер</span>
        <span class="badge badge-mesh" id="mesh-badge" style="display:none;">Mesh</span>
    </div>
    <div class="server-cards">
        <div class="server-card active" id="card-render"><div class="server-name">🌐 Render</div><div class="server-status" id="render-status">🟡 Проверка...</div></div>
        <div class="server-card" id="card-workers"><div class="server-name">⚡ Workers</div><div class="server-status" id="workers-status">🟡 Проверка...</div></div>
        <div class="server-card" id="card-mesh"><div class="server-name">📡 Пиры</div><div class="server-status" id="mesh-status">Поиск...</div></div>
    </div>
    <button id="btn-refresh">🔄 Проверить</button>
    <div class="log-box" id="log-box"></div>
    <div class="stats-row">
        <span>ID: <span id="node-id">-</span></span>
        <span>Каналы: <span id="ch-count">0</span></span>
        <span>Пиры: <span id="peer-count">0</span></span>
    </div>
</div>
<script>
/**
 * P2PPong v5.0 Standalone — Бронебойная сигнальная машина (Пинбол)
 */
(function() {
    'use strict';

    const SERVERS = [
        { id: 'render', url: 'https://p2ppong-v2.onrender.com' },
        { id: 'workers', url: 'https://robincall.stephanclaps-491.workers.dev' }
    ];

    let channels = {};
    let pollIntervals = {};
    let callbacks = {};
    let peerId = null;
    let sessionId = null;
    let isInitialized = false;
    let handshakeSecret = null;

    function $(id) { return document.getElementById(id); }

    function log(msg, type = 'info') {
        console.log('[P2PPong]', msg);
        const box = $('log-box');
        if (box) {
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
            box.insertBefore(entry, box.firstChild);
            if (box.children.length > 50) box.lastChild.remove();
        }
    }

    function updateUI() {
        const chCount = Object.keys(channels).length;
        const el = $('ch-count'); if (el) el.textContent = chCount;
        const nid = $('node-id'); if (nid) nid.textContent = (peerId || '---').substring(0, 10) + '...';
        const dot = $('status-dot'); if (dot) dot.className = 'status-dot online';
        const txt = $('status-text'); if (txt) txt.textContent = '✅ Готов';
    }

    function generateToken() {
        return crypto.randomUUID?.() || Math.random().toString(36).substring(2) + Date.now().toString(36);
    }

    async function sha256(text) {
        const data = new TextEncoder().encode(text);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open('P2PPongSecure', 1);
            req.onupgradeneeded = () => {
                if (!req.result.objectStoreNames.contains('identity'))
                    req.result.createObjectStore('identity', { keyPath: 'id' });
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    async function getOrCreatePeerId() {
        if (peerId) return peerId;
        try {
            const db = await openDB();
            const tx = db.transaction('identity', 'readonly');
            const store = tx.objectStore('identity');
            const stored = await new Promise((resolve, reject) => {
                const req = store.get('peerId');
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
            if (stored?.value) { peerId = stored.value; return peerId; }
        } catch (e) { log('IndexedDB недоступна', 'error'); }
        peerId = generateToken().substring(0, 16);
        try {
            const db = await openDB();
            const tx = db.transaction('identity', 'readwrite');
            tx.objectStore('identity').put({ id: 'peerId', value: peerId });
        } catch (e) {}
        return peerId;
    }

    async function deriveKey(secret) {
        const hash = await sha256(secret);
        const keyBytes = new TextEncoder().encode(hash.substring(0, 32));
        return await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
    }

    async function encryptPacket(plaintext, secret) {
        try {
            const key = await deriveKey(secret);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encoded = new TextEncoder().encode(plaintext);
            const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded);
            const combined = new Uint8Array(iv.length + new Uint8Array(ciphertext).length);
            combined.set(iv); combined.set(new Uint8Array(ciphertext), iv.length);
            return '🔐' + btoa(String.fromCharCode(...combined));
        } catch (e) { return plaintext; }
    }

    async function decryptPacket(encryptedText, secret) {
        if (!encryptedText || !encryptedText.startsWith('🔐')) return null;
        try {
            const key = await deriveKey(secret);
            const combined = Uint8Array.from(atob(encryptedText.substring(2)), c => c.charCodeAt(0));
            const iv = combined.slice(0, 12); const ct = combined.slice(12);
            const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
            return new TextDecoder().decode(decrypted);
        } catch (e) { return null; }
    }

    async function apiCall(serverId, method, path, body = null) {
        const server = SERVERS.find(s => s.id === serverId);
        if (!server) return null;
        const ctrl = new AbortController();
        const timeout = setTimeout(() => ctrl.abort(), serverId === 'workers' ? 5000 : 10000);
        try {
            const opts = { method, headers: { 'Content-Type': 'application/json' }, signal: ctrl.signal };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(server.url + path, opts);
            clearTimeout(timeout);
            if (!res.ok) return null;
            return await res.json();
        } catch (e) { clearTimeout(timeout); return null; }
    }

    function startPolling(sid, serverId) {
        if (pollIntervals[sid]) return;
        let lastTime = Date.now();
        const poll = async () => {
            const srv = serverId || channels[sid]?.server;
            const res = await apiCall(srv, 'GET', '/message?id=' + sid + '&since=' + lastTime);
            if (!res?.messages) return;
            for (const m of res.messages) {
                const ch = channels[sid]; if (!ch) continue;
                let decrypted = await decryptPacket(m.packet, ch.sessionSecret);
                if (!decrypted) { try { const parsed = JSON.parse(m.packet); decrypted = parsed.text || m.packet; } catch (e) { decrypted = m.packet; } }
                let sender = null, text = decrypted;
                try { const parsed = JSON.parse(decrypted); sender = parsed.sender; text = parsed.text || decrypted; } catch (e) {}
                if (sender === sessionId) { const msgTime = m.time > 9999999999 ? m.time : m.time * 1000; lastTime = Math.max(lastTime, msgTime); continue; }
                if (callbacks.onMessage) callbacks.onMessage({ text, channelId: sid, sender });
                sendToParent({ type: 'message', text, channelId: sid, sender });
                const msgTime = m.time > 9999999999 ? m.time : m.time * 1000; lastTime = Math.max(lastTime, msgTime);
            }
        };
        poll(); pollIntervals[sid] = setInterval(poll, 4000);
    }

    function stopPolling(sid) { if (pollIntervals[sid]) { clearInterval(pollIntervals[sid]); delete pollIntervals[sid]; } }
    function stopAllPolling() { Object.keys(pollIntervals).forEach(stopPolling); }

    function sendToParent(msg) {
        if (window.parent && window.parent !== window) {
            try { window.parent.postMessage(msg, '*'); } catch (e) {}
        }
    }

    async function createArrow() {
        await ensureInit();
        const tempKey = generateToken();
        const tempKeyHash = await sha256(tempKey);
        const sessionSecret = tempKey;
        log('Создание маяка...');
        const results = [];
        for (const server of SERVERS) {
            const body = server.id === 'workers' ? { tempKeyHash, publicId: peerId } : { tempKey: tempKey, tempKeyHash, publicId: peerId };
            const res = await apiCall(server.id, 'POST', '/beacon', body);
            if (res?.sessionId) results.push({ sessionId: res.sessionId, server: server.id });
        }
        if (results.length === 0) { sendToParent({ type: 'error', text: 'Серверы не отвечают' }); return; }
        const primary = results[0]; const sid = primary.sessionId;
        channels[sid] = { status: 'waiting', sessionSecret, server: primary.server, peerId, allServers: results.map(r => r.server) };
        const serversParam = results.map(r => r.server).join(',');
        const fullLink = 'https://stepweather-prog.github.io/ROBINHOOD-P2P/?id=' + sid + '&servers=' + serversParam + '&peer=' + peerId + '&key=' + tempKey;
        if (callbacks.onSessionCreated) callbacks.onSessionCreated({ fullLink, peerId, key: tempKey });
        sendToParent({ type: 'session-created', sessionId: sid, key: tempKey, fullLink, peerId });
        let matched = false; const start = Date.now();
        while (Date.now() - start < 90000) {
            const checks = await Promise.all(results.map(r => apiCall(r.server, 'GET', '/beacon?id=' + r.sessionId)));
            if (checks.some(c => c?.matched)) { matched = true; break; }
            await new Promise(r => setTimeout(r, 5000));
        }
        if (!matched) { delete channels[sid]; sendToParent({ type: 'error', text: 'Таймаут ожидания' }); return; }
        channels[sid].status = 'open'; startPolling(sid, channels[sid].server);
        updateUI();
        if (callbacks.onChannelOpen) callbacks.onChannelOpen({ channelId: sid, role: 'creator', peerId });
        sendToParent({ type: 'channel-open', channelId: sid, role: 'creator', peerId });
        log('Канал открыт!', 'success');
    }

    async function acceptArrow(peerIdFromLink, tempKey) {
        await ensureInit();
        const keyHash = await sha256(tempKey);
        const sessionSecret = tempKey;
        log('Поиск маяка для пира ' + peerIdFromLink + '...');
        for (const server of SERVERS) {
            try {
                const res = await apiCall(server.id, 'POST', '/find-by-peer', { targetPublicId: peerIdFromLink, myPublicId: peerId, tempKeyHash: keyHash });
                if (res?.status === 'matched') { await openChannel(res.sessionId, server.id, sessionSecret, peerIdFromLink); return; }
            } catch (e) {}
        }
        const urlParams = new URLSearchParams(window.location.search);
        const serversParam = urlParams.get('servers') || 'render,workers';
        const serversList = serversParam.split(',');
        const sid = urlParams.get('id');
        for (const srvId of serversList) {
            const body = srvId === 'workers' ? { tempKeyHash: keyHash } : { tempKey };
            const res = await apiCall(srvId, 'POST', '/find', body);
            if (res?.status === 'matched') { await openChannel(res.sessionId || sid, srvId, sessionSecret, peerIdFromLink); return; }
        }
        sendToParent({ type: 'error', text: 'Маяк не найден' });
    }

    async function openChannel(sid, serverId, sessionSecret, peerIdFromLink) {
        channels[sid] = { status: 'open', sessionSecret, server: serverId, peerId: peerIdFromLink };
        startPolling(sid, serverId);
        updateUI();
        if (callbacks.onChannelOpen) callbacks.onChannelOpen({ channelId: sid, role: 'receiver', peerId: peerIdFromLink });
        sendToParent({ type: 'channel-open', channelId: sid, role: 'receiver', peerId: peerIdFromLink });
        log('Подключено через ' + serverId + '!', 'success');
    }

    async function sendMessage(channelId, text) {
        await ensureInit();
        const ch = channels[channelId];
        if (!ch) { sendToParent({ type: 'error', text: 'Канал не найден', channelId }); return; }
        const payload = JSON.stringify({ text, sender: sessionId, time: Date.now() });
        const encrypted = await encryptPacket(payload, ch.sessionSecret);
        const res = await apiCall(ch.server, 'POST', '/message', { sessionId: channelId, packet: encrypted });
        if (!res) { delete channels[channelId]; stopPolling(channelId); updateUI(); sendToParent({ type: 'error', text: 'session_not_found', channelId }); }
    }

    function on(event, cb) { callbacks[event] = cb; }
    function getPeerId() { return peerId; }

    async function checkServers() {
        for (const server of SERVERS) {
            const ping = await apiCall(server.id, 'GET', '/ping');
            const status = ping ? 'online' : 'offline';
            const el = $(server.id + '-status');
            if (el) el.textContent = (status === 'online' ? '🟢 ' : '🔴 ') + (status === 'online' ? 'Онлайн' : 'Офлайн');
            const card = $('card-' + server.id);
            if (card) card.classList.toggle('active', status === 'online');
        }
    }

    async function ensureInit() { if (!isInitialized) await init(); }

    async function init() {
        if (isInitialized) return;
        sessionId = generateToken();
        await getOrCreatePeerId();
        await checkServers();
        updateUI();
        handshakeSecret = generateToken();
        sendToParent({ type: 'pong-ready', handshake: handshakeSecret });
        isInitialized = true;
        log('P2PPong v5.0 готов. PeerId: ' + peerId.substring(0, 10) + '...', 'success');
        if (callbacks.onReady) callbacks.onReady({ peerId });
    }

    window.addEventListener('message', (event) => {
        if (event.source !== window.parent) return;
        const data = event.data;
        if (!data || !data.action) return;
        if (data.action === 'handshake') { if (data.handshake === handshakeSecret) { handshakeSecret = null; sendToParent({ type: 'handshake-ok' }); } return; }
        if (data.action === 'create') { createArrow(); return; }
        if (data.action === 'accept' && data.id) { acceptArrow(data.id, data.key || ''); return; }
        if (data.action === 'send') { sendMessage(data.channelId || Object.keys(channels)[0], data.text); return; }
        if (data.action === 'get-status') { sendToParent({ type: 'server-status', channels: Object.keys(channels).length, peerId }); return; }
    });

    $('btn-refresh')?.addEventListener('click', checkServers);
    window.addEventListener('beforeunload', stopAllPolling);
    init().catch(e => log('Ошибка инициализации: ' + e.message, 'error'));
})();
</script>
</body>
</html>
