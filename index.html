<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>RobinHood P2P</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/avatars/001-.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js">
    </script>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src 'self' blob:; connect-src 'self' https://p2ppong.onrender.com https://robincall.stephanclaps-491.workers.dev blob:; img-src 'self' data: blob: https://stepweather-prog.github.io https://warp-generator.github.io; frame-src 'self' https://stepweather-prog.github.io; manifest-src 'self'; form-action 'none'; base-uri 'self';">
    <style>
        :root,
        [data-theme="forest"] {
            --bg-primary: #1a2a1f;
            --bg-secondary: #0d1a0c;
            --accent: #c4a24b;
            --accent-light: #e8d5a3;
            --accent-glow: rgba(196, 162, 75, 0.5);
            --text: #e8e2c7;
            --text-bright: #f5e6b8;
            --text-dim: #b8a87a;
            --border: #c4a24b;
            --btn-bg: rgba(196, 162, 75, 0.1);
            --btn-border: rgba(196, 162, 75, 0.3);
            --btn-hover: rgba(196, 162, 75, 0.25);
            --sheet-bg: linear-gradient(145deg, #1e2a1a 0%, #0f180d 100%);
            --input-bg: rgba(20, 30, 18, 0.9);
            --input-focus: rgba(25, 38, 22, 0.95);
            --msg-bg: rgba(30, 40, 25, 0.85);
            --msg-accent: #c4a24b;
            --robin-bg: rgba(50, 70, 40, 0.9);
            --robin-accent: #e8c97a;
            --overlay-bg: rgba(0, 0, 0, 0.6);
            --call-bg: linear-gradient(135deg, rgba(25, 35, 20, 0.98), rgba(15, 25, 12, 0.98));
        }

        [data-theme="sunset"] {
            --bg-primary: #2a1a1f;
            --bg-secondary: #1a0a0f;
            --accent: #e85d3a;
            --accent-light: #f0a080;
            --accent-glow: rgba(232, 93, 58, 0.5);
            --text: #f0d8c0;
            --text-bright: #fae8d0;
            --text-dim: #c08060;
            --border: #e85d3a;
            --btn-bg: rgba(232, 93, 58, 0.1);
            --btn-border: rgba(232, 93, 58, 0.3);
            --btn-hover: rgba(232, 93, 58, 0.25);
            --sheet-bg: linear-gradient(145deg, #2a1a18 0%, #1a0a08 100%);
            --input-bg: rgba(30, 15, 10, 0.9);
            --input-focus: rgba(38, 18, 12, 0.95);
            --msg-bg: rgba(40, 20, 15, 0.85);
            --msg-accent: #e85d3a;
            --robin-bg: rgba(60, 30, 20, 0.9);
            --robin-accent: #f0a080;
            --overlay-bg: rgba(0, 0, 0, 0.7);
            --call-bg: linear-gradient(135deg, rgba(35, 15, 10, 0.98), rgba(20, 8, 5, 0.98));
        }

        [data-theme="ocean"] {
            --bg-primary: #0a1a2f;
            --bg-secondary: #050d18;
            --accent: #4bc4d0;
            --accent-light: #90e8f0;
            --accent-glow: rgba(75, 196, 208, 0.5);
            --text: #c8f0f8;
            --text-bright: #e0fafc;
            --text-dim: #60a0b0;
            --border: #4bc4d0;
            --btn-bg: rgba(75, 196, 208, 0.1);
            --btn-border: rgba(75, 196, 208, 0.3);
            --btn-hover: rgba(75, 196, 208, 0.25);
            --sheet-bg: linear-gradient(145deg, #0a1828 0%, #050d18 100%);
            --input-bg: rgba(8, 20, 30, 0.9);
            --input-focus: rgba(10, 25, 38, 0.95);
            --msg-bg: rgba(10, 25, 35, 0.85);
            --msg-accent: #4bc4d0;
            --robin-bg: rgba(15, 35, 50, 0.9);
            --robin-accent: #90e8f0;
            --overlay-bg: rgba(0, 0, 0, 0.7);
            --call-bg: linear-gradient(135deg, rgba(8, 20, 30, 0.98), rgba(3, 10, 15, 0.98));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: clamp(14px, 2.5vw, 16px);
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text);
            font-family: 'Segoe UI', 'Inter', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            position: relative;
        }

        /* ФОН ИСПРАВЛЕН: строго между уведомителем и полем ввода */
        body::before {
            content: "";
            position: fixed;
            top: clamp(58px, 13vw, 76px);
            left: 0;
            width: 100%;
            height: calc(100dvh - clamp(58px, 13vw, 76px) - clamp(54px, 11vw, 70px));
            background-image: url('assets/background.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            opacity: 0.35;
        }

        body::after {
            content: "";
            position: fixed;
            top: clamp(58px, 13vw, 76px);
            left: 0;
            width: 100%;
            height: calc(100dvh - clamp(58px, 13vw, 76px) - clamp(54px, 11vw, 70px));
            background: radial-gradient(circle at 50% 40%, rgba(30, 40, 25, 0.5), rgba(10, 20, 8, 0.85));
            z-index: 0;
        }

        .header {
            background: linear-gradient(135deg, rgba(25, 35, 20, 0.96), rgba(15, 25, 12, 0.98));
            border-bottom: 2px solid var(--border);
            backdrop-filter: blur(8px);
            z-index: 10;
            padding: 6px 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .header-row-1 {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-title-text {
            font-size: clamp(1em, 3vw, 1.3em);
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .header-shield {
            font-size: clamp(0.9em, 2.5vw, 1.1em);
            filter: drop-shadow(0 0 3px var(--accent-glow));
        }

        .header-clock {
            font-size: clamp(0.7em, 2vw, 0.85em);
            color: var(--accent-light);
            font-family: monospace;
            margin-left: auto;
            margin-right: 8px;
            letter-spacing: 1px;
        }

        .header-version {
            font-size: 0.55em;
            color: var(--text-dim);
        }

        .header-row-2 {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .header-row-3 {
            display: flex;
            justify-content: space-around;
        }

        .header-btn {
            width: clamp(36px, 8vw, 44px);
            height: clamp(36px, 8vw, 44px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 10px;
            font-size: clamp(18px, 4vw, 22px);
            position: relative;
            transition: all 0.2s ease;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
        }

        .header-btn:hover {
            background: var(--btn-hover);
            transform: scale(1.05);
            border-color: var(--accent);
        }

        .header-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 5px;
        }

        .header-label {
            font-size: 0.55em;
            color: var(--text-dim);
            text-align: center;
            width: clamp(36px, 8vw, 44px);
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }

        .header-avatar {
            width: clamp(28px, 6vw, 34px);
            height: clamp(28px, 6vw, 34px);
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(10, 18, 8, 0.35);
            scrollbar-width: none;
            position: relative;
            z-index: 1;
        }

        .chat-area::-webkit-scrollbar {
            display: none;
        }

        .message-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            background: var(--msg-bg);
            backdrop-filter: blur(8px);
            padding: 8px 10px;
            border-radius: 14px;
            border-left: 3px solid var(--msg-accent);
            transition: all 0.2s ease;
            animation: messageSlideIn 0.3s ease;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .input-area {
            background: linear-gradient(135deg, rgba(25, 35, 20, 0.96), rgba(15, 25, 12, 0.98));
            backdrop-filter: blur(8px);
            padding: 8px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
            display: flex;
            gap: 5px;
            align-items: center;
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        input,
        textarea {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 10px;
            color: var(--text);
            border-radius: 10px;
            font-size: clamp(14px, 2.5vw, 16px);
            outline: none;
            font-family: 'Segoe UI', 'Inter', monospace;
            transition: all 0.2s;
            min-width: 0;
        }

        input:focus,
        textarea:focus {
            border-color: var(--accent-light);
            box-shadow: 0 0 8px var(--accent-glow);
            background: var(--input-focus);
        }

        .bow-button {
            width: 38px;
            height: 38px;
            cursor: pointer;
            transition: transform 0.1s ease;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
            flex-shrink: 0;
        }

        .bow-button:active {
            transform: scale(0.92);
        }

        .avatar {
            width: clamp(38px, 8vw, 44px);
            height: clamp(38px, 8vw, 44px);
            border-radius: 50%;
            object-fit: cover;
            background-color: #2a3a25;
            flex-shrink: 0;
            border: 2px solid var(--border);
        }

        .msg-body {
            flex: 1;
            min-width: 0;
        }

        .msg-sender {
            font-weight: 900;
            color: var(--text-bright);
            font-size: 0.9em;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.3px;
        }

        .msg-body div {
            font-size: 0.9em;
            line-height: 1.4;
            color: var(--text);
        }

        .msg-status {
            font-size: 0.6em;
            color: var(--text-dim);
            text-align: right;
            margin-top: 4px;
        }

        #robin-row {
            background: var(--robin-bg);
            border-left: 3px solid var(--robin-accent);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 6;
            margin-bottom: 4px;
        }

        #robin-text {
            font-weight: 700;
            font-size: 0.85em;
            color: var(--text-bright);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        }

        .voice-timer-overlay {
            display: none;
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #f44336;
            font-family: monospace;
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 6px;
            z-index: 20;
            pointer-events: none;
            white-space: nowrap;
        }

        /* АНИМАЦИЯ ЛУКА — ФИКСИРОВАННАЯ */
        #bow-above-send {
            position: fixed !important;
            bottom: clamp(62px, 12vw, 78px) !important;
            right: clamp(50px, 18vw, 90px) !important;
            width: 80px !important;
            height: 80px !important;
            z-index: 100 !important;
            pointer-events: none !important;
            display: none !important;
        }

        .bottom-sheet,
        .avatar-selector {
            position: fixed;
            top: 0;
            left: 0;
            width: min(85%, 380px);
            height: 100%;
            background: var(--sheet-bg);
            border-right: 2px solid var(--border);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-y: auto;
            backdrop-filter: blur(16px);
            box-shadow: 8px 0 30px rgba(0, 0, 0, 0.5);
            -webkit-overflow-scrolling: touch;
        }

        .bottom-sheet.open,
        .avatar-selector.show {
            transform: translateX(0);
        }

        .bottom-sheet-header {
            padding: 16px 16px 10px;
            font-weight: bold;
            color: var(--accent-light);
            border-bottom: 1px solid var(--border);
            margin-bottom: 6px;
            font-size: 1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .bottom-sheet-close {
            background: none;
            border: none;
            color: var(--accent-light);
            font-size: 22px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .bottom-sheet-close:hover {
            background: var(--btn-hover);
            transform: rotate(90deg);
        }

        .bottom-sheet-list {
            padding: 6px 12px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            margin: 5px 0;
            border-radius: 12px;
            background: rgba(255, 245, 215, 0.05);
            border: 1px solid var(--btn-border);
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s;
        }

        .contact-item:hover {
            background: var(--btn-hover);
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .contact-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .contact-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
        }

        .contact-name {
            font-weight: 600;
            font-size: 0.9em;
            color: var(--accent-light);
        }

        .delete-contact {
            background: none;
            border: none;
            color: #c97a5a;
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .delete-contact:hover {
            background: rgba(201, 122, 90, 0.2);
            transform: scale(1.1);
        }

        .avatar-selector {
            padding: 16px;
        }

        .avatar-selector p {
            color: var(--accent-light);
            margin: 0 0 12px;
            font-size: 1em;
            text-align: center;
        }

        #avatar-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }

        .avatar-option {
            width: clamp(45px, 10vw, 55px);
            height: clamp(45px, 10vw, 55px);
            border-radius: 50%;
            object-fit: cover;
            margin: 3px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .avatar-option:hover {
            border-color: var(--accent-light);
            transform: scale(1.1);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 190;
        }

        .overlay.show {
            display: block;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-dialog {
            background: var(--sheet-bg);
            padding: 20px;
            border-radius: 20px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            border: 2px solid var(--border);
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-dialog h3 {
            color: var(--accent-light);
            margin: 0 0 12px;
            font-size: 1.1em;
        }

        .modal-dialog button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-dialog button:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #b8903a);
            color: #1a1f0f;
        }

        .btn-dark {
            background: #4a3a2a;
            color: #eee;
        }

        .btn-cancel {
            background: #5a3a2a;
            color: #eee;
        }

        .code-display {
            background: #0a1208;
            border: 1px solid var(--border);
            color: var(--accent-light);
            border-radius: 10px;
            padding: 10px;
            font-size: 0.75em;
            word-break: break-all;
            margin: 12px 0;
            text-align: center;
            user-select: all;
            font-family: monospace;
        }

        .robin-arrow-container {
            display: inline-block;
            vertical-align: middle;
            margin-left: 6px;
            background: transparent !important;
        }

        .robin-arrow-container svg,
        .robin-arrow-container canvas {
            background: transparent !important;
        }

        .modal-input-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 500;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-input-overlay.active {
            display: flex;
        }

        .modal-input-dialog {
            background: var(--sheet-bg);
            border: 2px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            width: 85%;
            max-width: 320px;
            text-align: center;
        }

        .modal-input-dialog h3 {
            color: var(--accent-light);
            margin: 0 0 10px;
            font-size: 1em;
        }

        .modal-input-dialog input {
            width: 100%;
            margin-bottom: 10px;
        }

        .modal-input-dialog .modal-btns {
            display: flex;
            gap: 6px;
        }

        .modal-input-dialog .modal-btns button {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--accent), var(--accent));
            color: #1a1f0f;
        }

        .terms-btn {
            background: none;
            border: 1px solid var(--btn-border);
            color: var(--text-dim);
            padding: 3px 6px;
            border-radius: 6px;
            font-size: 0.55em;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .terms-btn:hover {
            background: var(--btn-hover);
            border-color: var(--accent);
        }

        #call-panel {
            background: var(--call-bg);
            border-top: 2px solid var(--border);
        }

        #call-status {
            color: var(--accent-light);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            border: 2px solid var(--border);
            transition: all 0.3s;
        }

        .toggle-slider:before {
            content: "";
            position: absolute;
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background: var(--text-dim);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .toggle-switch input:checked+.toggle-slider {
            background: #4caf50;
            border-color: #4caf50;
        }

        .toggle-switch input:checked+.toggle-slider:before {
            transform: translateX(20px);
            background: white;
        }

        .toggle-switch.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .typing-indicator {
            font-size: 0.65em;
            color: var(--text-dim);
            padding: 2px 10px;
            font-style: italic;
            min-height: 16px;
        }

        #pong-frame {
            display: none !important;
            position: fixed !important;
            top: -9999px !important;
            left: -9999px !important;
            width: 1px !important;
            height: 1px !important;
            opacity: 0 !important;
            pointer-events: none !important;
            visibility: hidden !important;

    <script>
        (function() {
            const P2PPONG_URL = 'https://stepweather-prog.github.io/P2PPong/';
            const isPWA = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone || false;
            const MAX_CHANNELS = isPWA ? 20 : 2;
            const MAX_NICK_LENGTH = 12;
            const MAX_FILE_SIZE = 50000;

            let pongFrame, chatBox, msgInput, robinText, profileAvatarSmall, nickLabel, bowContainer;
            let btnVoiceInput, btnVideoInput, voiceTimerOverlay, callPanel, callStatus, callAccept, callReject;
            let callSpeaker, callMic, callEnd, callTimerDisplay, callVolumeControls;
            let handshakeSecret = null,
                channels = {},
                activeChannelId = null;
            let toggleSoundState = !0,
                currentServer = 'render';
            let voiceRecorder = null,
                voiceChunks = [],
                voiceStream = null,
                voiceRecording = false;
            let voiceTimerInterval = null,
                voiceSeconds = 0;
            let callActive = false,
                videoCallActive = false,
                speakerOn = true,
                micOn = true;
            let peerConnections = {},
                localStreams = {},
                pendingIceCandidates = {};
            let audioPool = {};
            let robinDefaultText = 'Святые сокеты стабильны!',
                robinTimer = null;
            let archerAnimation, bowAnim, quiverAnim, currentArrowContainer;
            let callTimerInterval = null,
                callSeconds = 0;
            let typingTimeout;
            let profileSent = {};
            let autoConnectDone = false;

            function safeHtml(str) { if (!str) return ''; const div = document.createElement('div');
                div.textContent = str; return div.innerHTML }

            function updateClock() { const now = new Date();
                document.getElementById('header-clock').textContent = now.toLocaleTimeString([], { hour: '2-digit',
                    minute: '2-digit' }) }
            setInterval(updateClock, 1000);
            updateClock();

            function getAudio(filename) {
                if (!audioPool[filename]) { audioPool[filename] = new Audio('assets/sounds/' + filename);
                    audioPool[filename].volume = 0.5 }
                const a = audioPool[filename];
                a.currentTime = 0; return a
            }

            function playSound(filename) { if (toggleSoundState) { try { getAudio(filename).play().catch(() => {}) } catch (
                    e) {} } }

            function playCallStart() { getAudio('open.mp3').volume = 0.7;
                getAudio('open.mp3').play().catch(() => {}) }

            function playCallEnd() { getAudio('exet.mp3').volume = 0.7;
                getAudio('exet.mp3').play().catch(() => {}) }

            function updateRobinStatus(text, duration = 4000) {
                if (!robinText) return;
                clearTimeout(robinTimer);
                robinText.textContent = text;
                if (duration > 0) { robinTimer = setTimeout(() => { robinText.textContent = robinDefaultText }, duration) }
            }

            function playArcherAnimation() {
                if (!robinText) return;
                if (currentArrowContainer?.parentNode) currentArrowContainer.remove();
                if (archerAnimation) { archerAnimation.destroy();
                    archerAnimation = null }
                const wrapper = document.createElement('span');
                wrapper.className = 'robin-arrow-container';
                wrapper.style.cssText = 'width:120px;height:60px;display:inline-block;vertical-align:middle;';
                currentArrowContainer = wrapper;
                robinText.textContent = '';
                robinText.appendChild(wrapper);
                if (typeof lottie !== 'undefined') {
                    archerAnimation = lottie.loadAnimation({ container: wrapper, renderer: 'canvas', loop: false,
                        autoplay: true, path: 'assets/Archer.json' });
                    archerAnimation.addEventListener('complete', () => {
                        wrapper.remove();
                        currentArrowContainer = null;
                        archerAnimation = null;
                        robinText.textContent = robinDefaultText
                    })
                }
            }

            function playBowAnimation() {
                if (!bowContainer) return;
                if (bowAnim) { bowAnim.destroy();
                    bowAnim = null }
                bowContainer.style.display = 'block';
                if (typeof lottie !== 'undefined') {
                    bowAnim = lottie.loadAnimation({ container: bowContainer, renderer: 'canvas', loop: false,
                        autoplay: true, path: 'assets/bow.json' });
                    bowAnim.addEventListener('complete', () => { bowContainer.style.display = 'none';
                        bowAnim = null })
                }
            }

            function playQuiverAnimation() {
                if (!robinText) return;
                if (currentArrowContainer?.parentNode) currentArrowContainer.remove();
                if (quiverAnim) { quiverAnim.destroy();
                    quiverAnim = null }
                const wrapper = document.createElement('span');
                wrapper.className = 'robin-arrow-container';
                wrapper.style.cssText = 'width:120px;height:60px;display:inline-block;vertical-align:middle;';
                currentArrowContainer = wrapper;
                robinText.textContent = '✅ ';
                robinText.appendChild(wrapper);
                if (typeof lottie !== 'undefined') {
                    quiverAnim = lottie.loadAnimation({ container: wrapper, renderer: 'canvas', loop: false,
                        autoplay: true, path: 'assets/docking/animation.json' });
                    quiverAnim.addEventListener('complete', () => {
                        if (wrapper.parentNode) wrapper.remove();
                        currentArrowContainer = null;
                        quiverAnim = null;
                        robinText.textContent = robinDefaultText
                    })
                }
            }

            function saveChannelsState() {
                const state = {
                    channels: Object.entries(channels).map(([id, ch]) => ({ id, secret: ch.secret, role: ch.role })),
                    activeChannelId,
                    profileSent
                };
                localStorage.setItem('robinhood_channels_state', JSON.stringify(state))
            }

            function restoreChannelsState() {
                try {
                    const saved = JSON.parse(localStorage.getItem('robinhood_channels_state'));
                    if (saved) {
                        saved.channels.forEach(ch => { channels[ch.id] = { secret: ch.secret, role: ch.role } });
                        activeChannelId = saved.activeChannelId;
                        profileSent = saved.profileSent || {}
                    }
                } catch (e) { console.error('Restore error:', e) }
            }

            function getIceServers() { return [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }] }

            function sendToPong(msg) {
                if (!msg) return;
                if (activeChannelId && channels[activeChannelId]) {
                    msg.secret = channels[activeChannelId].secret;
                    msg.channelId = activeChannelId
                }
                if (handshakeSecret && msg.action === 'handshake') msg.handshake = handshakeSecret;
                pongFrame.contentWindow.postMessage(msg, '*')
            }

            function sendCallSignal(text) { sendToPong({ action: 'send', text, channelId: activeChannelId }) }

            function sendFileMessage(fileData) {
                if (!activeChannelId || !channels[activeChannelId]) return;
                if (fileData.size > MAX_FILE_SIZE) { updateRobinStatus('⚠ Файл слишком большой', 3000); return }
                sendToPong({ action: 'send', text: '__FILE__' + JSON.stringify(fileData), channelId: activeChannelId })
            }

            function appendMessage(sender, text, avatarSrc, timeStr, audioData, audioMime) {
                const msgId = 'msg_' + Date.now();
                const row = document.createElement('div');
                row.className = 'message-row';
                row.id = msgId;
                const finalTime = timeStr || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                if (audioData && audioMime && audioMime.startsWith('audio/')) {
                    row.innerHTML =
                        `<img src="${avatarSrc}" class="avatar"><div class="msg-body"><div class="msg-sender">${safeHtml(sender)}</div><audio controls src="data:${audioMime};base64,${audioData}" style="width:100%;max-width:250px;"></audio><div class="msg-status">${finalTime}</div></div>`
                } else {
                    const links = (text || '').match(/(https?:\/\/[^\s]+)/g) || [];
                    let displayText = safeHtml(text || '');
                    if (links.length > 0) { links.forEach(url => { displayText = displayText.replace(safeHtml(url),
                            `<a href="${url}" target="_blank">${safeHtml(url)}</a>`) }) }
                    row.innerHTML =
                        `<img src="${avatarSrc}" class="avatar"><div class="msg-body"><div class="msg-sender">${safeHtml(sender)}</div><div>${displayText}</div><div class="msg-status">${finalTime}</div></div>`
                }
                chatBox.insertBefore(row, document.getElementById('typing-indicator'));
                chatBox.scrollTop = chatBox.scrollHeight
            }

            function startVoiceTimer() { voiceSeconds = 0;
                voiceTimerOverlay.style.display = 'block';
                voiceTimerOverlay.textContent = '🎤 0:00';
                voiceTimerInterval = setInterval(() => { voiceSeconds++; const m = Math.floor(voiceSeconds / 60); const s = (
                        voiceSeconds % 60).toString().padStart(2, '0');
                    voiceTimerOverlay.textContent = '🎤 ' + m + ':' + s }, 1000) }

            function stopVoiceTimer() { if (voiceTimerInterval) { clearInterval(voiceTimerInterval);
                    voiceTimerInterval = null }
                voiceTimerOverlay.style.display = 'none' }

            function startVoiceRecording() {
                if (voiceRecorder?.state === 'recording') return;
                navigator.mediaDevices.getUserMedia({ audio: true }).then(st => {
                    voiceStream = st;
                    voiceRecorder = new MediaRecorder(st, { mimeType: 'audio/webm; codecs=opus',
                        audioBitsPerSecond: 16000 });
                    voiceChunks = [];
                    voiceRecorder.ondataavailable = e => voiceChunks.push(e.data);
                    voiceRecorder.onstop = () => {
                        const blob = new Blob(voiceChunks, { type: 'audio/webm' });
                        if (blob.size > 100 && blob.size < MAX_FILE_SIZE) {
                            const reader = new FileReader();
                            reader.onload = () => {
                                const b64 = reader.result.split(',')[1];
                                sendFileMessage({ name: 'voice_message.webm', size: blob.size, type: 'audio/webm',
                                    data: b64, mime: 'audio/webm' });
                                appendMessage('Вы', '🎤 Голосовое', profileAvatarSmall?.src ||
                                    'assets/avatars/001-.png', null, b64, 'audio/webm');
                                playCallStart()
                            };
                            reader.readAsDataURL(blob)
                        }
                        if (voiceStream) { voiceStream.getTracks().forEach(t => t.stop());
                            voiceStream = null }
                        voiceRecorder = null;
                        voiceRecording = false;
                        stopVoiceTimer();
                        btnVoiceInput.style.background = ''
                    };
                    voiceRecorder.start();
                    voiceRecording = true;
                    startVoiceTimer();
                    btnVoiceInput.style.background = '#f44336'
                }).catch(() => updateRobinStatus('❌ Нет микрофона'))
            }

            function stopVoiceRecording() { if (voiceRecorder?.state === 'recording') { voiceRecorder.stop() } }

            function toggleVoiceRecording() { if (voiceRecording) { stopVoiceRecording(); return }
                startVoiceRecording() }

            function startCallTimer() { callSeconds = 0;
                callTimerDisplay.style.display = '';
                callTimerDisplay.textContent = '00:00';
                callTimerInterval = setInterval(() => { callSeconds++; const m = Math.floor(callSeconds / 60).toString()
                        .padStart(2, '0'); const s = (callSeconds % 60).toString().padStart(2, '0');
                    callTimerDisplay.textContent = m + ':' + s }, 1000) }

            function stopCallTimer() { if (callTimerInterval) { clearInterval(callTimerInterval);
                    callTimerInterval = null }
                callTimerDisplay.style.display = 'none' }

            function setSpeakerVolume(val) {
                Object.values(localStreams).forEach(stream => {
                    stream.getAudioTracks().forEach(track => {
                        if (track.kind === 'audio') track.enabled = val > 0
                    })
                })
            }

            function setMicVolume(val) {
                Object.values(localStreams).forEach(stream => {
                    stream.getAudioTracks().forEach(track => {
                        if (track.kind === 'audio') track.enabled = val > 0
                    })
                })
            }

            async function getMediaStream(enableVideo = false) {
                try { return await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true,
                        noiseSuppression: true, autoGainControl: true }, video: enableVideo }) } catch (e) {
                    updateRobinStatus('❌ Нет доступа'); return null }
            }

            function createPeerConn(stream, callId) {
                const pc = new RTCPeerConnection({ iceServers: getIceServers(), iceTransportPolicy: 'all' });
                if (stream) stream.getTracks().forEach(t => pc.addTrack(t, stream));
                pc.ontrack = e => { if (e.streams && e.streams[0]) { const a = new Audio();
                        a.srcObject = e.streams[0];
                        a.play().catch(() => {}) } };
                pc.onicecandidate = e => { if (e.candidate) sendCallSignal('__ICE__' + JSON.stringify({ candidate: e
                            .candidate, callId })) };
                pc.oniceconnectionstatechange = () => { if (pc.iceConnectionState === 'connected' || pc
                        .iceConnectionState === 'completed') { if (callStatus) callStatus.textContent =
                            '✅ Разговор' } if (pc.iceConnectionState === 'disconnected' || pc
                        .iceConnectionState === 'failed') { cleanupPeer(callId); if (callId === 'main')
                        endCall() } };
                return pc
            }

            function cleanupPeer(callId) { if (peerConnections[callId]) { peerConnections[callId].close(); delete peerConnections[
                        callId] } if (localStreams[callId]) { localStreams[callId].getTracks().forEach(t => t.stop());
                    delete localStreams[callId] } delete pendingIceCandidates[callId] }

            function flushIceCandidates(callId = 'main') { const pc = peerConnections[callId]; if (!pc || !pc
                    .remoteDescription || !pc.remoteDescription.type) return; const candidates =
                    pendingIceCandidates[callId] || [];
                for (const c of candidates) { try { pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {}) } catch (
                    e) {} } delete pendingIceCandidates[callId] }

            function endCall() { callActive = false;
                videoCallActive = false;
                stopCallTimer();
                playCallEnd();
                sendCallSignal('__HANGUP__');
                Object.keys(peerConnections).forEach(k => cleanupPeer(k));
                Object.keys(localStreams).forEach(k => { if (localStreams[k]) localStreams[k].getTracks().forEach(t => t
                        .stop()) });
                localStreams = {};
                peerConnections = {};
                pendingIceCandidates = {}; if (callPanel) callPanel.style.display = 'none'; if (callAccept)
                    callAccept.style.display = 'inline-block'; if (callReject) callReject.style.display =
                    'inline-block'; if (callEnd) callEnd.style.display = 'none'; if (callSpeaker) callSpeaker.style
                    .display = 'none'; if (callMic) callMic.style.display = 'none'; if (callVolumeControls)
                    callVolumeControls.style.display = 'none';
                updateRobinStatus('📞 Звонок завершён') }

            function toggleSpeaker() { speakerOn = !speakerOn; if (callSpeaker) callSpeaker.textContent = speakerOn ?
                    '🔊' : '🔇' }

            function toggleMic() { micOn = !micOn; const stream = localStreams['main']; if (stream) { stream
                        .getAudioTracks().forEach(t => t.enabled = micOn); if (callMic) callMic.textContent = micOn ?
                        '🎤' : '🚫' } }

            async function startCall(enableVideo = false) { if (callActive) return; if (!activeChannelId || !channels[
                    activeChannelId]) { updateRobinStatus('🏹 Сначала стрела!', 3000); return }
                videoCallActive = enableVideo; const stream = await getMediaStream(enableVideo); if (!stream) return;
                localStreams['main'] = stream; if (callPanel) callPanel.style.display = 'block'; if (callStatus)
                    callStatus.textContent = enableVideo ? '📹 Видеовызов...' : '📞 Вызов...'; if (callAccept)
                    callAccept.style.display = 'none'; if (callReject) callReject.style.display = 'none'; if (callEnd)
                    callEnd.style.display = 'inline-block'; if (callSpeaker) callSpeaker.style.display =
                    'inline-block'; if (callMic) callMic.style.display = 'inline-block'; if (callVolumeControls)
                    callVolumeControls.style.display = 'block';
                playCallStart(); const pc = createPeerConn(stream, 'main');
                peerConnections['main'] = pc; const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
                sendCallSignal('__OFFER__' + JSON.stringify({ sdp: offer, video: enableVideo }));
                callActive = true }

            function initApp() {
                pongFrame = document.getElementById('pong-frame');
                chatBox = document.getElementById('chat-box');
                msgInput = document.getElementById('msg-input');
                robinText = document.getElementById('robin-text');
                profileAvatarSmall = document.getElementById('profile-avatar-small');
                nickLabel = document.getElementById('nick-label');
                bowContainer = document.getElementById('bow-above-send');
                btnVoiceInput = document.getElementById('btn-voice-input');
                btnVideoInput = document.getElementById('btn-video-input');
                voiceTimerOverlay = document.getElementById('voice-timer-overlay');
                callPanel = document.getElementById('call-panel');
                callStatus = document.getElementById('call-status');
                callAccept = document.getElementById('call-accept');
                callReject = document.getElementById('call-reject');
                callSpeaker = document.getElementById('call-speaker');
                callMic = document.getElementById('call-mic');
                callEnd = document.getElementById('call-end');
                callTimerDisplay = document.getElementById('call-timer-display');
                callVolumeControls = document.getElementById('call-volume-controls');
                const toggleSound = document.getElementById('toggle-sound');
                const toggleServer = document.getElementById('toggle-server');
                const serverLabel = document.getElementById('server-label');

                restoreChannelsState();
                const savedServer = localStorage.getItem('robinhood_server');
                if (savedServer) currentServer = savedServer;
                if (serverLabel) serverLabel.textContent = currentServer === 'workers' ? 'Workers' : 'Render';
                if (toggleServer) toggleServer.checked = currentServer === 'workers';

                const savedSound = localStorage.getItem('robinhood_sound');
                if (savedSound !== null) toggleSoundState = savedSound === 'true';
                if (toggleSound) toggleSound.checked = toggleSoundState;

                pongFrame.src = P2PPONG_URL + '?v=' + Date.now();
                pongFrame.style.display = 'none';

                const savedAvatar = localStorage.getItem('robinhood_avatar');
                if (savedAvatar && profileAvatarSmall) { profileAvatarSmall.src = savedAvatar;
                    document.getElementById('robin-avatar').src = savedAvatar }
                const savedNick = localStorage.getItem('robinhood_nick');
                if (savedNick && nickLabel) nickLabel.textContent = savedNick.substring(0, MAX_NICK_LENGTH);

                setupEventHandlers();
                updateRobinStatus('🏹 Ждём колчан... (' + Object.keys(channels).length + '/' + MAX_CHANNELS + ') [' + (
                    currentServer === 'workers' ? 'Workers' : 'Render') + ']', 0)
            }

            function setupEventHandlers() {
                window.addEventListener('message', (event) => {
                    if (event.source !== pongFrame.contentWindow) return;
                    const data = event.data;
                    switch (data.type) {
                        case 'pong-ready':
                            handshakeSecret = data.handshake;
                            sendToPong({ action: 'handshake' });
                            break;
                        case 'session-created':
                            document.getElementById('ref-link-display').textContent = data.fullLink;
                            document.getElementById('ref-modal').classList.add('active');
                            navigator.clipboard.writeText(data.fullLink).catch(() => {});
                            break;
                        case 'channel-open':
                            channels[data.channelId] = { secret: data.secret, role: data.role };
                            if (!activeChannelId) activeChannelId = data.channelId;
                            updateRobinStatus('✅ Колчан открыт!', 3000);
                            const contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                            if (!contacts.find(c => c.pubkey === data.channelId)) {
                                contacts.push({ pubkey: data.channelId, name: 'Лучник', avatar: 'assets/avatars/001-.png',
                                    status: 'confirmed' });
                                localStorage.setItem('robinhood_contacts', JSON.stringify(contacts))
                            }
                            document.getElementById('ref-modal')?.classList.remove('active');
                            saveChannelsState();
                            setTimeout(() => { playQuiverAnimation() }, 300);
                            break;
                        case 'message':
                            if (!data.channelId || !data.text || !channels[data.channelId]) break;
                            if (data.text === '__TYPING__') {
                                document.getElementById('typing-indicator').textContent = '✍️ Лучник...';
                                clearTimeout(typingTimeout);
                                typingTimeout = setTimeout(() => { document.getElementById(
                                        'typing-indicator').textContent = '' }, 2500);
                                return
                            }
                            if (data.text.startsWith('__OFFER__')) {
                                const parsed = JSON.parse(data.text.replace('__OFFER__', ''));
                                videoCallActive = parsed.video || false; if (callPanel) callPanel.style.display =
                                    'block'; if (callStatus) callStatus.textContent = videoCallActive ?
                                    '📹 Входящий...' : '📞 Входящий...'; if (callAccept) callAccept.style.display =
                                    'inline-block'; if (callReject) callReject.style.display = 'inline-block';
                                callAccept.onclick = async () => { if (callAccept) callAccept.style.display =
                                        'none'; if (callReject) callReject.style.display = 'none'; if (callEnd)
                                        callEnd.style.display = 'inline-block'; if (callSpeaker) callSpeaker.style
                                        .display = 'inline-block'; if (callMic) callMic.style.display =
                                        'inline-block'; if (callVolumeControls) callVolumeControls.style.display =
                                        'block';
                                    playCallStart();
                                    startCallTimer(); const stream = await getMediaStream(videoCallActive); if (
                                        !stream) { if (callPanel) callPanel.style.display = 'none'; return }
                                    localStreams['main'] = stream; const pc = createPeerConn(stream, 'main');
                                    peerConnections['main'] = pc; await pc.setRemoteDescription(
                                        new RTCSessionDescription(parsed.sdp || parsed)); const answer = await pc
                                        .createAnswer(); await pc.setLocalDescription(answer);
                                    sendCallSignal('__ANSWER__' + JSON.stringify(answer));
                                    callActive = true;
                                    flushIceCandidates('main') };
                                callReject.onclick = () => { sendCallSignal('__HANGUP__'); if (callPanel)
                                        callPanel.style.display = 'none' };
                                return
                            }
                            if (data.text.startsWith('__ANSWER__')) {
                                startCallTimer(); const answer = JSON.parse(data.text.replace('__ANSWER__', ''));
                                if (peerConnections['main']) { peerConnections['main'].setRemoteDescription(
                                        new RTCSessionDescription(answer)).then(() => flushIceCandidates(
                                        'main')) }
                                return
                            }
                            if (data.text.startsWith('__ICE__')) { try { const iceData = JSON.parse(data.text.replace(
                                        '__ICE__', '')); const callId = iceData.callId || 'main'; if (!
                                        pendingIceCandidates[callId]) pendingIceCandidates[callId] = [];
                                    pendingIceCandidates[callId].push(iceData.candidate || iceData);
                                    flushIceCandidates(callId) } catch (e) {} return }
                            if (data.text === '__HANGUP__') { if (callActive) { endCall() } else { if (
                                    callPanel) callPanel.style.display = 'none' } return }
                            if (data.text.startsWith('__FILE__')) { try { const fd = JSON.parse(data.text.replace(
                                    '__FILE__', '')); if (fd.mime && fd.mime.startsWith('audio/')) {
                                    appendMessage('🎤 Голосовое', '', profileAvatarSmall?.src ||
                                        'assets/avatars/001-.png', null, fd.data, fd.mime) } } catch (e) {} return }
                            activeChannelId = data.channelId; const contactsArr = JSON.parse(localStorage.getItem(
                                'robinhood_contacts') || '[]'); const contact = contactsArr.find(c => c.pubkey ===
                                data.channelId);
                            appendMessage(contact?.name || 'Друг', data.text, contact?.avatar ||
                                'assets/avatars/001-.png'); if (toggleSoundState) playSound('bow_shot.mp3');
                            break;
                        case 'error':
                            updateRobinStatus('⚠ ' + data.text, 4000);
                            break
                    }
                });

                document.getElementById('send-btn')?.addEventListener('click', sendMessageHandler);
                msgInput?.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessageHandler() });
                document.getElementById('btn-voice-input')?.addEventListener('click', toggleVoiceRecording);
                document.getElementById('btn-arrow')?.addEventListener('click', () => {
                    if (Object.keys(channels).length >= MAX_CHANNELS) { updateRobinStatus('⚠ Лимит каналов',
                            5000); return }
                    sendToPong({ action: 'create' })
                });
                document.getElementById('cancel-arrow-btn')?.addEventListener('click', () => { sendToPong({ action: 'cancel-create' });
                    document.getElementById('ref-modal')?.classList.remove('active') });
                document.getElementById('btn-call')?.addEventListener('click', () => startCall(false));
                document.getElementById('btn-video')?.addEventListener('click', () => startCall(true));
                if (callReject) callReject.addEventListener('click', () => { sendCallSignal('__HANGUP__'); if (
                        callPanel) callPanel.style.display = 'none' });
                if (callEnd) callEnd.addEventListener('click', endCall);
                if (callSpeaker) callSpeaker.addEventListener('click', toggleSpeaker);
                if (callMic) callMic.addEventListener('click', toggleMic);
                if (document.getElementById('toggle-sound')) document.getElementById('toggle-sound').addEventListener(
                    'change', function() { toggleSoundState = this.checked;
                        localStorage.setItem('robinhood_sound', toggleSoundState) });
                if (document.getElementById('toggle-server')) document.getElementById('toggle-server').addEventListener(
                    'change', function() { currentServer = this.checked ? 'workers' : 'render';
                        localStorage.setItem('robinhood_server', currentServer);
                        document.getElementById('server-label').textContent = currentServer === 'workers' ?
                        'Workers' : 'Render' });
                document.getElementById('nick-label')?.addEventListener('click', async () => { const newNick = prompt(
                        'Новый ник:', nickLabel.textContent); if (newNick) { const nick = newNick.substring(0,
                            MAX_NICK_LENGTH);
                        nickLabel.textContent = nick;
                        localStorage.setItem('robinhood_nick', nick) } });
                document.getElementById('btn-avatar')?.addEventListener('click', () => {
                    document.getElementById('avatar-selector').classList.toggle('show');
                    document.getElementById('overlay').classList.toggle('show')
                });
                document.getElementById('overlay')?.addEventListener('click', () => {
                    document.querySelectorAll('.bottom-sheet.open,.avatar-selector.show').forEach(el => el
                        .classList.remove('open', 'show'));
                    document.getElementById('overlay').classList.remove('show')
                });
                document.getElementById('btn-settings')?.addEventListener('click', () => {
                    document.getElementById('settings-sheet').classList.toggle('open');
                    document.getElementById('overlay').classList.toggle('show')
                });
                document.getElementById('settings-close')?.addEventListener('click', () => {
                    document.getElementById('settings-sheet').classList.remove('open');
                    document.getElementById('overlay').classList.remove('show')
                });
                document.getElementById('setting-contacts')?.addEventListener('click', () => {
                    document.getElementById('settings-sheet').classList.remove('open');
                    loadContacts();
                    document.getElementById('contacts-sheet').classList.add('open')
                });
                document.getElementById('contacts-close')?.addEventListener('click', () => {
                    document.getElementById('contacts-sheet').classList.remove('open');
                    document.getElementById('overlay').classList.remove('show')
                });
                document.getElementById('btn-clear')?.addEventListener('click', () => {
                    chatBox.querySelectorAll('.message-row:not(#robin-row .message-row)').forEach(m => m.remove());
                    localStorage.removeItem('robinhood_contacts');
                    localStorage.removeItem('robinhood_channels_state');
                    channels = {};
                    activeChannelId = null;
                    profileSent = {};
                    updateRobinStatus('🚬 Всё сжёг!', 8000)
                });
                document.getElementById('close-ref-modal-btn')?.addEventListener('click', () => document.getElementById(
                    'ref-modal').classList.remove('active'));
            }

            async function sendMessageHandler() { const text = msgInput.value.trim(); if (!text) return; if (!activeChannelId ||
                    !channels[activeChannelId]) { updateRobinStatus('❌ Нет колчана', 2500); return } if (!profileSent[
                    activeChannelId]) { profileSent[activeChannelId] = true;
                    sendToPong({ action: 'send', text: '__PROFILE__' + JSON.stringify({ nick: nickLabel?.textContent ||
                                'Лучник', avatar: profileAvatarSmall?.src || 'assets/avatars/001-.png' }),
                        channelId: activeChannelId }) }
                sendToPong({ action: 'send', text, channelId: activeChannelId });
                appendMessage('Вы', text, profileAvatarSmall?.src || 'assets/avatars/001-.png');
                msgInput.value = '';
                playArcherAnimation();
                playBowAnimation(); if (toggleSoundState) playSound('shot.mp3') }

            const avatars = ['assets/avatars/001-.png', 'assets/avatars/002--1.png', 'assets/avatars/003-icon-8033085.png'];

            function loadAvatars() { const list = document.getElementById('avatar-list');
                list.innerHTML = '';
                avatars.forEach(src => { const img = document.createElement('img');
                    img.src = src;
                    img.className = 'avatar-option';
                    img.addEventListener('click', () => { if (profileAvatarSmall) profileAvatarSmall.src = src;
                        document.getElementById('robin-avatar').src = src;
                        localStorage.setItem('robinhood_avatar', src);
                        document.getElementById('avatar-selector').classList.remove('show');
                        document.getElementById('overlay').classList.remove('show') });
                    list.appendChild(img) }) }

            function loadContacts() { const list = document.getElementById('contacts-list-inner'); const contacts = JSON.parse(
                    localStorage.getItem('robinhood_contacts') || '[]').filter(c => c.status === 'confirmed');
                list.innerHTML = ''; if (contacts.length) { contacts.forEach(c => { const div = document.createElement(
                        'div');
                    div.className = 'contact-item';
                    div.innerHTML =
                        `<div class="contact-info"><img src="${c.avatar||'assets/avatars/001-.png'}" class="contact-avatar"><span class="contact-name">${safeHtml(c.name)}</span></div>`;
                    div.addEventListener('click', () => { activeChannelId = c.pubkey; if (channels[c.pubkey]) {
                            document.getElementById('contacts-sheet').classList.remove('open');
                            document.getElementById('overlay').classList.remove('show');
                            updateRobinStatus('💬 ' + c.name, 3000) } else { updateRobinStatus(
                                '⚠ Канал не активен', 3000) } });
                    list.appendChild(div) }) } else { updateRobinStatus('🏹 Лучников нет!', 3000) } }

            document.getElementById('avatar-list')?.addEventListener('click', loadAvatars);
            document.getElementById('setting-contacts')?.addEventListener('click', () => {
                loadContacts();
                document.getElementById('contacts-sheet').classList.add('open');
                document.getElementById('overlay').classList.add('show')
            });

            initApp();
        })();
    </script>
</body>
</html>
