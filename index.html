    <style>

        [data-theme="sunset"] { --bg-primary: #2a1a1f; --bg-secondary: #1a0a0f; --accent: #e85d3a; --accent-light: #f0a080; --text: #f0d8c0; --text-bright: #fae8d0; --text-dim: #c08060; --border: #e85d3a; --robin-accent: #f0a080; --seeding-color: #e85d3a; --msg-bg: rgba(40,20,15,0.85); }

        [data-theme="night-ember"] { --bg-primary: #0f0f0f; --bg-secondary: #080808; --accent: #e87030; --accent-light: #f09060; --text: #d0d0d0; --text-bright: #e8e8e8; --text-dim: #907060; --border: #e87030; --robin-accent: #f09060; --seeding-color: #e87030; --msg-bg: rgba(20,15,10,0.85); }
        [data-theme="morning-mist"] { --bg-primary: #d8d5c8; --bg-secondary: #c5c1b0; --accent: #4a6b3a; --accent-light: #6b8f55; --text: #2a2a1f; --text-bright: #1a1a0f; --text-dim: #6a6a50; --border: #8a9b70; --robin-accent: #5a7b4a; --seeding-color: #4a6b3a; --msg-bg: rgba(220,215,200,0.85); }

        .btn-round:hover { background:var(--btn-hover); box-shadow:0 0 30px var(--accent-glow); transform:scale(1.08); }
        .btn-call { border-color:var(--seeding-color); background:rgba(76,175,80,0.2); }

        .btn-main:hover { background:var(--btn-hover); box-shadow:0 0 35px var(--accent-glow); transform:scale(1.08); }
        .btn-main:active { transform:scale(0.92); }

        .hidden { display:none!important; }
        .controls-row { display:flex; gap:18px; align-items:center; justify-content:center; }

        .bottom-sheet, .avatar-selector { position:fixed; top:0; left:0; width:min(85%, 320px); height:100%; background:var(--sheet-bg); border-right:2px solid var(--border); z-index:200; transform:translateX(-100%); transition:transform 0.3s ease; overflow-y:auto; backdrop-filter:blur(16px); }
        .bottom-sheet.open, .avatar-selector.show { transform:translateX(0); }
        .bottom-sheet-header { padding:14px 14px 8px; font-weight:bold; color:var(--accent-light); border-bottom:1px solid var(--border); margin-bottom:4px; font-size:0.9em; display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.2); }
        .bottom-sheet-close { background:none; border:none; color:var(--accent-light); font-size:20px; cursor:pointer; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
        .contact-item { display:flex; align-items:center; justify-content:space-between; padding:10px; margin:4px 0; border-radius:10px; background:rgba(255,245,215,0.05); border:1px solid var(--btn-border); cursor:pointer; color:var(--text); }
        .contact-info { display:flex; align-items:center; gap:8px; flex:1; }

        .avatar-selector { padding:14px; } .avatar-selector p { color:var(--accent-light); margin:0 0 10px; font-size:0.9em; text-align:center; }
        #avatar-list { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }
        .avatar-option { width:46px; height:46px; border-radius:50%; object-fit:cover; margin:2px; cursor:pointer; border:2px solid transparent; transition:all 0.2s; }
        .avatar-option:hover { border-color:var(--accent-light); transform:scale(1.1); }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); display:none; z-index:190; }
        .overlay.show { display:block; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:300; justify-content:center; align-items:center; }
        .modal-overlay.active { display:flex; }
        .modal-dialog { background:var(--sheet-bg); padding:18px; border-radius:18px; width:85%; max-width:360px; text-align:center; border:2px solid var(--border); }
        .modal-dialog h3 { color:var(--accent-light); margin:0 0 10px; }
        .modal-dialog input { width:100%; padding:8px; margin-bottom:8px; background:var(--input-bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; }
        .modal-dialog button { width:100%; padding:10px; margin-top:6px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
        .btn-primary { background:linear-gradient(135deg, var(--accent), #b8903a); color:#1a1f0f; }
        .btn-dark { background:#4a3a2a; color:#eee; }
        .code-display { background:#0a1208; border:1px solid var(--border); color:var(--accent-light); border-radius:8px; padding:8px; font-size:0.65em; word-break:break-all; margin:10px 0; font-family:monospace; user-select:all; }
        .toggle-switch { position:relative; display:inline-block; width:40px; height:22px; flex-shrink:0; }
        .toggle-switch input { opacity:0; width:0; height:0; }
        .toggle-slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:rgba(255,255,255,0.1); border-radius:22px; border:2px solid var(--border); }
        .toggle-slider:before { content:""; position:absolute; height:14px; width:14px; left:2px; bottom:2px; background:var(--text-dim); border-radius:50%; }
        .toggle-switch input:checked + .toggle-slider { background:var(--seeding-color); border-color:var(--seeding-color); }
        .toggle-switch input:checked + .toggle-slider:before { transform:translateX(18px); background:white; }
        .chat-msg { background:var(--msg-bg); border-radius:10px; padding:6px 10px; max-width:85%; font-size:0.75em; border-left:2px solid var(--accent); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
        .chat-msg.self { border-left-color:var(--seeding-color); align-self:flex-end; }
        #recent-msgs { display:none; max-height:120px; overflow-y:auto; width:90%; flex-direction:column; gap:4px; padding:0 10px; }
        #verify-code-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; max-width:240px; margin:12px auto; }
        #verify-code-grid button { width:65px; height:65px; font-size:1.8em; border-radius:50%; border:2px solid var(--border); background:var(--btn-bg); color:var(--text); cursor:pointer; }
        #verify-code-grid button:active { background:var(--accent); }
        .verify-code-display { font-size:2em; font-family:monospace; letter-spacing:8px; margin:12px 0; color:var(--accent-light); min-height:40px; }
        .main-input-row { display:flex; gap:6px; width:90%; max-width:320px; }
        .main-input-row input { flex:1; padding:8px 12px; background:var(--input-bg); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:12px; font-family:monospace; outline:none; }
        .main-input-row button { padding:8px 14px; border-radius:10px; border:none; background:linear-gradient(135deg,#6b7db3,#4a5a8a); color:white; cursor:pointer; font-weight:bold; white-space:nowrap; font-size:12px; }
    </style>
</head>
<body>
<div id="app-container" style="display:flex;flex-direction:column;height:100%;">
<div class="header">
    <div class="header-top"><span class="header-title">🏹 RobinCall v6.1</span><div class="header-status"><span class="connection-dot checking" id="connection-dot"></span><span id="connection-label">Проверка...</span></div></div>
    <div class="header-btns">
        <div class="header-btn" id="btn-avatar-menu"><img src="001-.png" class="header-avatar" id="profile-avatar-small" alt="avatar"></div>
        <div class="header-btn" id="btn-arrow"><span>🏹</span></div>
        <div class="header-btn" id="btn-call-main"><span>📞</span></div>
        <div class="header-btn" id="btn-video-circle"><span>📹</span></div>
        <div class="header-btn" id="btn-voice"><span>🎤</span></div>
        <div class="header-btn" id="btn-settings"><span>⚙️</span></div>
    </div>
    <div class="header-labels"><span class="header-label" id="nick-label">Ник</span><span class="header-label">Стрела</span><span class="header-label">Звонок</span><span class="header-label">Кружок</span><span class="header-label">Голос</span><span class="header-label" id="settings-label">Опции</span></div>
</div>

<div class="main-area">
    <div class="robin-row"><img src="001-.png" class="robin-avatar" id="robin-avatar" alt="Robin" onerror="this.src='001-.png';"><div><div style="font-weight:900;font-size:0.85em;">Robin Hood</div><div class="robin-text" id="robin-message">Колчан готов!</div></div></div>
    <div class="main-input-row" id="main-join-row">
        <input type="text" id="main-join-input" placeholder="Beacon ID друга..." autocomplete="off">
        <button id="btn-main-join">🔗</button>
    </div>
    <div class="call-timer hidden" id="call-timer">00:00</div>
    <div id="recent-msgs"></div>
    <button class="btn-main" id="btn-main-action"><span>🏹</span></button>
    <div class="controls-row hidden" id="incoming-row"><button class="btn-round btn-call" id="btn-answer">📞</button><button class="btn-round btn-hangup" id="btn-reject">✕</button></div>
    <div class="controls-row hidden" id="active-row"><button class="btn-round btn-hangup" id="btn-end-call">✕</button></div>
    <div class="controls-row hidden" id="audio-controls" style="gap:10px;"><button class="header-btn" id="btn-mic" style="width:44px;height:44px;">🎤</button><button class="header-btn" id="btn-speaker" style="width:44px;height:44px;">🔊</button></div>
</div>

<div class="voice-timer-overlay" id="voice-timer-overlay">🎤 0:00</div>
<div class="video-circle-player" id="video-circle-player"><button class="video-circle-close" id="video-circle-close">✕</button><video id="video-circle-video" controls autoplay playsinline></video></div>

<div class="modal-overlay" id="craft-modal"><div class="modal-dialog">
    <h3>🏹 Колчан</h3>
    <button class="btn-primary" id="btn-craft-arrow">🏹 Крафт стрелы</button>
    <div class="code-display" id="craft-beacon-display" style="display:none;"></div>
    <div class="code-display" id="craft-code-display" style="display:none;font-size:1.5em;letter-spacing:6px;"></div>
    <button class="btn-dark" id="btn-copy-link" style="display:none;">📋 Копировать</button>
    <hr style="border-color:var(--border);margin:12px 0;">
    <div style="color:var(--text-dim);margin-bottom:6px;">Стрела друга:</div>
    <input type="text" id="join-input" placeholder="Beacon ID или ссылка" autocomplete="off" style="width:100%;padding:8px;margin:6px 0;background:var(--input-bg);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:12px;font-family:monospace;">
    <button class="btn-primary" id="btn-join" style="background:linear-gradient(135deg,#6b7db3,#4a5a8a);">🏹 Натянуть тетиву</button>
    <button class="btn-dark" id="btn-close-craft" style="margin-top:8px;">Закрыть</button>
</div></div>

<div class="modal-overlay" id="verify-modal"><div class="modal-dialog">
    <h3>🔐 Подтверждение</h3>
    <div style="color:var(--text-dim);margin-bottom:12px;">Введи 7-значный код</div>
    <div style="color:var(--danger);font-size:0.7em;margin-bottom:12px;">⚠️ Сравни код с собеседником голосом</div>
    <div class="verify-code-display" id="verify-code-display">_______</div>
    <div id="verify-code-grid"></div>
    <div style="color:var(--danger);font-size:0.7em;margin-top:6px;display:none;" id="verify-error"></div>
    <button class="btn-dark" id="btn-verify-reset" style="width:auto;display:inline-block;margin:8px auto;">↩ Сбросить</button>
    <button class="btn-primary" id="btn-verify-confirm">✅ Подтвердить</button>
    <button class="btn-dark" id="btn-close-verify">Закрыть</button>
</div></div>

<div class="modal-overlay" id="nick-modal"><div class="modal-dialog"><h3>🏷 Сменить ник</h3><input type="text" id="nick-input" placeholder="Ваш ник (макс. 12 символов)" maxlength="12" autocomplete="off"><div style="display:flex;gap:6px;"><button class="btn-dark" id="btn-nick-cancel">Отмена</button><button class="btn-primary" id="btn-nick-save">✓ Сохранить</button></div></div></div>

<div class="bottom-sheet" id="settings-sheet"><div class="bottom-sheet-header"><span>⚙️ Опции</span><button class="bottom-sheet-close" id="settings-close">✕</button></div><div class="bottom-sheet-list">
    <div class="contact-item" id="setting-sound"><div class="contact-info"><span>🔔</span><span class="contact-name">Звук</span></div><label class="toggle-switch"><input type="checkbox" id="toggle-sound" checked><span class="toggle-slider"></span></label></div>
    <div class="contact-item" id="setting-theme"><div class="contact-info"><span id="theme-icon">🌲</span><span class="contact-name">Тема</span></div><span id="theme-name">Лес</span></div>
    <div class="contact-item" id="setting-clear"><div class="contact-info"><span>🚬</span><span class="contact-name">Сбросить всё</span></div><span style="color:var(--danger);">⚠</span></div>
</div></div>

<div class="avatar-selector" id="avatar-selector"><p>🏹 Выбери лучника 🏹</p><div id="avatar-list"></div></div>
<div class="overlay" id="overlay"></div>
</div>

<script>
(function(){
const MAX_VOICE_DURATION=60;
let activeChannelId=null,pc=null,stream=null,callActive=!1,callStartTime=null,callTimerInterval=null;
let micOn=!0,incomingOffer=null,toggleSoundState=!0;
let voiceRecorder=null,voiceChunks=[],voiceStream=null,voiceRecording=!1,voiceSeconds=0,voiceTimerInterval=null;
let videoCircleRecorder=null,videoCircleChunks=[],audioPool={};
let verifyCode='',verifyInput='';

function $(s){return document.getElementById(s)}
function rMsg(m,t=0){const rm=$('robin-message');if(rm){rm.textContent=m;if(t>0)setTimeout(()=>{if(rm.textContent===m)rm.textContent='Колчан готов!'},t)}}
function conn(s){const cd=$('connection-dot'),cl=$('connection-label');if(cd)cd.className='connection-dot '+s;if(cl)cl.textContent=s==='online'?'Готов':s==='offline'?'Нет связи':'Проверка...'}
function playSound(f){if(!toggleSoundState)return;if(!audioPool[f]){audioPool[f]=new Audio('sounds/'+f);audioPool[f].volume=0.5}const a=audioPool[f];a.currentTime=0;a.play().catch(()=>{})}

function ui(s){
    $('btn-main-action')?.classList.remove('hidden','ringing');$('incoming-row')?.classList.add('hidden');
    $('active-row')?.classList.add('hidden');$('audio-controls')?.classList.add('hidden');
    if(s==='idle'){$('btn-main-action')?.classList.remove('hidden');$('btn-main-action').querySelector('span').textContent='🏹'}
    else if(s==='ready'){$('btn-main-action')?.classList.remove('hidden');$('btn-main-action').querySelector('span').textContent='📞'}
    else if(s==='active'){$('active-row')?.classList.remove('hidden');$('audio-controls')?.classList.remove('hidden')}
    else if(s==='incoming'){$('incoming-row')?.classList.remove('hidden');$('btn-main-action')?.classList.add('ringing','hidden')}
}

async function getMediaStream(){try{return await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:!0,noiseSuppression:!0}})}catch(e){rMsg('❌ Нет микрофона',4000);return null}}
function createPC(){if(pc){pc.close();pc=null}pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});if(stream)stream.getTracks().forEach(t=>pc.addTrack(t,stream));pc.ontrack=e=>{if(e.streams[0]){const a=new Audio();a.srcObject=e.streams[0];a.play().catch(()=>{})}};pc.onicecandidate=e=>{if(e.candidate&&activeChannelId)P2PPong.sendMessage(activeChannelId,JSON.stringify({webrtc:'webrtc-ice',sdp:JSON.stringify(e.candidate)}))};pc.onconnectionstatechange=()=>{if(pc.connectionState==='connected'){callActive=!0;callStartTime=Date.now();startCallTimer();ui('active');playSound('open.mp3')}if(pc.connectionState==='disconnected'||pc.connectionState==='failed')hang(!1)};return pc}
function startCallTimer(){$('call-timer').classList.remove('hidden');callTimerInterval=setInterval(()=>{const e=Math.floor((Date.now()-callStartTime)/1000);$('call-timer').textContent=Math.floor(e/60).toString().padStart(2,'0')+':'+(e%60).toString().padStart(2,'0')},1000)}
function stopCallTimer(){if(callTimerInterval)clearInterval(callTimerInterval);$('call-timer').classList.add('hidden')}
async function startCall(){if(callActive||!activeChannelId){rMsg('⚠ Сначала подключитесь',4000);return}ui('calling');const s=await getMediaStream();if(!s){ui('ready');return}stream=s;createPC();try{const o=await pc.createOffer();await pc.setLocalDescription(o);P2PPong.sendMessage(activeChannelId,JSON.stringify({webrtc:'webrtc-offer',sdp:JSON.stringify(o)}))}catch(e){hang(!0)}}
async function acceptCall(){if(!incomingOffer)return;ui('active');const s=await getMediaStream();if(!s){ui('ready');return}stream=s;createPC();try{await pc.setRemoteDescription(new RTCSessionDescription(incomingOffer));const a=await pc.createAnswer();await pc.setLocalDescription(a);P2PPong.sendMessage(activeChannelId,JSON.stringify({webrtc:'webrtc-answer',sdp:JSON.stringify(a)}));incomingOffer=null;callActive=!0;callStartTime=Date.now();startCallTimer();playSound('open.mp3')}catch(e){hang(!0)}}
function hang(sig=!0){callActive=!1;stopCallTimer();if(sig&&activeChannelId)P2PPong.sendMessage(activeChannelId,JSON.stringify({webrtc:'webrtc-hangup',sdp:''}));if(pc){pc.close();pc=null}if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}incomingOffer=null;ui('ready');playSound('exet.mp3')}
function startVoiceTimer(){voiceSeconds=0;$('voice-timer-overlay').style.display='block';voiceTimerInterval=setInterval(()=>{voiceSeconds++;const m=Math.floor(voiceSeconds/60),s=(voiceSeconds%60).toString().padStart(2,'0');$('voice-timer-overlay').textContent='🎤 '+m+':'+s;if(voiceSeconds>=MAX_VOICE_DURATION)stopVoiceRecording()},1000)}
function stopVoiceTimer(){if(voiceTimerInterval)clearInterval(voiceTimerInterval);$('voice-timer-overlay').style.display='none'}
function startVoiceRecording(){if(voiceRecording)return;navigator.mediaDevices.getUserMedia({audio:!0}).then(st=>{voiceStream=st;voiceRecorder=new MediaRecorder(st,{mimeType:'audio/webm',audioBitsPerSecond:16000});voiceChunks=[];voiceRecorder.ondataavailable=e=>voiceChunks.push(e.data);voiceRecorder.onstop=()=>{const blob=new Blob(voiceChunks,{type:'audio/webm'});stopVoiceTimer();if(blob.size>100&&blob.size<50000&&activeChannelId){const r=new FileReader();r.onload=()=>P2PPong.sendVoiceMessage(activeChannelId,r.result.split(',')[1]);r.readAsDataURL(blob)}if(voiceStream){voiceStream.getTracks().forEach(t=>t.stop());voiceStream=null}voiceRecorder=null;voiceRecording=!1;$('btn-voice').style.background=''};voiceRecorder.start();voiceRecording=!0;startVoiceTimer();$('btn-voice').style.background='#f44336'}).catch(()=>rMsg('❌ Нет микрофона',3000))}
function stopVoiceRecording(){if(voiceRecorder?.state==='recording'){voiceRecorder.stop();stopVoiceTimer()}}
function startVideoCircle(){if(videoCircleRecorder?.state==='recording'){videoCircleRecorder.stop();$('btn-video-circle').style.background='';return}navigator.mediaDevices.getUserMedia({video:!0,audio:!0}).then(st=>{videoCircleRecorder=new MediaRecorder(st,{mimeType:'video/webm; codecs=vp8,opus',videoBitsPerSecond:50000});videoCircleChunks=[];videoCircleRecorder.ondataavailable=e=>videoCircleChunks.push(e.data);videoCircleRecorder.onstop=()=>{const blob=new Blob(videoCircleChunks,{type:'video/webm'});if(blob.size<50000&&activeChannelId)P2PPong.sendVoiceMessage(activeChannelId,btoa(String.fromCharCode(...new Uint8Array(blob)))).catch(()=>{});st.getTracks().forEach(t=>t.stop());videoCircleRecorder=null;$('btn-video-circle').style.background=''};videoCircleRecorder.start();$('btn-video-circle').style.background='#f44336';setTimeout(()=>{if(videoCircleRecorder?.state==='recording')videoCircleRecorder.stop()},30000)}).catch(()=>rMsg('❌ Нет камеры',3000))}

const avatars=['001-.png'];
function loadAvatars(){const al=$('avatar-list');if(!al)return;al.innerHTML='';avatars.forEach(src=>{const img=document.createElement('img');img.src=src;img.className='avatar-option';img.onerror=()=>img.src='001-.png';img.onclick=()=>{const pa=$('profile-avatar-small');if(pa)pa.src=src;$('robin-avatar').src=src;localStorage.setItem('robinhood_avatar',src);closeSheets()};al.appendChild(img)})}
function closeSheets(){$('avatar-selector')?.classList.remove('show');$('settings-sheet')?.classList.remove('open');$('overlay')?.classList.remove('show')}

const themes=[{id:'forest',icon:'🌲',name:'Лес'},{id:'sunset',icon:'🌅',name:'Закат'},{id:'ocean',icon:'🌊',name:'Океан'},{id:'night-ember',icon:'🔥',name:'Костёр'},{id:'morning-mist',icon:'🌫️',name:'Туман'}];
function applyTheme(id){document.documentElement.setAttribute('data-theme',id);localStorage.setItem('robinhood_theme',id);const t=themes.find(t=>t.id===id)||themes[0];const ti=$('theme-icon'),tn=$('theme-name');if(ti)ti.textContent=t.icon;if(tn)tn.textContent=t.name}
function addMsg(sender,text,self=false){const rm=$('recent-msgs');if(!rm)return;rm.style.display='flex';const d=document.createElement('div');d.className='chat-msg'+(self?' self':'');d.textContent=(self?'Вы: ':'Друг: ')+text;rm.appendChild(d);if(rm.children.length>20)rm.firstChild.remove();rm.scrollTop=rm.scrollHeight}
function showVerifyModal(expectedCode){verifyCode=expectedCode;verifyInput='';$('verify-code-display').textContent='_______';$('verify-error').style.display='none';const grid=$('verify-code-grid');grid.innerHTML='';for(let i=1;i<=9;i++){const btn=document.createElement('button');btn.textContent=i;btn.onclick=()=>addVerifyDigit(i.toString());grid.appendChild(btn)}const btn0=document.createElement('button');btn0.textContent='0';btn0.onclick=()=>addVerifyDigit('0');grid.appendChild(btn0);const btnDel=document.createElement('button');btnDel.textContent='⌫';btnDel.style.background='rgba(244,67,54,0.3)';btnDel.onclick=()=>{verifyInput=verifyInput.slice(0,-1);$('verify-code-display').textContent=verifyInput.padEnd(7,'_')};grid.appendChild(btnDel);$('verify-modal')?.classList.add('active')}
function addVerifyDigit(d){if(verifyInput.length>=7)return;verifyInput+=d;$('verify-code-display').textContent=verifyInput.padEnd(7,'_');if(verifyInput.length===7)setTimeout(()=>$('btn-verify-confirm')?.click(),300)}

function initApp(){
    applyTheme(localStorage.getItem('robinhood_theme')||'forest');
    const savedAvatar=localStorage.getItem('robinhood_avatar');if(savedAvatar){const pa=$('profile-avatar-small');if(pa)pa.src=savedAvatar;$('robin-avatar').src=savedAvatar}
    const savedNick=localStorage.getItem('robinhood_nick');if(savedNick){const nl=$('nick-label');if(nl)nl.textContent=savedNick.substring(0,12)}
    toggleSoundState=localStorage.getItem('robinhood_sound')!=='false';const ts=$('toggle-sound');if(ts)ts.checked=toggleSoundState;

    P2PPong.on('ready',()=>{conn('online');rMsg('🏹 Готов!',3000);ui('idle')});
    P2PPong.on('peer-id-generated',d=>{$('craft-beacon-display').style.display='block';$('craft-beacon-display').textContent=d.beaconId;const cd=$('craft-code-display');if(cd){cd.style.display='block';cd.textContent=d.code}$('btn-copy-link').style.display='block';rMsg('✅ Стрела создана!',3000);navigator.clipboard.writeText(d.beaconId+'\n'+d.code).catch(()=>{})});
    P2PPong.on('verification-needed',d=>{showVerifyModal(d.code)});
    P2PPong.on('channel-opened',d=>{activeChannelId=d.channelId;ui('ready');rMsg('✅ Колчан открыт!',3000);$('verify-modal')?.classList.remove('active');$('craft-modal')?.classList.remove('active')});
    P2PPong.on('message-received',d=>{if(!d.text)return;try{const p=JSON.parse(d.text);if(p.webrtc){handleWebRTCSignal(p.webrtc,p.sdp);return}}catch(e){}activeChannelId=d.channelId;addMsg('Друг',d.text);playSound('arrow_hit.wav')});
    P2PPong.on('error',d=>{rMsg('⚠ '+(d.message||'Ошибка'),4000);conn('offline')});

    function handleWebRTCSignal(type,sdp){if(type==='webrtc-offer'&&!callActive){try{incomingOffer=JSON.parse(sdp);ui('incoming');playSound('melodi.mp3');rMsg('📞 Входящий!',0)}catch(e){}return}if(type==='webrtc-answer'&&pc){try{pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(sdp)));callActive=!0;callStartTime=Date.now();startCallTimer();ui('active');playSound('open.mp3')}catch(e){}return}if(type==='webrtc-ice'&&pc){try{pc.addIceCandidate(new RTCIceCandidate(JSON.parse(sdp))).catch(()=>{})}catch(e){}return}if(type==='webrtc-hangup'){if(callActive||pc){rMsg('📞 Собеседник завершил',3000);hang(!1)}return}}

    $('btn-main-action')?.addEventListener('click',()=>{if(!activeChannelId)$('craft-modal')?.classList.add('active');else if(callActive)hang(!0);else startCall()});
    $('btn-arrow')?.addEventListener('click',()=>$('craft-modal')?.classList.add('active'));
    $('btn-craft-arrow')?.addEventListener('click',()=>P2PPong.craftArrow());
    $('btn-copy-link')?.addEventListener('click',()=>{const bid=$('craft-beacon-display')?.textContent;const code=$('craft-code-display')?.textContent;if(bid)navigator.clipboard.writeText(bid+'\n'+code).then(()=>rMsg('📋 Скопировано!',2000))});
    $('btn-join')?.addEventListener('click',()=>{const raw=$('join-input')?.value.trim();if(!raw){rMsg('⚠ Вставь Beacon ID',3000);return}const lines=raw.split('\n');const bid=lines[0]?.trim();if(bid)P2PPong.joinBeacon(bid);$('craft-modal')?.classList.remove('active')});
    $('btn-main-join')?.addEventListener('click',()=>{const raw=$('main-join-input')?.value.trim();if(!raw){rMsg('⚠ Вставь Beacon ID',3000);return}const lines=raw.split('\n');const bid=lines[0]?.trim();if(bid)P2PPong.joinBeacon(bid)});
    $('main-join-input')?.addEventListener('keypress',e=>{if(e.key==='Enter')$('btn-main-join')?.click()});
    $('join-input')?.addEventListener('keypress',e=>{if(e.key==='Enter')$('btn-join')?.click()});
    $('btn-close-craft')?.addEventListener('click',()=>$('craft-modal')?.classList.remove('active'));
    $('btn-close-verify')?.addEventListener('click',()=>$('verify-modal')?.classList.remove('active'));
    $('btn-call-main')?.addEventListener('click',()=>callActive?hang(!0):startCall());
    $('btn-answer')?.addEventListener('click',acceptCall);
    $('btn-reject')?.addEventListener('click',()=>{if(incomingOffer){P2PPong.sendMessage(activeChannelId,JSON.stringify({webrtc:'webrtc-hangup',sdp:''}));incomingOffer=null;ui('ready')}});
    $('btn-end-call')?.addEventListener('click',()=>hang(!0));
    $('btn-mic')?.addEventListener('click',()=>{if(stream){micOn=!micOn;stream.getAudioTracks().forEach(t=>t.enabled=micOn);$('btn-mic').textContent=micOn?'🎤':'🔇'}});
    $('btn-speaker')?.addEventListener('click',()=>{$('btn-speaker').textContent=$('btn-speaker').textContent==='🔊'?'🔈':'🔊'});
    $('btn-voice')?.addEventListener('pointerdown',e=>{e.preventDefault();startVoiceRecording()});
    $('btn-voice')?.addEventListener('pointerup',e=>{e.preventDefault();stopVoiceRecording()});
    $('btn-voice')?.addEventListener('pointerleave',stopVoiceRecording);
    $('btn-video-circle')?.addEventListener('click',startVideoCircle);
    $('video-circle-close')?.addEventListener('click',()=>{$('video-circle-player').style.display='none';$('video-circle-video')?.pause()});
    $('btn-verify-confirm')?.addEventListener('click',()=>{if(verifyInput.length!==7){$('verify-error').style.display='block';$('verify-error').textContent='Введи ровно 7 цифр';return}if(verifyInput===verifyCode){$('verify-error').style.display='none';$('verify-modal')?.classList.remove('active');P2PPong.confirmVerification()}else{$('verify-error').style.display='block';$('verify-error').textContent='❌ Неверный код';verifyInput='';$('verify-code-display').textContent='_______'}});
    $('btn-verify-reset')?.addEventListener('click',()=>{verifyInput='';$('verify-code-display').textContent='_______'});
    $('btn-avatar-menu')?.addEventListener('click',()=>{$('avatar-selector')?.classList.toggle('show');$('overlay')?.classList.toggle('show');if($('avatar-selector')?.classList.contains('show'))loadAvatars()});
    $('overlay')?.addEventListener('click',closeSheets);
    $('nick-label')?.addEventListener('click',()=>{$('nick-input').value=$('nick-label').textContent;$('nick-modal')?.classList.add('active')});
    $('btn-nick-cancel')?.addEventListener('click',()=>$('nick-modal')?.classList.remove('active'));
    $('btn-nick-save')?.addEventListener('click',()=>{const n=$('nick-input').value.trim().substring(0,12);if(n){$('nick-label').textContent=n;localStorage.setItem('robinhood_nick',n)}$('nick-modal')?.classList.remove('active')});
    $('btn-settings')?.addEventListener('click',()=>{$('settings-sheet')?.classList.toggle('open');$('overlay')?.classList.toggle('show')});
    $('settings-close')?.addEventListener('click',closeSheets);
    $('setting-theme')?.addEventListener('click',()=>{const ct=localStorage.getItem('robinhood_theme')||'forest';const idx=themes.findIndex(t=>t.id===ct);applyTheme(themes[(idx+1)%themes.length].id)});
    $('setting-clear')?.addEventListener('click',()=>{if(confirm('⚠ Все данные будут удалены!')){hang(!1);activeChannelId=null;rMsg('🚬 Всё сожжено!',5000);localStorage.clear()}});
    if(ts)ts.addEventListener('change',function(){toggleSoundState=this.checked;localStorage.setItem('robinhood_sound',toggleSoundState)});

    conn('checking');ui('idle');rMsg('🏹 Готов!',3000);
}
P2PPong.on('ready',initApp);
P2PPong.init();
})();
</script>
</body>
