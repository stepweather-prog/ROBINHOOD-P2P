<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2PPong — обучаемая стрела</title>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: monospace; padding: 20px; max-width: 700px; margin: 0 auto; }
        button, input, textarea { background: #1e1e1e; border: 1px solid #444; color: #eee; padding: 10px; border-radius: 8px; font-size: 16px; }
        button { background: #2c5e2c; cursor: pointer; }
        button:hover { background: #1e4a1e; }
        .box { border: 1px solid #444; padding: 15px; margin: 15px 0; border-radius: 12px; background: #111; }
        #chat { border: 1px solid #333; min-height: 150px; padding: 10px; margin: 10px 0; overflow-y: auto; background: #0f0f0f; }
        .link { word-break: break-all; background: #1a2a1a; padding: 10px; border-radius: 8px; font-size: 14px; }
        hr { border-color: #333; }
        .stats { font-size: 12px; color: #888; margin-top: 10px; }
        .stats span { margin-right: 15px; }
    </style>
</head>
<body>
<h2>🏹 P2PPong — стрела с обучением</h2>
<p style="color:#aaa;">Временные хранилища: 0x0.st, ix.io, paste.rs, file.io, transfer.sh</p>

<div class="box">
    <button id="createBtn">🎯 Создать стрелу</button>
    <div id="offerLink" class="link" style="display:none; margin-top:12px;"></div>
</div>

<div id="acceptSection" class="box" style="display:none;">
    <input type="text" id="uuidInput" placeholder="Вставьте ID стрелы (например, abc123)" style="width:100%;">
    <button id="acceptBtn">🔗 Принять стрелу</button>
</div>

<div id="chat" style="display:none;"></div>
<div>
    <input type="text" id="messageInput" placeholder="Сообщение" disabled style="width:70%;">
    <button id="sendBtn" disabled>Отправить</button>
</div>
<div id="status" style="color:#aaa; margin-top:10px;">⚡ Готов. Нажми «Создать стрелу».</div>

<!-- Панель статистики роутера -->
<div class="stats" id="statsPanel" style="display:none;">
    <strong>Статистика узлов:</strong>
    <div id="statsContent"></div>
</div>

<script>
    // ========== 1. САМООБУЧАЮЩИЙСЯ РОУТЕР (статистика + приоритет + прокси) ==========
    const CORS_PROXY = 'https://corsproxy.io/?';   // публичный CORS-прокси
    const STORAGES = [
        { name: "0x0.st", url: "https://0x0.st" },
        { name: "ix.io", url: "https://ix.io" },
        { name: "paste.rs", url: "https://paste.rs" },
        { name: "file.io", url: "https://file.io" },
        { name: "transfer.sh", url: "https://transfer.sh" }
    ];

    class NodeStats {
        constructor() {
            this.stats = JSON.parse(localStorage.getItem('p2ppong_nodes') || '{}');
            // миграция для новых хранилищ
            for (const store of STORAGES) {
                if (!this.stats[store.name]) {
                    this.stats[store.name] = { success: 0, fail: 0, lastSeen: 0, penalty: 0 };
                }
            }
            this.save();
        }
        save() {
            localStorage.setItem('p2ppong_nodes', JSON.stringify(this.stats));
        }
        success(name) {
            const s = this.stats[name];
            if (s) {
                s.success++;
                s.fail = 0;
                s.penalty = 0;
                s.lastSeen = Date.now();
                this.save();
            }
        }
        fail(name, isCorsBlock = false) {
            if (isCorsBlock) {
                this.markNeedsProxy(name);
                return;
            }
            const s = this.stats[name];
            if (s) {
                s.fail++;
                s.lastSeen = Date.now();
                if (s.fail >= 3) {
                    s.penalty = Date.now() + 5 * 60 * 1000; // штраф 5 минут
                }
                this.save();
            }
        }
        markNeedsProxy(name) {
            const s = this.stats[name];
            if (s) s.needsProxy = true;
            this.save();
        }
        isUsable(name) {
            const s = this.stats[name];
            if (!s) return true;
            if (s.penalty && Date.now() < s.penalty) return false;
            return true;
        }
        getSortedNodes() {
            return [...STORAGES].sort((a, b) => {
                const sa = this.stats[a.name] || {};
                const sb = this.stats[b.name] || {};
                const aUsable = this.isUsable(a.name) ? 0 : 1;
                const bUsable = this.isUsable(b.name) ? 0 : 1;
                if (aUsable !== bUsable) return aUsable - bUsable;
                // предпочитаем узлы с большим числом успехов
                return (sb.success || 0) - (sa.success || 0);
            });
        }
        getReport() {
            let html = '';
            for (const store of STORAGES) {
                const s = this.stats[store.name] || {};
                const usable = this.isUsable(store.name) ? '🟢' : '🔴';
                html += `<span>${usable} ${store.name}: ${s.success||0}✔ ${s.fail||0}✖</span>`;
            }
            return html;
        }
    }

    const nodeStats = new NodeStats();
    setTimeout(() => {
        document.getElementById('statsPanel').style.display = 'block';
        document.getElementById('statsContent').innerHTML = nodeStats.getReport();
        setInterval(() => {
            document.getElementById('statsContent').innerHTML = nodeStats.getReport();
        }, 10000);
    }, 2000);

    async function uploadToAny(filename, content) {
        const sortedNodes = nodeStats.getSortedNodes();
        const totalAttempts = Math.min(sortedNodes.length, 50);
        const batchSize = 3;
        
        for (let i = 0; i < totalAttempts; i += batchSize) {
            const batch = sortedNodes.slice(i, i + batchSize);
            const tasks = batch.map(async (store) => {
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 3000);
                    const formData = new FormData();
                    formData.append("file", new Blob([content], {type: "text/plain"}), filename);
                    
                    const proxyUrl = CORS_PROXY + encodeURIComponent(store.url);
                    const res = await fetch(proxyUrl, {
                        method: "POST",
                        body: formData,
                        signal: controller.signal,
                        mode: "cors"
                    });
                    clearTimeout(timeout);
                    
                    if (res.type === 'opaque') {
                        // CORS-блокировка, но сервер ответил
                        nodeStats.markNeedsProxy(store.name);
                        return null;
                    }
                    
                    if (res.ok) {
                        let fileUrl = await res.text();
                        fileUrl = fileUrl.trim();
                        if (!fileUrl.startsWith("http")) {
                            if (store.url.endsWith("/")) fileUrl = store.url + fileUrl;
                            else fileUrl = store.url + "/" + fileUrl;
                        }
                        nodeStats.success(store.name);
                        return { store: store.name, fileUrl };
                    } else {
                        nodeStats.fail(store.name);
                    }
                } catch(e) {
                    nodeStats.fail(store.name);
                }
                return null;
            });
            const results = await Promise.allSettled(tasks);
            for (const r of results) {
                if (r.status === "fulfilled" && r.value) return r.value;
            }
        }
        return null;
    }

    async function downloadText(url) {
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 4000);
            const res = await fetch(url, { signal: controller.signal, mode: "cors" });
            clearTimeout(timeout);
            if (res.ok) return await res.text();
        } catch(e) {}
        return null;
    }

    async function findOfferById(uuid) {
        const filename = `p2p_${uuid}.offer.txt`;
        for (const store of STORAGES) {
            const baseUrl = store.url.endsWith("/") ? store.url + filename : store.url + "/" + filename;
            const proxyUrl = CORS_PROXY + encodeURIComponent(baseUrl);
            const content = await downloadText(proxyUrl);
            if (content && content.trim().startsWith("v=")) {
                return { content, sourceUrl: proxyUrl, store: store.name };
            }
        }
        return null;
    }

    // ========== 2. WebRTC логика (без изменений) ==========
    let peerConnection = null;
    let dataChannel = null;
    let currentUUID = null;
    let pollingInterval = null;

    const statusDiv = document.getElementById('status');
    const chatDiv = document.getElementById('chat');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const createBtn = document.getElementById('createBtn');
    const acceptBtn = document.getElementById('acceptBtn');
    const uuidInput = document.getElementById('uuidInput');
    const offerLinkDiv = document.getElementById('offerLink');
    const acceptSection = document.getElementById('acceptSection');

    function generateUUID() {
        return Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
    }

    function setupDataChannel(channel) {
        channel.onopen = () => {
            statusDiv.innerHTML = '✅ Канал открыт! Можно общаться.';
            messageInput.disabled = false;
            sendBtn.disabled = false;
            chatDiv.style.display = 'block';
        };
        channel.onmessage = (e) => {
            const msgDiv = document.createElement('div');
            msgDiv.textContent = `📩 Собеседник: ${e.data}`;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        };
        channel.onclose = () => {
            statusDiv.innerHTML = '⚠️ Канал закрыт.';
            messageInput.disabled = true;
            sendBtn.disabled = true;
        };
    }

    // === СОЗДАНИЕ СТРЕЛЫ ===
    async function createOffer() {
        createBtn.disabled = true;
        statusDiv.innerHTML = '🔄 Создаём offer, загружаем на хранилища...';
        if (peerConnection) peerConnection.close();
        peerConnection = new RTCPeerConnection();
        dataChannel = peerConnection.createDataChannel('chat');
        setupDataChannel(dataChannel);
        
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        const sdpOffer = peerConnection.localDescription.sdp;
        const uuid = generateUUID();
        currentUUID = uuid;
        const filename = `p2p_${uuid}.offer.txt`;
        
        // Загружаем offer с новым умным роутером
        const uploadResult = await uploadToAny(filename, sdpOffer);
        if (!uploadResult) {
            statusDiv.innerHTML = '❌ Не удалось загрузить offer ни в одно хранилище. Попробуйте позже.';
            createBtn.disabled = false;
            return;
        }
        
        // Формируем ссылку с ID
        const fullUrl = `${window.location.href.split('?')[0]}?id=${uuid}`;
        offerLinkDiv.style.display = 'block';
        offerLinkDiv.innerHTML = `<strong>🔗 Стрела создана! Отправьте ссылку другу:</strong><br>
                                  <a href="${fullUrl}" target="_blank" style="color:#8bc34a;">${fullUrl}</a><br>
                                  <small>или передайте ID: <code>${uuid}</code></small>
                                  <button id="copyBtn" style="margin-left:10px; padding:4px 8px;">📋 Копировать ссылку</button>`;
        document.getElementById('copyBtn')?.addEventListener('click', () => {
            navigator.clipboard.writeText(fullUrl);
            statusDiv.innerHTML = '✅ Ссылка скопирована.';
        });
        
        statusDiv.innerHTML = `✅ Offer загружен (${uploadResult.store}). Ожидаем ответа друга... ID: ${uuid}`;
        
        // Polling: ищем файл ответа
        const answerFilename = `p2p_${uuid}.answer.txt`;
        const answerCandidateUrl = uploadResult.fileUrl.replace(/\.offer\.txt$/, '.answer.txt');
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(async () => {
            const answerSdp = await downloadText(answerCandidateUrl);
            if (answerSdp && answerSdp.trim().startsWith('v=')) {
                clearInterval(pollingInterval);
                pollingInterval = null;
                statusDiv.innerHTML = '📡 Получен SDP answer, устанавливаем соединение...';
                try {
                    await peerConnection.setRemoteDescription({ type: 'answer', sdp: answerSdp });
                    statusDiv.innerHTML = '✅ Соединение установлено!';
                } catch (err) {
                    statusDiv.innerHTML = `❌ Ошибка: ${err.message}`;
                    createBtn.disabled = false;
                }
                return;
            }
        }, 2000);
        
        // Таймаут 90 секунд
        setTimeout(() => {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
                statusDiv.innerHTML = '⏱️ Таймаут: ответ не получен. Попробуйте ещё раз.';
                createBtn.disabled = false;
            }
        }, 90000);
    }
    
    // === ПРИНЯТИЕ СТРЕЛЫ ===
    async function acceptOffer() {
        const uuid = uuidInput.value.trim();
        if (!uuid) {
            statusDiv.innerHTML = '❌ Введите ID стрелы.';
            return;
        }
        acceptBtn.disabled = true;
        statusDiv.innerHTML = `🔍 Ищем offer с ID ${uuid}...`;
        
        const found = await findOfferById(uuid);
        if (!found) {
            statusDiv.innerHTML = '❌ Offer не найден. Проверьте ID или попросите друга создать стрелу заново.';
            acceptBtn.disabled = false;
            return;
        }
        
        statusDiv.innerHTML = `✅ Offer найден (${found.store}). Создаём ответ...`;
        if (peerConnection) peerConnection.close();
        peerConnection = new RTCPeerConnection();
        peerConnection.ondatachannel = (e) => {
            dataChannel = e.channel;
            setupDataChannel(dataChannel);
        };
        
        try {
            await peerConnection.setRemoteDescription({ type: 'offer', sdp: found.content });
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            const answerSdp = peerConnection.localDescription.sdp;
            
            // Загружаем answer с умным роутером
            const answerFilename = `p2p_${uuid}.answer.txt`;
            const uploadResult = await uploadToAny(answerFilename, answerSdp);
            if (uploadResult) {
                statusDiv.innerHTML = `✅ Ответ отправлен через ${uploadResult.store}. Ожидаем открытия канала...`;
            } else {
                statusDiv.innerHTML = '⚠️ Не удалось отправить ответ, но канал может установиться автоматически.';
            }
        } catch (err) {
            statusDiv.innerHTML = `❌ Ошибка WebRTC: ${err.message}`;
            acceptBtn.disabled = false;
        }
    }
    
    function sendMessage() {
        if (dataChannel && dataChannel.readyState === 'open') {
            const text = messageInput.value.trim();
            if (text) {
                dataChannel.send(text);
                const msgDiv = document.createElement('div');
                msgDiv.textContent = `📤 Я: ${text}`;
                chatDiv.appendChild(msgDiv);
                messageInput.value = '';
                chatDiv.scrollTop = chatDiv.scrollHeight;
            }
        } else {
            statusDiv.innerHTML = '⚠️ Канал не открыт.';
        }
    }
    
    // === Обработка параметра ?id= в URL ===
    const urlParams = new URLSearchParams(window.location.search);
    const idFromUrl = urlParams.get('id');
    if (idFromUrl) {
        uuidInput.value = idFromUrl;
        acceptSection.style.display = 'block';
        statusDiv.innerHTML = `🔗 ID стрелы: ${idFromUrl}. Нажмите «Принять стрелу».`;
    } else {
        acceptSection.style.display = 'block';
        statusDiv.innerHTML = '⚡ Введите ID стрелы от друга и нажмите «Принять».';
    }
    
    createBtn.addEventListener('click', createOffer);
    acceptBtn.addEventListener('click', acceptOffer);
    sendBtn.addEventListener('click', sendMessage);

    // ========== 3. Фоновое обучение (раз в 5 минут проверяем случайный узел) ==========
    setInterval(() => {
        const sorted = nodeStats.getSortedNodes();
        // выбираем случайный узел из тех, у кого мало успехов
        const candidates = sorted.filter(store => (nodeStats.stats[store.name]?.success || 0) < 2);
        if (candidates.length === 0) return;
        const randomStore = candidates[Math.floor(Math.random() * candidates.length)];
        const testName = `p2ppong_ping_${Date.now()}.txt`;
        uploadToAny(testName, 'ping').then(result => {
            if (result) console.log(`Фоновая проверка: ${randomStore.name} жив`);
            else console.log(`Фоновая проверка: ${randomStore.name} мёртв`);
        });
    }, 5 * 60 * 1000);
</script>
</body>
</html>
