    <style>

        .header { background-color: rgba(31,31,31,0.95); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2E7D32; backdrop-filter: blur(5px); z-index: 10; }

        .profile-edit { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; display: none; margin-top: 5px; width: 100%; box-sizing: border-box; }
        .profile-edit input { width: 100%; padding: 8px 12px; background: #121212; border: 1px solid #444; color: white; border-radius: 6px; margin-bottom: 8px; outline: none; box-sizing: border-box; }
        .invite-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
        .invite-modal.active { display: flex; }
        .invite-dialog { background: #1F1F1F; padding: 20px; border-radius: 12px; width: 80%; max-width: 320px; text-align: center; border: 1px solid #2E7D32; max-height: 80vh; overflow-y: auto; }
        .invite-dialog h3 { color: #4CAF50; margin: 0 0 10px; }
        .invite-dialog button { width: 100%; padding: 10px; margin-top: 5px; background: #2E7D32; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }

        .avatar-selector, .contacts-list { display: none; margin-top: 10px; text-align: center; max-height: 300px; overflow-y: auto; padding: 5px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .avatar-option { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin: 5px; cursor: pointer; border: 2px solid transparent; transition: border 0.2s; }
        .avatar-option:hover { border-color: #FFA000; }
        .contact-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; color: #E0E0E0; }
        .contact-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .contact-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .contact-name { font-weight: 600; }
        .delete-contact { background: none; border: none; color: #f44336; font-size: 20px; cursor: pointer; padding: 0 10px; opacity: 0.7; }
        .delete-contact:hover { opacity: 1; }
        .drawer-footer { padding: 16px; font-size: 11px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.15); color: #888; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>

<body>

            <div id="contacts-list-inner"></div>
            <div id="pending-requests" style="margin-top: 10px; border-top: 1px solid #444; padding-top: 10px;"></div>
        </div>
        <div class="menu-item"><span>🗑️ Хранить историю</span><label class="switch"><input type="checkbox" id="toggle-history" checked><span class="slider"></span></label></div>
        <div class="menu-item"><span>🔐 Двойное шифрование</span><label class="switch"><input type="checkbox" id="toggle-double-e2ee"><span class="slider"></span></label></div>
        <div class="menu-item"><span>🔊 Звук приложения</span><label class="switch"><input type="checkbox" id="toggle-sound" checked><span class="slider"></span></label></div>
        <div class="menu-link" id="ref-link-btn"><img src="assets/invain/invain.png"> Реферальная стрела</div>

<script>
    // ========== АВАРИЙНЫЙ NOSTR (если библиотека не загрузилась) ==========
    if (typeof nostr === 'undefined' || !nostr.generateSecretKey) {
        window.nostr = {
            generateSecretKey: function() { var arr = new Uint8Array(32); crypto.getRandomValues(arr); return arr; },
            hexEncode: function(buffer) { return Array.from(buffer).map(b => ('0' + b.toString(16)).slice(-2)).join(''); },
            hexDecode: function(hex) { return new Uint8Array(hex.match(/.{1,2}/g).map(byte => parseInt(byte, 16))); },
            getPublicKey: function(sk) { return this.hexEncode(sk); },
            getEventHash: function() { return ''; },
            signEvent: function() { return ''; },
            nip44: { encrypt: async (priv, pub, text) => text, decrypt: async (priv, pub, text) => text }
        };
    }

    const relays = [
    'wss://relay.damus.io',
    'wss://nos.lol',
    'wss://relay.snort.social',
    'wss://relay.primal.net',
    'wss://nostr.mom',
    'wss://relay.nostr.band',
    'wss://purplepag.es',
    'wss://relay.nostr.net',
    'wss://nostr.swiss-enigma.ch',
    'wss://nostr.land'
];
    let pool, myPrivkey, myPubkey, sub, activeContact;
    let doubleE2EEEnabled = false;
    let bestRelay = relays[0];
    const loadedEvents = new Set();

    // --- Умный выбор релеев ---
    async function measureRelayLatency(url) {
        return new Promise((resolve) => {
            const ws = new WebSocket(url);
            const start = Date.now();
            let resolved = false;
            ws.onopen = () => ws.send(JSON.stringify(["REQ", "ping", { limit: 0 }]));
            ws.onmessage = () => { if (!resolved) { resolved = true; ws.close(); resolve(Date.now() - start); } };
            ws.onerror = () => { if (!resolved) { resolved = true; ws.close(); resolve(Infinity); } };
            setTimeout(() => { if (!resolved) { resolved = true; ws.close(); resolve(Infinity); } }, 1500);
        });
    }

    async function selectBestRelay() {
        const results = await Promise.all(relays.map(async url => ({ url, latency: await measureRelayLatency(url) })));
        const reachable = results.filter(r => r.latency < Infinity);
        if (reachable.length > 0) {
            reachable.sort((a, b) => a.latency - b.latency);
            bestRelay = reachable[0].url;
            updateRobinStatus('Выбран релей: ' + new URL(bestRelay).hostname, 2000);
        } else {
            bestRelay = relays[0];
            updateRobinStatus('Нет доступных релеев', 3000);
        }
    }

    setInterval(selectBestRelay, 10 * 60 * 1000);

    // --- Вспомогательные функции шифрования ---
    async function generateAESKey() { return await window.crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt","decrypt"]); }
    async function aesEncrypt(text, key) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, new TextEncoder().encode(text));
        const result = new Uint8Array(iv.length + encrypted.byteLength);
        result.set(iv, 0); result.set(new Uint8Array(encrypted), iv.length);
        return btoa(String.fromCharCode.apply(null, result));
    }
    async function aesDecrypt(base64Data, key) {
        const raw = Uint8Array.from(atob(base64Data), c=>c.charCodeAt(0));
        const iv = raw.slice(0,12), ciphertext = raw.slice(12);
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ciphertext);
        return new TextDecoder().decode(decrypted);
    }

    // --- Обмен симметричным ключом (v3) ---
    async function initiateKeyExchange(theirPubkey) {
        if (!pool || !myPrivkey) return;
        const aesKey = await generateAESKey();
        const rawKey = await crypto.subtle.exportKey("raw", aesKey);
        const keyBase64 = btoa(String.fromCharCode(...new Uint8Array(rawKey)));

        const payload = JSON.stringify({ type: 'sharedKey', key: keyBase64 });
        const encrypted = await nostr.nip44.encrypt(nostr.hexDecode(myPrivkey), nostr.hexDecode(theirPubkey), payload);
        let event = { kind: 30001, pubkey: myPubkey, created_at: Math.floor(Date.now()/1000), tags: [['p', theirPubkey]], content: encrypted };
        try {
            event.id = nostr.getEventHash(event);
            event.sig = nostr.signEvent(event, nostr.hexDecode(myPrivkey));
            pool.publish(event, [bestRelay]);
        } catch(e) { console.error(e); }
    }

    async function encryptMessageForSending(plainText, recipientPubkey) {
        const payloadObj = {
            text: plainText,
            sender: myNick.textContent,
            avatar: profileAvatar.src
        };
        const payloadStr = JSON.stringify(payloadObj);

        // Проверяем, есть ли общий ключ (v3)
        let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
        const contact = contacts.find(c => c.pubkey === recipientPubkey);
        if (contact && contact.sharedKey) {
            const rawKey = Uint8Array.from(atob(contact.sharedKey), c => c.charCodeAt(0));
            const aesKey = await crypto.subtle.importKey("raw", rawKey, "AES-GCM", true, ["encrypt"]);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, aesKey, new TextEncoder().encode(payloadStr));
            const result = new Uint8Array(iv.length + encrypted.byteLength);
            result.set(iv, 0);
            result.set(new Uint8Array(encrypted), iv.length);
            return "v3:" + btoa(String.fromCharCode.apply(null, result));
        }

        // Иначе NIP-44 с опциональным двойным шифрованием
        if (!doubleE2EEEnabled) {
            const encrypted = await nostr.nip44.encrypt(nostr.hexDecode(myPrivkey), nostr.hexDecode(recipientPubkey), payloadStr);
            return "v1:" + btoa(encrypted);
        } else {
            const aesKey = await generateAESKey();
            const aesEncrypted = await aesEncrypt(payloadStr, aesKey);
            const exportedKey = await crypto.subtle.exportKey("raw", aesKey);
            const keyBase64 = btoa(String.fromCharCode.apply(null, new Uint8Array(exportedKey)));
            const innerPayload = JSON.stringify({ key: keyBase64, data: aesEncrypted });
            const encryptedPayload = await nostr.nip44.encrypt(nostr.hexDecode(myPrivkey), nostr.hexDecode(recipientPubkey), innerPayload);
            return "v2:" + btoa(encryptedPayload);
        }
    }

    async function decryptReceivedMessage(content, senderPubkey) {
        try {
            let decryptedPayload;

            if (content.startsWith("v3:")) {
                // Расшифровка общим ключом
                const contact = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]').find(c => c.pubkey === senderPubkey);
                if (contact && contact.sharedKey) {
                    const rawKey = Uint8Array.from(atob(contact.sharedKey), c => c.charCodeAt(0));
                    const aesKey = await crypto.subtle.importKey("raw", rawKey, "AES-GCM", true, ["decrypt"]);
                    const raw = Uint8Array.from(atob(content.slice(3)), c => c.charCodeAt(0));
                    const iv = raw.slice(0,12), ciphertext = raw.slice(12);
                    const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, aesKey, ciphertext);
                    return new TextDecoder().decode(decrypted);
                }
                return "[Ошибка расшифровки v3]";
            }

            if (content.startsWith("v2:")) {
                const innerEncrypted = atob(content.slice(3));
                const decryptedInner = await nostr.nip44.decrypt(nostr.hexDecode(myPrivkey), nostr.hexDecode(senderPubkey), innerEncrypted);
                const { key: keyBase64, data: aesEncrypted } = JSON.parse(decryptedInner);
                const keyRaw = Uint8Array.from(atob(keyBase64), c=>c.charCodeAt(0));
                const aesKey = await crypto.subtle.importKey("raw", keyRaw, "AES-GCM", true, ["decrypt"]);
                decryptedPayload = await aesDecrypt(aesEncrypted, aesKey);
            } else if (content.startsWith("v1:")) {
                const innerEncrypted = atob(content.slice(3));
                decryptedPayload = await nostr.nip44.decrypt(nostr.hexDecode(myPrivkey), nostr.hexDecode(senderPubkey), innerEncrypted);
            } else {
                try { return JSON.parse(content).text || content; } catch(e) { return content; }
            }

            const data = JSON.parse(decryptedPayload);
            if (data.sender && data.sender !== 'Вы') updateContactInfo(senderPubkey, data.sender, data.avatar);
            return data.text || decryptedPayload;
        } catch(e) { return "[Ошибка расшифровки]"; }
    }

    // --- Загрузка метаданных контакта (kind 0) ---
    async function fetchAndUpdateContactMeta(pubkey) {
        if (!pool) return;
        try {
            const metaSub = pool.subscribeMany(relays, [{ kinds: [0], authors: [pubkey], limit: 1 }], {
                onevent: event => {
                    try {
                        const meta = JSON.parse(event.content);
                        let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                        let updated = false;
                        contacts = contacts.map(c => {
                            if (c.pubkey === pubkey) {
                                if (meta.name && c.name !== meta.name) { c.name = meta.name; updated = true; }
                                if (meta.picture && c.avatar !== meta.picture) { c.avatar = meta.picture; updated = true; }
                            }
                            return c;
                        });
                        if (updated) {
                            localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
                            loadContacts();
                            if (activeContact && activeContact.pubkey === pubkey) {
                                activeContact.name = meta.name || activeContact.name;
                                activeContact.avatar = meta.picture || activeContact.avatar;
                                headerTitle.textContent = activeContact.name;
                            }
                        }
                    } catch(e) {}
                    metaSub.close();
                }
            });
        } catch(e) {}
    }

    // --- Nostr соединение ---
    async function startNostrConnection() {
        if (typeof nostr === 'undefined' || !nostr.SimplePool) {
            updateRobinStatus('Библиотека Nostr не загружена, работаем офлайн');
            return;
        }
        try {
            pool = new nostr.SimplePool();
            await selectBestRelay();

            // Личные сообщения (kind 4)
            sub = pool.subscribeMany(relays, [{kinds: [4], '#p': [myPubkey]}], {
                onevent: async (event) => {
                    if (loadedEvents.has(event.id)) return;
                    loadedEvents.add(event.id);
                    const decrypted = await decryptReceivedMessage(event.content, event.pubkey);
                    let senderName = event.pubkey.slice(0,8);
                    let senderAvatar = 'assets/avatars/001-.png';
                    if (!event.content.startsWith("v1:") && !event.content.startsWith("v2:") && !event.content.startsWith("v3:")) {
                        try { const data = JSON.parse(event.content); senderName = data.sender || senderName; senderAvatar = data.avatar || senderAvatar; } catch(e) {}
                    }
                    let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                    if (event.pubkey !== myPubkey) {
                        const existingContact = contacts.find(c => c.pubkey === event.pubkey);
                        if (!existingContact) {
                            updateRobinStatus(`Сообщение от неизвестного отправителя ${senderName}`, 3000);
                            return;
                        } else if (existingContact.status !== 'confirmed') {
                            updateRobinStatus(`Сообщение от ${senderName} скрыто (${existingContact.status})`, 2000);
                            return;
                        }
                    }
                    appendMessage(senderName, decrypted, senderAvatar, new Date(event.created_at*1000).toLocaleTimeString());
                    if (toggleHistory.checked) saveHistory();
                }
            });

            // Запросы в друзья (kind 10000)
            const friendSub = pool.subscribeMany(relays, [{kinds: [10000], '#p': [myPubkey]}], {
                onevent: event => {
                    if (event.pubkey === myPubkey) return;
                    try {
                        const data = JSON.parse(event.content);
                        const senderName = data.name || event.pubkey.slice(0,8);
                        const senderAvatar = data.avatar || 'assets/avatars/001-.png';
                        let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                        if (!contacts.some(c => c.pubkey === event.pubkey)) {
                            contacts.push({ name: senderName, pubkey: event.pubkey, avatar: senderAvatar, status: 'pending' });
                            localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
                            loadContacts();
                        }
                        updateRobinStatus(`Пользователь ${senderName} добавил вас в друзья!`, 5000);
                    } catch(e) {}
                }
            });

            // Обмен ключами (kind 30001)
            const keySub = pool.subscribeMany(relays, [{kinds: [30001], '#p': [myPubkey]}], {
                onevent: async (event) => {
                    if (event.pubkey === myPubkey) return;
                    try {
                        const decrypted = await nostr.nip44.decrypt(nostr.hexDecode(myPrivkey), nostr.hexDecode(event.pubkey), event.content);
                        const data = JSON.parse(decrypted);
                        if (data.type === 'sharedKey') {
                            let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                            const contact = contacts.find(c => c.pubkey === event.pubkey);
                            if (contact) {
                                contact.sharedKey = data.key;
                                localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
                                updateRobinStatus(`Ключ защиты установлен с ${contact.name}`, 3000);
                            }
                        }
                    } catch(e) {}
                }
            });

            updateRobinStatus('Подключение к релеям установлено');
        } catch(e) { console.error(e); updateRobinStatus('Ошибка подключения'); }
    }

    async function sendNostrMessage(text) {
        if (!pool || !activeContact) { appendMessage('Вы', text, profileAvatar.src); if (toggleHistory.checked) saveHistory(); return; }
        const encrypted = await encryptMessageForSending(text, activeContact.pubkey);
        let event = { kind: 4, pubkey: myPubkey, created_at: Math.floor(Date.now()/1000), tags: [['p', activeContact.pubkey]], content: encrypted };
        try {
            event.id = nostr.getEventHash(event);
            event.sig = nostr.signEvent(event, nostr.hexDecode(myPrivkey));
            pool.publish(event, [bestRelay || relays[0]]);
            appendMessage('Вы', text, profileAvatar.src);
            if (toggleHistory.checked) saveHistory();
        } catch(e) { console.error(e); updateRobinStatus('Ошибка отправки'); }
    }

    async function sendMessage() { const text = msgInput.value.trim(); if (!text) return; await sendNostrMessage(text); updateRobinStatus('Стрела в полёте...'); playSound('bow_shot.wav'); msgInput.value = ''; }

    async function loadChatHistory(contactPubkey) {
        if (!pool || !myPubkey) return;
        const filter = { kinds: [4], authors: [myPubkey, contactPubkey], '#p': [myPubkey, contactPubkey], limit: 100 };
        const historySub = pool.subscribeMany(relays, [filter], {
            onevent: event => {
                if (loadedEvents.has(event.id)) return;
                loadedEvents.add(event.id);
                events.push(event);
            }
        });
        const events = [];
        setTimeout(async () => {
            historySub.close();
            events.sort((a,b) => a.created_at - b.created_at);
            for (const event of events) {
                const decrypted = await decryptReceivedMessage(event.content, event.pubkey);
                let senderName = event.pubkey.slice(0,8);
                let senderAvatar = 'assets/avatars/001-.png';
                if (!event.content.startsWith("v1:") && !event.content.startsWith("v2:") && !event.content.startsWith("v3:")) {
                    try { const data = JSON.parse(event.content); senderName = data.sender || senderName; senderAvatar = data.avatar || senderAvatar; } catch(e) {}
                }
                appendMessage(senderName, decrypted, senderAvatar, new Date(event.created_at*1000).toLocaleTimeString());
            }
        }, 1500);
    }

    function generateKeys() {
        try {
            const sk = nostr.generateSecretKey();
            myPrivkey = nostr.hexEncode(sk);
            myPubkey = nostr.getPublicKey(sk);
            localStorage.setItem('robinhood_sk', myPrivkey);
        } catch(e) { myPrivkey = 'fallback_key'; myPubkey = 'fallback_pub'; }
    }
    function loadKeys() {
        const stored = localStorage.getItem('robinhood_sk');
        if (stored) { myPrivkey = stored; try { const sk = nostr.hexDecode(myPrivkey); myPubkey = nostr.getPublicKey(sk); } catch(e) { generateKeys(); } }
        else generateKeys();
    }

    function addFriendManually() {
        const input = document.getElementById('friend-input');
        let value = input.value.trim();
        if (!value) return;
        let ref = value;
        if (value.includes('?ref=')) {
            const url = new URL(value);
            ref = url.searchParams.get('ref') || ref;
        }
        if (!/^[0-9a-fA-F]{64}$/.test(ref)) { updateRobinStatus('Неверный формат ссылки или ключа', 2000); return; }
        if (ref === myPubkey) { updateRobinStatus('Это ваш собственный ключ', 2000); return; }
        let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
        if (contacts.some(c => c.pubkey === ref)) { updateRobinStatus('Контакт уже существует', 2000); return; }
        const tempName = ref.slice(0,8);
        contacts.push({ name: tempName, pubkey: ref, avatar: 'assets/avatars/001-.png', status: 'confirmed' });
        localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
        updateRobinStatus(`Контакт ${tempName} добавлен`, 3000);
        loadContacts();
        fetchAndUpdateContactMeta(ref);
        initiateKeyExchange(ref);
        input.value = '';
        document.getElementById('ref-modal').classList.remove('active');
        if (pool) {
            const friendEvent = { kind: 10000, pubkey: myPubkey, created_at: Math.floor(Date.now()/1000), tags: [['p', ref]], content: JSON.stringify({ name: myNick.textContent, avatar: profileAvatar.src }) };
            try { friendEvent.id = nostr.getEventHash(friendEvent); friendEvent.sig = nostr.signEvent(friendEvent, nostr.hexDecode(myPrivkey)); pool.publish(friendEvent, [bestRelay || relays[0]]); } catch(e) {}
        }
    }

    function loadAvatars() { avatarList.innerHTML = ''; avatars.forEach(src => { const img = document.createElement('img'); img.src = src; img.className = 'avatar-option'; img.addEventListener('click', () => { profileAvatar.src = src; localStorage.setItem('robinhood_avatar', src); updateRobinStatus('Аватар обновлён'); avatarSelector.style.display = 'none'; }); avatarList.appendChild(img); }); }

    function saveHistory() {
        if (!toggleHistory.checked) return;
        const messages = [];
        document.querySelectorAll('.message-row:not(#robin-row)').forEach(row => {
            const sender = row.querySelector('.msg-sender').textContent;
            const text = row.querySelector('.msg-sender').nextElementSibling.textContent;
            const time = row.querySelector('.msg-status').textContent;
            const avatar = row.querySelector('.avatar').src;
            messages.push({ sender, text, time, avatar });
        });
        localStorage.setItem('robinhood_chat_history', JSON.stringify(messages));
    }
    function loadHistory() { if (!toggleHistory.checked) return; const stored = localStorage.getItem('robinhood_chat_history'); if (stored) JSON.parse(stored).forEach(msg => appendMessage(msg.sender, msg.text, msg.avatar, msg.time)); }
    function appendMessage(sender, text, avatarSrc, timeStr = null) { const row = document.createElement('div'); row.className = 'message-row'; const finalTime = timeStr || new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); row.innerHTML = `<img src="${avatarSrc}" class="avatar"><div class="msg-body"><div class="msg-sender">${sender}</div><div>${text}</div><div class="msg-status">${finalTime}</div></div>`; chatBox.appendChild(row); chatBox.scrollTop = chatBox.scrollHeight; }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendBtn.click(); });

    ddgClearBtn.addEventListener('click', () => { document.querySelectorAll('.message-row:not(#robin-row)').forEach(m => m.remove()); localStorage.removeItem('robinhood_chat_history'); updateRobinStatus('История очищена',5000); });

    toggleHistory.addEventListener('change', function() { localStorage.setItem('robinhood_history', this.checked); updateRobinStatus(this.checked ? 'История сохраняется' : 'История не сохраняется'); if (!this.checked) { localStorage.removeItem('robinhood_chat_history'); document.querySelectorAll('.message-row:not(#robin-row)').forEach(m => m.remove()); } else loadHistory(); });
    toggleSound.addEventListener('change', function() { localStorage.setItem('robinhood_sound', this.checked); updateRobinStatus(this.checked ? 'Звук включён' : 'Выключен'); });

    function loadContacts() {
        const contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
        
        let updated = false;
        contacts.forEach(c => {
            if (!c.status) {
                c.status = 'confirmed';
                updated = true;
            }
        });
        if (updated) localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
        
        const confirmed = contacts.filter(c => c.status === 'confirmed');
        const pending = contacts.filter(c => c.status === 'pending');
        
        contactsListInner.innerHTML = '';
        if (confirmed.length) {
            confirmed.forEach(c => {
                const div = document.createElement('div'); div.className = 'contact-item';
                div.innerHTML = `<div class="contact-info"><img src="${c.avatar || 'assets/avatars/001-.png'}" class="contact-avatar"><span class="contact-name">${c.name}</span></div><button class="delete-contact" data-pubkey="${c.pubkey}">✖</button>`;
                const infoDiv = div.querySelector('.contact-info');
                infoDiv.addEventListener('click', () => openChatWithContact(c));
                const delBtn = div.querySelector('.delete-contact');
                delBtn.addEventListener('click', (e) => deleteContact(c.pubkey, e));
                contactsListInner.appendChild(div);
            });
        } else {
            contactsListInner.innerHTML = '<div style="padding:10px;color:#888;">Воспользуйся реферальной стрелой!</div>';
        }
        
        const pendingDiv = document.getElementById('pending-requests');
        if (!pendingDiv) return;
        pendingDiv.innerHTML = '';
        if (pending.length) {
            pendingDiv.innerHTML = '<div style="padding: 8px 0; color: #FFA000; font-weight: bold;">Запросы в друзья:</div>';
            pending.forEach(c => {
                const div = document.createElement('div'); div.className = 'contact-item';
                div.style.justifyContent = 'space-between';
                div.innerHTML = `
                    <div class="contact-info"><img src="${c.avatar || 'assets/avatars/001-.png'}" class="contact-avatar"><span class="contact-name">${c.name}</span></div>
                    <div>
                        <button class="accept-request" data-pubkey="${c.pubkey}" style="background:#2E7D32; color:white; border:none; padding:4px 8px; border-radius:4px; margin-right:4px;">✓</button>
                        <button class="reject-request" data-pubkey="${c.pubkey}" style="background:#f44336; color:white; border:none; padding:4px 8px; border-radius:4px;">✕</button>
                    </div>`;
                pendingDiv.appendChild(div);
            });
            
            document.querySelectorAll('.accept-request').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const pubkey = e.target.getAttribute('data-pubkey');
                    let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                    const contact = contacts.find(c => c.pubkey === pubkey);
                    if (contact) {
                        contact.status = 'confirmed';
                        localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
                        loadContacts();
                        updateRobinStatus(`Запрос от ${contact.name} принят!`, 3000);
                        fetchAndUpdateContactMeta(pubkey);
                        initiateKeyExchange(pubkey);
                    }
                });
            });
            
            document.querySelectorAll('.reject-request').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const pubkey = e.target.getAttribute('data-pubkey');
                    let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
                    contacts = contacts.filter(c => c.pubkey !== pubkey);
                    localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
                    loadContacts();
                    updateRobinStatus('Запрос отклонён', 2000);
                });
            });
        }
    }

    let touchStartX = 0; document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }); document.addEventListener('touchend', e => { const deltaX = e.changedTouches[0].clientX - touchStartX; if (Math.abs(deltaX) > 50) { if (deltaX > 0 && !drawer.classList.contains('open')) { drawer.classList.add('open'); overlay.classList.add('visible'); } else if (deltaX < 0 && drawer.classList.contains('open')) { drawer.classList.remove('open'); overlay.classList.remove('visible'); } } });

    overlay.addEventListener('click', () => { drawer.classList.remove('open'); overlay.classList.remove('visible'); });

    function playSound(filename) { if (toggleSound.checked) { const audio = new Audio(`assets/sounds/${filename}`); audio.volume = 0.5; audio.play().catch(e=>console.log); } }

    let robinDefaultText = robinText.textContent; let robinTimer;
    function updateRobinStatus(text, duration=4000) { clearTimeout(robinTimer); robinText.style.transition = 'none'; robinText.style.opacity = 1; robinText.textContent = text; robinTimer = setTimeout(() => { robinText.style.transition = 'opacity 0.6s ease'; robinText.style.opacity = 0; const onEnd = () => { robinText.removeEventListener('transitionend', onEnd); robinText.style.transition = 'none'; robinText.textContent = robinDefaultText; robinText.style.opacity = 1; }; robinText.addEventListener('transitionend', onEnd); }, duration); }

    function processReferral() {
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');
        if (ref && ref !== myPubkey) {
            let contacts = JSON.parse(localStorage.getItem('robinhood_contacts') || '[]');
            if (!contacts.some(c => c.pubkey === ref)) {
                const tempName = ref.slice(0,8);
                contacts.push({ name: tempName, pubkey: ref, avatar: 'assets/avatars/001-.png', status: 'confirmed' });
                localStorage.setItem('robinhood_contacts', JSON.stringify(contacts));
                loadContacts();
                fetchAndUpdateContactMeta(ref);
                initiateKeyExchange(ref);
                updateRobinStatus(`Контакт ${tempName} добавлен по ссылке`, 3000);
                if (pool) {
                    const friendEvent = { kind: 10000, pubkey: myPubkey, created_at: Math.floor(Date.now()/1000), tags: [['p', ref]], content: JSON.stringify({ name: myNick.textContent, avatar: profileAvatar.src }) };
                    try { friendEvent.id = nostr.getEventHash(friendEvent); friendEvent.sig = nostr.signEvent(friendEvent, nostr.hexDecode(myPrivkey)); pool.publish(friendEvent, [bestRelay || relays[0]]); } catch(e) {}
                }
            }
        }
    }

    window.addEventListener('load', () => { loadKeys(); startNostrConnection(); if (toggleHistory.checked) loadHistory(); processReferral(); });
    window.addEventListener('pagehide', () => { if (!toggleHistory.checked) document.querySelectorAll('.message-row:not(#robin-row)').forEach(m => m.remove()); if (pool) pool.close(); });
    window.addEventListener('pageshow', () => startNostrConnection());
</script>
