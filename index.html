        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { font-size: clamp(14px, 2.5vw, 16px); }
        html,body { margin:0; padding:0; height:100%; overflow:hidden; -webkit-text-size-adjust:100%; }

        body::before { content:""; position:fixed; top:clamp(58px, 13vw, 76px); left:0; width:100%; height:calc(100dvh - clamp(58px, 13vw, 76px) - clamp(54px, 11vw, 70px)); background-image:url('assets/background.webp'); background-size:cover; background-position:center; z-index:0; opacity:0.35; }
        body::after { content:""; position:fixed; top:clamp(58px, 13vw, 76px); left:0; width:100%; height:calc(100dvh - clamp(58px, 13vw, 76px) - clamp(54px, 11vw, 70px)); background:radial-gradient(circle at 50% 40%, rgba(30,40,25,0.5), rgba(10,20,8,0.85)); z-index:0; }
        .header { background:linear-gradient(135deg, rgba(25,35,20,0.96), rgba(15,25,12,0.98)); border-bottom:2px solid var(--border); backdrop-filter:blur(8px); z-index:10; padding:6px 10px; display:flex; flex-direction:column; gap:4px; flex-shrink:0; }
        .header-row-1 { display:flex; align-items:center; gap:6px; }
        .header-title-text { font-size:clamp(1em, 3vw, 1.3em); font-weight:bold; background:linear-gradient(135deg, var(--accent-light), var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .header-shield { font-size:clamp(0.9em, 2.5vw, 1.1em); filter:drop-shadow(0 0 3px var(--accent-glow)); }
        .header-clock { font-size:clamp(0.7em, 2vw, 0.85em); color:var(--accent-light); font-family:monospace; margin-left:auto; }
        .header-row-2 { display:flex; justify-content:space-around; align-items:center; }
        .header-row-3 { display:flex; justify-content:space-around; }
        .header-btn { width:clamp(36px, 8vw, 44px); height:clamp(36px, 8vw, 44px); display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:10px; font-size:clamp(18px, 4vw, 22px); background:var(--btn-bg); border:1px solid var(--btn-border); }
        .header-btn:hover { background:var(--btn-hover); }
        .header-btn img { width:100%; height:100%; object-fit:contain; padding:5px; }
        .header-label { font-size:0.55em; color:var(--text-dim); text-align:center; width:clamp(36px, 8vw, 44px); cursor:pointer; }
        .header-avatar { width:clamp(28px, 6vw, 34px); height:clamp(28px, 6vw, 34px); border-radius:50%; object-fit:cover; border:2px solid var(--border); }
        .chat-area { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; background:rgba(10,18,8,0.35); scrollbar-width:none; z-index:1; }
        .chat-area::-webkit-scrollbar { display:none; }
        .message-row { display:flex; align-items:flex-start; gap:8px; background:var(--msg-bg); backdrop-filter:blur(8px); padding:8px 10px; border-radius:14px; border-left:3px solid var(--msg-accent); animation:messageSlideIn 0.3s ease; }
        @keyframes messageSlideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
        .input-area { background:linear-gradient(135deg, rgba(25,35,20,0.96), rgba(15,25,12,0.98)); backdrop-filter:blur(8px); padding:8px; display:flex; gap:6px; align-items:center; border-top:1px solid var(--border); z-index:1; flex-shrink:0; }
        input, textarea { flex:1; background:var(--input-bg); border:1px solid var(--border); padding:10px 12px; color:var(--text); border-radius:10px; font-size:clamp(14px, 2.5vw, 16px); outline:none; font-family:monospace; min-width:0; }
        input:focus, textarea:focus { border-color:var(--accent-light); box-shadow:0 0 8px var(--accent-glow); background:var(--input-focus); }
        .bow-button { width:clamp(38px, 8vw, 44px); height:clamp(38px, 8vw, 44px); cursor:pointer; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3)); flex-shrink:0; }
        .bow-button:active { transform:scale(0.92); }
        .avatar { width:clamp(38px, 8vw, 44px); height:clamp(38px, 8vw, 44px); border-radius:50%; object-fit:cover; background-color:#2a3a25; flex-shrink:0; border:2px solid var(--border); }
        .msg-body { flex:1; min-width:0; }
        .msg-sender { font-weight:900; color:var(--text-bright); font-size:0.9em; }
        .msg-body div { font-size:0.9em; line-height:1.4; color:var(--text); }
        .msg-status { font-size:0.6em; color:var(--text-dim); text-align:right; margin-top:4px; }
        #robin-row { background:var(--robin-bg); border-left:3px solid var(--robin-accent); position:sticky; top:0; z-index:6; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
        #robin-text { font-weight:700; font-size:0.85em; color:var(--text-bright); }
        .bottom-sheet, .avatar-selector { position:fixed; top:0; left:0; width:min(85%, 380px); height:100%; background:var(--sheet-bg); border-right:2px solid var(--border); z-index:200; transform:translateX(-100%); transition:transform 0.35s ease; overflow-y:auto; backdrop-filter:blur(16px); }
        .bottom-sheet.open, .avatar-selector.show { transform:translateX(0); }
        .bottom-sheet-header { padding:16px; font-weight:bold; color:var(--accent-light); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; }
        .bottom-sheet-close { background:none; border:none; color:var(--accent-light); font-size:22px; cursor:pointer; }
        .bottom-sheet-list { padding:6px 12px; }
        .contact-item { display:flex; align-items:center; justify-content:space-between; padding:10px; margin:5px 0; border-radius:12px; background:rgba(255,245,215,0.05); border:1px solid var(--btn-border); cursor:pointer; }
        .contact-item:hover { background:var(--btn-hover); }
        .contact-info { display:flex; align-items:center; gap:10px; flex:1; }
        .contact-avatar { width:36px; height:36px; border-radius:50%; object-fit:cover; border:2px solid var(--border); }
        .contact-name { font-weight:600; font-size:0.9em; color:var(--accent-light); }
        .delete-contact { background:none; border:none; color:#c97a5a; font-size:18px; cursor:pointer; }
        .avatar-selector { padding:16px; }
        .avatar-selector p { color:var(--accent-light); margin-bottom:12px; text-align:center; }
        #avatar-list { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
        .avatar-option { width:clamp(45px, 10vw, 55px); height:clamp(45px, 10vw, 55px); border-radius:50%; object-fit:cover; cursor:pointer; border:2px solid transparent; }
        .avatar-option:hover { border-color:var(--accent-light); }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--overlay-bg); backdrop-filter:blur(4px); display:none; z-index:190; }
        .overlay.show { display:block; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:300; justify-content:center; align-items:center; }
        .modal-overlay.active { display:flex; }
        .modal-dialog { background:var(--sheet-bg); padding:20px; border-radius:20px; width:85%; max-width:380px; text-align:center; border:2px solid var(--border); }
        .modal-dialog h3 { color:var(--accent-light); margin-bottom:12px; }
        .modal-dialog button { width:100%; padding:12px; margin-top:8px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
        .btn-primary { background:linear-gradient(135deg, var(--accent), #b8903a); color:#1a1f0f; }
        .btn-dark { background:#4a3a2a; color:#eee; }
        .btn-cancel { background:#5a3a2a; color:#eee; }
        .code-display { background:#0a1208; border:1px solid var(--border); color:var(--accent-light); border-radius:10px; padding:10px; font-size:0.75em; word-break:break-all; margin:12px 0; font-family:monospace; user-select:all; }
        .contact-menu { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--sheet-bg); border:2px solid var(--border); border-radius:18px; padding:10px; z-index:400; min-width:220px; }
        .contact-menu-item { padding:10px; cursor:pointer; border-radius:10px; margin-bottom:5px; }
        .contact-menu-item:hover { background:var(--btn-hover); }
        .toggle-switch { position:relative; display:inline-block; width:44px; height:24px; }
        .toggle-switch input { opacity:0; width:0; height:0; }
        .toggle-slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:rgba(255,255,255,0.1); border-radius:24px; border:2px solid var(--border); }
        .toggle-slider:before { content:""; position:absolute; height:16px; width:16px; left:2px; bottom:2px; background:var(--text-dim); border-radius:50%; }
        .toggle-switch input:checked + .toggle-slider { background:#4caf50; }
        .toggle-switch input:checked + .toggle-slider:before { transform:translateX(20px); background:white; }
        .smoke-anim { position:fixed; bottom:50%; left:50%; transform:translate(-50%,50%); width:280px; height:280px; z-index:500; pointer-events:none; animation:smokeRise 3s ease-out forwards; }
        @keyframes smokeRise { 0%{opacity:1;transform:translate(-50%,50%) scale(0.5)} 100%{opacity:0;transform:translate(-50%,-100%) scale(1.5)} }

<script>
// ==================== P2PPong — ЗАГРУЗКА В IFRAME ====================
const P2PPONG_HTML = `
<!DOCTYPE html><html><head><meta charset="UTF-8"><script>
const S=[{id:'render',url:'https://p2ppong-v2.onrender.com'},{id:'workers',url:'https://robincall.stephanclaps-491.workers.dev'}];
const ch={},pt={},ev={};let pid=null,sid=null,rdy=!1;
function rnd(){return crypto.randomUUID?.()||Math.random().toString(36).substr(2)+Date.now().toString(36)}
async function sha256(t){const d=new TextEncoder().encode(t);const h=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}
async function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('PP',1);r.onupgradeneeded=()=>{r.result.createObjectStore('id',{keyPath:'k'})};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function loadPeerId(){if(pid)return pid;try{const db=await openDB();const v=await new Promise(r=>{const q=db.transaction('id','readonly').objectStore('id').get('peerId');q.onsuccess=()=>r(q.result);q.onerror=()=>r(null)});if(v?.v){pid=v.v;return pid}}catch(e){}const fp=[navigator.userAgent,screen.width,screen.height].join('|');let salt=localStorage.getItem('s');if(!salt){salt=rnd();localStorage.setItem('s',salt)}const h=await sha256(fp+'|'+salt);pid=h.substring(0,16);try{const db=await openDB();db.transaction('id','readwrite').objectStore('id').put({k:'peerId',v:pid})}catch(e){}return pid}
async function deriveKey(sec){const h=await sha256(sec);const kb=new TextEncoder().encode(h.substring(0,32));return await crypto.subtle.importKey('raw',kb,{name:'AES-GCM'},false,['encrypt','decrypt'])}
async function encrypt(text,sec){try{const k=await deriveKey(sec);const iv=crypto.getRandomValues(new Uint8Array(12));const enc=new TextEncoder().encode(text);const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,enc);const c=new Uint8Array(iv.length+new Uint8Array(ct).length);c.set(iv);c.set(new Uint8Array(ct),iv.length);return '\\u{1F510}'+btoa(String.fromCharCode(...c))}catch(e){return text}}
async function decrypt(enc,sec){if(!enc||!enc.startsWith('\\u{1F510}'))return null;try{const k=await deriveKey(sec);const c=Uint8Array.from(atob(enc.substring(2)),x=>x.charCodeAt(0));const iv=c.slice(0,12);const ct=c.slice(12);const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},k,ct);return new TextDecoder().decode(dec)}catch(e){return null}}
async function api(srv,method,path,body){const server=S.find(s=>s.id===srv);if(!server)return null;const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),8000);try{const o={method,headers:{'Content-Type':'application/json'},signal:ctrl.signal};if(body)o.body=JSON.stringify(body);const r=await fetch(server.url+path,o);clearTimeout(t);return r.ok?await r.json():null}catch(e){clearTimeout(t);return null}}
function startPoll(sid,srv){if(pt[sid])return;let last=Date.now();const poll=async()=>{const s=srv||ch[sid]?.server;const res=await api(s,'GET','/message?id='+sid+'&since='+last);if(!res?.messages)return;for(const m of res.messages){const c=ch[sid];if(!c)continue;let dec=await decrypt(m.packet,c.sec);if(!dec){try{dec=JSON.parse(m.packet).text||m.packet}catch(e){dec=m.packet}}let sender=null,text=dec;try{const p=JSON.parse(dec);sender=p.sender;text=p.text||dec}catch(e){}if(sender===sid){last=Math.max(last,m.time>9999999999?m.time:m.time*1000);continue}window.parent.postMessage({type:'message',text,channelId:sid,sender},'*');last=Math.max(last,m.time>9999999999?m.time:m.time*1000)}};poll();pt[sid]=setInterval(poll,4000)}
async function createArrow(key){if(!rdy)await init();const kh=await sha256(key);const sec=key;const results=[];for(const s of S){const body=s.id==='workers'?{tempKeyHash:kh,publicId:pid}:{tempKey:key,tempKeyHash:kh,publicId:pid};const res=await api(s.id,'POST','/beacon',body);if(res?.sessionId)results.push({sessionId:res.sessionId,server:s.id})}if(!results.length){window.parent.postMessage({type:'error',text:'Server offline'},'*');return}const primary=results[0];const sid2=primary.sessionId;ch[sid2]={sec,server:primary.server,peerId:pid,last:Date.now()};const link='https://stepweather-prog.github.io/ROBINHOOD-P2P/?id='+sid2+'&servers='+results.map(r=>r.server).join(',')+'&peer='+pid+'&key='+key;window.parent.postMessage({type:'session-created',sessionId:sid2,secret:sec,fullLink:link,peerId:pid,key},'*');let matched=false;const start=Date.now();while(Date.now()-start<90000){const checks=await Promise.all(results.map(r=>api(r.server,'GET','/beacon?id='+r.sessionId)));if(checks.some(c=>c?.matched)){matched=true;break}await new Promise(r=>setTimeout(r,5000))}if(!matched){delete ch[sid2];window.parent.postMessage({type:'error',text:'Timeout'},'*');return}ch[sid2].last=Date.now();startPoll(sid2,ch[sid2].server);window.parent.postMessage({type:'channel-open',channelId:sid2,role:'creator',peerId:pid,secret:sec},'*')}
async function acceptArrow(pid2,key){if(!rdy)await init();const kh=await sha256(key);const sec=key;const params=new URLSearchParams(window.location.search);const servers=(params.get('servers')||'render,workers').split(',');const sid2=params.get('id');for(const srv of servers){const body=srv==='workers'?{tempKeyHash:kh}:{tempKey:key};const res=await api(srv,'POST','/find',body);if(res?.status==='matched'){const cid=res.sessionId||sid2;ch[cid]={sec,server:srv,peerId:pid2,last:Date.now()};startPoll(cid,srv);window.parent.postMessage({type:'channel-open',channelId:cid,role:'receiver',peerId:pid2,secret:sec},'*');return}}window.parent.postMessage({type:'error',text:'Not found'},'*')}
async function sendMsg(cid,text){if(!rdy)await init();const c=ch[cid];if(!c){window.parent.postMessage({type:'error',text:'Channel not found',channelId:cid},'*');return}const payload=JSON.stringify({text,sender:sid,time:Date.now()});const encrypted=await encrypt(payload,c.sec);const res=await api(c.server,'POST','/message',{sessionId:cid,packet:encrypted});if(!res){delete ch[cid];clearInterval(pt[cid]);delete pt[cid]}}
async function init(){if(rdy)return;sid=rnd();await loadPeerId();rdy=true;window.parent.postMessage({type:'pong-ready',handshake:sid,peerId:pid},'*')}
window.addEventListener('message',async e=>{const d=e.data;if(d.action==='handshake'){window.parent.postMessage({type:'handshake-ok'},'*')}else if(d.action==='create'){await createArrow(d.tempKey)}else if(d.action==='accept'){await acceptArrow(d.id,d.key)}else if(d.action==='send'){await sendMsg(d.channelId||d.id,d.text)}});
init().catch(e=>{});
<\\/script></head><body></body></html>`;

(function(){

const themes=[{id:'forest',icon:'🌲',name:'Лес'},{id:'sunset',icon:'🌅',name:'Закат'},{id:'ocean',icon:'🌊',name:'Океан'},{id:'rose',icon:'🌹',name:'Роза'},{id:'amber',icon:'🍯',name:'Янтарь'},{id:'mint',icon:'🌿',name:'Мята'},{id:'lavender',icon:'💜',name:'Лаванда'},{id:'cherry',icon:'🍒',name:'Вишня'},{id:'emerald',icon:'💚',name:'Изумруд'},{id:'slate',icon:'🪨',name:'Сланец'},{id:'coral',icon:'🪸',name:'Коралл'},{id:'plum',icon:'🫐',name:'Слива'}];

const avatars=['assets/avatars/001-.png','assets/avatars/002--1.png','assets/avatars/003-icon-8033085.png','assets/avatars/009--7.png','assets/avatars/018--16.png','assets/avatars/037--35.png','assets/avatars/048--46.png','assets/avatars/066--64.png','assets/avatars/077-icon-8033092.png','assets/avatars/108--83.png','assets/avatars/147-icon-6081840.png','assets/avatars/153-icon-4964924.png','assets/avatars/167-icon-1920840.png','assets/avatars/183-icon-5840846.png','assets/avatars/216-icon-5504960.png','assets/avatars/229-icon-10032172.png','assets/avatars/245-icon-16150697.png','assets/avatars/256--120.png'];

async function getContactsDB(){try{const db=await new Promise((r,j)=>{const req=indexedDB.open('RobinHoodContacts',1);req.onupgradeneeded=()=>{if(!req.result.objectStoreNames.contains('contacts'))req.result.createObjectStore('contacts',{keyPath:'peerId'})};req.onsuccess=()=>r(req.result);req.onerror=()=>j(req.error)});return await new Promise(r=>{const tx=db.transaction('contacts','readonly');const req=tx.objectStore('contacts').getAll();req.onsuccess=()=>r(req.result);req.onerror=()=>r([])})}catch(e){return[]}}

async function getMediaStream(){try{return await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:!0,noiseSuppression:!0}})}catch(e){return null}}
function createPC(){if(pc){pc.close();pc=null}pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));pc.ontrack=e=>{if(e.streams[0]){const a=new Audio();a.srcObject=e.streams[0];a.play().catch(()=>{})}};pc.onicecandidate=e=>{if(e.candidate&&currentChannelId)sendToPong({action:'send',text:'__ICE__'+JSON.stringify(e.candidate),channelId:currentChannelId})};pc.onconnectionstatechange=()=>{if(pc.connectionState=='connected'){callActive=!0;E.callStatus.textContent='✅ Разговор';E.callAccept.style.display='none';E.callReject.style.display='none';E.callEnd.style.display='inline-block';playSound('open.mp3')}if(pc.connectionState=='disconnected'||pc.connectionState=='failed')hang(!1)};return pc}

async function startCall(){if(callActive||!currentChannelId){rMsg('❌ Нет канала',3000);return}const s=await getMediaStream();if(!s)return;localStream=s;createPC();showCallPanel(!0);E.callStatus.textContent='📞 Вызов...';E.callAccept.style.display='none';E.callReject.style.display='none';E.callEnd.style.display='inline-block';playSound('Welk.mp3');try{const o=await pc.createOffer();await pc.setLocalDescription(o);sendToPong({action:'send',text:'__OFFER__'+JSON.stringify(o),channelId:currentChannelId})}catch(e){hang(!0)}}
async function acceptCall(){if(!incomingOffer||!currentChannelId)return;const s=await getMediaStream();if(!s)return;localStream=s;createPC();showCallPanel(!0);E.callStatus.textContent='✅ Разговор';E.callAccept.style.display='none';E.callReject.style.display='none';E.callEnd.style.display='inline-block';try{await pc.setRemoteDescription(new RTCSessionDescription(incomingOffer));const a=await pc.createAnswer();await pc.setLocalDescription(a);sendToPong({action:'send',text:'__ANSWER__'+JSON.stringify(a),channelId:currentChannelId});incomingOffer=null;callActive=!0}catch(e){hang(!0)}}
function hang(sig=!0){callActive=!1;if(sig&&currentChannelId)sendToPong({action:'send',text:'__HANGUP__',channelId:currentChannelId});if(pc){pc.close();pc=null}if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null}incomingOffer=null;showCallPanel(!1);E.callAccept.style.display='none';E.callReject.style.display='none';E.callEnd.style.display='none';playSound('exet.mp3')}

function sendToPong(msg){const frame=document.getElementById('pong-frame');if(frame&&frame.contentWindow)frame.contentWindow.postMessage(msg,'*')}

async function destroySession(){if(!confirm('⚠ ПОЛНЫЙ СБРОС!\n\nВсе данные будут удалены.\nПродолжить?'))return;hang(!1);currentChannelId=null;const dbs=['PP','RobinHoodContacts'];for(const name of dbs){try{await new Promise(r=>{const req=indexedDB.deleteDatabase(name);req.onsuccess=()=>r();req.onerror=()=>r()})}catch(e){}}localStorage.clear();E.chatBox.querySelectorAll('.message-row:not(#robin-row)').forEach(m=>m.remove());const smoke=document.createElement('div');smoke.className='smoke-anim';document.body.appendChild(smoke);if(typeof lottie!='undefined'){lottie.loadAnimation({container:smoke,renderer:'canvas',loop:false,autoplay:true,path:'assets/smoke.json'})}rMsg('🔥 Всё уничтожено!',5000);applyTheme('forest');if(E.profileAvatarSmall)E.profileAvatarSmall.src='assets/avatars/001-.png';document.getElementById('robin-avatar').src='assets/avatars/231-icon-11433690.png';if(E.nickLabel)E.nickLabel.textContent='Твой ник';if(E.lockStatusEl)E.lockStatusEl.textContent='Не задан';loadContacts();setTimeout(()=>{if(smoke.parentNode)smoke.remove()},5000)}

// ========== INIT ==========
async function initApp(){
    applyTheme(localStorage.getItem('robinhood_theme')||'forest');
    const savedAvatar=localStorage.getItem('robinhood_avatar');if(savedAvatar&&E.profileAvatarSmall){E.profileAvatarSmall.src=savedAvatar;document.getElementById('robin-avatar').src=savedAvatar}
    const savedNick=localStorage.getItem('robinhood_nick');if(savedNick&&E.nickLabel)E.nickLabel.textContent=savedNick.substring(0,12);
    toggleSoundState=localStorage.getItem('robinhood_sound')!=='false';if(E.toggleSound)E.toggleSound.checked=toggleSoundState;

    // Приём сообщений от Понга через postMessage
    window.addEventListener('message',async e=>{
        const d=e.data;if(!d||!d.type)return;
        if(d.type==='session-created'){currentChannelId=d.sessionId;if(E.refLinkDisplay)E.refLinkDisplay.textContent=d.fullLink;E.refModal?.classList.add('active');navigator.clipboard.writeText(d.fullLink).catch(()=>{})}
        else if(d.type==='channel-open'){currentChannelId=d.channelId;rMsg('✅ Канал открыт!',3000);E.refModal?.classList.remove('active');const contacts=await getContactsDB();if(!contacts.find(c=>c.peerId===d.peerId))await saveContactDB({peerId:d.peerId,name:'Лучник',avatar:'assets/avatars/001-.png'})}
        else if(d.type==='message'&&d.text){
            if(d.text.indexOf('__')===0){
                if(d.text.startsWith('__OFFER__')){if(callActive||pc){sendToPong({action:'send',text:'__HANGUP__',channelId:d.channelId});return}try{incomingOffer=JSON.parse(d.text.replace('__OFFER__',''));showCallPanel(!0);E.callStatus.textContent='📞 Входящий...';E.callAccept.style.display='inline-block';E.callReject.style.display='inline-block';E.callEnd.style.display='none';playSound('melodi.mp3')}catch(e){}return}
                if(d.text.startsWith('__ANSWER__')&&pc){try{await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(d.text.replace('__ANSWER__',''))));callActive=!0;E.callStatus.textContent='✅ Разговор';E.callAccept.style.display='none';E.callReject.style.display='none';E.callEnd.style.display='inline-block'}catch(e){}return}
                if(d.text.startsWith('__ICE__')&&pc){try{pc.addIceCandidate(new RTCIceCandidate(JSON.parse(d.text.replace('__ICE__','')))).catch(()=>{})}catch(e){}return}
                if(d.text=='__HANGUP__'){if(callActive||pc){rMsg('📞 Собеседник завершил',3000);hang(!1)}return}
                return}
            currentChannelId=d.channelId;const contacts=await getContactsDB();const contact=contacts.find(c=>c.peerId===d.sender);appendMessage(contact?.name||'Друг',d.text,contact?.avatar||'assets/avatars/001-.png');if(toggleSoundState)playSound('bow_shot.mp3')}
        else if(d.type==='error'){rMsg('⚠ '+(d.text||'Ошибка'),4000)}
    });

    function sendMsgHandler(){const text=E.msgInput.value.trim();if(!text)return;if(!currentChannelId){rMsg('❌ Создайте стрелу (🏹)',3000);return}sendToPong({action:'send',text,channelId:currentChannelId});appendMessage('Вы',text,E.profileAvatarSmall?.src||'assets/avatars/001-.png');E.msgInput.value='';if(toggleSoundState)playSound('shot.mp3')}

    E.sendBtn?.addEventListener('click',sendMsgHandler);
    E.msgInput?.addEventListener('keypress',e=>{if(e.key=='Enter')sendMsgHandler()});
    document.getElementById('btn-arrow')?.addEventListener('click',()=>{const tempKey=crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).substr(2)+Date.now().toString(36);sendToPong({action:'create',tempKey})});
    document.getElementById('btn-clear')?.addEventListener('click',()=>{E.chatBox.querySelectorAll('.message-row:not(#robin-row)').forEach(m=>m.remove());playSound('clear cache.mp3');rMsg('🚬 Всё скурили!',5000)});
    document.getElementById('btn-avatar')?.addEventListener('click',()=>{closeSheets();loadAvatars();E.avatarSelector?.classList.add('show');E.overlay?.classList.add('show')});
    document.getElementById('btn-settings')?.addEventListener('click',()=>{closeSheets();E.settingsSheet?.classList.add('open');E.overlay?.classList.add('show')});
    document.getElementById('settings-close')?.addEventListener('click',closeSheets);
    document.getElementById('contacts-close')?.addEventListener('click',closeSheets);
    document.getElementById('setting-contacts')?.addEventListener('click',()=>{E.settingsSheet?.classList.remove('open');loadContacts();E.contactsSheet?.classList.add('open');E.overlay?.classList.add('show')});
    E.overlay?.addEventListener('click',closeSheets);
    E.nickLabel?.addEventListener('click',async()=>{const n=prompt('🏷 Твой ник (макс. 12 символов)',E.nickLabel.textContent);if(n){E.nickLabel.textContent=n.substring(0,12);localStorage.setItem('robinhood_nick',n.substring(0,12))}});
    document.getElementById('setting-theme')?.addEventListener('click',()=>{const ct=localStorage.getItem('robinhood_theme')||'forest';const idx=themes.findIndex(t=>t.id==ct);applyTheme(themes[(idx+1)%themes.length].id)});
    document.getElementById('setting-destroy')?.addEventListener('click',()=>{closeSheets();destroySession()});
    document.getElementById('cancel-arrow-btn')?.addEventListener('click',()=>E.refModal?.classList.remove('active'));
    document.getElementById('close-ref-modal-btn')?.addEventListener('click',()=>E.refModal?.classList.remove('active'));
    document.getElementById('share-ref-link-btn')?.addEventListener('click',()=>{const link=E.refLinkDisplay?.textContent;if(link)navigator.clipboard.writeText(link).then(()=>rMsg('📋 Скопировано!')).catch(()=>{})});
    document.getElementById('btn-call')?.addEventListener('click',()=>{if(callActive)hang(!0);else startCall()});
    E.callAccept?.addEventListener('click',acceptCall);
    E.callReject?.addEventListener('click',()=>{if(incomingOffer){sendToPong({action:'send',text:'__HANGUP__',channelId:currentChannelId});incomingOffer=null;showCallPanel(!1)}});
    E.callEnd?.addEventListener('click',()=>hang(!0));
    if(E.toggleSound)E.toggleSound.addEventListener('change',function(){toggleSoundState=this.checked;localStorage.setItem('robinhood_sound',toggleSoundState)});
    document.getElementById('setting-lock')?.addEventListener('click',()=>{if(lockType){if(confirm('Сбросить блокировку?')){localStorage.removeItem('robinhood_lock_v2');lockType=null;lockPinHash='';lockPatternHash='';if(E.lockStatusEl)E.lockStatusEl.textContent='Не задан'}return}isSettingUp=!0;tempPinHash='';tempPatternHash='';lockScreen.style.display='flex';appContainer.style.display='none';setupLockUI()});
    window.addEventListener('online',()=>rMsg('🌐 Сеть',2000));
    window.addEventListener('offline',()=>rMsg('⚠️ Офлайн',0));

    const params=new URLSearchParams(window.location.search);const refId=params.get('id'),refKey=params.get('key');
    if(refId&&refKey){rMsg('🔄 Подключаюсь...',0);setTimeout(()=>sendToPong({action:'accept',id:refId,key:refKey}),500)}
    rMsg('🏹 Ждём колчан...',0);
}

// Блокировка
const LOCK_KEY='robinhood_lock_v2';let lockType=null,lockPinHash='',lockPatternHash='',pinInput='',patternInput=[],isSettingUp=!1,tempPinHash='',tempPatternHash='',failedAttempts=0;
const lockScreen=document.getElementById('lock-screen'),appContainer=document.getElementById('app-container'),lockSubtitle=document.getElementById('lock-subtitle'),lockPinDots=document.getElementById('lock-pin-dots'),lockNumpad=document.getElementById('lock-numpad'),lockPatternCanvas=document.getElementById('lock-pattern-canvas'),lockError=document.getElementById('lock-error');
const patternCtx=lockPatternCanvas?.getContext('2d'),patternPoints=[{x:70,y:70},{x:140,y:70},{x:210,y:70},{x:70,y:140},{x:140,y:140},{x:210,y:140},{x:70,y:210},{x:140,y:210},{x:210,y:210}];

async function loadLockSettings(){const saved=JSON.parse(localStorage.getItem(LOCK_KEY)||'null');if(saved){lockType=saved.type;lockPinHash=saved.pinHash||'';lockPatternHash=saved.patternHash||''}failedAttempts=0;if(!lockType){lockScreen.style.display='none';appContainer.style.display='flex';initApp()}else{lockScreen.style.display='flex';appContainer.style.display='none';setupLockUI()}}
function setupLockUI(){document.querySelectorAll('.lock-tab').forEach(t=>t.classList.remove('active'));if(lockType=='pin'){document.querySelector('[data-tab="pin"]').classList.add('active');document.getElementById('lock-pin-section').style.display='';document.getElementById('lock-pattern-section').style.display='none';drawNumpad();updatePinDots();lockSubtitle.textContent=isSettingUp?'Задайте пин-код':'Введите пин-код'}else{document.querySelector('[data-tab="pattern"]').classList.add('active');document.getElementById('lock-pin-section').style.display='none';document.getElementById('lock-pattern-section').style.display='';drawPatternGrid();lockSubtitle.textContent=isSettingUp?'Нарисуйте ключ':'Нарисуйте ключ'}lockError.textContent='';pinInput='';patternInput=[];updatePinDots();drawPatternGrid()}
function drawNumpad(){lockNumpad.innerHTML='';for(let i=1;i<=9;i++){const btn=document.createElement('button');btn.className='lock-num';btn.textContent=i;btn.addEventListener('click',()=>{if(pinInput.length>=4)return;pinInput+=i;updatePinDots();if(pinInput.length==4)verifyPin()});lockNumpad.appendChild(btn)}const btn0=document.createElement('button');btn0.className='lock-num zero';btn0.textContent='0';btn0.addEventListener('click',()=>{if(pinInput.length>=4)return;pinInput+='0';updatePinDots();if(pinInput.length==4)verifyPin()});lockNumpad.appendChild(btn0);const btnDel=document.createElement('button');btnDel.className='lock-num';btnDel.textContent='⌫';btnDel.addEventListener('click',()=>{pinInput=pinInput.slice(0,-1);updatePinDots()});lockNumpad.appendChild(btnDel)}
function updatePinDots(){const dots=lockPinDots.querySelectorAll('.lock-pin-dot');dots.forEach((d,i)=>d.classList.toggle('filled',i<pinInput.length))}
async function sha256Hash(text){const d=new TextEncoder().encode(text);const h=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}
async function verifyPin(){if(isSettingUp){if(!tempPinHash){tempPinHash=await sha256Hash(pinInput);pinInput='';updatePinDots();lockSubtitle.textContent='Повторите пин-код'}else{const h=await sha256Hash(pinInput);if(h===tempPinHash)await saveLock('pin',h,'');else{lockError.textContent='Не совпадают';tempPinHash='';pinInput='';updatePinDots();lockSubtitle.textContent='Задайте пин-код'}}}else{const h=await sha256Hash(pinInput);if(h===lockPinHash){failedAttempts=0;unlock()}else{failedAttempts++;pinInput='';updatePinDots();if(failedAttempts>=3){destroySession();lockScreen.style.display='none';appContainer.style.display='flex';initApp()}else{lockError.textContent='Неверно. Осталось: '+(3-failedAttempts)}}}}
function drawPatternGrid(hl=[]){if(!patternCtx)return;const w=lockPatternCanvas.width,h=lockPatternCanvas.height;patternCtx.clearRect(0,0,w,h);patternCtx.fillStyle='rgba(0,0,0,0.3)';patternCtx.fillRect(0,0,w,h);patternPoints.forEach((p,i)=>{patternCtx.beginPath();patternCtx.arc(p.x,p.y,18,0,Math.PI*2);patternCtx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--border').trim()||'#c4a24b';patternCtx.lineWidth=2;patternCtx.stroke();if(hl.includes(i)){patternCtx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--accent-light').trim()||'#e8d5a3';patternCtx.fill()}});if(hl.length>1){patternCtx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--accent-light').trim()||'#e8d5a3';patternCtx.lineWidth=3;patternCtx.beginPath();patternCtx.moveTo(patternPoints[hl[0]].x,patternPoints[hl[0]].y);for(let i=1;i<hl.length;i++)patternCtx.lineTo(patternPoints[hl[i]].x,patternPoints[hl[i]].y);patternCtx.stroke()}}
function getPatternPoint(x,y){for(let i=0;i<patternPoints.length;i++){const p=patternPoints[i];if(Math.sqrt((x-p.x)**2+(y-p.y)**2)<25)return i}return-1}
lockPatternCanvas?.addEventListener('pointerdown',e=>{patternInput=[];const rect=lockPatternCanvas.getBoundingClientRect();const pt=getPatternPoint(e.clientX-rect.left,e.clientY-rect.top);if(pt>=0)patternInput.push(pt);drawPatternGrid(patternInput)});
lockPatternCanvas?.addEventListener('pointermove',e=>{if(patternInput.length==0)return;const rect=lockPatternCanvas.getBoundingClientRect();const pt=getPatternPoint(e.clientX-rect.left,e.clientY-rect.top);if(pt>=0&&!patternInput.includes(pt))patternInput.push(pt);drawPatternGrid(patternInput)});
lockPatternCanvas?.addEventListener('pointerup',()=>{if(patternInput.length>=3)verifyPattern();else{lockError.textContent='Минимум 3 точки';patternInput=[];drawPatternGrid()}});
async function verifyPattern(){if(isSettingUp){if(!tempPatternHash){tempPatternHash=await sha256Hash(patternInput.sort().join(','));patternInput=[];drawPatternGrid();lockSubtitle.textContent='Повторите ключ'}else{const h=await sha256Hash(patternInput.sort().join(','));if(h===tempPatternHash)await saveLock('pattern','',h);else{lockError.textContent='Не совпадают';tempPatternHash='';patternInput=[];drawPatternGrid();lockSubtitle.textContent='Нарисуйте ключ'}}}else{const h=await sha256Hash(patternInput.sort().join(','));if(h===lockPatternHash){failedAttempts=0;unlock()}else{failedAttempts++;patternInput=[];drawPatternGrid();if(failedAttempts>=3){destroySession();lockScreen.style.display='none';appContainer.style.display='flex';initApp()}else{lockError.textContent='Неверно. Осталось: '+(3-failedAttempts)}}}}
async function saveLock(type,pinHash,patternHash){lockType=type;lockPinHash=pinHash||'';lockPatternHash=patternHash||'';localStorage.setItem(LOCK_KEY,JSON.stringify({type,pinHash:lockPinHash,patternHash:lockPatternHash}));isSettingUp=!1;tempPinHash='';tempPatternHash='';pinInput='';patternInput=[];failedAttempts=0;if(E.lockStatusEl)E.lockStatusEl.textContent=type=='pin'?'Пин-код':'Граф. ключ';unlock()}
function unlock(){lockScreen.style.display='none';appContainer.style.display='flex';initApp()}
document.getElementById('lock-tabs')?.addEventListener('click',e=>{if(e.target.classList.contains('lock-tab')){lockType=e.target.dataset.tab;setupLockUI()}});

loadLockSettings();
})();
</script>
